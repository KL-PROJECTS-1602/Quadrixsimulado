recadar ou administrar bens e valores públicos ou pelos quais a União responda, ou que, em nome desta, assuma obrigações de natureza pecuniária.", "c": "advogado_11:10"}, {"p": "advogado_11", "n": 88, "a": "direito", "t": "São formas de provimento de cargo público: a  nomeação; a promoção; a readaptação; a reversão; o aproveitamento; a reintegração; e a recondução.", "c": "advogado_11:10"}, {"p": "advogado_11", "n": 89, "a": "direito", "t": "A responsabilidade civil decorre de ato omissivo ou  comissivo, doloso ou culposo, que resulte em prejuízo ao erário ou a terceiros, sendo que as sanções civis, penais e administrativas podem cumular‑se, sendo independentes entre si.", "c": "advogado_11:10"}, {"p": "advogado_11", "n": 90, "a": "direito", "t": "O prazo para a conclusão do processo disciplinar  não excederá 120 dias, contados da constituição da comissão, admitida prorrogação por igual prazo.", "c": "advogado_11:10"}, {"p": "advogado_11", "n": 91, "a": "direito", "t": "Não comete ato ilícito o titular de direito que,  ao exercê‑lo, exceda os limites impostos por sua finalidade econômica.", "c": "advogado_11:10"}, {"p": "advogado_11", "n": 92, "a": "direito", "t": "A prescrição iniciada contra uma pessoa é  interrompida quando ocorre a sucessão.", "c": "advogado_11:10"}, {"p": "advogado_11", "n": 93, "a": "direito", "t": "Tem domicílio necessário o incapaz, o servidor público,  o militar, o marítimo e o preso.", "c": "advogado_11:10"}, {"p": "advogado_11", "n": 94, "a": "direito", "t": "Constitui universalidade, de fato, a pluralidade de bens  singulares que, pertinentes à mesma pessoa, tenham destinação unitária, sendo que esses bens podem ser objeto de relações jurídicas próprias.", "c": "advogado_11:10"}, {"p": "advogado_11", "n": 95, "a": "direito", "t": "Os negócios jurídicos benéficos e a renúncia  interpretam‑se estritamente.", "c": "advogado_11:10"}, {"p": "advogado_11", "n": 96, "a": "direito", "t": "Podem se casar os ascendentes com os descendentes  de 3º grau, por parentesco civil.", "c": "advogado_11:11"}, {"p": "advogado_11", "n": 97, "a": "direito", "t": "Estabelecimento público ou privado é obrigado a  prestar informações aos genitores sobre os filhos menores destes, sob pena de multa diária.", "c": "advogado_11:11"}, {"p": "advogado_11", "n": 98, "a": "direito", "t": "A confissão materna é suficiente para excluir a  paternidade, sendo que cabe ao marido o direito de contestar a paternidade dos filhos nascidos de sua mulher, por ação imprescritível.", "c": "advogado_11:11"}, {"p": "advogado_11", "n": 99, "a": "direito", "t": "Com o casamento, a união estável ou o concubinato  do credor, cessa o dever de prestar alimentos. Prova aplicada  Advogado CONSELHO REGIONAL DE MEDICINA DO ESTADO DE RORAIMA Quadrix | 2024 6", "c": "advogado_11:11"}, {"p": "advogado_11", "n": 100, "a": "direito", "t": "Quando o curador for o cônjuge, não será obrigado à  prestação de contas.", "c": "advogado_11:11"}, {"p": "advogado_11", "n": 101, "a": "direito", "t": "A alienação em fraude à execução é eficaz em relação  ao exequente.", "c": "advogado_11:12"}, {"p": "advogado_11", "n": 102, "a": "direito", "t": "A execução pode ser instaurada caso o devedor deixe  de satisfazer a obrigação certa e líquida ainda que não esteja consubstanciada em título executivo.", "c": "advogado_11:12"}, {"p": "advogado_11", "n": 103, "a": "direito", "t": "A cobrança de multas por litigância de má‑fé ou de  prática de ato atentatório à dignidade da justiça será promovida em autos apartados.", "c": "advogado_11:12"}, {"p": "advogado_11", "n": 104, "a": "direito", "t": "No procedimento de jurisdição voluntária, o juiz  não é obrigado a observar critério de legalidade estrita, podendo adotar a solução mais conveniente ou oportuna.", "c": "advogado_11:12"}, {"p": "advogado_11", "n": 105, "a": "direito", "t": "Em regra, a execução por quantia certa realiza‑se pela  expropriação de bens do executado, podendo ocorrer por adjudicação, alienação, apropriação de frutos e rendimentos de empresa.", "c": "advogado_11:12"}, {"p": "advogado_11", "n": 106, "a": "direito", "t": "Em regra, a solidariedade não exonera todos os  obrigados na hipótese de isenção ou de remissão de crédito.", "c": "advogado_11:13"}, {"p": "advogado_11", "n": 107, "a": "direito", "t": "A responsabilidade por infração da legislação tributária  independe da intenção do agente e da efetividade, da natureza e da extensão dos efeitos do ato.", "c": "advogado_11:13"}, {"p": "advogado_11", "n": 108, "a": "direito", "t": "Prescreve em cinco anos a ação anulatória da  decisão administrativa que denegou a restituição por pagamento indevido.", "c": "advogado_11:13"}, {"p": "advogado_11", "n": 109, "a": "direito", "t": "A isenção tributária dispensa o cumprimento das  obrigações acessórias dependentes da obrigação principal cujo crédito seja excluído.", "c": "advogado_11:13"}, {"p": "advogado_11", "n": 110, "a": "direito", "t": "A certidão de que conste a existência de créditos  não vencidos, em curso de cobrança executiva com penhora, ou cuja exigibilidade esteja suspensa, terá os mesmos efeitos da certidão negativa. Em relação ao direito do trabalho e ao que prevê a CLT,", "c": "advogado_11:13"}, {"p": "advogado_11", "n": 111, "a": "direito", "t": "A suspensão do empregado por mais de 30 dias  seguidos importa na rescisão injusta do contrato de trabalho.", "c": "advogado_11:13"}, {"p": "advogado_11", "n": 112, "a": "direito", "t": "O empregado não pode se desligar do contrato,  sem justa causa, sob pena de indenizar em dobro o empregador pelos prejuízos.", "c": "advogado_11:13"}, {"p": "advogado_11", "n": 113, "a": "direito", "t": "A prática constante de jogos de azar constitui  justa causa para rescisão do contrato de trabalho pelo empregador.", "c": "advogado_11:13"}, {"p": "advogado_11", "n": 114, "a": "direito", "t": "Após cada período de 1 ano de vigência do contrato,  o empregado terá direito a férias de 6 dias corridos, quando houver tido de 24 a 32 faltas.", "c": "advogado_11:13"}, {"p": "advogado_11", "n": 115, "a": "direito", "t": "Não integram o salário as comissões pagas  pelo empregador. Quantas às provas no direito processual do trabalho, ao rito", "c": "advogado_11:13"}, {"p": "advogado_11", "n": 116, "a": "direito", "t": "Os dissídios individuais cujo valor não exceda  a 40 vezes o salário mínimo se submetem ao procedimento sumaríssimo, inclusive quando for parte a Administração Pública Direta, autárquica e fundacional.", "c": "advogado_11:14"}, {"p": "advogado_11", "n": 117, "a": "direito", "t": "No procedimento sumaríssimo, não se fará citação  por edital, incumbindo ao autor a correta indicação do nome e do endereço do reclamado.", "c": "advogado_11:14"}, {"p": "advogado_11", "n": 118, "a": "direito", "t": "Todas as provas serão produzidas na audiência  de instrução e de julgamento, desde que requeridas previamente.", "c": "advogado_11:14"}, {"p": "advogado_11", "n": 119, "a": "direito", "t": "A testemunha que for parente até o terceiro grau civil  de qualquer das partes não prestará compromisso, e seu depoimento valerá como simples informação.", "c": "advogado_11:14"}, {"p": "advogado_11", "n": 120, "a": "direito", "t": "As partes devem indicar perito ou técnico em comum. RASCUNHO Prova aplicada", "c": "advogado_11:14"}, {"p": "advogado_118", "n": 1, "a": "portugues", "t": "O meio ambiente, a saúde da população, os homens e  as mulheres são igualmente afetados pela prática do garimpo ilegal.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 2, "a": "portugues", "t": "A violência decorrente da prática do garimpo ilegal  tem crescido entre os homens.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 3, "a": "portugues", "t": "O acesso ao celular e à Internet pela população  indígena representa um grande avanço para a comunidade local.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 4, "a": "portugues", "t": "As mulheres são as mais afetadas pela prática  do garimpo ilegal, por serem mais vulneráveis ao aliciamento.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 5, "a": "portugues", "t": "A restrição de circulação no território é uma grave  consequência do garimpo ilegal para as mulheres indígenas.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 6, "a": "portugues", "t": "O período “Enquanto os homens, especialmente os  mais jovens, estão mais vulneráveis ao aliciamento e à exploração do seu trabalho em troca de alimentos, celulares, álcool ou parte da produção, as mulheres raramente são integradas desse modo no ciclo econômico do garimpo ilegal” (linhas de 4 a 9) poderia ser reescrito, mantendo‑se a correção gramatical e o sentido original do texto, da seguinte forma: Os homens – os mais jovens, em especial – estão mais vulneráveis ao aliciamento e à exploração do seu trabalho em troca de alimentos, celulares, álcool ou parte da produção, ao passo que as mulheres dificilmente são integradas no ciclo econômico do garimpo ilegal da mesma maneira.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 7, "a": "portugues", "t": "A forma verbal “usufruindo” (linha 12) tem no texto  sentido equivalente ao de desfrutando.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 8, "a": "portugues", "t": "A expressão “o que” em “o que pode afetar sua  capacidade de buscar alimentos, água ou acessar serviços de saúde, assim como de exercer seus papéis e funções sociais” (linhas de 16 a 18) faz referência à expressão “violência sexual” (linha 16).", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 9, "a": "portugues", "t": "A substituição da forma verbal “criando” (linha 20) por  e cria manteria a correção gramatical e os sentidos do texto.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 11, "a": "portugues", "t": "Atribui‑se o fenômeno da feminização do mercado  de trabalho à queda nas taxas de fecundidade e ao aumento das taxas de escolaridade femininas.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 12, "a": "portugues", "t": "A diferença salarial entre os gêneros, segundo  a teoria econômica tradicional, não era um acontecimento provável.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 13, "a": "portugues", "t": "A palavra “então” (linha 8) remete ao momento  em que teve início “a queda nas taxas de fecundidade e o aumento das taxas de escolaridade femininas” (linhas de 5 a 7).", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 14, "a": "portugues", "t": "A expressão “as diferenças salariais” (linha 9)  funciona sintaticamente como sujeito da forma verbal “começaram” (linha 8).", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 15, "a": "portugues", "t": "O trecho “se porventura existissem diferenças salariais  entre trabalhadores igualmente produtivos” (linhas 14 e 15) poderia ser reescrito, com manutenção das ideias e da correção gramatical do texto, da seguinte forma: se fosse o caso de haverem diferenças salariais entre trabalhadores igualmente produtivos.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 16, "a": "portugues", "t": "A substituição do advérbio “decerto” (linha 18) por  possivelmente manteria a correção gramatical do texto, mas não o sentido original.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 17, "a": "portugues", "t": "A omissão da vírgula que se segue à oração “Sendo  assim” (linha 24) manteria a correção gramatical do texto.", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 18, "a": "portugues", "t": "É facultativo o emprego de vírgulas para isolar a  expressão “por exemplo” (linha 28). De acordo com o Manual de Redação da Presidência da", "c": "advogado_118:1"}, {"p": "advogado_118", "n": 19, "a": "portugues", "t": "A qualidade básica de todo texto oficial deve ser a  impessoalidade.", "c": "advogado_118:2"}, {"p": "advogado_118", "n": 20, "a": "direito", "t": "O padrão ofício diz respeito a um tipo de diagramação  única para certos documentos oficiais. 1 4 7 10 13 16 19 22 25 28 31  COFFITO ADVOGADO CONSELHO FEDERAL DE FISIOTERAPIA E TERAPIA OCUPACIONAL INSTITUTO QUADRIX – APLICAÇÃO: 2023 3 Um número inteiro é aritmético quando a média de seus divisores positivos também é um número inteiro. Por exemplo, o número 14 é um número aritmético, pois a soma de seus divisores inteiros (1 + 2 + 7 + 14) dividida por", "c": "advogado_118:2"}, {"p": "advogado_118", "n": 21, "a": "matematica", "t": "O número 1 é um número aritmético.", "c": "advogado_118:3"}, {"p": "advogado_118", "n": 22, "a": "matematica", "t": "O número 42 é um número aritmético.", "c": "advogado_118:3"}, {"p": "advogado_118", "n": 23, "a": "matematica", "t": "O número 2.023 é um número aritmético. Um baralho comum é composto de 52 cartas e é dividido em quatro naipes: copas, ouros, espadas e paus. Cada naipe possui 13 cartas, com valores que variam de 2 a 10, além das cartas J (valete), Q (dama), K (rei) e A (ás). Com", "c": "advogado_118:3"}, {"p": "advogado_118", "n": 24, "a": "matematica", "t": "Ao ser selecionada uma carta de um baralho comum  aleatoriamente, a probabilidade de ela ser uma dama de paus será superior a 2%.", "c": "advogado_118:3"}, {"p": "advogado_118", "n": 25, "a": "matematica", "t": "Se uma carta de um baralho comum for selecionada  aleatoriamente, e não for do naipe de copas, a probabilidade de ela ser de ouros ou espadas será de 50%.", "c": "advogado_118:3"}, {"p": "advogado_118", "n": 26, "a": "matematica", "t": "Ao serem selecionadas 2 cartas do baralho  aleatoriamente, a probabilidade de, pelo menos, uma delas ser um ás será inferior a 15%.", "c": "advogado_118:3"}, {"p": "advogado_118", "n": 27, "a": "matematica", "t": "Ao ser selecionada uma carta de um baralho comum  aleatoriamente, a probabilidade de ela ser um 7 ou do naipe ouros será de 17 52. Admitindo‑se a veracidade das proposições “Todo advogado", "c": "advogado_118:3"}, {"p": "advogado_118", "n": 28, "a": "matematica", "t": "A proposição “Paula é doutora ou Felipe é advogado”  é necessariamente verdadeira.", "c": "advogado_118:4"}, {"p": "advogado_118", "n": 29, "a": "matematica", "t": "A proposição “Se Felipe é advogado, então Paula é  doutora” não é necessariamente verdadeira.", "c": "advogado_118:4"}, {"p": "advogado_118", "n": 30, "a": "informatica", "t": "As proposições “Todo advogado é doutor” e “Se não é  doutor, então não é advogado” são equivalentes. RASCUNHO  COFFITO ADVOGADO CONSELHO FEDERAL DE FISIOTERAPIA E TERAPIA OCUPACIONAL INSTITUTO QUADRIX – APLICAÇÃO: 2023 4 Quanto ao programa Microsoft Excel 2013, ao sistema operacional Windows 10 e aos conceitos de redes de", "c": "advogado_118:4"}, {"p": "advogado_123", "n": 1, "a": "portugues", "t": "No texto, a expressão “um representante da grande  nação brasileira” (linha 1) faz referência aos cidadãos do Brasil, de modo geral.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 2, "a": "portugues", "t": "O narrador expressa depreciação quanto ao porteiro  mencionado no primeiro parágrafo, o que se revela sobretudo pelo uso do sufixo –inho em “homenzinho” (linha 6).", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 3, "a": "portugues", "t": "Conforme se depreende do segundo parágrafo, o  narrador estava otimista e acreditava que sua situação de vida mudaria caso ele conseguisse entregar a carta do coronel ao Deputado Castro; porém, após várias tentativas frustradas de encontrar o Deputado, o narrador foi tomado por um estado de angústia, o que se infere do terceiro parágrafo.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 4, "a": "portugues", "t": "O narrador revela ter passado por um estado de solidão,  sendo esta evidenciada, no terceiro parágrafo, pelo uso reiterado do adjetivo “só”, em “Sentia-me só, só naquele grande e imenso formigueiro humano, só, sem parentes, sem amigos, sem conhecidos que uma desgraça pudesse fazer amigos” (linhas 16 e 17).  CONSELHO REGIONAL DE CONTABILIDADE DO PARANÁ INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRC-PR ADVOGADO 2", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 5, "a": "portugues", "t": "Infere-se do trecho “Eu nunca compreendi tanto a  avareza como naqueles dias em que dei alma ao dinheiro, e o senti tão forte para os elementos da nossa felicidade externa ou interna...” (linhas 21 e 22) que o narrador conferia muita importância ao dinheiro por considerá-lo fonte exclusiva de felicidade exterior ou interior.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 6, "a": "portugues", "t": "Depreende-se do último parágrafo que o doutor Felício  era um dos “amigos bons” (linha 29) a que se refere o narrador.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 7, "a": "portugues", "t": "Infere-se do último parágrafo que o gerente do hotel  utilizava anedotas como estratégia para intimidar o narrador.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 8, "a": "portugues", "t": "O último período do texto é, em parte, opinativo, pois  nele o narrador tece uma crítica à onipotência dos escrivães. ____________________________________________________ A respeito dos aspectos gramaticais e dos sentidos do texto", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 9, "a": "portugues", "t": "O prefixo des–, em “desprazer” (linha 5), exprime os  sentidos de intensidade e oposição.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 10, "a": "portugues", "t": "No trecho “Nada de justiça, de pretorias...” (linhas 28 e  29), caso fosse suprimida a vírgula empregada logo após “justiça”, seria mantida a correção gramatical do trecho, mas seu sentido seria alterado.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 11, "a": "portugues", "t": "Na linha 27, o sujeito de “contara-lhe” é “um seu amigo”.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 12, "a": "portugues", "t": "Tanto o trecho “pago o hotel” (linha 8) quanto o trecho  “mal fosse apresentada” (linha 10) expressam circunstância temporal.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 13, "a": "portugues", "t": "Há, no texto, diferentes ocorrências de orações nas  quais o sujeito está posposto ao verbo, como nos seguintes exemplos: “antes mesmo de acabar a pergunta” (linhas 5 e 6), “Não era ele o seu banqueiro para os efeitos eleitorais?” (linha 13) e “tecem os pauzinhos” (linha 32).", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 14, "a": "portugues", "t": "No período em que ocorre, o trecho “o coronel e o  doutor Castro” (linha 14) consiste em um sujeito composto, uma vez que possui dois núcleos.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 15, "a": "portugues", "t": "A supressão da forma “-me”, em “Vinham-me então os  terrores sombrios da falta de dinheiro, da falta absoluta” (linhas 15 e 16), manteria os sentidos e a coerência do trecho.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 16, "a": "portugues", "t": "Seriam mantidos os sentidos e a coerência do texto caso  o vocábulo “tão”, no último período do terceiro parágrafo, fosse substituído por muito.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 17, "a": "portugues", "t": "Na linha 28, o termo “ele”, em “Com ele, era assim”,  retoma “o homem”.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 18, "a": "portugues", "t": "O trecho “é que” (linha 31) poderia ser suprimido sem  prejuízo da coerência do texto.", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 19, "a": "portugues", "t": "No último parágrafo, o termo “as”, que antecede  “farejava” (linha 24), retoma “A minha ignorância de viver” (linha 23) e “a natureza das minhas preocupações” (linhas 23 e 24).", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 20, "a": "informatica", "t": "Caso o adjetivo “grande”, no trecho “Não era ele o seu  grande eleitor?” (linha 13), fosse deslocado para imediatamente após “eleitor”, seria alterado o sentido do texto. ____________________________________________________ Acerca dos tipos de computadores, do Microsoft Excel 2013 e", "c": "advogado_123:1"}, {"p": "advogado_123", "n": 21, "a": "informatica", "t": "O acesso a um supercomputador, geralmente, é  realizado por meio de terminais de vídeo.", "c": "advogado_123:2"}, {"p": "advogado_123", "n": 22, "a": "informatica", "t": "Os microcomputadores, também conhecidos como  computadores pessoais, são usados em aplicações pessoais domésticas e empresariais.", "c": "advogado_123:2"}, {"p": "advogado_123", "n": 23, "a": "informatica", "t": "O Excel 2013 não permite o uso de funções aninhadas,  ou seja, não é possível inserir uma função dentro de outra função.", "c": "advogado_123:2"}, {"p": "advogado_123", "n": 24, "a": "informatica", "t": "No Excel 2013, o usuário poderá ter acesso a uma lista  que contém os últimos arquivos abertos e editados; para isso, é suficiente que o usuário pressione as teclas  + .", "c": "advogado_123:2"}, {"p": "advogado_123", "n": 25, "a": "informatica", "t": "Ao se executar o logoff no Windows 8, todos os arquivos  abertos do usuário são fechados automaticamente, e os programas em execução também são encerrados de imediato. ____________________________________________________ No que se refere ao programa de correio eletrônico Microsoft Outlook 2016, aos conceitos de organização e de gerenciamento de arquivos e programas e aos", "c": "advogado_123:2"}, {"p": "advogado_123", "n": 26, "a": "informatica", "t": "Um dos motivos pelos quais as mensagens podem ficar  retidas na caixa de saída do Outlook 2016 é o fato de possuírem anexo grande.  CONSELHO REGIONAL DE CONTABILIDADE DO PARANÁ INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRC-PR ADVOGADO 3", "c": "advogado_123:3"}, {"p": "advogado_123", "n": 27, "a": "informatica", "t": "O usuário deve ter cautela ao remover uma conta de  e-mail do Outlook 2016, pois essa remoção implica a desativação permanente de sua conta de e-mail junto ao provedor.", "c": "advogado_123:3"}, {"p": "advogado_123", "n": 28, "a": "informatica", "t": "MPEG, AVI, e DivX são exemplos de Codecs de vídeo.", "c": "advogado_123:3"}, {"p": "advogado_123", "n": 29, "a": "informatica", "t": "O formato de imagem GIF (Graphics Interchange  Format) é adequado para imagens que não necessitam de grandes variações de cores e tonalidades.", "c": "advogado_123:3"}, {"p": "advogado_123", "n": 30, "a": "informatica", "t": "É recomendável que as empresas não façam o  alinhamento entre o negócio e a área de segurança, isto é, não misturem essas áreas, pois a segregação entre elas é benéfica e garante a segurança das informações no âmbito da empresa. ____________________________________________________ A Catedral Basílica de Maringá é considerada a mais alta catedral da América Latina. O corpo principal da catedral é um cone de 114 m de altura e 50 m de diâmetro de base.", "c": "advogado_123:3"}, {"p": "advogado_123", "n": 31, "a": "informatica", "t": "O volume total do corpo principal é igual a 71,25 dam3 .", "c": "advogado_123:4"}, {"p": "advogado_123", "n": 32, "a": "informatica", "t": "Se o diâmetro da base da catedral fosse duas vezes  maior, o volume do monumento também seria dobrado.", "c": "advogado_123:4"}, {"p": "advogado_123", "n": 33, "a": "informatica", "t": "Um desenho de um cone de 22,8 cm de altura e 5 cm de  raio da base estaria proporcionalmente correto com relação ao monumento da catedral. ____________________________________________________ Considerando a função ܨሺݔ,  ݕሻ = ݔ௬, em que x e y são", "c": "advogado_123:4"}, {"p": "advogado_123", "n": 34, "a": "informatica", "t": "O primeiro e o último dígito de ܨሺ4,6ሻ são 4 e 6,  respectivamente.", "c": "advogado_123:4"}, {"p": "advogado_123", "n": 36, "a": "informatica", "t": "A única solução de ܨሺݔ,  ݕሻ = 1 é ݔ=ݕ=1.  ____________________________________________________ Em 10 de dezembro de 2022, Cássia Rejane Eller, mais conhecida como Cássia Eller, completaria 60 anos de idade. Uma das maiores vozes da música brasileira, Cássia morreu no dia 29 de dezembro de 2001, em razão de um infarto do", "c": "advogado_123:4"}, {"p": "advogado_123", "n": 38, "a": "informatica", "t": "Cássia Eller morreu aos 40 anos de idade.", "c": "advogado_123:5"}, {"p": "advogado_123", "n": 39, "a": "informatica", "t": "O número de anagramas da palavra “REJANE” que  terminam em E é igual a 120.", "c": "advogado_123:5"}, {"p": "advogado_123", "n": 40, "a": "direito", "t": "Desconsiderando-se o acento, o número de anagramas  da palavra “CÁSSIA” é o sêxtuplo do número de anagramas da palavra “ELLER”.  CONSELHO REGIONAL DE CONTABILIDADE DO PARANÁ INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRC-PR ADVOGADO 4", "c": "advogado_123:5"}, {"p": "advogado_123", "n": 41, "a": "legislacao", "t": "Nas ações de improbidade administrativa, haverá  condenação em honorários sucumbenciais em quaisquer hipóteses, ainda que não seja comprovada má-fé.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 42, "a": "legislacao", "t": "As sentenças penais produzirão efeitos em relação à  ação de improbidade quando concluírem pela absolvição ou por ausência de ilícito penal.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 43, "a": "legislacao", "t": "Na ação por improbidade administrativa, não poderá ser  formulado, em caráter antecedente, pedido de indisponibilidade de bens dos réus.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 44, "a": "direito", "t": "Se houver mais de um réu na ação, a somatória dos  valores declarados indisponíveis não poderá superar o montante indicado na petição inicial como dano ao erário ou como enriquecimento ilícito.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 45, "a": "direito", "t": "Da decisão que deferir ou indeferir a medida relativa à  indisponibilidade de bens caberá recurso em sentido estrito.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 46, "a": "legislacao", "t": "Qualquer pessoa poderá representar à autoridade  administrativa competente para que seja instaurada investigação destinada a apurar a prática de ato de improbidade.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 47, "a": "legislacao", "t": "Em qualquer momento do processo, verificada a  inexistência do ato de improbidade, o juiz julgará a demanda improcedente.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 48, "a": "legislacao", "t": "Via de regra, a identificação do interessado constitui  elemento dispensável para iniciar o processo administrativo.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 49, "a": "legislacao", "t": "Havendo uma pluralidade de interessados, os  requerimentos administrativos deverão ser individualizados, mesmo que tenham conteúdo e fundamentos idênticos. Quanto à Lei n.o 12.527/2011, ao Decreto n.o 7.724/2012 e ao Decreto n.o", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 50, "a": "legislacao", "t": "O acesso à informação de que trata a Lei de Acesso à  Informação compreende, entre outros, o direito de obter a orientação sobre os procedimentos para a consecução de acesso, bem como sobre o local onde poderá ser encontrada ou obtida a informação almejada.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 51, "a": "direito", "t": "As informações relativas a repasses ou transferências de  recursos financeiros devem ser disponibilizadas, na forma da lei, pelos órgãos e pelas entidades, independentemente de requerimento de qualquer interessado.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 52, "a": "legislacao", "t": "O pedido de acesso à informação prescinde de  especificação, de forma clara e precisa, da informação requerida.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 53, "a": "legislacao", "t": "São considerados como dados processados aqueles  submetidos a qualquer operação ou tratamento por meio de processamento eletrônico ou por meio automatizado, com o emprego de tecnologia da informação.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 54, "a": "legislacao", "t": "Na hipótese de a autoridade entender conveniente para  eliminar irregularidade, incerteza jurídica ou situações contenciosas na aplicação do direito público, poderá celebrar compromisso com os interessados, observada a legislação aplicável.", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 55, "a": "legislacao", "t": "A decisão de celebrar o termo de ajustamento de gestão  prescinde de motivação. ____________________________________________________ Em relação a acontecimentos atuais da política, da economia,", "c": "advogado_123:6"}, {"p": "advogado_123", "n": 56, "a": "gerais", "t": "Os efeitos da pandemia agravaram o quadro da  desigualdade no Brasil, e mais da metade dos lares brasileiros sofrem em razão de insegurança alimentar.  CONSELHO REGIONAL DE CONTABILIDADE DO PARANÁ INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRC-PR ADVOGADO 5", "c": "advogado_123:7"}, {"p": "advogado_123", "n": 57, "a": "legislacao", "t": "A fim de tentar reduzir o preço dos combustíveis, o  plenário do Senado aprovou um projeto que altera a regra de incidência do Imposto sobre Operações Relativas à Circulação de Mercadorias (ICMS).", "c": "advogado_123:7"}, {"p": "advogado_123", "n": 58, "a": "legislacao", "t": "A ilegalidade no garimpo ultrapassa terras indígenas no  Brasil, o que fez trabalhadores ilegais alcançarem terras ianomâmis na Venezuela.", "c": "advogado_123:7"}, {"p": "advogado_123", "n": 59, "a": "matematica", "t": "A Eletrobrás, maior empresa brasileira do setor elétrico,  foi privatizada, passando a ser uma corporação de vários acionistas, sem que nenhum deles possua mais de 50% do controle da empresa.", "c": "advogado_123:7"}, {"p": "advogado_123", "n": 60, "a": "gerais", "t": "Diversos fatores influenciam o aumento do preço dos  combustíveis no Brasil, estando um deles ligado à invasão russa à Ucrânia, uma vez que Moscou é um grande produtor e exportador de petróleo e gás.", "c": "advogado_123:7"}, {"p": "advogado_123", "n": 61, "a": "matematica", "t": "Duas causas da perda do valor agregado dos preços das  commodities agrícolas no Brasil pós-pandemia foram as restrições da China a alguns produtos brasileiros e a alta interna das taxas de juros.", "c": "advogado_123:7"}, {"p": "advogado_123", "n": 62, "a": "gerais", "t": "O estreitamento diplomático entre Brasil e Colômbia  aumentou porque, nas últimas eleições colombianas, foi eleito um presidente aliado do atual governo brasileiro.", "c": "advogado_123:7"}, {"p": "advogado_123", "n": 63, "a": "gerais", "t": "A coligação entre o atual presidente colombiano Iván  Duque e o candidato Gustavo Petro fez este último vencer as eleições colombianas, e um dos principais fatores para o êxito eleitoral foi a popularidade de Duque no país.", "c": "advogado_123:7"}, {"p": "advogado_123", "n": 64, "a": "legislacao", "t": "O desaparecimento e o assassinato do indigenista Bruno  Pereira e do jornalista inglês Dom Phillips repercutiram na imprensa internacional e levaram à prisão de suspeitos.", "c": "advogado_123:7"}, {"p": "advogado_123", "n": 65, "a": "informatica", "t": "A varíola dos macacos é uma doença geralmente  encontrada na África Central e na África Ocidental, especificamente, em áreas de floresta tropical, já havendo registros dessa doença no Brasil, com casos monitorados pela equipe de vigilância. ____________________________________________________ Em uma dura mensagem, repleta de argumentos históricos, o presidente russo Vladimir Putin alegou que as terras ancestrais do leste ucraniano são russas.", "c": "advogado_123:7"}, {"p": "advogado_123", "n": 66, "a": "gerais", "t": "A ação militar russa contra a Ucrânia foi iniciada após  Vladimir Putin ter reconhecido como independentes as províncias separatistas de Donetsk e Luhansk.", "c": "advogado_123:x65"}, {"p": "advogado_123", "n": 67, "a": "gerais", "t": "Os primeiros ataques russos à Ucrânia aconteceram na  região leste do país, na região de Donbas, por terra, ar e mar.", "c": "advogado_123:x65"}, {"p": "advogado_123", "n": 68, "a": "gerais", "t": "Seis meses após o início da guerra em território  ucraniano, o primeiro-ministro do Reino Unido e o secretário-geral da Organização do Tratado do Atlântico Norte (Otan) declararam que consideravam essa guerra como um conflito de curto prazo.", "c": "advogado_123:x65"}, {"p": "advogado_123", "n": 69, "a": "gerais", "t": "O vencedor do Nobel da Paz do ano de 2021 é russo e  anunciou que leiloaria a medalha que ganhou como prêmio para ajudar as crianças ucranianas.", "c": "advogado_123:x65"}, {"p": "advogado_123", "n": 70, "a": "gerais", "t": "Os Estados Unidos da América, apesar de ajudarem a  Ucrânia por meio do fornecimento de armas e munições, não forneceram ajuda humanitária para os ucranianos.  CONSELHO REGIONAL DE CONTABILIDADE DO PARANÁ INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRC-PR ADVOGADO 6", "c": "advogado_123:8"}, {"p": "advogado_123", "n": 71, "a": "direito", "t": "No curso da execução fiscal, a certidão de dívida ativa  poderá, a qualquer tempo, ser emendada ou substituída, assegurada ao executado a devolução do prazo para embargos.", "c": "advogado_123:9"}, {"p": "advogado_123", "n": 73, "a": "direito", "t": "É vedado o ajuizamento de execução fiscal em desfavor  do espólio do devedor, devendo a Fazenda Pública habilitar seu crédito no respectivo inventário.", "c": "advogado_123:9"}, {"p": "advogado_123", "n": 74, "a": "matematica", "t": "Na execução fiscal, o executado será citado para, no  prazo de quinze dias, pagar a dívida com os juros, a multa de mora e os encargos indicados na certidão de dívida ativa, ou garantir a execução.", "c": "advogado_123:9"}, {"p": "advogado_123", "n": 75, "a": "direito", "t": "A execução fiscal somente pode ser garantida por meio  de depósito em dinheiro, no valor integral indicado na certidão de dívida ativa.", "c": "advogado_123:9"}, {"p": "advogado_123", "n": 77, "a": "direito", "t": "Não são admissíveis embargos do executado antes de  garantida a execução.", "c": "advogado_123:9"}, {"p": "advogado_123", "n": 78, "a": "direito", "t": "Nos embargos à execução fiscal, o executado deverá  alegar toda matéria útil à defesa, requerer provas e juntar aos autos os documentos e o rol de testemunhas, até cinco, ou, a critério do juiz, até o dobro desse limite.", "c": "advogado_123:9"}, {"p": "advogado_123", "n": 79, "a": "direito", "t": "Se, antes da decisão de primeira instância, a inscrição de  dívida ativa for, a qualquer título, cancelada, a execução fiscal será extinta, sem qualquer ônus para as partes.", "c": "advogado_123:9"}, {"p": "advogado_123", "n": 80, "a": "direito", "t": "O juiz suspenderá o curso da execução fiscal, enquanto  não for localizado o devedor ou não forem encontrados bens sobre os quais possa recair a penhora; nesses casos, não correrá o prazo de prescrição. ____________________________________________________", "c": "advogado_123:9"}, {"p": "advogado_123", "n": 81, "a": "direito", "t": "As fontes materiais do direito do trabalho, sob a  perspectiva sociológica, estão, regra geral, atadas à existência e à evolução do sistema capitalista.", "c": "advogado_123:10"}, {"p": "advogado_123", "n": 82, "a": "direito", "t": "As fontes materiais justrabalhistas, sob o ponto de vista  filosófico, correspondem às ideias e às correntes de pensamento que, articuladamente entre si ou não, influíram na construção e na mudança do direito do trabalho.", "c": "advogado_123:10"}, {"p": "advogado_123", "n": 83, "a": "direito", "t": "A teoria monista, de filiação positivista, capitaneada por  Hans Kelsen, sustenta que as fontes formais do direito derivam de um único centro de positivação, o Estado, caracterizado como o único dotado de coerção.", "c": "advogado_123:10"}, {"p": "advogado_123", "n": 84, "a": "direito", "t": "As fontes formais justrabalhistas classificam-se como  heterônomas e autônomas.", "c": "advogado_123:10"}, {"p": "advogado_123", "n": 85, "a": "direito", "t": "As construções doutrinárias enquadram-se como fontes  normativas do direito do trabalho. ____________________________________________________", "c": "advogado_123:10"}, {"p": "advogado_123", "n": 86, "a": "direito", "t": "Reputa-se válido o negócio jurídico cujo objeto for ilícito.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 87, "a": "direito", "t": "Nos negócios jurídicos, a incapacidade relativa de uma  das partes não pode ser invocada pela outra em benefício próprio, nem aproveita aos cointeressados capazes, salvo se, neste caso, for indivisível o objeto do direito ou da obrigação comum.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 88, "a": "direito", "t": "A impossibilidade inicial do objeto não invalida o negócio  jurídico se for relativa, ou se cessar antes de realizada a condição a que ele estiver subordinado.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 89, "a": "direito", "t": "A validade da declaração de vontade não dependerá de  forma especial, senão quando a lei expressamente a exigir.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 90, "a": "direito", "t": "A manifestação de vontade subsiste ainda que o seu  autor haja feito a reserva mental de não querer o que manifestou, salvo se dela o destinatário tinha conhecimento.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 91, "a": "direito", "t": "O silêncio importa anuência, quando as circunstâncias  ou os usos o autorizarem, ainda que seja necessária a declaração de vontade expressa.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 92, "a": "direito", "t": "Nas declarações de vontade, atender-se-á mais à  intenção nelas consubstanciada que ao sentido literal da linguagem.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 93, "a": "direito", "t": "A interpretação do negócio jurídico deve atribuir-lhe o  sentido que for mais benéfico à parte que redigiu o dispositivo, se identificável.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 94, "a": "direito", "t": "Os negócios jurídicos benéficos e a renúncia devem ser  interpretados de forma extensiva, aplicando-se, quando necessário, analogias.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 95, "a": "direito", "t": "Considera-se como encargo a cláusula que, derivando  exclusivamente da vontade das partes, subordina o efeito do negócio jurídico a evento futuro e incerto. ____________________________________________________ No que se refere aos procedimentos de jurisdição voluntária,", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 96, "a": "direito", "t": "Não são cabíveis recursos nos procedimentos de  jurisdição voluntária.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 97, "a": "direito", "t": "A homologação do divórcio ou da separação consensual,  observados os requisitos legais, poderá ser requerida em petição assinada por ambos os cônjuges.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 98, "a": "direito", "t": "O divórcio consensual, havendo ou não nascituro ou  filhos incapazes, poderá ser realizado por escritura pública.  CONSELHO REGIONAL DE CONTABILIDADE DO PARANÁ INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRC-PR ADVOGADO 7", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 99, "a": "direito", "t": "Recebendo testamento cerrado, o juiz, se não achar vício  externo que o torne suspeito de nulidade ou falsidade, o abrirá e mandará que o escrivão o leia na presença do apresentante.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 100, "a": "direito", "t": "A publicação do testamento particular poderá ser  requerida, antes da morte do testador, pelo herdeiro, pelo legatário ou pelo testamenteiro, bem como pelo terceiro detentor do testamento, se impossibilitado de entregá-lo a algum dos outros legitimados para requerê-la.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 101, "a": "direito", "t": "Nos casos em que a lei considere jacente a herança, o  juiz em cuja comarca tiver domicílio o falecido procederá imediatamente à arrecadação dos respectivos bens.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 102, "a": "direito", "t": "A herança jacente ficará sob a guarda, a conservação e a  administração de um curador até a respectiva entrega ao sucessor legalmente habilitado ou até a declaração de vacância.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 103, "a": "direito", "t": "A interdição somente poderá ser promovida pelo  Ministério Público ou pelos parentes do interditando.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 104, "a": "direito", "t": "Na interdição, o interditando será citado para, em dia  designado, comparecer perante o juiz, que o entrevistará minuciosamente acerca de sua vida, negócios, bens, vontades, preferências e laços familiares e afetivos e sobre o que mais lhe parecer necessário para convencimento quanto à sua capacidade para praticar atos da vida civil, devendo ser reduzidas a termo as perguntas e respostas.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 105, "a": "direito", "t": "O procedimento da interdição não admite a produção de  prova pericial, comportando apenas as testemunhais e os documentos. ____________________________________________________ Considerando as disposições da Resolução CFC n.o 1.612/2021 (Regulamento Geral dos Conselhos de", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 106, "a": "direito", "t": "Os Conselhos de Contabilidade são dotados de  personalidade jurídica de direito privado e possuem forma federativa.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 107, "a": "direito", "t": "O exercício da profissão contábil na esfera pública  constitui prerrogativa exclusiva dos contadores legalmente habilitados.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 108, "a": "direito", "t": "Os Conselhos de Contabilidade fiscalizarão o exercício da  profissão contábil com base em critérios que observem as atribuições do cargo ou emprego e(ou) a atividade efetivamente desempenhada, independentemente da denominação que se lhe tenha atribuído.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 109, "a": "direito", "t": "Os Conselhos de Contabilidade são organizados e  dirigidos pelos próprios profissionais da contabilidade e mantidos por estes e pelas organizações contábeis, com independência e autonomia, embora sejam subordinados ao Ministério da Fazenda.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 110, "a": "direito", "t": "Os Conselhos de Contabilidade gozam de imunidade  tributária total em relação aos seus bens, às suas rendas e aos seus serviços.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 111, "a": "direito", "t": "Constituem competência do Conselho Federal de  Contabilidade (CFC) a regulamentação e o controle das atividades finalísticas, financeiras, econômicas, administrativas, contábeis e orçamentárias dos Conselhos Regionais de Contabilidade.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 112, "a": "direito", "t": "Os cargos de conselheiros no CFC serão remunerados  com renda mensal equivalente a cinco salários mínimos.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 113, "a": "direito", "t": "O CFC é constituído por 27 conselheiros efetivos e  respectivos suplentes, com registro ativo em cada um dos 27 Conselhos Regionais, eleitos na forma da legislação específica, para mandatos de dois anos, com renovação a cada ano, alternadamente, por um terço e dois terços de seus membros.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 114, "a": "direito", "t": "Os conselheiros do CFC serão eleitos por um colégio  eleitoral integrado por um representante de cada conselho regional, por este eleito por maioria absoluta, em reunião especialmente convocada.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 115, "a": "direito", "t": "Ao CFC compete elaborar, aprovar e alterar as Normas  Brasileiras de Contabilidade de Natureza Técnica e Profissional. ____________________________________________________ De acordo com a Resolução CFC n.o", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 116, "a": "direito", "t": "Considera-se como exercício eventual ou temporário da  profissão aquele que for realizado fora da jurisdição do conselho regional de origem do contador ou do técnico em contabilidade e que não implique alteração do domicílio profissional.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 117, "a": "direito", "t": "O cancelamento do registro profissional dar-se-á pelo  falecimento ou por cassação do exercício profissional do contador ou do técnico em contabilidade, decorrente da aplicação de penalidade em primeira instância administrativa, ainda que pendente de trânsito em julgado.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 118, "a": "direito", "t": "Para fins de cancelamento do registro profissional, a  comprovação do falecimento do profissional somente poderá ser feita pela apresentação da respectiva certidão de óbito, acompanhada do laudo de exame cadavérico.", "c": "advogado_123:11"}, {"p": "advogado_123", "n": 119, "a": "direito", "t": "O cancelamento do registro profissional de titular de  organização contábil de responsabilidade individual acarreta o mesmo efeito ao seu registro cadastral, bem como a baixa da organização contábil de responsabilidade coletiva, cujos sócios remanescentes ou sucessores não sejam contadores ou técnicos em contabilidade.", "c": "advogado_123:11"}, {"p": "advogado_126", "n": 1, "a": "portugues", "t": "No texto, estruturado em forma dissertativa, o tema  está delimitado no primeiro período.", "c": "advogado_126:1"}, {"p": "advogado_126", "n": 2, "a": "portugues", "t": "Entende-se da leitura do texto que a avicultura e a  suinocultura são as principais atividades da economia brasileira, responsáveis por inserir o Brasil entre os mais importantes atores do agronegócio sustentável mundial.", "c": "advogado_126:1"}, {"p": "advogado_126", "n": 3, "a": "portugues", "t": "De acordo com o texto, o processo de conversão  alimentar representou um importante progresso tecnológico na avicultura e na suinocultura, dado o efeito poupa-terra gerado por seu emprego.", "c": "advogado_126:1"}, {"p": "advogado_126", "n": 4, "a": "portugues", "t": "Em “que incluem” (linhas 2 e 3), a forma verbal está  flexionada na terceira pessoa do plural porque o vocábulo “que”, que se classifica como pronome relativo, está empregado em referência ao antecedente “tecnologias” (linha 2), sendo correta, portanto, a substituição do referido vocábulo por as quais.", "c": "advogado_126:1"}, {"p": "advogado_126", "n": 5, "a": "portugues", "t": "Na linha 5, o emprego do acento indicativo de crase em  “à soma” justifica-se pela regência da forma verbal “correspondem” e pela anteposição de artigo definido feminino ao vocábulo “soma”.", "c": "advogado_126:1"}, {"p": "advogado_126", "n": 6, "a": "portugues", "t": "O emprego da vírgula após “alimentar” (linha 13)  justifica-se por separar um aposto explicativo.  CONSELHO REGIONAL DE MEDICINA VETERINÁRIA DO ESTADO DE SÃO PAULO INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRMV-SP ADVOGADO 2", "c": "advogado_126:1"}, {"p": "advogado_126", "n": 7, "a": "portugues", "t": "Na linha 17, o vocábulo “caso” tem a mesma  classificação gramatical que o empregado à linha 19.", "c": "advogado_126:1"}, {"p": "advogado_126", "n": 8, "a": "portugues", "t": "Na linha 21, o emprego do termo “produzidos” no  masculino plural justifica-se pela concordância com “milhões”. ____________________________________________________ No que diz respeito à correção gramatical e à coerência das substituições propostas para vocábulos e trechos destacados", "c": "advogado_126:1"}, {"p": "advogado_126", "n": 9, "a": "portugues", "t": "“que correspondem” (linha 5) por correspondentes", "c": "advogado_126:1"}, {"p": "advogado_126", "n": 10, "a": "portugues", "t": "“levou à” (linha 7) por gerou uma", "c": "advogado_126:1"}, {"p": "advogado_126", "n": 12, "a": "portugues", "t": "“Considerada” (linha 18) por Considerando ____________________________________________________", "c": "advogado_126:1"}, {"p": "advogado_126", "n": 13, "a": "portugues", "t": "“outras” (linha 4) – “tecnologias” (linha 2)", "c": "advogado_126:2"}, {"p": "advogado_126", "n": 14, "a": "portugues", "t": "“o”, em “o que traz” (linha 29) – “publicação” (linha 29)  ____________________________________________________ Acerca da correção gramatical e da coerência da proposta de reescrita para cada um dos trechos destacados do texto,", "c": "advogado_126:2"}, {"p": "advogado_126", "n": 15, "a": "portugues", "t": "“No caso da avicultura de corte, em 1975, o frango  precisava de 2,1 kg de ração para ganhar um quilo de peso vivo” (linha 17): Em se tratando da avicultura de corte, seria necessário 2,1 Kg de ração para um quilo de peso vivo de frango", "c": "advogado_126:2"}, {"p": "advogado_126", "n": 16, "a": "portugues", "t": "“Sem o aporte tecnológico, seria necessário  1.007.745,70 ha de terra” (linha 24): A despeito do aporte tecnológico, necessitaria-se de 1.007.745,70 ha de terra", "c": "advogado_126:2"}, {"p": "advogado_126", "n": 17, "a": "portugues", "t": "“O diretor de Pesquisa e Desenvolvimento da Embrapa,  Guy de Capdeville relata que os dados apresentados na publicação foram obtidos ao longo de décadas” (linhas 28 e 29): Segundo o diretor de Pesquisa e Desenvolvimento da Embrapa, Guy de Capdeville, obteve-se, ao longo de décadas, os dados apresentados na publicação", "c": "advogado_126:2"}, {"p": "advogado_126", "n": 18, "a": "portugues", "t": "“o que traz robustez aos resultados divulgados no  documento” (linhas 29 e 30): o que fortalece os resultados divulgados no documento ____________________________________________________ No que se refere à correção gramatical dos trechos apresentados e à adequação da linguagem à correspondência", "c": "advogado_126:2"}, {"p": "advogado_126", "n": 19, "a": "portugues", "t": "Informamos também, que é necessário a confirmação de  sua participação no evento para que possamos providenciar o material que será utilizado durante os trabalhos de grupo.", "c": "advogado_126:2"}, {"p": "advogado_126", "n": 20, "a": "informatica", "t": "Importa esclarecer que todas as instâncias deste órgão  estão empenhadas em resolver, com a maior urgência possível os problemas apontados na inspeção de saúde realizada a um mês nas dependências da instituição. Nos itens que avaliem conhecimentos de informática, a menos que seja explicitamente informado o contrário, considere que: todos os programas mencionados estejam em configuração-padrão, em português; o mouse esteja configurado para pessoas destras; expressões como clicar, clique simples e clique duplo refiram-se a cliques com o botão esquerdo do mouse; e teclar corresponda à operação de pressionar uma tecla e, rapidamente, liberá-la, acionando-a apenas uma vez.", "c": "advogado_126:2"}, {"p": "advogado_126", "n": 21, "a": "informatica", "t": "Uma das opções para se adicionar uma linha a uma  tabela, utilizando o Word 2013, é posicionar o cursor do mouse à esquerda da tabela, no ponto onde se quer que a linha seja inserida, e clicar no ícone de (+), que irá aparecer.", "c": "advogado_126:x20"}, {"p": "advogado_126", "n": 22, "a": "informatica", "t": "Na Guia Página Inicial do Word 2013, o botão  apresenta algumas opções de colagem, entre elas, a de Manter Formatação Original (F).", "c": "advogado_126:x20"}, {"p": "advogado_126", "n": 23, "a": "informatica", "t": "Para se acessar diretamente o Windows 8, sem passar  pela tela de logon, é suficiente digitar win8, assim que o computador for ligado, antes mesmo de o sistema solicitar a senha de acesso. Essa é uma forma de que os administradores de sistema dispõem para fazer a manutenção do Windows, caso algum usuário esqueça a senha.", "c": "advogado_126:x20"}, {"p": "advogado_126", "n": 24, "a": "informatica", "t": "No Windows 8, é possível realizar a pesquisa de  aplicativos e de configurações a partir da tela inicial.", "c": "advogado_126:x20"}, {"p": "advogado_126", "n": 25, "a": "informatica", "t": "Uma forma de se classificar as redes é quanto à  quantidade de computadores conectados a ela. Uma rede com duzentos computadores, por exemplo, não pode ser classificada como uma rede local (LAN). ____________________________________________________ Acerca do programa de navegação Mozilla Firefox, em sua versão mais atual, dos conceitos de organização e de gerenciamento de arquivos e programas e dos", "c": "advogado_126:3"}, {"p": "advogado_126", "n": 26, "a": "informatica", "t": "O Firefox possui um recurso (Sync) que permite ao  usuário sincronizar seus dados e suas preferências com todos os seus dispositivos. Para fazer uso desse recurso, é necessário criar uma Conta Firefox, que é gratuita.", "c": "advogado_126:3"}, {"p": "advogado_126", "n": 27, "a": "informatica", "t": "Ao clicar o botão direito do mouse sobre uma imagem  qualquer, exibida pelo navegador Firefox, o usuário poderá compartilhá-la com outro usuário, por meio da opção Compartilhar com, desde que o destinatário também esteja conectado à Internet.", "c": "advogado_126:3"}, {"p": "advogado_126", "n": 28, "a": "informatica", "t": "O Windows não permite que os cookies, arquivos de  texto enviados pelos sites, sejam armazenados no computador.", "c": "advogado_126:3"}, {"p": "advogado_126", "n": 29, "a": "informatica", "t": "Ao executar o programa de restauração do computador,  no Windows 8, o usuário deverá ter muito cuidado, pois, caso ele escolha a opção Remover tudo e reinstalar o Windows, todos os dados serão removidos e não poderão mais ser recuperados, mesmo com o uso de um software especial.  CONSELHO REGIONAL DE MEDICINA VETERINÁRIA DO ESTADO DE SÃO PAULO INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRMV-SP ADVOGADO 3", "c": "advogado_126:3"}, {"p": "advogado_126", "n": 30, "a": "informatica", "t": "As fitas DAT (Digital Audio Tape) são utilizadas para a  realização de backup e tem a vantagem, entre outras, de permitir a portabilidade, ou seja, é possível transportar o backup para vários locais, visando à redundância e à segurança dos dados. ____________________________________________________ Gustavo está perdidamente apaixonado por Rafaela e, para demonstrar o seu amor, escreveu, sequencialmente, o nome dela 2.022 vezes em uma folha de cartolina.", "c": "advogado_126:3"}, {"p": "advogado_126", "n": 31, "a": "informatica", "t": "A centésima letra que ele escreveu na folha de cartolina  foi a : "advogado_126:10"}, {"p": "advogado_126", "n": 78, "a": "direito", "t": "O credor não é obrigado a receber prestação diversa da  que lhe é devida, salvo se mais valiosa.", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 79, "a": "direito", "t": "A obrigação de solver a dívida em dinheiro abrange,  também, além das dívidas pecuniárias e das dívidas de valor, as dívidas remuneratórias.", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 80, "a": "direito", "t": "Nas obrigações de não fazer, a mora é presumida pelo  descumprimento do dever de abstenção, mas depende da intimação judicial do devedor. ____________________________________________________ No que se refere à extinção das obrigações no direito civil,", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 81, "a": "direito", "t": "O pagamento é um modo de extinção das obrigações e  pode ser direto ou indireto.", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 82, "a": "direito", "t": "Qualquer interessado na extinção da dívida poderá  pagá-la, usando, se o credor se opuser, dos meios conducentes à exoneração do devedor.", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 83, "a": "direito", "t": "Credor putativo é aquele que se apresenta aos olhos de  todos como o verdadeiro credor, mas cujo pagamento a ele realizado não é válido.", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 84, "a": "matematica", "t": "O devedor que não cumpre a obrigação no vencimento  sujeita-se às consequências do inadimplemento, respondendo por perdas e danos, mais juros, atualização monetária e honorários de advogado.", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 85, "a": "direito", "t": "A quitação é a declaração bilateral escrita, emitida pelo  credor, de que a prestação foi efetuada e o devedor está liberado.", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 86, "a": "direito", "t": "A presunção de pagamento decorrente da posse de  título de crédito pelo devedor é absoluta, não admitindo prova em contrário.", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 87, "a": "direito", "t": "Quando o pagamento for em quotas periódicas, a  quitação da última não estabelece a presunção de estarem solvidas as anteriores, mas isenta o devedor dos efeitos da mora.", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 88, "a": "direito", "t": "O pagamento sempre deverá ser realizado no lugar em  que houver sido constituída a obrigação.", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 89, "a": "direito", "t": "As obrigações puras, com estipulação de data para o  pagamento, devem ser solvidas nessa ocasião, sob pena de inadimplemento.", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 90, "a": "direito", "t": "Se não se ajustou época para o pagamento, o credor  poderá exigi-lo imediatamente. ____________________________________________________", "c": "advogado_126:10"}, {"p": "advogado_126", "n": 91, "a": "direito", "t": "O princípio do devido processo legal tem a função de  criar os elementos necessários à promoção do ideal de protetividade dos direitos, integrando o sistema jurídico, eventualmente lacunoso.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 92, "a": "direito", "t": "A dignidade da pessoa humana pode ser considerada  como um direito fundamental de conteúdo simples, formado apenas pelo conjunto de direitos fundamentais previstos no texto constitucional.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 93, "a": "direito", "t": "O princípio da legalidade pode funcionar como uma  norma processual ou como uma norma de decisão.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 94, "a": "direito", "t": "O dever de observar o princípio da legalidade significa  que a interpretação dos textos normativos deve ser literal.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 95, "a": "direito", "t": "Na estruturação do processo, o princípio do  contraditório é um reflexo do princípio democrático.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 96, "a": "direito", "t": "O princípio do contraditório abrange a garantia de que  as partes participem do processo, mas sem o poder efetivo de influenciar na decisão a ser tomada.  CONSELHO REGIONAL DE MEDICINA VETERINÁRIA DO ESTADO DE SÃO PAULO INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRMV-SP ADVOGADO 7", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 97, "a": "direito", "t": "A ampla defesa corresponde ao aspecto substancial do  princípio do contraditório.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 98, "a": "direito", "t": "O princípio da duração razoável do processo autoriza a  desconsideração do princípio do contraditório.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 99, "a": "direito", "t": "O princípio da igualdade processual, também chamado  de princípio da paridade de armas, estabelece que as partes devem receber, rigorosamente, o mesmo tratamento.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 100, "a": "direito", "t": "O princípio da eficiência, aplicado ao processo, é um dos  corolários da cláusula geral do devido processo legal. ____________________________________________________ Com relação às intervenções de terceiros no direito", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 101, "a": "direito", "t": "A intervenção de terceiros é fato jurídico processual que  implica a modificação de processo já existente.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 102, "a": "direito", "t": "As intervenções de terceiros são sempre espontâneas e  dependem da vontade de participar daquele que não é parte do processo.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 103, "a": "direito", "t": "Para serem admitidas, as intervenções de terceiros  dispensam a existência de um vínculo entre o terceiro e o objeto litigioso do processo.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 104, "a": "direito", "t": "As intervenções de terceiros somente são admitidas nos  procedimentos especiais, sendo vedadas no procedimento comum.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 105, "a": "direito", "t": "A assistência é uma modalidade de intervenção de  terceiro ad coadjuvandum, pela qual um terceiro ingressa em processo alheio para auxiliar uma das partes.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 106, "a": "direito", "t": "A assistência é admissível ainda que o interesse do  assistente seja meramente econômico ou afetivo.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 107, "a": "direito", "t": "Na assistência simples, o terceiro ingressa no feito  afirmando-se titular de relação jurídica conexa àquela que está sendo discutida.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 108, "a": "direito", "t": "O assistente simples pode, como parte auxiliar, produzir  provas e recorrer.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 109, "a": "direito", "t": "Quando o terceiro alegar a existência de um interesse  jurídico imediato na causa, caberá a assistência litisconsorcial.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 110, "a": "direito", "t": "A assistência litisconsorcial é hipótese de litisconsórcio  simples e necessário. Conforme a Lei n.o", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 112, "a": "direito", "t": "É inadmissível o ajuizamento de execução fiscal em  desfavor dos fiadores dos devedores originais.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 113, "a": "direito", "t": "A competência para processar e julgar a execução da  dívida ativa da Fazenda Pública exclui a de qualquer outro Juízo, salvo os da falência, os da recuperação judicial ou os do inventário.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 114, "a": "direito", "t": "A petição inicial da execução fiscal deverá ser instruída  com a respectiva certidão de dívida ativa, e elas deverão, obrigatoriamente, constituir documentos apartados.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 115, "a": "direito", "t": "O valor da causa das execuções fiscais será o original da  dívida, sem se considerar atualizações ou encargos legais.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 116, "a": "direito", "t": "É vedado ao executado garantir a execução fiscal por  meio de fiança bancária ou seguro-garantia.", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 118, "a": "direito", "t": "No prazo dos embargos, o executado deverá alegar toda  matéria útil à defesa, requerer provas e juntar aos autos os documentos e o rol de testemunhas (até três, ou, a critério do juiz, até o dobro desse limite).", "c": "advogado_126:11"}, {"p": "advogado_126", "n": 119, "a": "direito", "t": "Recebidos os embargos, o juiz mandará intimar a  Fazenda, para impugná-los no prazo de trinta dias, designando, em seguida, audiência de instrução e julgamento.", "c": "advogado_126:11"}, {"p": "advogado_127", "n": 1, "a": "portugues", "t": "No texto, estruturado em forma dissertativa,  argumenta-se em favor do uso de terapias alternativas para o tratamento de episódios depressivos, em substituição às ações terapêuticas em que sejam prescritos medicamentos psiquiátricos.", "c": "advogado_127:1"}, {"p": "advogado_127", "n": 2, "a": "portugues", "t": "Depreende-se da leitura do texto que é possível que, em  alguns casos, a depressão tenha relação com o histórico familiar.", "c": "advogado_127:1"}, {"p": "advogado_127", "n": 3, "a": "portugues", "t": "Entende-se da leitura do terceiro parágrafo do texto que  a alteração cerebral e as mudanças de humor capazes de gerar tristeza profunda ou desânimo resultam de fatores psíquicos.", "c": "advogado_127:1"}, {"p": "advogado_127", "n": 4, "a": "portugues", "t": "De acordo com o texto, as empresas devem se precaver  dos prejuízos econômicos causados pelas concessões de auxílio-doença por incapacidade laboral decorrente do adoecimento mental por depressão de seus trabalhadores.  CONSELHO REGIONAL DE MEDICINA DO ESTADO DE SANTA CATARINA INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRM-SC ADVOGADO 2", "c": "advogado_127:1"}, {"p": "advogado_127", "n": 5, "a": "gerais", "t": "Estaria garantida a correção gramatical do texto caso o  ponto final empregado após “pandemia” (linha 7) fosse substituído por vírgula, feito o devido ajuste de letra inicial maiúscula/minúscula no período.", "c": "advogado_127:2"}, {"p": "advogado_127", "n": 6, "a": "portugues", "t": "O vocábulo “doença” é o núcleo do sujeito da primeira  oração do terceiro parágrafo do texto, por isso o verbo “tratar” está flexionado na terceira pessoa do singular.", "c": "advogado_127:2"}, {"p": "advogado_127", "n": 7, "a": "portugues", "t": "No segmento “a que todos estão sujeitos e com o qual  aprendem a lidar” (linhas 13 e 14), o emprego das preposições “a”, em “a que todos”, e “com”, em “com o qual”, justifica-se, respectivamente, pela regência do termo “sujeitos” e pela regência do verbo “lidar”.", "c": "advogado_127:2"}, {"p": "advogado_127", "n": 8, "a": "portugues", "t": "Na linha 15, o emprego do vocábulo “inclusive”,  destacado entre vírgulas, evidencia a intenção do autor do texto de destacar os “fatores socioambientais” como a mais importante causa da depressão.", "c": "advogado_127:2"}, {"p": "advogado_127", "n": 9, "a": "portugues", "t": "Estariam preservadas a coerência das ideias e a correção  gramatical do texto caso o primeiro período do quinto parágrafo fosse assim reescrito: Conforme o impacto dos sintomas no paciente, pode-se classificar a depressão como leve, moderada ou grave.", "c": "advogado_127:2"}, {"p": "advogado_127", "n": 10, "a": "portugues", "t": "A oração “Como os sintomas se assemelham a outros  transtornos psiquiátricos” (linha 21) expressa circunstância de comparação em relação à oração subsequente.", "c": "advogado_127:2"}, {"p": "advogado_127", "n": 11, "a": "portugues", "t": "Na linha 21, estaria mantido o sentido original do texto  caso o vocábulo “só” fosse deslocado para imediatamente depois da palavra “profissionais”.", "c": "advogado_127:2"}, {"p": "advogado_127", "n": 12, "a" ": "advogado_127:4"}, {"p": "advogado_127", "n": 34, "a": "informatica", "t": "É possível usar adaptadores sem fio externos,  conectados à porta USB do computador, para permitir sua conexão a uma rede Wi-Fi.", "c": "advogado_127:4"}, {"p": "advogado_127", "n": 35, "a": "informatica", "t": "Pelo fato de as redes Ethernet apresentarem altas taxas  de transmissão de pacotes, os cabos de par trançado não podem ser utilizados nessas redes como meio de comunicação. ____________________________________________________ Acerca do programa de navegação Google Chrome, em sua versão mais atual, dos conceitos de organização e de gerenciamento de programas e das noções de vírus, worms e", "c": "advogado_127:4"}, {"p": "advogado_127", "n": 36, "a": "informatica", "t": "No Google Chrome, caso o usuário digite os termos crm  sc na barra de endereços, será exibida uma mensagem de alerta, informando que a URL está incompleta.", "c": "advogado_127:4"}, {"p": "advogado_127", "n": 37, "a": "informatica", "t": "Ao se selecionar a opção ,  disponível em Avançado, nas configurações do Google Chrome, é possível ativar ou desativar o recurso “Usar aceleração de hardware quando disponível”.", "c": "advogado_127:4"}, {"p": "advogado_127", "n": 38, "a": "informatica", "t": "O Codec pode ser definido como um dispositivo de  hardware ou um programa que codifica os dados referentes a uma imagem em movimento para que ela seja transmitida ou armazenada e os decodifica para que a imagem em movimento seja visualizada ou manipulada.", "c": "advogado_127:4"}, {"p": "advogado_127", "n": 39, "a": "informatica", "t": "O ataque Smurf, um ataque DoS, utiliza o comando ping para enviar vários pacotes a um endereço de broadcast qualquer.", "c": "advogado_127:4"}, {"p": "advogado_127", "n": 40, "a": "informatica", "t": "Rootkit e Botnet são dois vírus semelhantes, sendo a  única diferença entre eles a origem do ataque: o vírus Rootkit parte de um computador local (hospedeiro), ao passo que o vírus Botnet parte d  da decisão se tornar impossível, inútil ou prejudicado por fato superveniente.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 49, "a": "legislacao", "t": "Quando a lei não fixar prazo diferente, o recurso  administrativo deverá ser decidido no prazo máximo de trinta dias, a partir do recebimento dos autos pelo órgão competente. ____________________________________________________ À luz do disposto na Lei n.o 12.527/2011 e no Decreto n.o", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 50, "a": "legislacao", "t": "No caso de indeferimento de acesso a informações,  poderá o interessado interpor recurso contra a decisão no prazo de trinta dias, a contar da sua ciência.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 51, "a": "legislacao", "t": "A informação em poder dos órgãos e das entidades  públicas, observado o seu teor e em razão de sua imprescindibilidade à segurança do Estado, poderá ser classificada como ultrassecreta, secreta ou reservada.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 52, "a": "informatica", "t": "É dever dos órgãos e das entidades promover, apenas  mediante requerimento fundamentado, a divulgação, em seus sítios na Internet, de informações de interesse coletivo por eles produzidas ou custodiadas.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 53, "a": "legislacao", "t": "O Serviço de Informações ao Cidadão (SIC) será instalado  em unidade física identificada, de fácil acesso e aberta ao público. ____________________________________________________ De acordo com o Decreto n.o", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 54, "a": "legislacao", "t": "Não será celebrado termo de ajustamento de gestão na  hipótese de ocorrência de dano ao erário praticado por agentes públicos que agirem apenas com dolo.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 56, "a": "gerais", "t": "A abertura econômica da China foi acompanhada por  uma forte abertura política que introduziu no país o modelo democrático ocidental.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 57, "a": "gerais", "t": "A China é, na atualidade, o maior comprador mundial de  commodities, como petróleo, minério de ferro e soja.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 58, "a": "gerais", "t": "Graças à expansão do agronegócio, a China é o mais  importante parceiro comercial do Brasil; assim, o que acontece na economia chinesa exerce forte influência no desempenho da balança comercial brasileira.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 59, "a": "gerais", "t": "Mais de sessenta anos após sua criação, a ONU continua  a enfocar os problemas de segurança com quase exclusiva prioridade, o que explica a inexistência, em sua estrutura, de agências especializadas em questões econômicas.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 60, "a": "gerais", "t": "No atual conflito do Leste europeu, a China foi a única  grande potência mundial a cerrar fileiras em torno da Ucrânia, fornecendo-lhe armas, munições e apoio político.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 61, "a": "gerais", "t": "Para enfrentar a pandemia da covid-19, o governo  chinês impôs à população do país uma das mais rígidas formas de isolamento social.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 62, "a": "gerais", "t": "A China tem, nos dias atuais, o segundo maior produto  interno bruto (PIB) mundial, ficando atrás apenas dos Estados Unidos da América (EUA).", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 63, "a": "legislacao", "t": "O Brasil é um bom exemplo de que a crescente  globalização econômica está sendo decisiva para a drástica redução da desigualdade entre as nações e no interior das sociedades.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 64, "a": "gerais", "t": "A guerra entre a Rússia e a Ucrânia afeta profundamente  a economia mundial, por se tratar de países de grande peso como exportadores de petróleo, fertilizantes e grãos.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 65, "a": "gerais", "t": "Por causa da decisão de invadir a Ucrânia, o que deu  início a uma sangrenta guerra, a Rússia sofreu pesadas sanções do Ocidente, inclusive com o congelamento das reservas russas em moeda estrangeira depositadas em bancos ocidentais. ____________________________________________________ O século XXI se mostra parecido com o precedente. Guerras com maior ou menor intensidade, graves problemas climáticos e milhares de refugiados pelo mundo afora. Instituições multilaterais, ainda que atuem, são impotentes para oferecer resposta consistente à diversidade dos problemas. Relativamente ao cenário atual do mundo contemporâneo,", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 66, "a": "gerais", "t": "O Conselho de Segurança da ONU foi reformulado e,  agora, os seus quinze membros — permanentes e temporários — têm direitos iguais, inclusive quanto ao veto.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 67, "a": "legislacao", "t": "A questão ambiental assume posição de destaque na  agenda mundial, especialmente devido ao aumento de problemas que afetam a vida das sociedades, a exemplo do risco da escassez de água e de extremos climáticos, como chuvas torrenciais, incêndios florestais e secas prolongadas.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 68, "a": "gerais", "t": "A combinação da pandemia do novo coronavírus com a  guerra na Europa Oriental atinge fortemente a economia global nos dias atuais: desaceleração nos países ricos, comércio mundial estagnado e mercado de trabalho ruim.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 69, "a": "legislacao", "t": "O grande número de refugiados e de migrantes hoje  existentes no mundo consiste em decisão voluntária, sem que fatores externos às pessoas que decidem sair dos respectivos países sejam responsáveis por isso.", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 70, "a": "gerais", "t": "Gases do efeito estufa causam o aquecimento global,  sendo o gás carbônico o principal deles, o que exime os combustíveis fósseis, como é o caso do carvão, de qualquer responsabilidade pelas mudanças climáticas.  CONSELHO REGIONAL DE MEDICINA DO ESTADO DE SANTA CATARINA INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRM-SC ADVOGADO 6", "c": "advogado_127:5"}, {"p": "advogado_127", "n": 71, "a": "direito", "t": "Os direitos fundamentais são, a um só tempo, direitos  subjetivos e elementos fundamentais da ordem constitucional objetiva.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 72, "a": "direito", "t": "Na condição de direitos de defesa, os direitos  fundamentais asseguram a esfera de liberdade individual contra interferências ilegítimas do Poder Público, salvo se estas forem provenientes do Poder Judiciário.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 73, "a": "direito", "t": "Nos termos da atual Carta Constitucional, são direitos  sociais a educação, a saúde, a alimentação, o trabalho, a moradia, o lazer, a segurança, a previdência social, a proteção à maternidade e à infância e a assistência aos desamparados.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 74, "a": "direito", "t": "Entre os direitos sociais, o direito à educação tem  assumido importância predominante para a concretização dos valores tutelados pela Constituição e, principalmente, para a construção de um patamar mínimo de dignidade para os cidadãos.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 75, "a": "direito", "t": "O direito à alimentação, a despeito de sua relevância,  não integra o mínimo existencial.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 76, "a": "direito", "t": "Como direito fundamental, o direito à moradia possui  natureza exclusivamente positiva.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 77, "a": "direito", "t": "O direito fundamental à saúde foi expressamente  consagrado em todas as Constituições brasileiras.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 78, "a": "direito", "t": "Compete ao Poder Judiciário, em conjunto com o Poder  Executivo e o Poder Legislativo, formular políticas sociais e econômicas na área da saúde.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 79, "a": "direito", "t": "A seguridade social, autêntica realidade institucional  disciplinada constitucionalmente, obriga o legislador a promulgar um complexo normativo que assegure sua existência, funcionalidade e utilidade, pública e privada.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 80, "a": "direito", "t": "Os direitos sociais possuem uma estrutura complexa,  sendo, ao mesmo tempo, direitos individuais e coletivos. ____________________________________________________ No que se refere ao processo administrativo disciplinar,", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 81, "a": "direito", "t": "Processo administrativo-disciplinar é o instrumento  formal por meio do qual a Administração apura a existência de infrações praticadas por seus servidores e, se for o caso, sugere ao Poder Judiciário a aplicação das sanções adequadas.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 82, "a": "direito", "t": "O fundamento do processo administrativo disciplinar  está abrigado no princípio da supremacia do interesse público.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 83, "a": "direito", "t": "No processo administrativo disciplinar, incide o princípio  da disciplina reguladora difusa.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 84, "a": "direito", "t": "O objeto do processo administrativo disciplinar é a  averiguação da existência de alguma infração funcional por parte dos servidores públicos, qualquer que seja o nível de gravidade.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 85, "a": "direito", "t": "A averiguação de faltas funcionais constitui uma  faculdade da Administração.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 86, "a": "direito", "t": "A sindicância reveste-se de caráter inquisitório, sendo  processo não litigioso.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 87, "a": "direito", "t": "Em razão de sua natureza preparatória, a sindicância  deve atender irrestritamente ao princípio da publicidade.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 88, "a": "direito", "t": "Os processos administrativos disciplinares devem, sob  pena de nulidade, ser precedidos de sindicância.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 89, "a": "direito", "t": "Nos processos administrativos disciplinares, pode o  servidor comparecer sozinho ou ser representado por advogado munido do necessário instrumento de procuração.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 90, "a": "direito", "t": "Não incidirá, no processo administrativo disciplinar, o  princípio da insignificância quando o servidor obtiver proveito econômico indevido. ____________________________________________________ Acerca dos processos nos tribunais e dos meios de impugnação", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 91, "a": "direito", "t": "Ao editar enunciados de súmula, os tribunais devem  ater-se às circunstâncias fáticas dos precedentes que motivaram sua criação.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 93, "a": "direito", "t": "Incumbe ao relator, dispensando a apresentação de  contrarrazões, dar provimento ao recurso se a decisão recorrida for contrária a entendimento firmado em incidente de resolução de demandas repetitivas ou de assunção de competência.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 94, "a": "direito", "t": "Se o relator constatar a ocorrência de fato  superveniente à decisão recorrida ou a existência de questão apreciável, de ofício, ainda não examinada que deva ser considerada no julgamento do recurso, intimará as partes para que se manifestem no prazo de cinco dias.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 95, "a": "direito", "t": "Entre a data de publicação da pauta e a da sessão de  julgamento decorrerá, pelo menos, o prazo de quinze dias, incluindo-se em nova paut
