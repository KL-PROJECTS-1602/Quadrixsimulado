ede, é o dispositivo de  hardware utilizado para que um computador se conecte a uma rede de computadores; esse dispositivo possui um número único de identificação, chamado endereço IP.", "ctx": 7}, {"n": 32, "text": "Nas configurações da barra de tarefas do Windows 10, é  possível ativar ou desativar a exibição da barra de tarefas em vários monitores.", "ctx": 7}, {"n": 33, "text": "Por meio dos dispositivos de saída, o computador exibe  os resultados do seu processamento.", "ctx": 7}, {"n": 34, "text": "O recurso “Navegação Segura” do Google Chrome emite alertas sobre malware, extensões perigosas e outras ameaças da Internet.", "ctx": 8}, {"n": 35, "text": "A pesquisa reversa de imagens do Google permite  coletar informações sobre sites que contenham essa imagem ou outra semelhante.", "ctx": 8}, {"n": 36, "text": "Caso se digite, na pesquisa do Google, o argumento  concurso site:crosc.org.br, o resultado obtido será a ocorrência exata da palavra “concurso” apenas no site crosc.org.br.", "ctx": 8}, {"n": 37, "text": "Ao contrário dos worms, os rootkits têm como objetivo  principal consumir os recursos do sistema comprometido, causando lentidão.", "ctx": 8}, {"n": 38, "text": "O uso de assinaturas digitais fornece proteção de  autenticidade, integridade, confidencialidade e irretratabilidade.", "ctx": 9}, {"n": 39, "text": "Comparado ao esquema de backup incremental, o  esquema diferencial armazena um maior volume de dados, uma vez que armazena de forma cumulativa todas as alterações desde o último backup completo.", "ctx": 9}, {"n": 40, "text": "O CAPTCHA é um recurso adicionado a formulários  projetados para inibir a utilização de bots (robôs), sem exigir a interação do usuário.  CONSELHO REGIONAL DE ODONTOLOGIA DE SANTA CATARINA INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRO-SC ADVOGADO 4", "ctx": 9}, {"n": 41, "text": "Consideram-se atos de improbidade administrativa as  condutas culposas praticadas por agentes públicos que violem, mesmo que genericamente, os princípios da Administração Pública.", "ctx": 10}, {"n": 42, "text": "O sistema de responsabilização por atos de improbidade  administrativa, em razão de sua natureza criminal, não admite a aplicação dos princípios do direito administrativo sancionador.", "ctx": 10}, {"n": 43, "text": "Os atos de improbidade violam a probidade na  organização do Estado e no exercício de suas funções e a integridade do patrimônio público e social dos Poderes Executivo, Legislativo e Judiciário, bem como da Administração Direta e Indireta, no âmbito da União, dos estados, dos municípios e do Distrito Federal.", "ctx": 10}, {"n": 44, "text": "Não configura improbidade a ação ou a omissão  decorrente de divergência interpretativa da lei, baseada em jurisprudência, ainda que não pacificada, mesmo que não venha a ser posteriormente prevalecente nas decisões dos órgãos de controle ou dos tribunais do Poder Judiciário.", "ctx": 10}, {"n": 45, "text": "O sistema de responsabilização por atos de improbidade  administrativa alcança apenas os agentes públicos, não sendo aplicável a terceiros que não integrem os quadrados da Administração Direta ou Indireta.", "ctx": 10}, {"n": 46, "text": "Os sócios, os cotistas, os diretores e os colaboradores de  pessoa jurídica de direito privado não respondem pelo ato de improbidade que venha a ser imputado à pessoa jurídica, mesmo se, comprovadamente, houver participação e benefícios diretos.", "ctx": 10}, {"n": 47, "text": "Se houver indícios de ato de improbidade, a autoridade  que conhecer dos fatos representará ao Ministério Público competente, para as providências necessárias.", "ctx": 10}, {"n": 48, "text": "O sucessor ou o herdeiro daquele que causar dano ao  erário ou que se enriquecer ilicitamente estão sujeitos apenas à obrigação de repará-lo até o limite do valor da herança ou do patrimônio transferido.", "ctx": 10}, {"n": 49, "text": "A posse e o exercício de agente público ficam  condicionados à apresentação de declaração de imposto de renda e proventos de qualquer natureza, que tenha sido apresentada à Secretaria Especial da Receita Federal do Brasil, a fim de ser arquivada no serviço de pessoal competente.", "ctx": 10}, {"n": 50, "text": "As sanções de perda da função pública e de suspensão  dos direitos políticos possuem efetividade imediata, bastando a publicação da sentença condenatória no diário oficial e dispensando-se o trânsito em julgado.", "ctx": 10}, {"n": 51, "text": "A Administração Pública obedecerá, entre outros, aos  princípios da legalidade, finalidade, motivação, razoabilidade, proporcionalidade, moralidade, ampla defesa e contraditório, não lhe competindo prezar pela segurança jurídica.", "ctx": 11}, {"n": 52, "text": "A competência é irrenunciável e se exerce pelos órgãos  administrativos a que foi atribuída como própria, salvo os casos de delegação e avocação legalmente admitidos.", "ctx": 11}, {"n": 53, "text": "É vedada, ainda que em caráter excepcional, a avocação  temporária de competência atribuída a órgão hierarquicamente inferior.", "ctx": 11}, {"n": 54, "text": "Inexistindo competência legal específica, o processo  administrativo deverá ser iniciado perante a autoridade de menor grau hierárquico para decidir.", "ctx": 11}, {"n": 55, "text": "Os atos do processo administrativo não dependem de  forma determinada senão quando a lei expressamente a exigir.", "ctx": 11}, {"n": 56, "text": "Os protestos no Irã contribuíram para o aumento da  violência e para a consolidação da polícia da moralidade, autoridade governamental encarregada de cumprir o código de vestimenta islâmico nesse país.", "ctx": 12}, {"n": 57, "text": "O Talibã voltou ao poder no Afeganistão, mas a execução  pública de criminosos condenados, prática comum durante a primeira passagem do grupo fundamentalista ao governo de Cabul, foi completamente abolida.  CONSELHO REGIONAL DE ODONTOLOGIA DE SANTA CATARINA INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRO-SC ADVOGADO 5", "ctx": 12}, {"n": 58, "text": "O fato de Zelensky, presidente da Ucrânia, ter se recusado a deixar Kiev no momento em que o país estava sendo bombardeado por tropas russas e o fato de ele ter reunido seus compatriotas em transmissões da capital e ter viajado pela Ucrânia devastada pela guerra fizeram uma revista norte-americana renomada elegê-lo como a “pessoa do ano” em 2022.", "ctx": 12}, {"n": 59, "text": "Durante a pandemia de covid-19, quando iniciou seu  programa de vacinação, a China priorizou a vacinação de pessoas em idade de trabalhar; atualmente, com a nova onda do coronavírus, o país está enfrentando dificuldades para vacinar os idosos de sua população.", "ctx": 12}, {"n": 60, "text": "Os protestos no Irã, após a morte de uma jovem curda  sob custódia policial por “uso inadequado” do véu islâmico, geraram centenas de mortes e tiveram uma maior visibilidade mundial devido à Internet.", "ctx": 12}, {"n": 61, "text": "O investimento total da Copa do Mundo de Futebol no  Catar foi estimado em 300 bilhões de dólares, mas o governo tinha certeza do retorno em lucro, já que normalmente ocorre o imediato retorno financeiro para o país que sedia esse tipo de evento esportivo internacional.", "ctx": 12}, {"n": 62, "text": "A crise inflacionária e o aumento do custo de vida no  Reino Unido têm dilatado os bolsões de pobreza, fazendo pessoas mais vulneráveis pularem uma refeição por causa do alto preço dos alimentos.", "ctx": 12}, {"n": 63, "text": "Após seis meses da guerra na Ucrânia, a Rússia cessou os  bombardeios ao país vizinho, o que, segundo especialistas, sugere que o presidente russo esteja realizando ataques terrestres para manter apenas as províncias ucranianas já conquistadas.", "ctx": 12}, {"n": 64, "text": "O fato de a Ucrânia ter usado drones na guerra contra a  Rússia consistiu na primeira vez que o país chefiado por Volodymyr Zelensky conseguiu atingir alvos militares dentro da Rússia.", "ctx": 12}, {"n": 65, "text": "A troca de uma jogadora de basquete norte-americana,  que estava presa na Rússia, por um traficante de armas russo, que estava preso nos Estados Unidos, sendo os dois liberados após negociações entre Washington e Moscou, pode ser inserido analiticamente no contexto geopolítico da guerra na Ucrânia, já que a jogadora foi presa logo após a invasão russa ao país europeu e o presidente Biden é um aliado de Zelensky.", "ctx": 12}, {"n": 66, "text": "Declarada culpada em um processo que investigava sua  participação em um esquema de fraude enquanto presidiu a Argentina, Cristina Kirchner foi condenada a seis anos de prisão, mas continua elegível enquanto cumpre a pena.", "ctx": 13}, {"n": 67, "text": "A crise no Peru se estende desde que Pedro Castillo  assumiu a presidência, o que fez com que o referido governante decretasse estado de exceção no país e causasse renúncia de alguns dos seus ministros.", "ctx": 13}, {"n": 68, "text": "O momento político crítico atual no Peru fez o  presidente ser preso após ter anunciado a dissolução temporária do Congresso e a convocação de novas eleições parlamentares.", "ctx": 13}, {"n": 69, "text": "A crise na Venezuela tende a se agravar por mais alguns  anos, devido ao fato de o país depender exclusivamente das reservas de petróleo para o crescimento do produto interno bruto (PIB); a estimativa de decréscimo na economia venezuelana está atrelada às sucessivas quedas no preço do barril de petróleo, em associação ao aumento das energias renováveis.", "ctx": 13}, {"n": 70, "text": "A recente queda do presidente do Peru marca o fato de  Castillo ter sido o sexto presidente do país nos últimos 4 anos; a então presidência foi assumida por uma mulher pela primeira vez.  CONSELHO REGIONAL DE ODONTOLOGIA DE SANTA CATARINA INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRO-SC ADVOGADO 6", "ctx": 13}, {"n": 71, "text": "Os incapazes não podem ser parte em processos  judiciais.", "ctx": 14}, {"n": 72, "text": "O juiz nomeará curador especial ao réu preso revel, bem  como ao réu revel citado por edital ou com hora certa, enquanto não for constituído advogado.", "ctx": 14}, {"n": 73, "text": "O cônjuge necessitará do consentimento do outro para  propor ação que verse sobre direito real imobiliário, inclusive quando casados sob o regime de separação absoluta de bens.", "ctx": 14}, {"n": 74, "text": "A massa falida será representada em juízo, ativa e  passivamente, pela assembleia geral de credores.", "ctx": 14}, {"n": 75, "text": "Verificada a incapacidade processual ou a irregularidade  da representação da parte, o juiz extinguirá o processo sem resolução de mérito, uma vez que não se trata de vício sanável.", "ctx": 14}, {"n": 76, "text": "É vedado às partes, a seus procuradores, aos juízes, aos  membros do Ministério Público e da Defensoria Pública e a qualquer pessoa que participe do processo empregar expressões ofensivas nos escritos apresentados.", "ctx": 14}, {"n": 77, "text": "Responde por perdas e danos aquele que litigar de  má-fé como autor, réu ou interveniente.", "ctx": 14}, {"n": 78, "text": "A sentença condenará o vencido a pagar honorários ao  advogado do vencedor.", "ctx": 14}, {"n": 79, "text": "Se cada litigante for, em parte, vencedor e vencido, o juiz  os isentará do pagamento das custas e despesas processuais.", "ctx": 14}, {"n": 80, "text": "Nos procedimentos de jurisdição voluntária, as despesas  serão adiantadas pelo requerente e rateadas entre os interessados.", "ctx": 14}, {"n": 81, "text": "O Conselho Nacional de Justiça, em que pese tenha funções jurisdicionais, não integra a estrutura do Poder Judiciário.", "ctx": 15}, {"n": 82, "text": "Dois quintos dos lugares dos tribunais regionais federais,  dos tribunais dos estados e do Distrito Federal e territórios serão compostos de membros, do Ministério Público, com mais de dez anos de carreira, e de advogados de notório saber jurídico e de reputação ilibada, com mais de dez anos de efetiva atividade profissional, indicados em lista sêxtupla pelos órgãos de representação das respectivas classes.", "ctx": 15}, {"n": 83, "text": "Dedicar-se à atividade político-partidária é lícito aos  juízes.", "ctx": 15}, {"n": 84, "text": "Compete privativamente aos tribunais eleger seus  órgãos diretivos e elaborar seus regimentos internos, com observância das normas de processo e das garantias processuais das partes, dispondo sobre a competência e o funcionamento dos respectivos órgãos jurisdicionais e administrativos.", "ctx": 15}, {"n": 85, "text": "Somente pelo voto da totalidade de seus membros ou  dos membros do respectivo órgão especial poderão os tribunais declarar a inconstitucionalidade de lei ou ato normativo do poder público.", "ctx": 15}, {"n": 86, "text": "Ao Poder Judiciário é assegurada autonomia  administrativa e financeira.", "ctx": 15}, {"n": 87, "text": "O Supremo Tribunal Federal compõe-se de onze  ministros, escolhidos entre cidadãos com mais de trinta e menos de setenta e cinco anos de idade, de notável saber jurídico e reputação ilibada.", "ctx": 15}, {"n": 88, "text": "Compete ao Supremo Tribunal Federal, precipuamente,  a guarda da Constituição, cabendo-lhe processar e julgar, originariamente, nas infrações penais comuns, o presidente da República, o vice-presidente, os membros do Congresso Nacional, seus próprios ministros e o procurador-geral da República.", "ctx": 15}, {"n": 89, "text": "A Mesa do Senado Federal possui legitimidade para  ajuizar ação declaratória de constitucionalidade.", "ctx": 15}, {"n": 90, "text": "O Supremo Tribunal Federal poderá, de ofício ou por  provocação, mediante decisão de dois terços dos seus membros, após reiteradas decisões sobre matéria constitucional, aprovar súmula que, a partir de sua publicação na imprensa oficial, terá efeito vinculante em relação aos demais órgãos do Poder Judiciário e à Administração Pública Direta e Indireta, nas esferas federal, estadual e municipal, bem como proceder à sua revisão ou cancelamento, na forma estabelecida em lei.", "ctx": 15}, {"n": 91, "text": "A obrigação de dar coisa certa abrange os acessórios  dela, embora não mencionados, salvo se o contrário resultar do título ou das circunstâncias do caso.", "ctx": 16}, {"n": 92, "text": "Deteriorada a coisa, não sendo o devedor culpado,  poderá o credor resolver a obrigação, ou aceitar a coisa, abatido de seu preço o valor que perdeu.", "ctx": 16}, {"n": 93, "text": "Até a tradição pertence ao devedor a coisa, exceto os  seus melhoramentos e acrescidos, pelos quais não poderá exigir aumento no preço.", "ctx": 16}, {"n": 94, "text": "Se a obrigação for de restituir coisa certa, e esta, com culpa do devedor, perder-se antes da tradição, sofrerá o credor a perda, e a obrigação se resolverá.", "ctx": 16}, {"n": 95, "text": "Nas coisas determinadas pelo gênero e pela quantidade,  a escolha pertence ao credor, se o contrário não resultar do título da obrigação.", "ctx": 16}, {"n": 96, "text": "Extingue-se a obrigação de não fazer, desde que, sem  culpa do devedor, se lhe torne impossível abster-se do ato, que se obrigou a não praticar.", "ctx": 16}, {"n": 97, "text": "Nas obrigações alternativas, a escolha cabe ao devedor,  sendo vedado às partes estipular de forma diversa.", "ctx": 16}, {"n": 98, "text": "Havendo mais de um devedor ou mais de um credor em  obrigação divisível, esta presume-se dividida em tantas obrigações, iguais e distintas, quantos os credores ou devedores.", "ctx": 16}, {"n": 99, "text": "A obrigação é indivisível quando a prestação tem por  objeto uma coisa ou um fato não suscetíveis de divisão, por sua natureza, por motivo de ordem econômica, ou dada a razão determinante do negócio jurídico.", "ctx": 16}, {"n": 100, "text": "A solidariedade é sempre presumida, sendo vedado às  partes estabelecer ou afastar por convenção ou contrato.  CONSELHO REGIONAL DE ODONTOLOGIA DE SANTA CATARINA INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRO-SC ADVOGADO 7 À luz das disposições sobre perícias e auditorias", "ctx": 16}, {"n": 101, "text": "Considera-se perito o profissional que auxilia a decisão  judicial e administrativa, por solicitação da autoridade judiciária ou por designação do conselho, fornecendo laudo técnico detalhado, realizado através de perícia, com a verificação de exames clínicos, radiográficos, digitalizados, fotografias, modelos de arcos dentais, exames complementares e outros que auxiliarão na descrição de laudo técnico, com absoluta imparcialidade, indicando sempre a fonte de informação que o amparou.", "ctx": 17}, {"n": 102, "text": "São atribuições específicas do perito, devidamente  nomeado: executar o laudo técnico com absoluta isenção e imparcialidade; responder os quesitos formulados de forma objetiva; abster-se de emitir opiniões pessoais; e reportar-se sempre a fundamentos científicos, citando a sua fonte.", "ctx": 17}, {"n": 103, "text": "Considera-se auditor o profissional concursado ou  contratado por empresa pública ou privada que preste serviços odontológicos e necessite de auditoria odontológica permanente para verificação da execução e da qualidade técnico-científica dos trabalhos realizados por seus credenciados.", "ctx": 17}, {"n": 104, "text": "É atribuição específica do auditor seguir as normas  técnicas administrativas da empresa em que presta serviço, mas não lhe é permitido observar se tais normas estão de acordo com os preceitos éticos e legais que norteiam a profissão do cirurgião-dentista, recusando-se a cumpri-las caso estejam em desacordo com o Código de Ética Odontológica.", "ctx": 17}, {"n": 105, "text": "O cirurgião-dentista, na função de auditor ou perito, não  está obrigado a manter sigilo profissional.", "ctx": 17}, {"n": 106, "text": "É lícito ao cirurgião-dentista, sem qualquer limitação, na  função de auditor ou perito, divulgar suas observações, conclusões ou recomendações.", "ctx": 17}, {"n": 107, "text": "O cirurgião-dentista, na função de auditor ou perito, tem  o direito de acessar, in loco, toda a documentação necessária, sendo-lhe vedada a retirada dos prontuários ou das cópias da instituição, podendo, se necessário, examinar o paciente, desde que devidamente autorizado por ele, quando possível, ou por seu representante legal.", "ctx": 17}, {"n": 108, "text": "As empresas que prestam serviços de auditoria e(ou) perícia e seus responsáveis técnicos deverão estar devidamente registrados nos Conselhos Regionais de Odontologia das jurisdições onde seus contratantes estiverem atuando.", "ctx": 17}, {"n": 109, "text": "É lícito ao perito ou auditor fazer, perante o usuário,  comentários ou observações sobre os serviços executados, bem como indicar a este outro profissional para realizar o tratamento.", "ctx": 17}, {"n": 110, "text": "É vedado ao perito ou auditor glosar serviços propostos  ou executados, mesmo que estes não atendam às restrições observadas ou estabelecidas como norma pela empresa.", "ctx": 17}, {"n": 111, "text": "De acordo com a referida Lei, deve haver um Conselho  Federal de Odontologia na capital da República e, em cada capital de estado, de território e no Distrito Federal, deve haver um Conselho Regional de Odontologia, denominado segundo a sua jurisdição, a qual alcançará, respectivamente, a do estado, a do território e a do Distrito Federal.", "ctx": 18}, {"n": 112, "text": "O Conselho Federal e os Conselhos Regionais de  Odontologia constituem, em seu conjunto, uma autarquia, sendo cada um deles dotado de personalidade jurídica de direito privado, com autonomia administrativa e financeira, e têm por finalidade a supervisão da ética profissional em todo o país, cabendo-lhes zelar e trabalhar pelo perfeito desempenho ético da odontologia e pelo prestígio e bom conceito da profissão e dos que a exercem legalmente.", "ctx": 18}, {"n": 113, "text": "O Conselho Federal de Odontologia compor-se-á de 15  membros efetivos e 15 suplentes, todos de nacionalidade brasileira, com mandato trienal, eleitos por escrutínio secreto e maioria absoluta de votos em assembleia dos delegados dos Conselhos Regionais.", "ctx": 18}, {"n": 114, "text": "O mandato dos membros do Conselho Federal de  Odontologia será meramente honorífico, exigida como requisito para eleição a qualidade de cirurgião-dentista devidamente legalizado.", "ctx": 18}, {"n": 115, "text": "Os Conselhos Regionais de Odontologia estão instalados  em cada capital de estado, de território e no Distrito Federal, sendo compostos de onze membros efetivos e cinco suplentes, com mandato bienal, eleitos em votação secreta, por maioria absoluta de votos dos cirurgiões-dentistas inscritos na respectiva região.", "ctx": 18}, {"n": 116, "text": "O mandato dos membros dos Conselhos Regionais de  Odontologia será remunerado mensalmente em montante equivalente ao triplo do salário mínimo vigente.", "ctx": 18}, {"n": 117, "text": "A diretoria de cada Conselho Regional de Odontologia  compor-se-á de presidente, secretário e tesoureiro.", "ctx": 18}, {"n": 118, "text": "Aos Conselhos Regionais de Odontologia compete  organizar o seu regimento interno, independentemente da aprovação do Conselho Federal.", "ctx": 18}, {"n": 119, "text": "Se o cirurgião-dentista inscrito no Conselho Regional de  Odontologia de um estado passar a exercer, de modo permanente, atividade em outra região, assim se entendendo o exercício da profissão por mais de noventa dias, na nova jurisdição, ficará obrigado a requerer inscrição secundária no quadro respectivo ou para ele se transferir, sujeito, em ambos os casos, à ação do Conselho em cuja jurisdição estiver em exercício.", "ctx": 18}, {"n": 120, "text": "No prontuário do cirurgião-dentista, serão feitas  quaisquer anotações referentes à atividade profissional, inclusive elogios e penalidades.", "ctx": 18}], "contextos": {"1": "Cada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a \nque cada um deles esteja vinculado, marque, no cartão-resposta, para cada item: o campo designado com o código C, caso julgue \no item CERTO; ou o campo designado com o código E, caso julgue o item ERRADO.\nA marcação de acordo com o gabarito valerá + 1,00 (um ponto positivo). A marcação em desacordo com o gabarito \nvalerá - 1,00 (um ponto negativo). A ausência de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não \nreceberão pontuação negativa. Para as devidas marcações, use o cartão-resposta, único documento válido para a correção da sua \nprova objetiva.\nCONHECIMENTOS BÁSICOS\n1\n4\n7\n10\n13\n16\n19\n22\n25\n28\nTexto para os itens de 1 a 20.\nDe acordo com a Academia Americana da Odontologia Cosmética (AACD), uma faceta é uma peça fina de porcelana \nusada para recriar a aparência natural dos dentes, ao mesmo tempo em que fornece força e elasticidade comparável ao esmalte \ndo dente natural. Elas são moldadas para acompanhar o contorno dos dentes e coladas ao esmalte natural durante alguns \nprocedimentos de consultório. Constituem uma opção para a correção de dentes manchados, lascados, cariados ou apinhados. \nAs facetas são feitas por um técnico, geralmente num laboratório dental, que trabalha sobre um modelo fornecido pelo seu \ndentista. Além dos benefícios estéticos, as facetas podem ser usadas para fechar espaços ou corrigir pequenos desalinhamentos. \nOs pacientes também escolhem facetas como uma solução cosmética para realçar o brilho dos dentes e reforçar o sorriso. E o \nmaterial mais comum usado para as facetas são as de porcelana e a faceta de resina composta.\nEntenda que, tanto as facetas de porcelana quanto as lentes de contato dental são restaurações de cerâmicas que são \n“colocadas e cimentadas” na superfície frontal dos dentes, a fim de restabelecer o sorriso de uma forma natural e harmoniosa. \nEntretanto, o que as difere é a espessura da cerâmica. No que se refere ao preparo dos dentes, são realizados os mesmos \nprocedimentos de consultório. As facetas de porcelana são mais espessas, possuem em torno de 1 mm a 2 mm e servem para \ncorrigir defeitos maiores de coloração dental, formato ou posicionamento. As lentes de contato dental, nome dado \npopularmente ao “laminado cerâmico”, são ultrafinas, com cerca de 0,4 mm a 0,9 mm. E mesmo sendo bem fininhas o dente \ntambém sofre desgaste. Independente do tipo de peça a ser usada, esclarecemos que todo o processo de preparo do dente e \ncimentação das facetas ou lentes de contato dental é realizado sob anestesia local, gerando um mínimo desconforto e dor ao \npaciente.\nOptando por realizar uma técnica ou outra, você sairá no lucro com um belo conjunto de dentes! Além da rapidez, em \nmédia com três consultas já é possível modificar o sorriso, existe uma baixa manutenção, até porque a porcelana não altera a \ncor. É mais resistente e tem ótima durabilidade.\nPara saber se é melhor usar facetas de porcelana ou lentes de contato dental o melhor é conversar com seu dentista, \npois ele fará uma avaliação detalhada. Contudo, vamos esclarecer rapidamente a forma de aplicação de cada uma delas.\nAs facetas são mais usadas quando o dente está com a cor alterada pela falta de esmalte ou dentes que tenham \nrealizado tratamento de canal e escureceram em consequência disso. Essa recomendação é feita em casos mais complexos \nporque, para a colocação das facetas, é necessário desgastar os dentes, retirando parte do esmalte. Desta forma, a técnica é \nusada sempre quando a cobertura precisa ser mais densa.\nJá as lentes de contato dental são usadas para realizar pequenas correções como alongamento, aumento da largura ou \narredondamento de ângulos dos dentes. Para aplicação das lentes também é necessário realizar o desgaste dos dentes.\nInternet: <callegariemarques.com.br> (com adaptações).\n______________________________________________________________________________________________________________\nConsiderando as ideias e os aspectos linguísticos do texto, \njulgue os itens de 1 a 10.", "2": "_____________________________________________________\nCom relação à correção gramatical e à coerência das \nsubstituições propostas para vocábulos e trechos destacados \ndo texto, advogado:15"}, {"p": "advogado", "n": 91, "a": "direito", "t": "A obrigação de dar coisa certa abrange os acessórios  dela, embora não mencionados, salvo se o contrário resultar do título ou das circunstâncias do caso.", "g": "C", "c": "advogado:16"}, {"p": "advogado", "n": 92, "a": "direito", "t": "Deteriorada a coisa, não sendo o devedor culpado,  poderá o credor resolver a obrigação, ou aceitar a coisa, abatido de seu preço o valor que perdeu.", "g": "C", "c": "advogado:16"}, {"p": "advogado", "n": 93, "a": "direito", "t": "Até a tradição pertence ao devedor a coisa, exceto os  seus melhoramentos e acrescidos, pelos quais não poderá exigir aumento no preço.", "g": "E", "c": "advogado:16"}, {"p": "advogado", "n": 94, "a": "direito", "t": "Se a obrigação for de restituir coisa certa, e esta, com culpa do devedor, perder-se antes da tradição, sofrerá o credor a perda, e a obrigação se resolverá.", "g": "E", "c": "advogado:16"}, {"p": "advogado", "n": 95, "a": "direito", "t": "Nas coisas determinadas pelo gênero e pela quantidade,  a escolha pertence ao credor, se o contrário não resultar do título da obrigação.", "g": "C", "c": "advogado:16"}, {"p": "advogado", "n": 96, "a": "direito", "t": "Extingue-se a obrigação de não fazer, desde que, sem  culpa do devedor, se lhe torne impossível abster-se do ato, que se obrigou a não praticar.", "g": "C", "c": "advogado:16"}, {"p": "advogado", "n": 97, "a": "direito", "t": "Nas obrigações alternativas, a escolha cabe ao devedor,  sendo vedado às partes estipular de forma diversa.", "g": "C", "c": "advogado:16"}, {"p": "advogado", "n": 98, "a": "direito", "t": "Havendo mais de um devedor ou mais de um credor em  obrigação divisível, esta presume-se dividida em tantas obrigações, iguais e distintas, quantos os credores ou devedores.", "g": "E", "c": "advogado:16"}, {"p": "advogado", "n": 99, "a": "direito", "t": "A obrigação é indivisível quando a prestação tem por  objeto uma coisa ou um fato não suscetíveis de divisão, por sua natureza, por motivo de ordem econômica, ou dada a razão determinante do negócio jurídico.", "g": "C", "c": "advogado:16"}, {"p": "advogado", "n": 100, "a": "direito", "t": "A solidariedade é sempre presumida, sendo vedado às  partes estabelecer ou afastar por convenção ou contrato.  CONSELHO REGIONAL DE ODONTOLOGIA DE SANTA CATARINA INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRO-SC ADVOGADO 7 À luz das disposições sobre perícias e auditorias", "g": "E", "c": "advogado:16"}, {"p": "advogado", "n": 101, "a": "legislacao", "t": "Considera-se perito o profissional que auxilia a decisão  judicial e administrativa, por solicitação da autoridade judiciária ou por designação do conselho, fornecendo laudo técnico detalhado, realizado através de perícia, com a verificação de exames clínicos, radiográficos, digitalizados, fotografias, modelos de arcos dentais, exames complementares e outros que auxiliarão na descrição de laudo técnico, com absoluta imparcialidade, indicando sempre a fonte de informação que o amparou.", "g": "C", "c": "advogado:17"}, {"p": "advogado", "n": 102, "a": "legislacao", "t": "São atribuições específicas do perito, devidamente  nomeado: executar o laudo técnico com absoluta isenção e imparcialidade; responder os quesitos formulados de forma objetiva; abster-se de emitir opiniões pessoais; e reportar-se sempre a fundamentos científicos, citando a sua fonte.", "g": "C", "c": "advogado:17"}, {"p": "advogado", "n": 103, "a": "matematica", "t": "Considera-se auditor o profissional concursado ou  contratado por empresa pública ou privada que preste serviços odontológicos e necessite de auditoria odontológica permanente para verificação da execução e da qualidade técnico-científica dos trabalhos realizados por seus credenciados.", "g": "E", "c": "advogado:17"}, {"p": "advogado", "n": 104, "a": "matematica", "t": "É atribuição específica do auditor seguir as normas  técnicas administrativas da empresa em que presta serviço, mas não lhe é permitido observar se tais normas estão de acordo com os preceitos éticos e legais que norteiam a profissão do cirurgião-dentista, recusando-se a cumpri-las caso estejam em desacordo com o Código de Ética Odontológica.", "g": "E", "c": "advogado:17"}, {"p": "advogado", "n": 105, "a": "legislacao", "t": "O cirurgião-dentista, na função de auditor ou perito, não  está obrigado a manter sigilo profissional.", "g": "C", "c": "advogado:17"}, {"p": "advogado", "n": 106, "a": "legislacao", "t": "É lícito ao cirurgião-dentista, sem qualquer limitação, na  função de auditor ou perito, divulgar suas observações, conclusões ou recomendações.", "g": "C", "c": "advogado:17"}, {"p": "advogado", "n": 107, "a": "legislacao", "t": "O cirurgião-dentista, na função de auditor ou perito, tem  o direito de acessar, in loco, toda a documentação necessária, sendo-lhe vedada a retirada dos prontuários ou das cópias da instituição, podendo, se necessário, examinar o paciente, desde que devidamente autorizado por ele, quando possível, ou por seu representante legal.", "g": "C", "c": "advogado:17"}, {"p": "advogado", "n": 108, "a": "legislacao", "t": "As empresas que prestam serviços de auditoria e(ou) perícia e seus responsáveis técnicos deverão estar devidamente registrados nos Conselhos Regionais de Odontologia das jurisdições onde seus contratantes estiverem atuando.", "g": "C", "c": "advogado:17"}, {"p": "advogado", "n": 109, "a": "legislacao", "t": "É lícito ao perito ou auditor fazer, perante o usuário,  comentários ou observações sobre os serviços executados, bem como indicar a este outro profissional para realizar o tratamento.", "g": "E", "c": "advogado:17"}, {"p": "advogado", "n": 110, "a": "legislacao", "t": "É vedado ao perito ou auditor glosar serviços propostos  ou executados, mesmo que estes não atendam às restrições observadas ou estabelecidas como norma pela empresa.", "g": "C", "c": "advogado:17"}, {"p": "advogado", "n": 111, "a": "direito", "t": "De acordo com a referida Lei, deve haver um Conselho  Federal de Odontologia na capital da República e, em cada capital de estado, de território e no Distrito Federal, deve haver um Conselho Regional de Odontologia, denominado segundo a sua jurisdição, a qual alcançará, respectivamente, a do estado, a do território e a do Distrito Federal.", "g": "C", "c": "advogado:18"}, {"p": "advogado", "n": 112, "a": "direito", "t": "O Conselho Federal e os Conselhos Regionais de  Odontologia constituem, em seu conjunto, uma autarquia, sendo cada um deles dotado de personalidade jurídica de direito privado, com autonomia administrativa e financeira, e têm por finalidade a supervisão da ética profissional em todo o país, cabendo-lhes zelar e trabalhar pelo perfeito desempenho ético da odontologia e pelo prestígio e bom conceito da profissão e dos que a exercem legalmente.", "g": "E", "c": "advogado:18"}, {"p": "advogado", "n": 113, "a": "direito", "t": "O Conselho Federal de Odontologia compor-se-á de 15  membros efetivos e 15 suplentes, todos de nacionalidade brasileira, com mandato trienal, eleitos por escrutínio secreto e maioria absoluta de votos em assembleia dos delegados dos Conselhos Regionais.", "g": "E", "c": "advogado:18"}, {"p": "advogado", "n": 114, "a": "gerais", "t": "O mandato dos membros do Conselho Federal de  Odontologia será meramente honorífico, exigida como requisito para eleição a qualidade de cirurgião-dentista devidamente legalizado.", "g": "C", "c": "advogado:18"}, {"p": "advogado", "n": 115, "a": "direito", "t": "Os Conselhos Regionais de Odontologia estão instalados  em cada capital de estado, de território e no Distrito Federal, sendo compostos de onze membros efetivos e cinco suplentes, com mandato bienal, eleitos em votação secreta, por maioria absoluta de votos dos cirurgiões-dentistas inscritos na respectiva região.", "g": "E", "c": "advogado:18"}, {"p": "advogado", "n": 116, "a": "direito", "t": "O mandato dos membros dos Conselhos Regionais de  Odontologia será remunerado mensalmente em montante equivalente ao triplo do salário mínimo vigente.", "g": "E", "c": "advogado:18"}, {"p": "advogado", "n": 117, "a": "direito", "t": "A diretoria de cada Conselho Regional de Odontologia  compor-se-á de presidente, secretário e tesoureiro.", "g": "E", "c": "advogado:18"}, {"p": "advogado", "n": 118, "a": "direito", "t": "Aos Conselhos Regionais de Odontologia compete  organizar o seu regimento interno, independentemente da aprovação do Conselho Federal.", "g": "E", "c": "advogado:18"}, {"p": "advogado", "n": 119, "a": "direito", "t": "Se o cirurgião-dentista inscrito no Conselho Regional de  Odontologia de um estado passar a exercer, de modo permanente, atividade em outra região, assim se entendendo o exercício da profissão por mais de noventa dias, na nova jurisdição, ficará obrigado a requerer inscrição secundária no quadro respectivo ou para ele se transferir, sujeito, em ambos os casos, à ação do Conselho em cuja jurisdição estiver em exercício.", "g": "C", "c": "advogado:18"}, {"p": "advogado", "n": 120, "a": "direito", "t": "No prontuário do cirurgião-dentista, serão feitas  quaisquer anotações referentes à atividade profissional, inclusive elogios e penalidades.", "g": "C", "c": "advogado:18"}, {"p": "advogado12", "n": 1, "a": "portugues", "t": "Dados de pesquisa realizada pela empresa Global  Cancer Statistics mostram que, no ano de 2020, o câncer constituiu‑se na maior causa de morte no Brasil, estando à frente de doenças cardiovasculares nesse quesito.", "c": "advogado12:1"}, {"p": "advogado12", "n": 2, "a": "portugues", "t": "O número de profissionais bem qualificados  para prestar cuidados paliativos no mundo ainda é insuficiente. 1 4 7 10 13 16 19 22 25 28 31 34 37 40", "c": "advogado12:1"}, {"p": "advogado12", "n": 3, "a": "portugues", "t": "O câncer é uma doença que evolui de maneira não  uniforme entre os pacientes.", "c": "advogado12:1"}, {"p": "advogado12", "n": 4, "a": "portugues", "t": "De acordo com o texto, os cuidados paliativos  devem ser direcionados tanto ao enfermo quanto a seus familiares.", "c": "advogado12:1"}, {"p": "advogado12", "n": 5, "a": "portugues", "t": "A partir da leitura do último parágrafo do texto, é  correto inferir que o alívio ao sofrimento espiritual do paciente deve ser realizado por meio de líderes religiosos, tais como padres, monges e pais de santo. Com base na estrutura linguística do texto e em sua", "c": "advogado12:1"}, {"p": "advogado12", "n": 6, "a": "portugues", "t": "O texto tem caráter essencialmente informativo.", "c": "advogado12:1"}, {"p": "advogado12", "n": 7, "a": "portugues", "t": "O primeiro período do texto, “O aumento da  expectativa de vida e da incidência de doenças crônicas, como o câncer, é responsável por grande parte dos óbitos em todo o mundo” (linhas de 1 a 3), poderia ser reescrito, mantendo‑se a correção gramatical e as ideias originais do texto, da seguinte forma: O aumento da expectativa de vida e da incidência de doenças crônicas (como o câncer) são responsáveis por grande parte das mortes no mundo todo.", "c": "advogado12:1"}, {"p": "advogado12", "n": 8, "a": "portugues", "t": "A forma verbal “ocorreram” (linha 4) poderia ser  substituída no texto, mantendo‑se seu sentido original e sua correção gramatical, por houve.", "c": "advogado12:1"}, {"p": "advogado12", "n": 9, "a": "portugues", "t": "O sentido da forma verbal “evidenciam” (linha 12) no  texto é colocam em evidência, destacam.", "c": "advogado12:1"}, {"p": "advogado12", "n": 10, "a": "portugues", "t": "Na linha 17, a substituição da expressão “se carece”  por falta, com a concomitante omissão da preposição “de”, manteria a correção gramatical e a coerência do texto.", "c": "advogado12:1"}, {"p": "advogado12", "n": 11, "a": "portugues", "t": "É facultativo o emprego do acento circunflexo na  palavra “têm” (linha 23).", "c": "advogado12:1"}, {"p": "advogado12", "n": 12, "a": "portugues", "t": "No trecho “não só do enfermo, mas também de  seus familiares em período de luto” (linhas 26 e 27), a expressão “não só... mas também” expressa uma adição.", "c": "advogado12:1"}, {"p": "advogado12", "n": 13, "a": "portugues", "t": "O emprego do sinal indicativo de crase no “a” que  antecede a palavra “pacientes” (linha 30) acarretaria incorreção gramatical ao trecho.", "c": "advogado12:1"}, {"p": "advogado12", "n": 14, "a": "portugues", "t": "A oração “Para mitigar sintomas relacionados ao  quadro clínico do paciente” (linhas 36 e 37) expressa a causa da ideia imediatamente a seguir.", "c": "advogado12:1"}, {"p": "advogado12", "n": 16, "a": "portugues", "t": "Na pré‑história, segundo o texto, o protagonismo na  sociedade era da mulher, e não do homem.", "c": "advogado12:1"}, {"p": "advogado12", "n": 17, "a": "portugues", "t": "Quando a enfermagem surgiu como profissão, os  homens já recebiam treinamento como enfermeiros há mais de um século.", "c": "advogado12:1"}, {"p": "advogado12", "n": 18, "a": "portugues", "t": "De acordo com o texto, o papel masculino e o papel  feminino eram bem definidos na pré‑história.", "c": "advogado12:1"}, {"p": "advogado12", "n": 19, "a": "portugues", "t": "O trecho “que vai de 4000 a.C. até 476 d.C.” (linhas 14  e 15) poderia ser reescrito, mantendo‑se a correção gramatical, da seguinte forma: do ano 4.000 a.C. à 476 d.C.", "c": "advogado12:1"}, {"p": "advogado12", "n": 20, "a": "portugues", "t": "A omissão da vírgula que se segue ao termo  “nosocomial” (linha 26) manteria a correção gramatical, mas alteraria o sentido original do texto. Considerando que as proposições “Ou o fogo está associado ao tetraedro, ou o ar está associado ao hexaedro, ou a água está associada ao octaedro”, “O icosaedro não está associado à terra ou a água está associada ao octaedro”, “Se o ar está associado ao hexaedro, então a terra está associada ao icosaedro” e “A água não está associada ao", "c": "advogado12:1"}, {"p": "advogado12", "n": 21, "a": "matematica", "t": "As proposições “O icosaedro não está associado à  terra ou a água está associada ao octaedro” e “Se o icosaedro está associado à terra, então a água está associada ao octaedro” são logicamente equivalentes.", "c": "advogado12:1"}, {"p": "advogado12", "n": 22, "a": "matematica", "t": "A negação da proposição “Se o ar está associado ao  hexaedro, então a terra está associada ao icosaedro” é “Se a terra não está associada ao icosaedro, então o ar não está associado ao hexaedro”.", "c": "advogado12:1"}, {"p": "advogado12", "n": 23, "a": "matematica", "t": "A proposição “O fogo está associado ao tetraedro e o  ar não está associado ao hexaedro” é verdadeira.", "c": "advogado12:1"}, {"p": "advogado12", "n": 24, "a": "matematica", "t": "A proposição “A água está associada octaedro se,  e somente se, a terra está associada ao icosaedro” é falsa.", "c": "advogado12:1"}, {"p": "advogado12", "n": 25, "a": "matematica", "t": "O número escolhido por Sofia tem 5 divisores naturais.", "c": "advogado12:x24"}, {"p": "advogado12", "n": 26, "a": "matematica", "t": "O número pensado por Sofia pode ser expresso como  a soma de 6 números consecutivos.", "c": "advogado12:x24"}, {"p": "advogado12", "n": 27, "a": "matematica", "t": "Se Sofia tivesse dito que o número era menor que  1.000 em vez de 100, Rafaela ainda conseguiria determinar qual seria o número escolhido por Sofia.", "c": "advogado12:x24"}, {"p": "advogado12", "n": 28, "a": "matematica", "t": "O número de grupos de trabalhos que podem ser  formados com 4 pessoas do sexo masculino e 2 pessoas do sexo feminino é igual a 1.260.", "c": "advogado12:x24"}, {"p": "advogado12", "n": 29, "a": "matematica", "t": "Formando esse grupo de trabalho aleatoriamente, a  probabilidade de ele ter o mesmo número de pessoas do sexo masculino e do sexo feminino é menor que 24%.", "c": "advogado12:2"}, {"p": "advogado12", "n": 30, "a": "informatica", "t": "O número de grupos de trabalho que podem ser  formados com, pelo menos, uma pessoa do sexo feminino é igual a 4.753. 1 4 7 10 13 16 19 22 25 RASCUNHO Prova aplicada  Advogado CONSEL do12:2"}, {"p": "advogado12", "n": 39, "a": "informatica", "t": "Um rootkit tem a capacidade de ocultar processos,  arquivos ou dados do sistema operacional, o que torna difícil a detecção de outros tipos de malware e compromete a integridade do sistema.", "c": "advogado12:2"}, {"p": "advogado12", "n": 40, "a": "informatica", "t": "Uma das características do malvertising é a sua  capacidade de executar scripts maliciosos. Nos itens que avaliem conhecimentos de informática, a menos que seja explicitamente informado o contrário, considere que: todos os programas mencionados estejam em configuração‑padrão, em português; o mouse esteja configurado para pessoas destras; expressões como clicar, clique simples e clique duplo refiram‑se a cliques com o botão esquerdo do mouse; e teclar corresponda à operação de pressionar uma tecla e, rapidamente, liberá‑la, acionando‑a apenas uma vez.", "c": "advogado12:2"}, {"p": "advogado12", "n": 41, "a": "direito", "t": "O servidor público deve facilitar a fiscalização de todos  atos ou serviços por quem de direito.", "c": "advogado12:x40"}, {"p": "advogado12", "n": 42, "a": "legislacao", "t": "É vedado ao agente público utilizar informações  privilegiadas obtidas no âmbito interno de seu serviço, em benefício próprio ou de terceiros, mesmo que não cause danos para a Administração. Em relação à Lei nº 8.429/1992 e suas alterações – Lei de", "c": "advogado12:x40"}, {"p": "advogado12", "n": 43, "a": "legislacao", "t": "Havendo prejuízos para a Administração Pública,  a conduta culposa poderá caracterizar o ato de improbidade administrativa que importa em enriquecimento ilícito.", "c": "advogado12:x40"}, {"p": "advogado12", "n": 44, "a": "legislacao", "t": "Em qualquer momento do processo, caso seja verificada a inexistência do ato de improbidade, o juiz julgará a demanda improcedente.", "c": "advogado12:x40"}, {"p": "advogado12", "n": 45, "a": "legislacao", "t": "Nas ações que envolvam apuração de ato de  improbidade administrativa, poderá ser decretada a indisponibilidade do bem de família do réu, ainda que o imóvel não seja fruto de vantagem patrimonial indevida.", "c": "advogado12:3"}, {"p": "advogado12", "n": 46, "a": "direito", "t": "As sanções de suspensão de direitos políticos e de  proibição de contratar ou de receber incentivos fiscais ou creditícios do poder público observarão o limite máximo de 20 anos. Segundo o que dispõe a Lei nº 9.784/1999 e suas", "c": "advogado12:3"}, {"p": "advogado12", "n": 47, "a": "legislacao", "t": "As associações representativas, no tocante a direitos  e a interesses coletivos, têm legitimidade para figurar como interessadas no processo administrativo.", "c": "advogado12:4"}, {"p": "advogado12", "n": 48, "a": "legislacao", "t": "Independentemente de previsão legal, os atos do  processo administrativo deverão ser praticados na forma estabelecida pelo órgão ou pela unidade administrativa em que tramitam.", "c": "advogado12:4"}, {"p": "advogado12", "n": 49, "a": "direito", "t": "Ainda que interposto fora do prazo estabelecido em  Lei, o recurso administrativo será conhecido, quando se tratar de decisão de mérito.", "c": "advogado12:4"}, {"p": "advogado12", "n": 50, "a": "legislacao", "t": "A decisão que se basear, exclusivamente, em  valores jurídicos abstratos será motivada com a contextualização dos fatos, quando cabível, e com a indicação dos fundamentos de mérito e jurídicos. À luz do que estabelece a Lei nº 12.527/2011 – Lei de Acesso", "c": "advogado12:4"}, {"p": "advogado12", "n": 51, "a": "legislacao", "t": "Em caso do extravio da informação solicitada, o  interessado somente poderá requerer a apuração do desaparecimento da respectiva documentação mediante ação judicial.", "c": "advogado12:5"}, {"p": "advogado12", "n": 52, "a": "legislacao", "t": "As informações relativas às licitações em andamento  deverão ser divulgadas, independentemente de requerimento de eventuais interessados. No que concerne à Lei nº 13.709/2018 – Lei Geral de", "c": "advogado12:5"}, {"p": "advogado12", "n": 53, "a": "legislacao", "t": "A LGPD aplica‑se ao tratamento de quaisquer dados  pessoais produzidos em território nacional, inclusive aqueles relativos à pessoa natural, os quais serão utilizados exclusivamente para fins particulares, e não econômicos.", "c": "advogado12:5"}, {"p": "advogado12", "n": 54, "a": "legislacao", "t": "O desenvolvimento econômico e tecnológico e a  inovação são fundamentos que disciplinam a proteção de dados pessoais.", "c": "advogado12:5"}, {"p": "advogado12", "n": 55, "a": "legislacao", "t": "O Conselho Diretor da Autoridade Nacional de  Proteção de Dados (ANPD) será composto de seis diretores, incluído o diretor‑presidente, os quais serão escolhidos pelo presidente da República para mandato de oito anos. Acerca de eventos políticos recentes no contexto europeu,", "c": "advogado12:5"}, {"p": "advogado12", "n": 56, "a": "gerais", "t": "A dissolução do parlamento francês e a convocação de  novas eleições, pelo presidente Emmanuel Macron, ocorreram após a derrota de seu partido nas eleições do Parlamento Europeu.", "c": "advogado12:5"}, {"p": "advogado12", "n": 57, "a": "legislacao", "t": "A dissolução do parlamento por parte do presidente  da França constituiu‑se como um fato inédito, por ser um tipo de ação sem precedentes no território francês.", "c": "advogado12:5"}, {"p": "advogado12", "n": 58, "a": "gerais", "t": "As eleições parlamentares da União Europeia foram  noticiadas pela mídia internacional com preocupação, exatamente em razão de os partidos de centro e da extrema esquerda obterem mais que o dobro dos votos dos demais espectros políticos.", "c": "advogado12:5"}, {"p": "advogado12", "n": 59, "a": "gerais", "t": "Marine Le Pen, uma das fortes lideranças da  extrema direita francesa, integra um partido que defende a contenção de imigrantes, a revogação das regulamentações ambientais e a oposição de apoio à Ucrânia na guerra contra a Rússia.", "c": "advogado12:5"}, {"p": "advogado12", "n": 60, "a": "gerais", "t": "Por se tratar de um golpe inconstitucional, o  desmanche do parlamento, executado pelo presidente francês Emmanuel Macron, gerou protestos da oposição e manifestações nas ruas das principais cidades francesas. Em relação às circunstâncias políticas e às relações internacionais que envolvem o atual conflito na Faixa de", "c": "advogado12:5"}, {"p": "advogado12", "n": 61, "a": "gerais", "t": "A Organização das Nações Unidas (ONU) concluiu  que Hamas e Israel cometeram crimes de guerra, e o Estado judeu também cometeu crimes contra a humanidade no conflito acontecido na Faixa de Gaza.", "c": "advogado12:5"}, {"p": "advogado12", "n": 62, "a": "gerais", "t": "Negociadores envolvidos na guerra em Gaza têm  tentado, sem sucesso, a mediação de um cessar‑fogo e da libertação dos reféns judeus que estão mantidos em cativeiro no interior da Faixa de Gaza.", "c": "advogado12:5"}, {"p": "advogado12", "n": 63, "a": "gerais", "t": "As investigações da ONU sobre a circunstância da  guerra na Faixa de Gaza apontaram para os crimes de tortura e de tratamento desumano ou cruel executados exclusivamente pelo Hamas.", "c": "advogado12:5"}, {"p": "advogado12", "n": 64, "a": "direito", "t": "O primeiro‑ministro de Israel, Benjamin Netanyahu,  e os três principais líderes do Hamas receberam pedido de prisão pela Procuradoria do Tribunal Penal Internacional (TPI).", "c": "advogado12:5"}, {"p": "advogado12", "n": 65, "a": "gerais", "t": "O relatório da comissão de inquérito das Nações  Unidas (COI) que tratava das ações empreendidas por Israel, cujas intenções eram a de provocar o máximo dano, o que desrespeitava, assim, os princípios da distinção, da proporcionalidade e das precauções adequadas, foi aceito com desconfiança pelo embaixador de Israel na ONU, em Genebra. A respeito das atuais circunstâncias políticas e das relações", "c": "advogado12:5"}, {"p": "advogado12", "n": 66, "a": "gerais", "t": "O episódio do atentado que provocou a morte do presidente iraniano obrigou a teocracia do país a convocar novas eleições.", "c": "advogado12:6"}, {"p": "advogado12", "n": 67, "a": "direito", "t": "No Irã, a intervenção das instituições oficiais de poder  no processo de aprovação dos candidatos influencia diretamente na liberdade e na competição do processo eleitoral.", "c": "advogado12:6"}, {"p": "advogado12", "n": 68, "a": "gerais", "t": "A comissão eleitoral iraniana aprovou uma mulher para  concorrer às eleições, mas as pesquisas mostraram que a maior parte da população não aprova uma candidatura feminina, devido ao conservadorismo islâmico do país.", "c": "advogado12:6"}, {"p": "advogado12", "n": 69, "a": "direito", "t": "A morte de uma jovem iraniana pela força policial,  supostamente por violar o rígido código de vestimenta do país, levou jornalistas à prisão por estes terem noticiado tal fato e por terem contribuído para torná‑lo público.", "c": "advogado12:6"}, {"p": "advogado12", "n": 70, "a": "gerais", "t": "O Irã acusou os ataques lançados pelo Estado judeu  contra a Síria de terem matado um conselheiro militar iraniano, uma vez que a nação persa apoia o Hamas na guerra contra Israel. Prova aplicada  Advogado CONSELHO REGIONAL DE ENFERMAGEM DO PARANÁ Quadrix | 2024 5", "c": "advogado12:6"}, {"p": "advogado12", "n": 71, "a": "direito", "t": "O alistamento eleitoral e o voto são obrigatórios para  os maiores de 16 anos.", "c": "advogado12:7"}, {"p": "advogado12", "n": 72, "a": "direito", "t": "Não podem alistar‑se como eleitores os estrangeiros  e, durante o período do serviço militar obrigatório, os conscritos.", "c": "advogado12:7"}, {"p": "advogado12", "n": 73, "a": "direito", "t": "É vedado à lei estabelecer a nacionalidade brasileira  como condição de elegibilidade.", "c": "advogado12:7"}, {"p": "advogado12", "n": 74, "a": "direito", "t": "São inelegíveis os inalistáveis e os analfabetos.", "c": "advogado12:7"}, {"p": "advogado12", "n": 75, "a": "direito", "t": "O presidente da República, os governadores de  estado e do Distrito Federal, os prefeitos e quem os houver sucedido, ou substituído no curso dos mandatos, poderão ser reeleitos para até dois períodos subsequentes.", "c": "advogado12:7"}, {"p": "advogado12", "n": 76, "a": "direito", "t": "Para concorrerem a outros cargos, o presidente da  República, os governadores de estado e do Distrito Federal e os prefeitos devem renunciar aos respectivos mandatos até seis meses antes do pleito.", "c": "advogado12:7"}, {"p": "advogado12", "n": 77, "a": "direito", "t": "O militar é alistável, mas absolutamente inelegível.", "c": "advogado12:7"}, {"p": "advogado12", "n": 78, "a": "direito", "t": "O mandato eletivo poderá ser impugnado ante a  justiça eleitoral no prazo de 15 dias, contados da diplomação, instruída a ação com provas de abuso do poder econômico, de corrupção ou de fraude.", "c": "advogado12:7"}, {"p": "advogado12", "n": 79, "a": "gerais", "t": "É assegurada aos partidos políticos a autonomia para  definir sua estrutura interna e estabelecer regras sobre escolha, formação e duração de seus órgãos permanentes e provisórios, bem como sobre sua organização e seu funcionamento, e para adotar os critérios de escolha e o regime de suas coligações nas eleições majoritárias, vedada sua celebração nas eleições proporcionais, sem obrigatoriedade de vinculação entre as candidaturas em âmbito nacional, estadual, distrital ou municipal, devendo seus estatutos estabelecerem normas de disciplina e fidelidade partidária.", "c": "advogado12:7"}, {"p": "advogado12", "n": 80, "a": "direito", "t": "É lícita a utilização, pelos partidos políticos, de  organização paramilitar.", "c": "advogado12:7"}, {"p": "advogado12", "n": 81, "a": "direito", "t": "A organização político‑administrativa da República  Federativa do Brasil compreende a União, os estados, o Distrito Federal e os municípios, todos soberanos.", "c": "advogado12:8"}, {"p": "advogado12", "n": 82, "a": "direito", "t": "Os territórios federais integram a União, e sua criação,  transformação em estado ou reintegração ao estado de origem serão reguladas em lei complementar.", "c": "advogado12:8"}, {"p": "advogado12", "n": 83, "a": "direito", "t": "Os estados podem incorporar‑se entre si, subdividir‑se  ou desmembrar‑se para se anexarem a outros, ou formarem novos estados ou territórios federais, mediante a aprovação da população diretamente interessada, por meio de plebiscito, e mediante aprovação do Congresso Nacional, por lei ordinária.", "c": "advogado12:8"}, {"p": "advogado12", "n": 84, "a": "direito", "t": "A competência da União para legislar sobre normas  gerais não exclui a competência suplementar dos estados.", "c": "advogado12:8"}, {"p": "advogado12", "n": 85, "a": "direito", "t": "Os estados poderão, mediante lei complementar,  instituir regiões metropolitanas, aglomerações urbanas e microrregiões, constituídas por agrupamentos de municípios limítrofes, para integrar a organização, o planejamento e a execução de funções públicas de interesse comum.", "c": "advogado12:8"}, {"p": "advogado12", "n": 86, "a": "direito", "t": "São bens imóveis o solo e tudo quanto se lhe  incorporar natural ou artificialmente.", "c": "advogado12:9"}, {"p": "advogado12", "n": 87, "a": "direito", "t": "São móveis os bens suscetíveis de movimento próprio,  ou de remoção por força alheia, sem alteração da substância ou da destinação econômico‑social.", "c": "advogado12:9"}, {"p": "advogado12", "n": 88, "a": "direito", "t": "Os materiais destinados a alguma construção,  enquanto não forem empregados, conservam sua qualidade de móveis. Todavia, não readquirem essa qualidade os materiais provenientes da demolição de algum prédio.", "c": "advogado12:9"}, {"p": "advogado12", "n": 89, "a": "direito", "t": "São fungíveis os móveis que podem substituir‑se por  outros da mesma espécie, qualidade e quantidade.", "c": "advogado12:9"}, {"p": "advogado12", "n": 90, "a": "direito", "t": "São consumíveis os bens móveis cujo uso importa  destruição imediata da própria substância, sendo, também, considerados tais os destinados à alienação.", "c": "advogado12:9"}, {"p": "advogado12", "n": 91, "a": "direito", "t": "Bens divisíveis são os que se podem fracionar sem  alteração em sua substância, diminuição em qualquer grau de valor, ou prejuízo do uso a que se destinam.", "c": "advogado12:9"}, {"p": "advogado12", "n": 92, "a": "direito", "t": "Os bens naturalmente divisíveis podem tornar‑se  indivisíveis somente por determinação da lei.", "c": "advogado12:9"}, {"p": "advogado12", "n": 93, "a": "direito", "t": "Constitui universalidade de fato o complexo de  relações jurídicas, de uma pessoa, que sejam dotadas de valor econômico.", "c": "advogado12:9"}, {"p": "advogado12", "n": 94, "a": "direito", "t": "Principal é o bem que existe sobre si, abstrata ou  concretamente. Já o acessório, aquele cuja existência supõe a do principal.", "c": "advogado12:9"}, {"p": "advogado12", "n": 95, "a": "direito", "t": "São frutos os bens que, não constituindo partes  integrantes, se destinam, de modo duradouro, ao uso, ao serviço ou ao aformoseamento de outro.", "c": "advogado12:9"}, {"p": "advogado12", "n": 96, "a": "direito", "t": "A tutela provisória pode fundamentar‑se em urgência,  evidência ou necessidade.", "c": "advogado12:10"}, {"p": "advogado12", "n": 97, "a": "direito", "t": "A tutela provisória requerida em caráter incidental  depende do pagamento de custas.", "c": "advogado12:10"}, {"p": "advogado12", "n": 98, "a": "direito", "t": "A tutela provisória conserva sua eficácia na pendência  do processo, mas pode, a qualquer tempo, ser revogada ou modificada.", "c": "advogado12:10"}, {"p": "advogado12", "n": 99, "a": "direito", "t": "O juiz poderá determinar as medidas que considerar  adequadas para a efetivação da tutela provisória.", "c": "advogado12:10"}, {"p": "advogado12", "n": 100, "a": "direito", "t": "Na decisão que conceder, negar, modificar ou revogar  a tutela provisória, o juiz motivará seu convencimento de modo claro e preciso.", "c": "advogado12:10"}, {"p": "advogado12", "n": 101, "a": "direito", "t": "A tutela provisória será requerida ao juízo da causa  e, quando antecedente, ao presidente do tribunal competente para julgar recurso relacionado ao pedido principal.", "c": "advogado12:10"}, {"p": "advogado12", "n": 102, "a": "matematica", "t": "A tutela de urgência será concedida quando houver  elementos que evidenciem a probabilidade do direito e o perigo de dano ou o risco ao resultado útil do processo.", "c": "advogado12:10"}, {"p": "advogado12", "n": 103, "a": "direito", "t": "A tutela de urgência não pode ser concedida  liminarmente.", "c": "advogado12:10"}, {"p": "advogado12", "n": 104, "a": "direito", "t": "A tutela de urgência de natureza antecipada poderá ser  concedida quando houver perigo de irreversibilidade dos efeitos da decisão.", "c": "advogado12:10"}, {"p": "advogado12", "n": 105, "a": "direito", "t": "A tutela de urgência de natureza cautelar pode ser  efetivada mediante arresto, sequestro, arrolamento de bens, registro de protesto contra alienação de bem e qualquer outra medida idônea para a asseguração do direito. Prova aplicada  Advogado CONSELHO REGIONAL DE ENFERMAGEM DO PARANÁ Quadrix | 2024 6", "c": "advogado12:10"}, {"p": "advogado12", "n": 106, "a": "direito", "t": "O uso da sigla COREN‑PR é privativo do Conselho  Regional de Enfermagem do Paraná.", "c": "advogado12:11"}, {"p": "advogado12", "n": 107, "a": "direito", "t": "O COREN‑PR tem jurisdição e competência nacional,  com sede administrativa em Brasília. Além disso, esse órgão apresenta autonomia administrativa e financeira, sendo vinculado ao Ministério da Saúde.", "c": "advogado12:11"}, {"p": "advogado12", "n": 108, "a": "direito", "t": "O COREN‑PR constitui‑se em tribunal para o  julgamento das infrações administrativas, cíveis e criminais dos profissionais de enfermagem.", "c": "advogado12:11"}, {"p": "advogado12", "n": 109, "a": "direito", "t": "O conselheiro suplente poderá participar das reuniões  ordinárias e extraordinárias, sem direito a voto, salvo quando estiver designado para substituir o conselheiro efetivo.", "c": "advogado12:11"}, {"p": "advogado12", "n": 110, "a": "direito", "t": "O plenário do COREN‑PR reunir‑se‑á ordinária ou  extraordinariamente, de acordo com o calendário anual, com a presença de maioria simples dos conselheiros presentes na audiência pública, e deverá ter pauta definida.", "c": "advogado12:11"}, {"p": "advogado12", "n": 111, "a": "direito", "t": "Em caso de falta, de impedimento ou de licença, o  conselheiro regional efetivo será substituído por um suplente, mediante convocação da assembleia geral.", "c": "advogado12:11"}, {"p": "advogado12", "n": 112, "a": "direito", "t": "Salvo disposição expressa em contrário, os conselheiros  terão o prazo de 10 dias para os despachos de mero impulso processual e para a requisição de documentos ou prestação de informações. Já para a prolação de pareceres, o prazo será de 30 dias.", "c": "advogado12:11"}, {"p": "advogado12", "n": 113, "a": "direito", "t": "Os Conselhos Regionais serão instalados em suas  respectivas sedes, compostos de 5 a 21 membros e de outros tantos suplentes, todos eles de nacionalidade brasileira, e portadores de diploma de curso de enfermagem de nível superior.", "c": "advogado12:11"}, {"p": "advogado12", "n": 114, "a": "direito", "t": "A assembleia dos presidentes dos Conselhos Regionais  poderá sustar os atos praticados pelo presidente do Conselho Federal de Enfermagem (COFEN).", "c": "advogado12:11"}, {"p": "advogado12", "n": 115, "a": "direito", "t": "O COFEN terá nove membros efetivos e igual número  de suplentes, de nacionalidade brasileira, e portadores de diploma de curso de enfermagem de nível superior. Com base no Código de Ética dos Empregados Públicos do Sistema COFEN/COREN (Resolução COFEN nº 507/2016),", "c": "advogado12:11"}, {"p": "advogado12", "n": 116, "a": "direito", "t": "Constitui infração leve, passível de aplicação da pena  de suspensão, a acumulação remunerada de cargos, empregos e funções públicas, a qual é vedada pela Constituição Federal de 1988.", "c": "advogado12:11"}, {"p": "advogado12", "n": 117, "a": "direito", "t": "Quanto à suspensão, a ação disciplinar prescreverá  em dois anos.", "c": "advogado12:11"}, {"p": "advogado12", "n": 118, "a": "direito", "t": "Os CORENs que, justificadamente, não tiverem  condições de instituir comissão de processo disciplinar poderão solicitar apoio de pessoal ao COFEN.", "c": "advogado12:11"}, {"p": "advogado12", "n": 119, "a": "direito", "t": "As infrações praticadas pelos profissionais de  enfermagem que ofendam a integridade física, mental ou moral de qualquer pessoa, ainda que não causem debilidade, são consideradas graves.", "c": "advogado12:12"}, {"p": "advogado15", "n": 1, "a": "portugues", "t": "Apesar da caracterização de espirituoso que se faz,  no primeiro parágrafo, do personagem Emílio, essa característica não se comprova no texto.", "c": "advogado15:1"}, {"p": "advogado15", "n": 2, "a": "portugues", "t": "Como se anuncia no primeiro parágrafo, ao se falar da  morte de um amigo, o texto tem um tom melancólico.", "c": "advogado15:1"}, {"p": "advogado15", "n": 3, "a": "portugues", "t": "O narrador demonstra que anedota e historieta são  definições diferentes para um mesmo contexto.", "c": "advogado15:1"}, {"p": "advogado15", "n": 4, "a": "portugues", "t": "Em “passou‑se” (linha 5), o “se” é parte integrante do  verbo, já que se trata de verbo pronominal.", "c": "advogado15:1"}, {"p": "advogado15", "n": 5, "a": "portugues", "t": "Na passagem “supôs que ela sorrisse não dele mas  para ele” (linha 9), há um jogo com os sentidos de duas preposições em específico.", "c": "advogado15:1"}, {"p": "advogado15", "n": 6, "a": "portugues", "t": "Na linha 10, os termos “Ela” e “o conquistador”  demarcam processos coesivos.", "c": "advogado15:1"}, {"p": "advogado15", "n": 7, "a": "portugues", "t": "No trecho “quando ela entrou, ele entrou  também” (linha 13), o verbo “entrar” foi empregado com que concorda com o pronome “ele”.", "c": "advogado15:2"}, {"p": "advogado15", "n": 19, "a": "portugues", "t": "Da forma como foi empregado no penúltimo  parágrafo, o substantivo “intercorrência” (linhas 24 e 30) está no campo semântico de “sobrevir”.", "c": "advogado15:2"}, {"p": "advogado15", "n": 20, "a": "direito", "t": "O último período do texto poderia ser corretamente  reescrito desta maneira, sem prejuízo para o sentido original do texto: Embora os dentistas não tenham sido proibidos de fazer o procedimento, foi determinado pela decisão da Justiça Federal que eles passam a precisar seguir as regras do Conselho Federal de Medicina. 1 4 7 10 13 16 19 22 25 28 31 34 37  Prova aplicada CRO-AM ADVOGADO CONSELHO REGIONAL DE ODONTOLOGIA DO AMAZONAS INSTITUTO QUADRIX – APLICAÇÃO: 2024 3 Admitindo‑se que as proposições “Se Potira não é manauara, então Raíra é manauara”, “Se Potira é manauara, então Tainá não é manauara” e “Tainá é manauara” são", "c": "advogado15:2"}, {"p": "advogado15", "n": 21, "a": "matematica", "t": "As proposições “Se Potira não é manauara, então  Raíra é manauara” e “Potira é manauara ou Raíra é manauara” são equivalentes.", "c": "advogado15:2"}, {"p": "advogado15", "n": 22, "a": "matematica", "t": "As proposições “Se Potira é manauara, então Tainá  não é manauara” e “Se Tainá é manauara, então Potira não é manauara” são equivalentes.", "c": "advogado15:2"}, {"p": "advogado15", "n": 23, "a": "matematica", "t": "A proposição “Se Potira é manauara, então Raíra não é  manauara” é falsa.", "c": "advogado15:2"}, {"p": "advogado15", "n": 24, "a": "matematica", "t": "A proposição “Ou Tainá ou Raíra é manauara” é falsa. Sabe‑se que, em uma turma, 9 16 dos alunos são do sexo feminino e que caso houvesse mais 4 alunos do sexo masculino, o número de alunos dos dois sexos seria igual.", "c": "advogado15:2"}, {"p": "advogado15", "n": 26, "a": "direito", "t": "Se, em um determinado dia, 7 alunos dessa turma  faltarem, é possível garantir que, pelo menos, 3 dos alunos presentes fazem aniversário no mesmo mês.", "c": "advogado15:3"}, {"p": "advogado15", "n": 27, "a": "matematica", "t": "O menor múltiplo comum entre o número de alunos  dos dois sexos é 252. Letícia deseja armazenar 5 alimentos – arroz; café; feijão; macarrão; e milho – em potes herméticos de cores distintas: amarelo; azul; rosa; verde; e vermelho.", "c": "advogado15:3"}, {"p": "advogado15", "n": 28, "a": "matematica", "t": "Letícia pode armazenar esses alimentos de 140  maneiras distintas.", "c": "advogado15:3"}, {"p": "advogado15", "n": 29, "a": "matematica", "t": "Se Letícia armazenar os 5 alimentos de forma  aleatória, a probabilidade de o arroz estar no pote hermético vermelho é de 10%.", "c": "advogado15:3"}, {"p": "advogado15", "n": 30, "a": "direito", "t": "Se o feijão estiver no pote hermético verde e o milho  no pote hermético amarelo, a probabilidade de o café estar no pote hermético azul e o macarrão no pote hermético rosa é inferior a 15%. RASCUNHO  Prova aplicada CRO-AM ADVOGADO CONSELHO REGIONAL DE ODONTOLOGIA DO AMAZONAS INSTITUTO QUADRIX – APLICAÇÃO: 2024 4 Acerca dos conceitos de hardware, do programa Microsoft", "c": "advogado15:3"}, {"p": "advogado15", "n": 31, "a": "informatica", "t": "Os HDDs (Hard Disk Drive), dispositivos destinados  ao armazenamento de dados, são propensos a falhas mecânicas devido às partes móveis, como, por exemplo, o braço de leitura/gravação e os discos magnéticos.", "c": "advogado15:4"}, {"p": "advogado15", "n": 32, "a": "informatica", "t": "O teclado e o mouse são os dois principais dispositivos  de saída de um computador do tipo desktop.", "c": "advogado15:4"}, {"p": "advogado15", "n": 33, "a": "informatica", "t": "A função PROCH do Excel 2013 não faz distinção de  letras maiúsculas e minúsculas em seus argumentos.", "c": "advogado15:4"}, {"p": "advogado15", "n": 34, "a": "informatica", "t": "A função Filtro no Excel 2013 é utilizada,  exclusivamente, para alterar a formatação das células em uma planilha.", "c": "advogado15:4"}, {"p": "advogado15", "n": 35, "a": "informatica", "t": "Ao restaurar um computador no Windows 8,  os aplicativos instalados pelo usuário não serão removidos, independentemente do tipo de restauração, já que esse processo remove somente os arquivos de sistemas do Windows. Quanto aos conceitos de redes de computadores, às noções de vírus, worms e pragas virtuais e ao Sistema Eletrônico de", "c": "advogado15:4"}, {"p": "advogado15", "n": 36, "a": "informatica", "t": "Em redes de computadores, links são definidos  como sendo apenas as conexões físicas entre os nós (dispositivos) da rede.", "c": "advogado15:4"}, {"p": "advogado15", "n": 37, "a": "informatica", "t": "O compartilhamento de hardware representa  uma das funções desempenhadas pelas redes de computadores, já que é possível compartilhar dispositivos periféricos, como, por exemplo, impressoras, unidades de armazenamento.", "c": "advogado15:4"}, {"p": "advogado15", "n": 38, "a": "informatica", "t": "Um invasor pode utilizar redes de computadores  infectados (botnets), controladas remotamente, para enviar spam, entre outras finalidades.", "c": "advogado15:4"}, {"p": "advogado15", "n": 39, "a": "informatica", "t": "Na Barra de Ferramentas do SEI, o botão  disponibiliza informações a respeito das novas funcionalidades adicionadas ao sistema, bem como comunicados relacionados.", "c": "advogado15:4"}, {"p": "advogado15", "n": 40, "a": "informatica", "t": "Para o SEI, um documento nato‑digital é um  documento produzido originariamente em meio eletrônico. Nos itens que avaliem conhecimentos de informática, a menos que seja explicitamente informado o contrário, considere que: todos os programas mencionados estejam em configuração‑padrão, em português; o mouse esteja configurado para pessoas destras; expressões como clicar, clique simples e clique duplo refiram‑se a cliques com o botão esquerdo do mouse; e teclar corresponda à operação de pressionar uma tecla e, rapidamente, liberá‑la, acionando‑a apenas uma vez.", "c": "advogado15:4"}, {"p": "advogado15", "n": 41, "a": "legislacao", "t": "Considera‑se informação os dados, processados ou  não, que podem ser utilizados para a produção e a transmissão de conhecimento, contidos em qualquer meio, suporte ou formato.", "c": "advogado15:x40"}, {"p": "advogado15", "n": 42, "a": "legislacao", "t": "É dever do Estado garantir o direito de acesso  à informação, que será franqueada, mediante procedimentos objetivos e ágeis, de forma transparente, clara e em linguagem de fácil compreensão.", "c": "advogado15:x40"}, {"p": "advogado15", "n": 43, "a": "legislacao", "t": "Não cabe aos órgãos e às entidades do poder público  assegurarem a proteção da informação.", "c": "advogado15:x40"}, {"p": "advogado15", "n": 44, "a": "legislacao", "t": "Informado do extravio da informação solicitada,  o interessado não poderá requerer à autoridade competente a abertura de sindicância para apurar o desaparecimento da respectiva documentação.", "c": "advogado15:x40"}, {"p": "advogado15", "n": 45, "a": "legislacao", "t": "Apenas pessoas alfabetizadas e em dia com  suas obrigações eleitorais poderão apresentar pedido de acesso a informações aos órgãos e às entidades públicas.", "c": "advogado15:5"}, {"p": "advogado15", "n": 46, "a": "legislacao", "t": "O órgão ou a entidade pública deverá autorizar ou  conceder o acesso imediato à informação disponível.", "c": "advogado15:5"}, {"p": "advogado15", "n": 47, "a": "direito", "t": "Quando não for autorizado o acesso por se tratar  de informação total ou parcialmente sigilosa, o requerente deverá ser informado sobre a possibilidade de recurso, dos prazos e das condições para sua interposição, mas não lhe deve ser indicada a autoridade competente à apreciação do recurso.", "c": "advogado15:5"}, {"p": "advogado15", "n": 48, "a": "legislacao", "t": "Caso a informação solicitada esteja disponível ao  público em formato impresso, eletrônico ou em qualquer outro meio de acesso universal, serão informados ao
