a os processos que não tenham sido julgados, salvo aqueles cujo julgamento tiver sido expressamente adiado para a primeira sessão seguinte.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 96, "a": "direito", "t": "Quando o resultado da apelação não for unânime, o  julgamento terá prosseguimento em sessão a ser designada com a presença de outros julgadores, que serão convocados nos termos previamente definidos no regimento interno, em número suficiente para garantir a possibilidade de inversão do resultado inicial, sendo vedada a possibilidade de que as partes e eventuais terceiros sustentem oralmente suas razões perante os novos julgadores.  CONSELHO REGIONAL DE MEDICINA DO ESTADO DE SANTA CATARINA INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRM-SC ADVOGADO 7", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 97, "a": "direito", "t": "Proferidos os votos, o presidente anunciará o resultado  do julgamento, designando para redigir o acórdão o relator ou, se vencido este, o autor do primeiro voto vencedor.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 99, "a": "direito", "t": "A efetiva repetição de processos que contenham  controvérsia sobre a mesma questão unicamente de direito é, por si só, circunstância que viabiliza a instauração do incidente de resolução de demandas repetitivas.", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 100, "a": "direito", "t": "A renúncia ao direito de recorrer independe da  aceitação da outra parte. ____________________________________________________", "c": "advogado_127:6"}, {"p": "advogado_127", "n": 101, "a": "direito", "t": "Desaparecendo uma pessoa do seu domicílio sem dela  haver notícia, se não houver deixado representante ou procurador a quem caiba administrar-lhe os bens, o juiz, a requerimento de qualquer interessado ou do Ministério Público, declarará a ausência e nomear-lhe-á curador.", "c": "advogado_127:7"}, {"p": "advogado_127", "n": 102, "a": "direito", "t": "O cônjuge do ausente, sempre que não esteja separado  judicialmente, ou de fato por mais de dois anos antes da declaração da ausência, será o seu legítimo curador.", "c": "advogado_127:7"}, {"p": "advogado_127", "n": 103, "a": "direito", "t": "Decorridos dois anos da arrecadação dos bens do  ausente, ou, se ele tiver deixado representante ou procurador, em se passando um ano, poderão os interessados requerer que se declare a ausência e se abra provisoriamente a sucessão.", "c": "advogado_127:7"}, {"p": "advogado_127", "n": 104, "a": "direito", "t": "Se o ausente aparecer, ou se lhe provar a existência,  depois de estabelecida a posse provisória, cessarão para logo as vantagens dos sucessores nela imitidos, ficando, todavia, obrigados a tomar as medidas assecuratórias precisas, até a entrega dos bens a seu dono.", "c": "advogado_127:7"}, {"p": "advogado_127", "n": 105, "a": "direito", "t": "Cinco anos depois de passada em julgado a sentença que  concedeu a abertura da sucessão provisória, poderão os interessados requerer a sucessão definitiva e o levantamento das cauções prestadas. ____________________________________________________", "c": "advogado_127:7"}, {"p": "advogado_127", "n": 106, "a": "direito", "t": "A responsabilidade médica é sempre pessoal e deve,  como regra, ser presumida.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 107, "a": "direito", "t": "O médico poderá deixar de assumir responsabilidade  sobre procedimento médico que indicou ou do qual participou, desde que vários médicos tenham assistido o paciente.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 108, "a": "direito", "t": "É vedado ao médico afastar-se de suas atividades  profissionais, mesmo temporariamente, sem deixar outro médico encarregado do atendimento de seus pacientes internados ou em estado grave.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 109, "a": "direito", "t": "É lícito ao médico, quando pertencente à equipe de  transplante, participar do processo de diagnóstico da morte ou da decisão de suspender meios artificiais para prolongar a vida do possível doador.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 110, "a": "direito", "t": "É vedado ao médico revelar sigilo profissional  relacionado a paciente adolescente, ainda que este não tenha capacidade de discernimento, inclusive a seus pais ou representantes legais.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 111, "a": "direito", "t": "O médico poderá ser perito ou auditor do próprio  paciente.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 112, "a": "direito", "t": "O médico deverá atuar com absoluta isenção quando  designado para servir como perito ou como auditor, sendo-lhe vedado ultrapassar os limites de suas atribuições e de sua competência.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 113, "a": "direito", "t": "É vedado ao médico atestar óbito quando não o tenha  verificado pessoalmente, ou quando não tenha prestado assistência ao paciente, salvo, no último caso, se o fizer como plantonista, médico substituto ou em caso de necropsia e verificação médico-legal.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 114, "a": "direito", "t": "O médico não poderá subordinar os honorários ao  resultado do tratamento ou à cura do paciente.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 115, "a": "direito", "t": "É vedado ao médico deixar de respeitar a vontade de  qualquer pessoa considerada capaz, física e mentalmente, em greve de fome, ou alimentá-la compulsoriamente, devendo cientificá-la das prováveis complicações do jejum prolongado e, na hipótese de risco iminente de morte, tratá-la. ____________________________________________________ Considerando as disposições da Resolução CFM n.o", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 116, "a": "direito", "t": "O cargo de médico fiscal deverá ser preenchido  mediante concurso público, sendo permitido aos conselheiros, federais ou regionais, participarem desse certame.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 117, "a": "direito", "t": "Os médicos que integram o corpo clínico de uma  instituição devem colaborar para que se façam presentes as condições mínimas para a segurança do ato médico.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 118, "a": "direito", "t": "É vedado ao médico delegar a outro profissional ato  privativo de médico, salvo quando integrante de equipe multiprofissional.", "c": "advogado_127:8"}, {"p": "advogado_127", "n": 119, "a": "direito", "t": "O diagnóstico e a classificação de doença devem ser  realizados por médico, em conformidade com a versão vigente da Classificação Estatística Internacional de Doenças e Problemas Relacionados à Saúde.", "c": "advogado_127:8"}, {"p": "advogado_130", "n": 1, "a": "portugues", "t": "De  acordo  com  o  texto,  ao  longo  da  evolução  da  humanidade, todas as sociedades desenvolveram algum grau  de  preocupação  com  a  proteção  da  privacidade, pois a divisão entre as esferas pública e privada existia mesmo em comunidades humanas mais antigas.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 2, "a": "portugues", "t": "O segundo parágrafo do texto concentra‐se em definir o  conceito  filosófico  de  oikos,  correspondente  à  esfera pública da vida, de acordo com Aristóteles.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 3, "a": "portugues", "t": "Infere‐se  do  texto  que,  atualmente,  com  a  nova  sociedade  digital,  não  são  claros  os  limites  entre  o público e o privado, o que se relaciona com a presença expressiva  da  tecnologia  nos  espaços  ocupados  pela sociedade humana.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 4, "a": "portugues", "t": "O objetivo central do texto é alertar o leitor dos perigos  associados  à  fragilidade  da  segurança  dos  dados disponíveis  em  meio  digital,  uma  vez  que  a  Internet facilita os ataques a informações pessoais.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 5, "a": "portugues", "t": "Na  linha  8,  os  dois‐pontos  foram  empregados  com  o  objetivo  de  introduzir  uma  síntese  das  ideias apresentadas nos três primeiros parágrafos do texto.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 6, "a": "portugues", "t": "No  primeiro  parágrafo  do  texto,  é  estabelecida  uma  comparação entre a dimensão territorial de Mênfis, no Antigo Egito, e a extensão do bairro da Sé, no centro de São Paulo.  CONSELHO REGIONAL DOS TÉCNICOS INDUSTRIAIS DE MINAS GERAIS  INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRT‐MG ADVOGADO  2 Acerca  dos  aspectos  gramaticais  e  dos  sentidos  do  texto", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 7, "a": "portugues", "t": "O  termo  “o”,  em  “o  atualizaram”  (linha  19),  retoma   toda  a  expressão  “O  conceito  jurídico  de privacidade” (linha 18).", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 8, "a": "portugues", "t": "Seria mantida a correção gramatical do texto caso fosse  inserido o sinal indicativo de crase no vocábulo “a”, no trecho “o direito a proteger”  (linha 8), por se tratar de contexto em que é opcional o emprego desse sinal.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 9, "a": "portugues", "t": "O  período  “Em  metrópoles  desse  porte,  era  possível,  pela primeira vez, garantir segredo em alguns aspectos da vida” (linhas 12 e 13) apresenta predicado nominal, e o trecho “garantir segredo em alguns aspectos da vida” exerce a função de sujeito nesse período.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 10, "a": "portugues", "t": "As  vírgulas  que  isolam  o  trecho  “na  prática”  (linha  6)  poderiam  ser  suprimidas  sem  prejuízo  da  correção gramatical do texto.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 11, "a": "portugues", "t": "Mantendo‐se  a  coerência  e  a  correção  gramatical  do  trecho “A preocupação de garantir o direito a proteger a vida  de  bisbilhoteiros  é  uma  invenção  muito  mais recente”  (linha  8),  a  preposição  “de” poderia  ser substituída por em.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 12, "a": "portugues", "t": "O  termo  “cercado”  (linha  15)  está  flexionado  no  masculino e no singular porque concorda com a palavra “escritor” (linha 13).", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 13, "a": "portugues", "t": "Mantendo‐se a correção e os sentidos originais do texto,  a palavra “onde”  (linha 17) poderia ser substituída por em que.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 14, "a": "portugues", "t": "O emprego do acento gráfico em “britânicos” (linha 18)  e  “público”  (linha  22)  justifica‐se  com  base  na  mesma regra de acentuação.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 15, "a": "portugues", "t": "No  trecho  ‘Ao  atender  um  telefone  dentro  de  um   teatro’  (linha  23),  o  vocábulo  ‘atender’  poderia  ser corretamente  flexionado  no  plural  —  atenderem  —, mantendo‐se a coerência e os sentidos do texto.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 16, "a": "portugues", "t": "O  trecho  ‘A  divisão  física  entre  ambiente  público  e  privado,  que  costumava  ser  definida  pela  arquitetura, não existe mais’ (linhas 30 e 31) poderia ser reescrito da seguinte forma, sem prejuízo de sua coerência e de sua correção gramatical: A arquitetura costumava definir a divisão  física  entre  ambiente  público  e  ambiente privado, mas essa divisão não existe mais.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 17, "a": "portugues", "t": "Sem  alteração  do  sentido  do  texto  e  das  relações  sintáticas  estabelecidas  no  trecho  “Não  é  que  a preocupação  não  existisse”  (linha  4),  a  palavra “existisse” poderia ser substituída por houvesse.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 18, "a": "portugues", "t": "A conjunção “Como” (linha 13) introduz oração adverbial  comparativa  no  período  em  que  se  insere, estabelecendo  um  contraste  entre  o  mundo  fictício criado por Edgar Allan Poe e a realidade de Londres do século XIX.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 19, "a": "portugues", "t": "No  último  período  do  texto,  a  expressão  “a  noção  de  privacidade”  classifica‐se  como  sujeito  composto,  por apresentar mais de um núcleo nominal.", "c": "advogado_130:1"}, {"p": "advogado_130", "n": 21, "a": "informatica", "t": "No Excel 2013, a barra de  rolagem do mouse pode ser  usada para percorrer as guias.", "c": "advogado_130:2"}, {"p": "advogado_130", "n": 22, "a": "informatica", "t": "No  Excel  2013,  caso  o  usuário  deseje  criar  restrições  quanto  aos  dados  que  poderão  ser  inseridos  em  uma célula, ele poderá usar o recurso Validação de Dados.", "c": "advogado_130:2"}, {"p": "advogado_130", "n": 23, "a": "informatica", "t": "O  TELNET  é  a  ferramenta,  utilizada  em  redes  de  computadores,  cuja  função  principal  é  a  de  configurar dinamicamente  os  parâmetros  da  rede  TCP/IP  em  um computador.", "c": "advogado_130:2"}, {"p": "advogado_130", "n": 24, "a": "informatica", "t": "Uma  rede de computadores não pode conter somente  computadores pessoais, pois é necessário que exista, no mínimo,  um  computador mais  robusto  do  tipo  grande porte, o qual será o servidor.", "c": "advogado_130:2"}, {"p": "advogado_130", "n": 25, "a": "informatica", "t": "Mesmo  que  o  computador  não  esteja  conectado  à  Internet,  o  usuário  poderá  fazer  uso  do  Outlook Express 6 para gerenciar as mensagens de e‐mail. ____________________________________________________ A  respeito  das  noções  de  vírus,  dos  aplicativos  para  a segurança  da  informação  e  dos  procedimentos  de  backup,", "c": "advogado_130:2"}, {"p": "advogado_130", "n": 26, "a": "direito", "t": "A principal característica dos vírus de boot é que eles se  fixam diretamente na memória RAM do computador.", "c": "advogado_130:2"}, {"p": "advogado_130", "n": 27, "a": "direito", "t": "Os  botnets  são  a  categoria  de  vírus  mais  perigosa  atualmente,  pois  eles  se  instalam  na  partição  de inicialização  do  sistema  e  executam  a  formatação  do computador no momento em que ele é iniciado.", "c": "advogado_130:2"}, {"p": "advogado_130", "n": 28, "a": "direito", "t": "Um dos aplicativos para a segurança da informação é o  antivírus,  que  inspeciona  o  conteúdo  de  um  arquivo e tenta  localizar  códigos  para  compará‐los  com  o  seu banco de dados de vacinas, visando a interromper uma possível infecção do sistema.", "c": "advogado_130:2"}, {"p": "advogado_130", "n": 29, "a": "informatica", "t": "Uma das funções do firewall é executar um comando de  filtragem  previamente  especificado  com  base  nas necessidades de compartilhamento, acesso e proteção requeridas pela rede.", "c": "advogado_130:2"}, {"p": "advogado_130", "n": 30, "a": "informatica", "t": "A  tarefa de compactação de dados é  raramente usada  em sistemas de backup, pois, além de não economizar espaço  de  armazenamento,  pode  ainda  corromper  os arquivos.  CONSELHO REGIONAL DOS TÉCNICOS INDUSTRIAIS DE MINAS GERAIS  INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRT‐MG ADVOGADO  3 Anderson e Bárbara resolveram jogar par ou ímpar de uma forma nada convencional. Cada um lançaria um dado com faces gravadas com números de um a seis. Se o produto dos  números  observados  fosse  par,  Bárbara  seria  a vencedora.  Se  o  produto  dos  números  observados  fosse ímpar, Anderson seria o vencedor.", "c": "advogado_130:2"}, {"p": "advogado_130", "n": 31, "a": "matematica", "t": "A probabilidade de Anderson vencer a disputa é de 25%.", "c": "advogado_130:3"}, {"p": "advogado_130", "n": 32, "a": "matematica", "t": "Se  a  soma  dos  números  observados  for  igual  a  8,  a  probabilidade de Bárbara vencer a disputa é de 60%.", "c": "advogado_130:3"}, {"p": "advogado_130", "n": 33, "a": "matematica", "t": "A probabilidade de a soma dos números observados ser  igual a 5 ou 9 é de 0,222222....", "c": "advogado_130:3"}, {"p": "advogado_130", "n": 34, "a": "informatica", "t": "Se os dados utilizados são cubos de aresta igual a 16 mm,  o volume de cada um deles é igual a 4.096 mL. ____________________________________________________ Em uma loja, há 6  tipos de refrigerante, 4  tipos de queijo e 3 tipos de carne.", "c": "advogado_130:3"}, {"p": "advogado_130", "n": 35, "a": "informatica", "t": "Há exatamente 13 modos de uma pessoa comprar um  refrigerante, um queijo e uma carne nessa loja.", "c": "advogado_130:3"}, {"p": "advogado_130", "n": 36, "a": "informatica", "t": "Há  exatamente  64  modos  de  uma  pessoa  comprar  10  carnes nessa loja.", "c": "advogado_130:3"}, {"p": "advogado_130", "n": 37, "a": "informatica", "t": "O número de anagramas da palavra QUEIJO está para o  número de anagramas da palavra REFRIGERANTE assim como 1 está para 2ସ ൈ 3 ൈ 5 ൈ 7 ൈ 11. ____________________________________________________ Lucas  é  um  rapaz  apaixonado  por  felinos.  Em  sua casa,  há  10  gatos  brancos,  7  gatos  alaranjados  e  8  gatos pretos. Há 4 gatos brancos e laranjas, 5 gatos brancos e pretos e 3 gatos pretos e laranjas. Apenas 3 gatos possuem essas três cores. Há, ainda, 5 gatos completamente marrons e 6 gatos completamente acinzentados.", "c": "advogado_130:3"}, {"p": "advogado_130", "n": 38, "a": "informatica", "t": "Se somente fêmeas dessa espécie podem ser tricolores,  então há apenas 3 gatas na casa de Lucas.", "c": "advogado_130:4"}, {"p": "advogado_130", "n": 39, "a": "informatica", "t": "O  total  de  gatos  na  casa  é  um  número  inteiro  e,  portanto,  não  pertence  ao  conjunto  dos  números racionais.", "c": "advogado_130:4"}, {"p": "advogado_130", "n": 40, "a": "informatica", "t": "Lucas possui 27 gatos.   CONSELHO REGIONAL DOS TÉCNICOS INDUSTRIAIS DE MINAS GERAIS  INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRT‐MG ADVOGADO  4", "c": "advogado_130:4"}, {"p": "advogado_130", "n": 41, "a": "legislacao", "t": "As  chamadas  decisões  coordenadas  exigem  a  intervenção de um mínimo de cinco setores ou órgãos.", "c": "advogado_130:5"}, {"p": "advogado_130", "n": 42, "a": "legislacao", "t": "A  escolha  de  se  adotar  a  modalidade  coordenada  de  decisão é puramente discricionária.", "c": "advogado_130:5"}, {"p": "advogado_130", "n": 43, "a": "legislacao", "t": "A decisão coordenada é intersetorial, não podendo ser  interinstitucional.", "c": "advogado_130:5"}, {"p": "advogado_130", "n": 44, "a": "legislacao", "t": "Não  é  possível  a  adoção  da  modalidade  decisória  coordenada em processos que digam respeito ao poder sancionador.", "c": "advogado_130:5"}, {"p": "advogado_130", "n": 45, "a": "direito", "t": "O  processo  para  a  prolação  de  decisão  coordenada  admite a intervenção de interessados, que poderão ter voz, de modo a subsidiar a conclusão. ____________________________________________________ A  respeito  das  alterações  impressas  na  Lei  n.o 8.429/1992 pela Lei n.o", "c": "advogado_130:5"}, {"p": "advogado_130", "n": 46, "a": "legislacao", "t": "Presentes os requisitos legais, é possível a conversão de  ação  de  improbidade  em  ação  civil  pública,  em  franca aplicação da fungibilidade.", "c": "advogado_130:5"}, {"p": "advogado_130", "n": 47, "a": "legislacao", "t": "Não se admite, em ação de improbidade, dolo ou dano  presumido.", "c": "advogado_130:5"}, {"p": "advogado_130", "n": 48, "a": "legislacao", "t": "A  ação  de  improbidade  administrativa  é  repressiva  e  sancionatória,  não  se  prestando  ao  controle  de legalidade de políticas públicas.", "c": "advogado_130:5"}, {"p": "advogado_130", "n": 49, "a": "legislacao", "t": "O  juízo,  ao  fundamentar  sentença  em  ação  de  improbidade,  deve  levar  em  consideração  as dificuldades práticas e reais do gestor e as limitações que puderem ter condicionado o seu agir.", "c": "advogado_130:5"}, {"p": "advogado_130", "n": 50, "a": "legislacao", "t": "Em ação de improbidade, não se admite decisão fundada  em valores jurídicos abstratos. ____________________________________________________", "c": "advogado_130:5"}, {"p": "advogado_130", "n": 51, "a": "legislacao", "t": "As  relações morais não podem ser contrárias ao que a  justiça estabelece.", "c": "advogado_130:6"}, {"p": "advogado_130", "n": 52, "a": "legislacao", "t": "A  ética  persegue  o  fundamento  do  valor  a  partir  da  historicidade nele presente.", "c": "advogado_130:6"}, {"p": "advogado_130", "n": 53, "a": "legislacao", "t": "A ética pressupõe dilema e reflexão.", "c": "advogado_130:6"}, {"p": "advogado_130", "n": 54, "a": "legislacao", "t": "Do ponto de vista ético, existir não é o bastante; deve‐se  buscar ser útil e contribuir.", "c": "advogado_130:6"}, {"p": "advogado_130", "n": 55, "a": "legislacao", "t": "A  ética  exerce  um  importante  papel  de  sustentáculo  social. ____________________________________________________", "c": "advogado_130:6"}, {"p": "advogado_130", "n": 56, "a": "gerais", "t": "Criada logo após o término da Segunda Guerra Mundial,  a  Organização  das  Nações  Unidas  (ONU)  é  um  grande órgão  multilateral,  com  cerca  de  duas  centenas  de Estados‐membros.", "c": "advogado_130:7"}, {"p": "advogado_130", "n": 57, "a": "gerais", "t": "O  Conselho  de  Segurança  da  ONU  é  formado  por  membros  temporários  e  por  cinco  membros permanentes  (Estados  Unidos,  Reino  Unido,  França, Rússia e China), sendo que estes têm direito a veto.", "c": "advogado_130:7"}, {"p": "advogado_130", "n": 58, "a": "gerais", "t": "Palco  principal  de  duas  guerras  mundiais  no  século  passado,  a  Europa  assiste,  nesta  segunda  década  do século XXI, à eclosão de um conflito que convulsiona o Leste do continente.", "c": "advogado_130:7"}, {"p": "advogado_130", "n": 59, "a": "gerais", "t": "A atual guerra, que comove e aterroriza larga parcela da  população mundial, teve início com a invasão da Ucrânia por  forças  de  combate  russas,  após  determinação  do presidente Vladimir Putin.", "c": "advogado_130:7"}, {"p": "advogado_130", "n": 60, "a": "gerais", "t": "O  pretexto  para  a  decisão  tomada  pela  Rússia  foi  a  entrada  da  Ucrânia  na  aliança  militar  ocidental,  a Organização  do  Tratado  do  Atlântico  Norte  (OTAN), ocorrida no final do ano passado.", "c": "advogado_130:7"}, {"p": "advogado_130", "n": 61, "a": "gerais", "t": "A ONU calcula que, em dez dias de combate, cerca de  dois milhões de ucranianos procuraram se refugiar em países vizinhos, notadamente na Polônia.", "c": "advogado_130:7"}, {"p": "advogado_130", "n": 62, "a": "gerais", "t": "Em situações como a vivida pela Ucrânia, além de outros  dramas recorrentes na Ásia e na África, é que se deplora a inexistência de um órgão na estrutura da ONU voltado para  a  proteção  e  o  amparo  a  refugiados  pelo mundo afora.", "c": "advogado_130:7"}, {"p": "advogado_130", "n": 63, "a": "gerais", "t": "Pelo fato de a Rússia estar fora do mercado mundial, em  face  de  sua  oposição  aos  rumos  da  globalização, acredita‐se que serão diminutos os efeitos econômicos do conflito entre Rússia e Ucrânia.", "c": "advogado_130:7"}, {"p": "advogado_130", "n": 64, "a": "gerais", "t": "Por temer uma reação violenta de Putin, cujo país detém  o arsenal nuclear herdado da extinta União Soviética, o Ocidente, com os Estados Unidos à frente, optou por não impor sanções econômicas e financeiras à Rússia.", "c": "advogado_130:7"}, {"p": "advogado_130", "n": 65, "a": "gerais", "t": "A  inexistência  de  leis  internacionais  que  regulem  o  comportamento,  as  ações  e  as  atitudes  de  países  em guerra está  sendo  sentida  com maior intensidade,  nos dias atuais, em face do atual conflito no Leste europeu. ____________________________________________________ Extremamente complexo e, não raro, contraditório, o mundo contemporâneo  em  muito  se  distingue  dos  séculos  que  o precederam.  Na  economia,  na  política,  na  cultura  e  nas relações sociais, a atual realidade mundial apresenta notáveis avanços,  mas  graves  problemas  insistem  em  continuar", "c": "advogado_130:7"}, {"p": "advogado_130", "n": 66, "a": "legislacao", "t": "Com o colapso da União Soviética e a desintegração do  chamado  “socialismo  real”  da  Europa  Oriental,  os Estados Unidos não mais encontraram concorrentes em termos  econômicos, militares  e  políticos,  situação  que persiste até hoje.", "c": "advogado_130:8"}, {"p": "advogado_130", "n": 67, "a": "legislacao", "t": "Há  uma  crença  generalizada  de  que,  nos  dias  atuais,   para  se  inserir  competitivamente  na  economia crescentemente globalizada, um país precisa contar com um sistema educacional de qualidade e não excludente.", "c": "advogado_130:8"}, {"p": "advogado_130", "n": 68, "a": "legislacao", "t": "Um  acontecimento  significativo  da  sociedade  contemporânea  é  a  ascensão  feminina:  embora  ainda longe  da  superação  da  desigualdade  de  gênero  e experimentando  graus  variados  de  intensidade  pelo mundo  afora,  as  mulheres  vão  vencendo  barreiras históricas e ocupando cargos e funções até então fora de seu alcance.", "c": "advogado_130:8"}, {"p": "advogado_130", "n": 69, "a": "legislacao", "t": "Vive‐se  a  era  do  conhecimento  e  da  informação,  assentada em verdadeira revolução tecnológica, de que resultaria a existência de um “mundo digital”.", "c": "advogado_130:8"}, {"p": "advogado_130", "n": 70, "a": "legislacao", "t": "A  erradicação  completa  do  analfabetismo  em  escala  mundial  foi,  muito  provavelmente,  a  maior  conquista civilizatória da sociedade contemporânea.  CONSELHO REGIONAL DOS TÉCNICOS INDUSTRIAIS DE MINAS GERAIS  INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRT‐MG ADVOGADO  5", "c": "advogado_130:8"}, {"p": "advogado_130", "n": 71, "a": "direito", "t": "No  controle  difuso,  em  relação  à  questão  principal  debatida  no  processo,  a  declaração  incidental  de inconstitucionalidade surge como questão prejudicial.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 72, "a": "direito", "t": "Para  fim  de  declaração  incidental  de  inconstitucionalidade,  a  cláusula  de  reserva  de plenário (full bench) alcança as turmas recursais.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 73, "a": "direito", "t": "Órgãos administrativos autônomos, como o Tribunal de  Contas  da  União,  devem  observância  à  cláusula  de reserva de plenário para  fins de controle incidental de constitucionalidade de atos administrativos.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 74, "a": "direito", "t": "O  controle  incidental,  quando  realizado  pelo  Supremo  Tribunal Federal, tem observado que, cada vez mais, ele se aproxima do modelo abstrato, seja pelo exemplo da repercussão  geral,  seja  pela  expansividade  dos  efeitos da  decisão,  a  partir  do  entendimento  de  mutação constitucional  que afastou a  necessidade  de  resolução do Senado Federal como condição para a eficácia erga omnes.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 75, "a": "direito", "t": "A  ação  civil  pública,  por  possuir  aptidão  para  produzir  decisão com eficácia erga omnes, não admite controle difuso  de  constitucionalidade,  sob  pena  de  acabar funcionando como sucedâneo de ação direta. ____________________________________________________ No  que  concerne  ao  incidente  de  arguição  de", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 76, "a": "direito", "t": "Arguida  incidentalmente  a  inconstitucionalidade  de  dado  dispositivo  em  dada  demanda,  haverá  a possibilidade de lavratura de até três acórdãos distintos: um primeiro pelo órgão fracionário, admitindo ou não o incidente;  um  segundo,  se  admitido  o  incidente  pelo órgão  especial,  decidindo  o  incidente  em  si;  e  um terceiro, novamente pelo órgão fracionário, decidindo a questão  principal  na esteira  do  que  houver  decidido  o órgão especial.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 77, "a": "direito", "t": "A  parte  que  desejar  interpor  recurso  extraordinário  contra  decisão  em  incidente  de  arguição  de inconstitucionalidade  voltar‐se‐á  contra  o  que  houver decidido o órgão especial do tribunal.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 78, "a": "direito", "t": "A  preexistência  de  decisão  do  órgão  especial  do  respectivo  tribunal ou de qualquer órgão colegiado no âmbito do Supremo Tribunal Federal a respeito de certo tema tornará dispensável a instauração do incidente de arguição  de  inconstitucionalidade  que  versar  sobre idêntico ponto.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 79, "a": "direito", "t": "É  obrigatória,  no  incidente  de  arguição  de  inconstitucionalidade, sob pena de nulidade, a oitiva das pessoas  jurídicas  de  direito  público  responsáveis  pela edição do ato normativo impugnado.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 80, "a": "direito", "t": "É  obrigatória,  no  incidente  de  arguição  de  inconstitucionalidade,  sob  pena  de  nulidade,  a oportunização de manifestação do Ministério Público. ____________________________________________________ A  respeito  da  legitimidade  em  sede  de  mandado  de", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 81, "a": "direito", "t": "O mero executor do ato coator não ostenta legitimidade  para  figurar como autoridade coatora em mandado de segurança.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 82, "a": "direito", "t": "Dirigentes  de  entidades  privadas,  notadamente  concessionárias  de  serviços  públicos,  não  ostentam legitimidade  para  figurar como autoridade  coatora em mandado de segurança contra atos de gestão.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 83, "a": "direito", "t": "Atos estatais que  sejam despidos de poder de império  não possuem, em geral, aptidão para desafiar mandado de segurança.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 84, "a": "direito", "t": "Em  atos  complexos,  a  legitimidade  para  figurar  como  autoridade coatora é de todos os agentes envolvidos na cadeia decisória.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 85, "a": "direito", "t": "Em  atos  compostos,  a  legitimidade  para  figurar  como  autoridade coatora é de todos os agentes envolvidos na cadeia decisória. ____________________________________________________ Tendo em vista as disposições da Lei n.o", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 86, "a": "legislacao", "t": "O  âmbito  de  vigência  material  da  Lei  n.o 14.133/2021 alcança concessão e permissão de uso de bens públicos e  contratos  que  tenham  por  objeto  operações  de crédito.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 87, "a": "legislacao", "t": "O  âmbito  de  vigência  material  da  Lei  n.o 14.133/2021 alcança contratações de tecnologia da informação e de gestão da dívida pública.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 88, "a": "direito", "t": "O  princípio  de  segregação  de  funções  consiste  em  compartimentação de atividades no certame licitatório, prezando‐se  pela  especialidade  e  pela  independência funcional dos servidores.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 89, "a": "direito", "t": "O  princípio  do  desenvolvimento  nacional  sustentável  passa  a  nortear  as  licitações  administrativas, incorporando à noção de vantajosidade das propostas a satisfação  de  políticas  públicas  sociais,  econômicas  e ambientais.", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 90, "a": "legislacao", "t": "Por remissão expressa, a Lei de Introdução às Normas do  Direito  Brasileiro  também  subordina  as  licitações administrativas, no que couber.  CONSELHO REGIONAL DOS TÉCNICOS INDUSTRIAIS DE MINAS GERAIS  INSTITUTO QUADRIX – APLICAÇÃO: 2022 CRT‐MG ADVOGADO  6 De  acordo  com  a  Consolidação  das  Leis  do  Trabalho  e  a", "c": "advogado_130:9"}, {"p": "advogado_130", "n": 91, "a": "direito", "t": "Os efeitos da decisão que rescindir sentença de mérito  já  transitada  em  julgado  retroagem  inclusive  para determinar  a  restituição  de  verbas  de  natureza alimentar.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 92, "a": "direito", "t": "Compete ao Pleno dos Tribunais Regionais do Trabalho  o julgamento de ações rescisórias contra os acórdãos do próprio Tribunal.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 93, "a": "matematica", "t": "A ação rescisória exige depósito prévio de 20% do valor  da  causa,  ainda  quando  houver  hipossuficiência econômica do autor.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 94, "a": "direito", "t": "A  execução  do  comando  judicial  proferido  em  ação  rescisória é feita na própria ação rescisória.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 95, "a": "direito", "t": "Uma  vez  transitada em julgado, a  decisão extintiva  de  execução é passível de pedido rescisório. ____________________________________________________ Com  relação  à  Lei  de  Introdução  às  Normas  do  Direito", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 96, "a": "direito", "t": "A lei que determina o começo da personalidade é a do  país em que tiver nascido a pessoa, enquanto a lei que determina  o  fim  da  personalidade é a  do  país em  que tiver ocorrido o óbito da pessoa.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 97, "a": "direito", "t": "O regime de bens dos nubentes é regido pela lei do país  em que tiver sido celebrado o casamento.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 98, "a": "direito", "t": "O  divórcio  realizado  em  país  estrangeiro  tem  eficácia  imediata no Brasil.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 99, "a": "direito", "t": "As obrigações são regidas pela lei do país em que elas se  constituírem.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 100, "a": "direito", "t": "A lei do domicílio do herdeiro regula a capacidade para  suceder. ____________________________________________________ Com base na Lei n.o", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 101, "a": "direito", "t": "O consórcio público constituirá pessoa jurídica de direito  privado ou associação pública.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 102, "a": "direito", "t": "A participação da União em consórcio público pressupõe  a  integração  de  todos  os  estados  em  que  estejam situados os municípios consorciados.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 103, "a": "direito", "t": "O  consórcio  público  depende  de  prévia  subscrição  de  protocolo de intenções.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 104, "a": "direito", "t": "O  consórcio  público,  independentemente  da  personalidade  que  assuma,  integra  a  administração direta de todos os entes consorciados.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 105, "a": "direito", "t": "A extinção de contrato de consórcio público depende de  aprovação de assembleia geral e de lei federal. Segundo a Lei n.o 5.524/1968 e o Decreto n.o  90.922/1985,", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 106, "a": "direito", "t": "O  técnico  industrial  de  nível  médio  somente  pode  auxiliar  na  execução  de  serviços  de  manutenção  de equipamentos e  instalações,  não  lhe  sendo autorizado coordenar com autonomia essas atividades.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 107, "a": "direito", "t": "Em  pesquisas  tecnológicas,  compete  ao  técnico  industrial  de  nível médio  coletar,  tabular e  interpretar dados de natureza técnica.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 108, "a": "direito", "t": "As  atribuições  dos  técnicos  industriais  de  nível  médio  não  estão  previstas  taxativamente  na  lei  ou  em  seu regulamento,  sendo  permitidas  quando  compatíveis com sua formação curricular.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 109, "a": "direito", "t": "Os  técnicos  agrícolas  de  nível  médio  possuem  autonomia  profissional  para  administrar  propriedades rurais.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 110, "a": "direito", "t": "Para fins de comprovação da habilitação profissional, a  carteira profissional de técnico, expedida por Conselho de  Fiscalização  do  Exercício  Profissional,  substitui  o diploma.", "c": "advogado_130:10"}, {"p": "advogado_130", "n": 111, "a": "direito", "t": "O Conselho Federal de Técnicos Agrícolas somente pode  ser composto por brasileiros natos.", "c": "advogado_130:11"}, {"p": "advogado_130", "n": 112, "a": "direito", "t": "São órgãos do Conselho Federal dos Técnicos Agrícolas a Diretoria Executiva e o Plenário Deliberativo.", "c": "advogado_130:11"}, {"p": "advogado_130", "n": 113, "a": "gerais", "t": "O mandato de conselheiro federal tem a duração de  dois anos, vedada a reeleição.", "c": "advogado_130:11"}, {"p": "advogado_130", "n": 114, "a": "direito", "t": "O  Plenário  dos  Conselhos  Federais será  composto  por  exatos  27  conselheiros,  três  para  cada  unidade  da Federação.", "c": "advogado_130:11"}, {"p": "advogado_130", "n": 115, "a": "direito", "t": "Não  há  a  figura  do  suplente  entre  os  conselheiros  federais,  que,  em  caso  de  indisponibilidade,  serão substituídos  por  novo  membro  eleito  em  pleito específico.", "c": "advogado_130:11"}, {"p": "advogado_130", "n": 116, "a": "direito", "t": "As  atividades  dos  conselhos  federais  poderão  ser  custeadas com renda própria ou de terceiros.", "c": "advogado_130:12"}, {"p": "advogado_130", "n": 117, "a": "direito", "t": "Os recursos dos conselhos podem provir da celebração  de convênios com outras entidades.", "c": "advogado_130:12"}, {"p": "advogado_130", "n": 118, "a": "direito", "t": "O  Conselho  Federal  receberá  dos  Conselhos  Regionais  percentual  do  valor  arrecadado  a  título  de  anuidades, multas, taxas e tarifas.", "c": "advogado_130:12"}, {"p": "advogado_130", "n": 119, "a": "gerais", "t": "A  abstenção  de  votação  nas  eleições  do  Conselho  Federal é infração disciplinar.", "c": "advogado_130:12"}, {"p": "advogado_130", "n": 120, "a": "direito", "t": "A admoestação pública é uma sanção disciplinar passível  de aplicação.", "c": "advogado_130:12"}, {"p": "advogado_133", "n": 1, "a": "portugues", "t": "No texto, que se caracteriza como dissertativo, argumenta‐se em favor de um esforço conjunto de todos os segmentos da  sociedade em prol da implantação de um modelo de desenvolvimento urbano sustentável.", "c": "advogado_133:1"}, {"p": "advogado_133", "n": 2, "a": "portugues", "t": "Entende‐se da leitura do texto que a descrença dos gestores públicos brasileiros na ciência é um entrave para a consecução  de um projeto de sustentabilidade urbana.", "c": "advogado_133:1"}, {"p": "advogado_133", "n": 3, "a": "portugues", "t": "Na linha 11, o emprego do acento indicativo de crase em “à natureza” justifica‐se pela regência do verbo “reverter” e pela  anteposição de artigo definido ao substantivo “natureza”.", "c": "advogado_133:1"}, {"p": "advogado_133", "n": 4, "a": "portugues", "t": "Estaria mantida a correção gramatical do texto caso a vírgula empregada após o termo “urbano” (linha 14) fosse substituída  por ponto final, feito o devido ajuste de minúscula/maiúscula na letra inicial do vocábulo que introduz o novo período.", "c": "advogado_133:1"}, {"p": "advogado_133", "n": 5, "a": "portugues", "t": "A oração “para que isso ocorra” (linha 32) subordina‐se à oração subsequente e expressa circunstância de finalidade.   INSTITUTO DE DESENVOLVIMENTO URBANO      Aplicação: 2020 IDURB ANALISTA DE DESENVOLVIMENTO URBANO E FUNDIÁRIO / URBANISMO E FUNDIÁRIO – ADVOGADO  2", "c": "advogado_133:1"}, {"p": "advogado_133", "n": 6, "a": "portugues", "t": "“têm origem justamente na” (linha 14) por advêm justamente da", "c": "advogado_133:2"}, {"p": "advogado_133", "n": 7, "a": "portugues", "t": "“dentro da qual” (linha 16) por de onde", "c": "advogado_133:2"}, {"p": "advogado_133", "n": 8, "a": "portugues", "t": "“o que não contribui para” (linha 28) por o que dificulta   ____________________________________________________________________________________________________", "c": "advogado_133:2"}, {"p": "advogado_133", "n": 9, "a": "portugues", "t": "Informamos aos senhores, de que o grupo de estudos formado para discutir o Projeto de Sustentabilidade Urbana que se  reuniria no dia 14 de abril de 2020, com tudo, por motivos de força maior, a reunião foi adiada por prazo indeterminado.", "c": "advogado_133:3"}, {"p": "advogado_133", "n": 11, "a": "portugues", "t": "O CMOS (Complementary Metal Oxide Semiconductor) é  uma  tecnologia  recente  que  consiste  em  um  chip  que reproduz as funções de um microprocessador. Contudo, essa tecnologia gera um alto consumo de energia.", "c": "advogado_133:4"}, {"p": "advogado_133", "n": 12, "a": "portugues", "t": "A memória virtual é uma técnica que permite expandir,  de modo definitivo, a capacidade de armazenamento da memória ROM do computador.", "c": "advogado_133:4"}, {"p": "advogado_133", "n": 13, "a": "informatica", "t": "Ao  clicar  o  botão ,  localizado  na  barra  de  ferramentas  de  acesso  rápido  do  PowerPoint  2013,  o usuário somente poderá iniciar a apresentação a partir do slide atual.", "c": "advogado_133:4"}, {"p": "advogado_133", "n": 14, "a": "informatica", "t": "Quando o PowerPoint 2013 é aberto (Apresentação em  Branco), o slide exibido mostra dois espaços formatados, um para adicionar um título e o outro para adicionar um subtítulo. Acerca do programa de navegação Google Chrome, em sua versão  mais  recente,  e  dos  conceitos  de  organização  e  de", "c": "advogado_133:4"}, {"p": "advogado_133", "n": 15, "a": "informatica", "t": "O  código  de  erro  ERR_NAME_NOT_RESOLVED,  que  aparece  no Google  Chrome ao  se  tentar  carregar  uma página, informa que o endereço da web não existe.", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 16, "a": "informatica", "t": "O  Chrome  permite  definir  uma  página web  para  ser  a  página  de  inicialização.  Todavia,  não  é  possível  definir um conjunto de páginas, já que esse recurso tem como característica a singularidade.", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 17, "a": "informatica", "t": "No Windows 10, é permitido fazer uso de um aplicativo  para compartilhar arquivos diretamente do Explorador de Arquivos.", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 18, "a": "portugues", "t": "Desde que se utilize o programa correto, um arquivo PDF  poderá ser dividido em dois ou mais arquivos PDF.  INSTITUTO DE DESENVOLVIMENTO URBANO      Aplicação: 2020 IDURB ANALISTA DE DESENVOLVIMENTO URBANO E FUNDIÁRIO / URBANISMO E FUNDIÁRIO – ADVOGADO  3", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 20, "a": "matematica", "t": "20% dos anagramas têm as vogais juntas.", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 21, "a": "matematica", "t": "Sorteando‐se ao acaso um anagrama, a probabilidade de  ele começar com a letra A é de  1 3 .", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 22, "a": "direito", "t": "As  vogais  e  as  consoantes  estão  alternadas  em  36  anagramas.", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 23, "a": "matematica", "t": "O  número  de  anagramas  que  começam  com  uma  consoante é menor que o número de diagonais de um icoságono (polígono de 20 lados).", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 24, "a": "direito", "t": "Exatamente 6 anagramas contêm a sequência MAG.  ____________________________________________________ Considerando acontecimentos que bem caracterizam o Brasil e o mundo na atualidade, além de aspectos significativos que inserem Canaã dos Carajás na realidade paraense e brasileira,", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 25, "a": "direito", "t": "A  globalização  é  um  fenômeno  que,  para  além  da  economia,  envolve  a  política,  a  sociedade  e  a  cultura mundiais,  sendo  caracterizada,  entre  outros  aspectos, pela ampla circulação de mercadorias, bens, serviços e ideias.", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 26, "a": "matematica", "t": "Nos  dias  de  hoje,  pelo  mundo  afora,  vê‐se  o  aprofundamento dos ideais democráticos, não havendo espaço para a defesa de princípios ideológicos  radicais assentados no nacionalismo extremado, na intolerância e nas mais diversas formas de preconceito.", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 27, "a": "matematica", "t": "Durante o regime militar instaurado em 1964, o projeto  de  Brasil  Grande  enfatizou  a  necessidade  de  se promover  o  desenvolvimento  da  Região  Norte, incorporando‐a  efetivamente  ao  conjunto  do  País, sendo o Pará uma das áreas estrategicamente escolhidas para receber os mais diversos investimentos.", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 28, "a": "direito", "t": "Canaã  dos  Carajás  jamais  esteve  vinculado  ao  Projeto  Grande  Carajás  do  regime militar,  provavelmente  pelo desconhecimento,  à  época,  de  suas  potencialidades minerais.", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 29, "a": "direito", "t": "Canaã dos Carajás nasceu de um assentamento agrícola,  implantado pelo Governo Federal, a partir de 1982, pelo Grupo  Executivo  das  Terras  do  Araguaia  e  Tocantins (GETAT). A área, ocupada por mais de mil e quinhentas famílias,  ficou  conhecida  como  Centro  de Desenvolvimento Regional II (CEDERE II).", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 30, "a": "direito", "t": "O rápido esgotamento das jazidas, sobretudo de cobre,  faz  da  agricultura,  na  atualidade,  o  sustentáculo  da economia  de  Canaã  dos  Carajás,  secundada  pela pecuária leiteira. RASCUNHO  INSTITUTO DE DESENVOLVIMENTO URBANO      Aplicação: 2020 IDURB ANALISTA DE DESENVOLVIMENTO URBANO E FUNDIÁRIO / URBANISMO E FUNDIÁRIO – ADVOGADO  4", "c": "advogado_133:5"}, {"p": "advogado_133", "n": 31, "a": "informatica", "t": "Os  Territórios  Federais  são  entes  federativos  autônomos.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 32, "a": "informatica", "t": "O  desmembramento  de estado  para anexação a  outro  depende  de  aprovação  da  população  residente  na parcela que se pretende desmembrar.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 33, "a": "informatica", "t": "Os entes federativos, ainda que não possam estabelecer  cultos ou religiões oficiais, podem com eles estabelecer cooperações  para  a  consecução  de  fins  de  interesse público.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 34, "a": "informatica", "t": "À  falta de  normas editadas pela União no exercício  de  competência  privativa,  caberá  aos  estados  regular  a matéria.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 35, "a": "direito", "t": "A superveniência de normas gerais editadas pela União  no  exercício  de  competência  concorrente  com  os estados  suspenderá  a  legislação  específica  por  estes editada naquilo em que ela for contrariada. ____________________________________________________ Com base na Lei Orgânica do município de Canaã dos Carajás,", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 36, "a": "informatica", "t": "Cabe  ao  prefeito  municipal,  presentes  razões  de  interesse público,  transferir  temporariamente a capital do município para fora de seus limites territoriais.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 37, "a": "informatica", "t": "O prefeito municipal, mediante autorização da Câmara  Municipal, poderá expedir título de arrendamento para uso  do  solo  urbano  nas  sedes  do  município  e  dos distritos.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 38, "a": "informatica", "t": "O arrendatário de solo urbano na sede do município fica  compelido  à  sua  utilização,  sob  pena  de  cassação  do arrendamento.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 39, "a": "informatica", "t": "O  recolhimento  de  taxa  de  transferência  em  razão  de  arrendamento  de  solo  na  sede  do  município  é transmissível aos herdeiros do arrendatário original.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 40, "a": "informatica", "t": "Os  agentes  distritais  administradores  dos  distritos  municipais  serão  indicados  pelo  prefeito  municipal  e referendados pela Câmara Municipal. ____________________________________________________ No que concerne ao plano diretor do município de Canaã dos", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 41, "a": "legislacao", "t": "Qualquer  pessoa  do  povo  tem  prerrogativa  para  fiscalizar  o  regular  cumprimento  do  plano  diretor municipal.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 42, "a": "legislacao", "t": "A  responsabilidade  por  multa  por  infração  ao  plano  diretor é solidária entre proprietário, possuidor e aquele que concorrer para a prática do ato ou dele se beneficiar.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 43, "a": "legislacao", "t": "A constatação de irregularidade impõe à Administração  a  cientificação  do  Ministério  Público  e  dos  órgãos públicos de controle competentes.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 44, "a": "legislacao", "t": "A proposta de regularização de parcelamento poderá ser  requerida  pelo  parcelador,  acompanhada  de  laudo técnico.", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 45, "a": "legislacao", "t": "A  regularização  de  parcelamento  também  poderá  ocorrer de ofício pela Administração, hipótese em que estará dispensado o laudo técnico.  INSTITUTO DE DESENVOLVIMENTO URBANO      Aplicação: 2020 IDURB ANALISTA DE DESENVOLVIMENTO URBANO E FUNDIÁRIO / URBANISMO E FUNDIÁRIO – ADVOGADO  5", "c": "advogado_133:6"}, {"p": "advogado_133", "n": 46, "a": "legislacao", "t": "Diferentemente das regras, que enunciam condutas de  forma  clara  e  objetiva,  os  princípios  veiculam mandamentos de otimização, isto é, objetivos a serem perseguidos  e  cujo  atingimento  observa  diferentes níveis de gradação.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 47, "a": "direito", "t": "A Constituição Federal de 1988 atribuiu maior densidade  ao  conceito  de  cidadania,  conferindo  à  população diferentes  mecanismos  de  controle  social  e  de responsabilização (accountability) dos agentes públicos.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 48, "a": "legislacao", "t": "A  cidadania  transcende  o  mero  exercício  dos  direitos  políticos,  estabelecendo  verdadeiro  poder‐dever  da população de influenciar nas políticas públicas.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 49, "a": "legislacao", "t": "Valores, enquanto paradigmas de aferição da correção  ou da incorreção de uma conduta, comportam definição clara e objetiva, missão conferida à ética.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 50, "a": "legislacao", "t": "A  virtude  é  uma  condição  inata.  Parte  considerável   do  juízo  moral  do  indivíduo,  é  forjada  inclusive geneticamente,  observando  antepassados  e  critérios biológicos. ____________________________________________________ De  acordo  com  a  Lei  n.º  8.429/1992  (Lei  de  Improbidade", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 51, "a": "legislacao", "t": "O  princípio  da  probidade  guarda  relação  íntima  com  outros princípios, como o da eficiência, de modo que a inabilidade, ainda que sem má‐fé, é capaz de configurar conduta ímproba.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 52, "a": "legislacao", "t": "De  modo  a  alcançar  o  máximo  possível  de  condutas  potencialmente  ilícitas,  que  sempre  evoluem  e mudam,  a  Lei  de  Improbidade  Administrativa  adotou tipos  abertos  em  rol  meramente  exemplificativo, aplicando‐se, isolada ou conjuntamente, tanto a agentes públicos quanto a agentes privados.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 53, "a": "legislacao", "t": "Não  apenas  os  agentes  públicos,  mas  também  os  agentes  privados,  detentores  de  parcela  de responsabilidade  social,  desempenham  um  papel  cada vez mais ativo na inibição e na prevenção de ilícitos no trato  com  a  Administração,  sendo  exemplo  disso  as políticas de conformidade.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 54, "a": "legislacao", "t": "No  caso  de  enriquecimento  ilícito,  os  bens  ou  valores  ilegalmente  auferidos  pelo  agente  ímprobo  reverterão em favor do ente político a que vinculada a pessoa ou o órgão desfalcado.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 55, "a": "legislacao", "t": "Enriquecimento ilícito pressupõe necessariamente lesão  ao erário. ____________________________________________________ Segundo a Lei n.º 12.527/2011 (Lei de Acesso à Informação),", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 56, "a": "direito", "t": "A  Lei  de  Acesso  à  Informação  não  alcança  as  concessionárias  de  serviços  públicos  de  personalidade jurídica de direito privado.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 57, "a": "direito", "t": "As organizações sociais submetem‐se à Lei de Acesso à  informação no que diz respeito aos recursos diretos ou indiretos recebidos do Poder Público.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 58, "a": "legislacao", "t": "Os presidentes dos três Poderes possuem competência  para a classificação de informação em seu nível máximo de sigilo, o grau ultrassecreto.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 59, "a": "direito", "t": "Para fins disciplinares aplicáveis aos servidores públicos  civis  federais, a  infração  à  Lei  de  Acesso  à Informação deverá receber, como sanção, no mínimo, a penalidade de suspensão.", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 60, "a": "legislacao", "t": "Dada  a  independência  entre  as  esferas  de  responsabilização,  a  infração  às  disposições  da  Lei  de Acesso à Informação poderá, sem prejuízo de apenações nas searas diversas, configurar ainda ato de improbidade administrativa.  INSTITUTO DE DESENVOLVIMENTO URBANO      Aplicação: 2020 IDURB ANALISTA DE DESENVOLVIMENTO URBANO E FUNDIÁRIO / URBANISMO E FUNDIÁRIO – ADVOGADO  6", "c": "advogado_133:7"}, {"p": "advogado_133", "n": 61, "a": "legislacao", "t": "As  OSCIPs  podem  ser  contratadas  pelo  Poder  Público  com  dispensa  de  licitação,  independentemente  do objeto a ser executado.", "c": "advogado_133:8"}, {"p": "advogado_133", "n": 62, "a": "legislacao", "t": "As  OSCIPs,  mesmo  depois  de  qualificadas  como  tal  mediante celebração de  termo de parceria, conservam personalidade jurídica de direito privado.", "c": "advogado_133:8"}, {"p": "advogado_133", "n": 63, "a": "legislacao", "t": "A  outorga  do  título  de  OSCIP  é  ato  administrativo  vinculado,  impondo  um  dever  ao  gestor  quando preenchidos os requisitos legais pela entidade.", "c": "advogado_133:8"}, {"p": "advogado_133", "n": 64, "a": "legislacao", "t": "A  entidade  que  deixar  de  preencher  os  requisitos  necessários  à  sua  qualificação  como  OSCIP  será, imediata e automaticamente, descredenciada.", "c": "advogado_133:8"}, {"p": "advogado_133", "n": 65, "a": "legislacao", "t": "As compras e obras a serem realizadas pelas OSCIPs com  recursos obtidos do Poder Público exigirão licitação. ____________________________________________________", "c": "advogado_133:8"}, {"p": "advogado_133", "n": 66, "a": "legislacao", "t": "A  governança  consensual  enfatiza  a  obtenção  de  resultados  e  encontra  nas  agências  executivas  um  de seus instrumentos.", "c": "advogado_133:9"}, {"p": "advogado_133", "n": 67, "a": "legislacao", "t": "As  agências  executivas  são  alcançadas  pela  expressão  “fazenda pública”, que designa o Estado em juízo.", "c": "advogado_133:9"}, {"p": "advogado_133", "n": 68, "a": "direito", "t": "O  contrato  de  gestão  é  o  instrumento  jurídico  que  qualifica as agências executivas, fixando prazos e metas.", "c": "advogado_133:9"}, {"p": "advogado_133", "n": 69, "a": "legislacao", "t": "As  agências  executivas  são  uma  categoria  nova,  apartada  e  autônoma  de  entidade  da  administração indireta.", "c": "advogado_133:9"}, {"p": "advogado_133", "n": 70, "a": "direito", "t": "As  agências  executivas  representam,  em  alguma  medida,  uma  flexibilização  da  legalidade  em  favor  da eficiência. Com  base  na  jurisprudência  do  Supremo  Tribunal  Federal,", "c": "advogado_133:9"}, {"p": "advogado_133", "n": 71, "a": "direito", "t": "Ainda  quando  o  direito  postulado  seja  titularizado  apenas  por  parcela  de  seus  associados,  a  entidade  de classe  conserva  a  legitimidade  para  a  impetração  de mandado de segurança coletivo.", "c": "advogado_133:9"}, {"p": "advogado_133", "n": 72, "a": "direito", "t": "Por  pressupor  direito  líquido  e  certo,  o  mandado  de  segurança  será  inadmissível  quando  a  matéria  jurídica for controvertida.", "c": "advogado_133:9"}, {"p": "advogado_133", "n": 73, "a": "direito", "t": "Por força da teoria da imputação objetiva, o ato coator  praticado  por  agente  no  exercício  de  competência delegada  deverá  ser  atribuído  ao  titular  originário  da competência,  que  deverá  figurar  como  autoridade coatora.", "c": "advogado_133:9"}, {"p": "advogado_133", "n": 74, "a": "direito", "t": "O  pedido  de  reconsideração  na  seara  administrativa  suspende o curso do prazo decadencial para impetração do mandado de segurança.", "c": "advogado_133:9"}, {"p": "advogado_133", "n": 75, "a": "direito", "t": "O mandado de segurança cuja ordem haja sido deferida  não  produz  efeitos  patrimoniais  retroativos,  que deverão ser pleiteados administrativa ou judicialmente. ____________________________________________________", "c": "advogado_133:9"}, {"p": "advogado_133", "n": 76, "a": "direito", "t": "O  método  lógico‐sistemático  é  espécie  do  gênero  clássico e busca identificar o âmbito de vigência material da  norma  segundo  o  contexto  do  sistema  que  ela integra.", "c": "advogado_133:10"}, {"p": "advogado_133", "n": 77, "a": "direito", "t": "O  método  tópico‐problemático  parte  da  premissa  de  que as normas constitucionais alcançam toda a riqueza dos  fatos concretos, merecendo um olhar prático para que se busque a solução existente.", "c": "advogado_133:10"}, {"p": "advogado_133", "n": 78, "a": "direito", "t": "O método hermenêutico‐concretizador busca combater  ideologias  ou  preconceitos,  privilegiando  uma interpretação abstrata e distanciada do objeto.", "c": "advogado_133:10"}, {"p": "advogado_133", "n": 79, "a": "direito", "t": "O  método  científico‐espiritual  busca  identificar  os  valores subjacentes à norma, incursionando, para isso, em uma perspectiva sociológica.", "c": "advogado_133:10"}, {"p": "advogado_133", "n": 80, "a": "direito", "t": "O método normativo‐estruturante parte da dissociação  entre texto e norma, cabendo ao intérprete identificar o conteúdo  desta  última,  percebendo  o  texto,  porém somente como um dos subsídios para tanto.  INSTITUTO DE DESENVOLVIMENTO URBANO      Aplicação: 2020 IDURB ANALISTA DE DESENVOLVIMENTO URBANO E FUNDIÁRIO / URBANISMO E FUNDIÁRIO – ADVOGADO  7 Segundo a Lei de introdução às normas do direito brasileiro,", "c": "advogado_133:10"}, {"p": "advogado_133", "n": 81, "a": "direito", "t": "O chamado consequencialismo deve pautar as decisões  nas  esferas  administrativa,  controladora  e  judicial, levando‐se  em  conta,  na  interpretação  de  valores abstratos,  a  necessidade  e  a  adequação  da  medida adotada às alternativas possíveis.", "c": "advogado_133:10"}, {"p": "advogado_133", "n": 82, "a": "direito", "t": "A regularização de ato ou contrato invalidado na esfera  administrativa  é  impositiva,  desde  que  não  onere  em excesso os sujeitos atingidos.", "c": "advogado_133:10"}, {"p": "advogado_133", "n": 83, "a": "direito", "t": "Os obstáculos reais do administrador devem ser levados  em  conta  na  interpretação  de  normas  sobre  gestão pública, sem prejuízo dos interesses dos administrados.", "c": "advogado_133:10"}, {"p": "advogado_133", "n": 84, "a": "direito", "t": "A mudança interpretativa de norma de conteúdo aberto  preverá,  a  bem  da  segurança  jurídica,  regime  de transição, o que equivale a uma ultra‐atividade capaz de, mesmo  já  à  luz  de  entendimento  novo,  admitir  como válida interpretação anterior já superada.", "c": "advogado_133:10"}, {"p": "advogado_133", "n": 85, "a": "direito", "t": "A  revisão  de  ato,  na  esfera  controladora,  que  já  haja  exaurido  seus  efeitos  obedecerá  à  teoria  do  fato consumado, privilegiando‐se sua manutenção, a bem da segurança  jurídica,  ainda  que  o  ato  contradiga  as orientações gerais à época de sua prática. ____________________________________________________", "c": "advogado_133:10"}, {"p": "advogado_133", "n": 86, "a": "direito", "t": "Os  direitos  de  personalidade  admitem  limitação  voluntária, desde que não permanente nem geral.", "c": "advogado_133:11"}, {"p": "advogado_133", "n": 87, "a": "direito", "t": "A pretensão de reconhecimento de ofensa a direito de  personalidade é imprescritível.", "c": "advogado_133:11"}, {"p": "advogado_133", "n": 88, "a": "direito", "t": "O dano decorrente de uso desautorizado de imagem de  pessoa com fins econômicos ou comerciais é in re ipsa, ou seja, induz presunção em seu favor.", "c": "advogado_133:11"}, {"p": "advogado_133", "n": 89, "a": "direito", "t": "O uso, por sociedade empresária, de imagem de pessoa,  isoladamente,  em  local  público,  sem  conotação vexaminosa, não configura dano moral.", "c": "advogado_133:11"}, {"p": "advogado_133", "n": 90, "a": "direito", "t": "Em  razão  da  teoria  do  direito  ao  esquecimento,  antecedentes  criminais  muito  antigos  podem  ser afastados como subsídio a uma análise desfavorável de caráter do indivíduo.", "c": "advogado_133:11"}, {"p": "advogado_133", "n": 91, "a": "direito", "t": "A  definição  estadual  de  área  de  proteção  especial  é  matéria  sujeita à  reserva legal, dependendo, portanto, de ato normativo primário.", "c": "advogado_133:12"}, {"p": "advogado_133", "n": 92, "a": "direito", "t": "Uma  vez  comercializados  os  lotes,  o  loteamento  não  mais poderá ter seu registro cancelado.", "c": "advogado_133:12"}, {"p": "advogado_133", "n": 93, "a": "direito", "t": "Os processos de loteamento podem ser examinados por  qualquer pessoa, a qualquer tempo.", "c": "advogado_133:12"}, {"p": "advogado_133", "n": 94, "a": "direito", "t": "Os  compromissos  de  compra  e  venda,  uma  vez  registrados, não admitem retratação.", "c": "advogado_133:12"}, {"p": "advogado_133", "n": 95, "a": "direito", "t": "A falência do loteador importa rescisão automática dos  contratos de comercialização dos lotes. ____________________________________________________", "c": "advogado_133:12"}, {"p": "advogado_133", "n": 96, "a": "direito", "t": "O estímulo à resolução consensual de conflitos é um dos  objetivos  da  regularização  fundiária  urbana  a  serem perseguidos pelos municípios.", "c": "advogado_133:13"}, {"p": "advogado_133", "n": 97, "a": "direito", "t": "Não será considerado como núcleo urbano informal ou  clandestino aquele que, ao tempo de sua implantação, atendia à legislação vigente.", "c": "advogado_133:13"}, {"p": "advogado_133", "n": 98, "a": "direito", "t": "A regularização fundiária urbana por motivo de interesse  social  é  aplicável  aos  núcleos  urbanos  informais exclusivamente ocupados por população de baixa renda.", "c": "advogado_133:13"}, {"p": "advogado_133", "n": 99, "a": "direito", "t": "O Ministério Público ostenta legitimidade para requerer  a regularização fundiária urbana.", "c": "advogado_133:13"}, {"p": "advogado_1_19", "n": 1, "a": "portugues", "t": "O texto informa o público leitor a respeito de um  experimento científico pioneiro com modelos de embriões humanos criados a partir de células‑tronco e da questão ética que envolve pesquisas dessa natureza.", "c": "advogado_1_19:1"}, {"p": "advogado_1_19", "n": 2, "a": "portugues", "t": "A criação dos modelos embrionários de que trata o  texto, embora tecnicamente indiscutível, contraria as diretrizes da Sociedade Internacional para Pesquisa de Células‑Tronco.", "c": "advogado_1_19:1"}, {"p": "advogado_1_19", "n": 3, "a": "portugues", "t": "De acordo com o primeiro parágrafo do texto, a  estrutura criada a partir de células‑tronco, em laboratório, por cientistas do Reino Unido e dos EUA difere de um embrião natural, porque não é criada com espermatozoides e óvulos.", "c": "advogado_1_19:1"}, {"p": "advogado_1_19", "n": 4, "a": "portugues", "t": "É correto inferir da leitura do texto que o fato de o  estudo apresentado na reunião anual da Sociedade Internacional para Pesquisa de Células‑Tronco, em junho de 2023, nos EUA, não ter sido ainda revisado por pares invalida os resultados do experimento.", "c": "advogado_1_19:1"}, {"p": "advogado_1_19", "n": 5, "a": "portugues", "t": "Estariam mantidos os sentidos e a correção gramatical  do texto, caso o segmento “se parece com as” (linha 2) fosse reescrito como assemelha‑se às.", "c": "advogado_1_19:1"}, {"p": "advogado_1_19", "n": 6, "a": "portugues", "t": "A forma verbal “suscita” (linha 6) poderia ser  substituída, sem prejuízo à coerência das ideias do texto, por motiva.", "c": "advogado_1_19:1"}, {"p": "advogado_1_19", "n": 7, "a": "portugues", "t": "Estaria mantida a clareza das ideias expressas no  último período do texto se, na linha 26, o vocábulo “sempre” fosse deslocado para imediatamente depois do vocábulo “feito”.", "c": "advogado_1_19:1"}, {"p": "advogado_1_19", "n": 8, "a": "portugues", "t": "No contexto sintático em que estão inseridos, os  vocábulos “muito” (linha 7) e “pouco” (linha 12) são classificados como advérbios e ambos expressam circunstância de intensidade.", "c": "advogado_1_19:2"}, {"p": "advogado_1_19", "n": 9, "a": "portugues", "t": "A oração “por que tantas gestações falham” (linha  8) expressa uma circunstância de causa em relação à oração anterior. 1 4 7 10 13 16 19 22 25  CRM-TO ADVOGADO CONSELHO REGIONAL DE MEDICINA DO TOCANTINS INSTITUTO QUADRIX – APLICAÇÃO: 2023 2", "c": "advogado_1_19:2"}, {"p": "advogado_1_19", "n": 10, "a": "portugues", "t": "Estaria mantida a correção gramatical do texto, caso a  forma verbal “ocorre” (linha 8) estivesse flexionada na terceira pessoa do plural – ocorrem.", "c": "advogado_1_19:2"}, {"p": "advogado_1_19", "n": 11, "a": "portugues", "t": "O trecho “As diretrizes da Sociedade Internacional  para Pesquisa de Células‑Tronco sobre o tema afirmam que” (linhas 15 e 16) poderia ser reescrito, mantendo‑se a correção gramatical e sem prejuízo às relações de coesão textual, da seguinte forma: Segundo as diretrizes da Sociedade Internacional para Pesquisa de Células‑Tronco sobre o tema, [...].", "c": "advogado_1_19:2"}, {"p": "advogado_1_19", "n": 12, "a": "portugues", "t": "A inserção de vírgula imediatamente depois do  vocábulo “estudos” (linha 24) comprometeria a coerência das ideias do período.", "c": "advogado_1_19:2"}, {"p": "advogado_1_19", "n": 13, "a": "portugues", "t": "No trecho “se é moralmente permissível” (linhas 21  e 22), o vocábulo “se” indica que o sujeito da oração é indeterminado.", "c": "advogado_1_19:2"}, {"p": "advogado_1_19", "n": 14, "a": "portugues", "t": "Estariam mantidos os sentidos e a correção gramatical  do texto, caso o trecho “em que se constroem essas estruturas” (linhas 8 e 9) fosse reescrito como onde são construídas essas estruturas.", "c": "advogado_1_19:2"}, {"p": "advogado_1_19", "n": 15, "a": "portugues", "t": "A oração introduzida pelo vocábulo “pois” (linha 12)  exprime uma conclusão a respeito do fato expresso anteriormente, o de que “o aperfeiçoamento conquistado pelo grupo de cientistas é indiscutível” (linhas 11 e 12).", "c": "advogado_1_19:2"}, {"p": "advogado_1_19", "n": 16, "a": "portugues", "t": "Pelas relações sintático‑semânticas estabelecidas  no segundo período do quinto parágrafo, é correto afirmar que o vocábulo “que” (linha 20) refere‑se a “algo”.", "c": "advogado_1_19:2"}, {"p": "advogado_1_19", "n": 17, "a": "portugues", "t": "A substituição da forma verbal “lidam” (linha 24) por  lidem não comprometeria nem a correção gramatical nem a coerência das ideias do texto.", "c": "advogado_1_19:2"}, {"p": "advogado_1_19", "n": 18, "a": "portugues", "t": "No segmento “também desperta dúvidas sobre os  limites éticos” (linha 14), a substituição de “sobre os” por em relação aos preservaria tanto a correção gramatical do texto, quanto a coerência de suas ideias. Considerando os trechos de correspondência oficial", "c": "advogado_1_19:2"}, {"p": "advogado_1_19", "n": 19, "a": "matematica", "t": "Vimos por meio desta, informá‑lo que o prazo para  impugnação, suspensão ou cancelamento do registro no CRM finda em 31/10/2023, podendo o valor da anuidade ser parcelado em até quatro vezes sem juros.", "c": "advogado_1_19:3"}, {"p": "advogado_1_19", "n": 20, "a": "direito", "t": "Informamos que a sua denúncia de desvio de recursos  foi encaminhada a Comissão de Ética deste Conselho Regional para conhecimento e providências, tendo a mesma o prazo de dez dias para se pronunciar a respeito. Com relação aos anagramas distintos da palavra AURORA,", "c": "advogado_1_19:3"}, {"p": "advogado_1_19", "n": 22, "a": "matematica", "t": "Um terço do número total de anagramas começa com  a letra R.", "c": "advogado_1_19:3"}, {"p": "advogado_1_19", "n": 23, "a": "direito", "t": "Há 48 anagramas que começam com AR ou terminam  com RA. O senhor Oswaldo pretende construir um cercado retangular em sua fazenda, e ele possui exatamente 120 metros de cerca disponíveis, que ele planeja usar por completo.", "c": "advogado_1_19:3"}, {"p": "advogado_1_19", "n": 24, "a": "direito", "t": "Se o comprimento do cercado for de 20 metros, a  altura do cercado será de 50 metros.", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 25, "a": "direito", "t": "Se o comprimento do cercado for de 10 metros, a área  do cercado será de 500 metros quadrados.", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 26, "a": "direito", "t": "A área máxima do cercado é igual a 900 metros  quadrados. Um baralho é composto de 40 cartas, distribuídas igualmente em quatro cores (amarelo, azul, verde e vermelho), e numeradas de 0 a 9. Considerando essa", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 27, "a": "matematica", "t": "Ao se selecionar aleatoriamente uma carta, a  probabilidade de que ela seja um múltiplo de 3 é de 30%.", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 28, "a": "matematica", "t": "Ao se selecionar aleatoriamente uma carta, a  probabilidade de que ela seja um número primo e de cor vermelha é de 12,5%.", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 29, "a": "matematica", "t": "Se uma carta selecionada aleatoriamente for amarela,  a probabilidade de que ela seja um número par é de 50%.", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 30, "a": "direito", "t": "Ao se selecionar aleatoriamente uma carta, a  probabilidade de que ela seja azul, verde ou sete é de 55%. RASCUNHO  CRM-TO ADVOGADO CONSELHO REGIONAL DE MEDICINA DO TOCANTINS INSTITUTO QUADRIX – APLICAÇÃO: 2023 3 Acerca dos conceitos de redes de computadores, do programa de navegação Mozilla Firefox, em sua versão mais atual, e dos conceitos de organização e de gerenciamento", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 31, "a": "informatica", "t": "Um proxy é um serviço que atua como intermediário  entre um cliente e um servidor, fornecendo serviços como anonimato e cache.", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 32, "a": "informatica", "t": "Um protocolo pode ser definido como um conjunto de  regras e padrões que governa a comunicação entre os dispositivos em uma rede.", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 33, "a": "informatica", "t": "O Mozilla Firefox permite ao usuário imprimir uma  versão simplificada da página utilizando o recurso Leitor, caso ele esteja disponível.", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 34, "a": "informatica", "t": "Diferentemente do navegador Chrome, o  Mozilla Firefox não permite ser definido como navegador padrão.", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 35, "a": "informatica", "t": "A função da extensão de arquivo .exe, no Windows, é  representar um arquivo de imagem.", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 36, "a": "direito", "t": "Um dos recursos fornecidos pelo site de busca Bing é  a Pesquisa Segura. Por meio desse recurso, o usuário pode selecionar a opção Moderada, a qual permite filtrar imagens e vídeos para adultos, mas não o texto dos resultados da pesquisa.", "c": "advogado_1_19:x35"}, {"p": "advogado_1_19", "n": 37, "a": "informatica", "t": "O PubMed é um mecanismo de busca especializado  amplamente utilizado por profissionais da área de saúde, pesquisadores e acadêmicos, para acessar artigos científicos relacionados à saúde.", "c": "advogado_1_19:x35"}, {"p": "advogado_1_19", "n": 38, "a": "direito", "t": "Em razão de sua limitação de recursos, os vírus de  computador não podem se anexar a outros arquivos para se propagarem.", "c": "advogado_1_19:x35"}, {"p": "advogado_1_19", "n": 39, "a": "informatica", "t": "No Windows 10, não é possível usar o Windows  Defender para ajudar os pais a protegerem as crianças, quando elas estiverem on‑line, permitindo a eles, por exemplo, limitarem o acesso a sites exclusivos e monitorarem as atividades delas. Para atender a essa finalidade, os pais devem adquirir softwares específicos.", "c": "advogado_1_19:x35"}, {"p": "advogado_1_19", "n": 40, "a": "informatica", "t": "Um firewall UTM, comumente conhecido como  firewall com inspeção de estado, funciona como a passagem, de uma rede para a outra, de uma aplicação específica. Nos itens que avaliem conhecimentos de informática, a menos que seja explicitamente informado o contrário, considere que: todos os programas mencionados estejam em configuração‑padrão, em português; o mouse esteja configurado para pessoas destras; expressões como clicar, clique simples e clique duplo refiram‑se a cliques com o botão esquerdo do mouse; e teclar corresponda à operação de pressionar uma tecla e, rapidamente, liberá‑la, acionando‑a apenas uma vez.", "c": "advogado_1_19:4"}, {"p": "advogado_1_19", "n": 41, "a": "legislacao", "t": "A atuação do CRM‑TO abrange o trabalho individual  e institucional, desde que exclusivamente privado, inclusive toda a hierarquia médica da instituição que preste, direta ou indiretamente, assistência à saúde.", "c": "advogado_1_19:x40"}, {"p": "advogado_1_19", "n": 42, "a": "legislacao", "t": "O CRM‑TO é composto de um colegiado de 21  conselheiros efetivos e 11 conselheiros suplentes.", "c": "advogado_1_19:x40"}, {"p": "advogado_1_19", "n": 43, "a": "legislacao", "t": "O mandato dos conselheiros do CRM‑TO tem duração  de cinco anos.", "c": "advogado_1_19:x40"}, {"p": "advogado_1_19", "n": 44, "a": "legislacao", "t": "A assembleia geral do CRM‑TO será dirigida pelo  presidente do Conselho.", "c": "advogado_1_19:x40"}, {"p": "advogado_1_19", "n": 45, "a": "legislacao", "t": "A diretoria do CRM‑TO é composta de presidente,  vice‑presidente, primeiro e segundo secretários, primeiro e segundo tesoureiros, corregedor, diretor de fiscalização e diretor jurídico.", "c": "advogado_1_19:5"}, {"p": "advogado_1_19", "n": 46, "a": "direito", "t": "O Tribunal Regional de Ética é composto apenas  de seu corpo de conselheiros efetivos, dispostos em câmaras de julgamentos, que atuarão independentemente de convocação.", "c": "advogado_1_19:5"}, {"p": "advogado_1_19", "n": 47, "a": "legislacao", "t": "As comissões transitórias, de composição mínima de  nove membros, conselheiros efetivos ou suplentes, serão criadas para fins especiais e definidos, sempre que o plenário julgar conveniente.", "c": "advogado_1_19:5"}, {"p": "advogado_1_19", "n": 48, "a": "legislacao", "t": "Os pedidos de licenças dos conselheiros do  CRM‑TO deverão ser encaminhados devidamente fundamentados, por escrito, e deferidos pelo pleno, para um período de até noventa dias, que pode ser renovado.", "c": "advogado_1_19:5"}, {"p": "advogado_1_19", "n": 49, "a": "legislacao", "t": "Verificadas, sem justificativa, três faltas consecutivas  a três convocações e cinco faltas intercaladas a cinco convocações intercaladas, considerar‑se‑á automaticamente vago o cargo do conselheiro faltoso, cabendo ao pleno do CRM‑TO tomar as medidas cabíveis para seu preenchimento.", "c": "advogado_1_19:5"}, {"p": "advogado_1_19", "n": 50, "a": "legislacao", "t": "O mandato de conselheiro poderá se extinguir antes  do seu término normal, em razão da prática de falta grave, após indicação da diretoria e aprovação de, no mínimo, dois terços dos conselheiros efetivos presentes que compõem o corpo de conselheiros do CRM‑TO, garantindo‑se a este a ampla defesa e o contraditório.", "c": "advogado_1_19:5"}, {"p": "advogado_1_19", "n": 51, "a": "legislacao", "t": "O sistema de responsabilização por atos de  improbidade administrativa tutelará a probidade na organização do Estado e no exercício de suas funções, como forma de assegurar a integridade do patrimônio público e social.", "c": "advogado_1_19:5"}, {"p": "advogado_1_19", "n": 53, "a": "legislacao", "t": "Não configura improbidade a ação ou omissão  decorrente de divergência interpretativa da lei, com base em jurisprudência, ainda que não pacificada, mesmo que não venha a ser posteriormente prevalecente nas decisões dos órgãos de controle ou dos tribunais do Poder Judiciário.", "c": "advogado_1_19:5"}, {"p": "advogado_1_19", "n": 54, "a": "legislacao", "t": "Apenas os delegados de polícia podem representar à  autoridade administrativa competente, para que seja instaurada investigação destinada a apurar a prática de ato de improbidade.", "c": "advogado_1_19:5"}, {"p": "advogado_1_19", "n": 55, "a": "legislacao", "t": "A ação para a aplicação das sanções pela prática de  atos de improbidade administrativa é imprescritível.  CRM-TO ADVOGADO CONSELHO REGIONAL DE MEDICINA DO TOCANTINS INSTITUTO QUADR
