RES DE IMÓVEIS DO PARANÁ – 6. a REGIÃO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRECI‑PR PROFISSIONAL ANALISTA SUPERIOR (PAS) – ADVOGADO 3", "c": "advogado_1_21:3"}, {"p": "advogado_1_21", "n": 21, "a": "matematica", "t": "A negação de “Se Gael encontrou o pote de ouro no fim do arco‑íris, então ficou rico” é “Gael encontrou o pote de ouro no fim do arco‑íris e não ficou rico”.", "c": "advogado_1_21:4"}, {"p": "advogado_1_21", "n": 22, "a": "matematica", "t": "A contrapositiva de “Se Gael encontrou o pote de ouro  no fim do arco‑íris, então ficou rico” é “Se Gael não ficou rico, então não encontrou o pote de ouro no fim do arco‑íris”.", "c": "advogado_1_21:4"}, {"p": "advogado_1_21", "n": 23, "a": "matematica", "t": "As proposições “Se Gael encontrou o pote de ouro no  fim do arco‑íris, então ficou rico” e “Gael não encontrou o pote de ouro no fim do arco‑íris ou ficou rico” são equivalentes.", "c": "advogado_1_21:4"}, {"p": "advogado_1_21", "n": 24, "a": "matematica", "t": "Se a proposição “Se Gael encontrou o pote de ouro no  fim do arco‑íris, então ficou rico” é falsa, é correto concluir que Gael encontrou o pote de ouro no fim do arco‑íris, mas não ficou rico.", "c": "advogado_1_21:4"}, {"p": "advogado_1_21", "n": 25, "a": "direito", "t": "O capitão pode formar novecentas e vinte e sete equipes  diferentes para invadir o navio inimigo.", "c": "advogado_1_21:5"}, {"p": "advogado_1_21", "n": 26, "a": "matematica", "t": "Se o capitão pudesse escolher sete piratas ao invés de  cinco, o número de equipes possíveis seria menor.", "c": "advogado_1_21:5"}, {"p": "advogado_1_21", "n": 27, "a": "matematica", "t": "Se o capitão pudesse participar da missão como um dos  cinco piratas, o número de equipes possíveis seria igual a 1.287.", "c": "advogado_1_21:5"}, {"p": "advogado_1_21", "n": 28, "a": "direito", "t": "É correto afirmar que trinta pessoas cultivam tanto  orquídeas quanto girassóis.", "c": "advogado_1_21:6"}, {"p": "advogado_1_21", "n": 29, "a": "matematica", "t": "Ao se selecionar, ao acaso, um participante que cultiva  girassóis, a probabilidade de ele não plantar orquídeas é de 2 3 .", "c": "advogado_1_21:6"}, {"p": "advogado_1_21", "n": 30, "a": "informatica", "t": "Menos de 30% das pessoas que cultivam pelo menos  uma das flores plantam apenas orquídeas.  CONSELHO REGIONAL DE CORRETORES DE IMÓVEIS DO PARANÁ – 6. a REGIÃO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRECI‑PR PROFISSIONAL ANALISTA SUPERIOR (PAS) – ADVOGADO 4 Nos itens que avaliem conhecimentos de informática, a menos que seja explicitamente informado o contrário, considere que: todos os programas mencionados estejam em configuração‑padrão, em português; o mouse esteja configurado para pessoas destras; expressões como clicar, clique simples e clique duplo refiram‑se a cliques com o botão esquerdo do mouse; e teclar corresponda à operação de pressionar uma tecla e, rapidamente, liberá‑la, acionando‑a apenas uma vez.", "c": "advogado_1_21:6"}, {"p": "advogado_1_21", "n": 31, "a": "informatica", "t": "O mainframe é um computador central de grande porte, projetado para o processamento de grandes volumes de dados em tempo real.", "c": "advogado_1_21:x30"}, {"p": "advogado_1_21", "n": 32, "a": "informatica", "t": "Um supercomputador é definido, especificamente,  como um computador de mesa com alta capacidade de processamento gráfico, cuja utilização é direcionada a jogos e a aplicações multimídia.", "c": "advogado_1_21:x30"}, {"p": "advogado_1_21", "n": 33, "a": "informatica", "t": "O programa Word, do pacote Office 365, baseia‑se  em serviços de subscrição, o que implica a necessidade da realização de um pagamento, a fim de que o usuário possa utilizá‑lo e, com isso, instalá‑lo em seu computador pessoal.", "c": "advogado_1_21:x30"}, {"p": "advogado_1_21", "n": 34, "a": "informatica", "t": "Em redes de computadores, a principal característica  da topologia em anel é a conexão dos dispositivos a uma árvore hierárquica, com um dispositivo principal no topo.", "c": "advogado_1_21:x30"}, {"p": "advogado_1_21", "n": 35, "a": "informatica", "t": "A topologia em redes de computadores mostra,  especificamente, a largura de banda disponível em uma rede.", "c": "advogado_1_21:7"}, {"p": "advogado_1_21", "n": 36, "a": "informatica", "t": "No Outlook versão web, serão removidos,  automaticamente, todos os e‑mails recebidos na última hora, ao se clicar o botão .", "c": "advogado_1_21:8"}, {"p": "advogado_1_21", "n": 37, "a": "informatica", "t": "Uma prática para a proteção das informações pessoais  enquanto se navega na Internet consiste em evitar cliques em links suspeitos.", "c": "advogado_1_21:8"}, {"p": "advogado_1_21", "n": 38, "a": "informatica", "t": "A realização de backups regulares dos dados  importantes não é uma prática recomendada para que se garanta a segurança da informação em um ambiente de trabalho, pois tal procedimento requer demasiado tempo dos funcionários.", "c": "advogado_1_21:8"}, {"p": "advogado_1_21", "n": 39, "a": "informatica", "t": "O backup completo (full) é indicado para a primeira  cópia de segurança ou quando se necessita de uma restauração completa do sistema após uma perda de dados.", "c": "advogado_1_21:8"}, {"p": "advogado_1_21", "n": 40, "a": "informatica", "t": "A principal finalidade da realização de um backup de  dados é a criação de cópias adicionais de arquivos importantes, para que, caso ocorra perda de dados, haja a possibilidade de recuperação desses arquivos a partir das cópias de segurança.  CONSELHO REGIONAL DE CORRETORES DE IMÓVEIS DO PARANÁ – 6. a REGIÃO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRECI‑PR PROFISSIONAL ANALISTA SUPERIOR (PAS) – ADVOGADO 5", "c": "advogado_1_21:8"}, {"p": "advogado_1_21", "n": 41, "a": "legislacao", "t": "O exercício da profissão de corretor de imóveis será  permitido ao possuidor de título de técnico em transações imobiliárias.", "c": "advogado_1_21:9"}, {"p": "advogado_1_21", "n": 42, "a": "legislacao", "t": "Compete ao corretor de imóveis exercer a  intermediação na compra, na venda, na permuta e na locação de imóveis, sendo‑lhe vedado opinar quanto à comercialização imobiliária.", "c": "advogado_1_21:9"}, {"p": "advogado_1_21", "n": 43, "a": "direito", "t": "O Conselho Federal de Corretores de Imóveis e os  Conselhos Regionais de Corretores de Imóveis são os órgãos de disciplina e de fiscalização do exercício da profissão de corretor de imóveis, constituídos em autarquia, a qual é dotada de personalidade jurídica de direito privado e vinculada ao Ministério da Economia, com autonomia administrativa, operacional e financeira.", "c": "advogado_1_21:9"}, {"p": "advogado_1_21", "n": 44, "a": "direito", "t": "Compete ao Conselho Federal e aos Conselhos Regionais  de Corretores de Imóveis representar, em juízo ou fora dele, os legítimos interesses da categoria profissional, respeitadas as respectivas áreas de competência.", "c": "advogado_1_21:9"}, {"p": "advogado_1_21", "n": 45, "a": "direito", "t": "O Conselho Federal será composto de cinco  representantes, efetivos e suplentes, de cada Conselho Regional, os quais serão eleitos entre seus membros.", "c": "advogado_1_21:9"}, {"p": "advogado_1_21", "n": 46, "a": "direito", "t": "Somente poderão ser membros do Conselho Regional  de Corretores de Imóveis os corretores de imóveis com inscrição principal na jurisdição há mais de dois anos e que não tenham sido condenados por infração disciplinar.", "c": "advogado_1_21:9"}, {"p": "advogado_1_21", "n": 47, "a": "direito", "t": "O Conselho Federal e os Conselhos Regionais são  administrados por uma diretoria, a qual é eleita entre seus membros.", "c": "advogado_1_21:9"}, {"p": "advogado_1_21", "n": 48, "a": "legislacao", "t": "Junto aos Conselhos Federal e Regionais, funcionará um  Conselho Fiscal, composto de nove membros, efetivos e suplentes, os quais serão eleitos entre seus membros.", "c": "advogado_1_21:9"}, {"p": "advogado_1_21", "n": 49, "a": "direito", "t": "Os membros do Conselho Federal e dos Conselhos  Regionais exercerão mandato de quatro anos.", "c": "advogado_1_21:9"}, {"p": "advogado_1_21", "n": 50, "a": "legislacao", "t": "Ao corretor de imóveis é vedado o anúncio de imóvel  loteado ou em condomínio sem que se mencione, no registro de imóveis, o número de registro do loteamento ou da incorporação.", "c": "advogado_1_21:9"}, {"p": "advogado_1_21", "n": 51, "a": "legislacao", "t": "As sanções, a serem aplicadas por autoridade  competente, terão natureza pecuniária ou consistirão em obrigação de fazer ou de não fazer, assegurado sempre o direito de defesa.", "c": "advogado_1_21:10"}, {"p": "advogado_1_21", "n": 52, "a": "legislacao", "t": "Os prazos começam a correr a partir da data da  cientificação oficial, excluindo‑se da contagem o dia do começo e incluindo‑se o dia do vencimento.", "c": "advogado_1_21:10"}, {"p": "advogado_1_21", "n": 53, "a": "direito", "t": "O recurso administrativo tramitará, no máximo, por  duas instâncias administrativas.", "c": "advogado_1_21:10"}, {"p": "advogado_1_21", "n": 54, "a": "direito", "t": "Salvo disposição legal específica, o prazo para a interposição de recurso administrativo será de trinta dias, contados a partir da ciência ou da divulgação oficial da decisão recorrida.", "c": "advogado_1_21:10"}, {"p": "advogado_1_21", "n": 55, "a": "direito", "t": "A Administração deve anular seus próprios atos, quando  eivados de vício de legalidade, e pode revogá‑los por motivo de conveniência ou de oportunidade, respeitados os direitos adquiridos.  CONSELHO REGIONAL DE CORRETORES DE IMÓVEIS DO PARANÁ – 6. a REGIÃO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRECI‑PR PROFISSIONAL ANALISTA SUPERIOR (PAS) – ADVOGADO 6", "c": "advogado_1_21:10"}, {"p": "advogado_1_21", "n": 56, "a": "gerais", "t": "O conhecimento tornou‑se a mola mestra da economia contemporânea, o que se manifesta, especialmente, nos avanços  científicos que marcam a contemporaneidade.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 57, "a": "gerais", "t": "A economia globalizada dos dias atuais assenta‑se nas incessantes inovações tecnológicas que ampliam consideravelmente  a capacidade produtiva.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 58, "a": "gerais", "t": "A imperiosa necessidade de se conquistar mercados pelo mundo afora, para dar vazão ao grande volume de mercadorias  produzidas, sepultou de vez as práticas protecionistas que os países adotavam no passado.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 59, "a": "gerais", "t": "A União Europeia é um exemplo de bloco de países que se integram para mais bem se posicionar em meio a um mercado  global profundamente competitivo.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 60, "a": "gerais", "t": "Apesar de várias tentativas que se perdem no tempo, a América do Sul ainda não foi capaz de superar suas diferenças, para,  enfim, constituir um bloco econômico.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 61, "a": "gerais", "t": "A questão ambiental entrou na agenda do mundo contemporâneo, premido pela necessidade inadiável de promover o  chamado desenvolvimento sustentável.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 62, "a": "gerais", "t": "Chuvas torrenciais e secas prolongadas são exemplos extremos da crise climática com a qual o mundo se debate hoje.  Também são, em larga medida, consequência da devastação da natureza e da degradação ambiental.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 63, "a": "gerais", "t": "As mudanças verificadas na China, nas últimas décadas, fizeram do país uma potência econômica mundial. Da velha experiência comunista, o que restou foi a democracia política aos moldes ocidentais que o país adotou.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 64, "a": "gerais", "t": "O eixo econômico mundial está se transferindo do Pacífico para o Atlântico, o que consolida a supremacia norte‑americana  no cenário mundial, sem que se veja o surgimento de uma força que lhe faça concorrência.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 65, "a": "gerais", "t": "O Oriente Médio, outrora foco de uma profunda tensão que punha em risco a paz mundial, finalmente alcançou a estabilidade  e a pacificação, com a efetiva criação do Estado da Palestina e a retirada de Israel dos territórios ocupados.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 66, "a": "gerais", "t": "As atuais correntes migratórias são determinadas pela intolerância religiosa, pelas perseguições políticas e por guerras – em  larga medida, civis – que devastam muitos países, sobretudo em regiões da Ásia e, especialmente, da África.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 67, "a": "gerais", "t": "O desenvolvimento brasileiro se deu e se dá pela ação exclusiva dos capitais privados, sem a participação do Estado.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 68, "a": "gerais", "t": "O Brasil, a Rússia, a Índia, a China e a África do Sul compõem um grupo de países – o BRICS − que buscam soluções comuns  para uma inserção internacional vantajosa.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 69, "a": "gerais", "t": "O Brasil é um dos maiores exportadores mundiais de alimentos. Para tanto, foi e é fundamental o investimento em  conhecimento científico e tecnológico, que tem na Empresa Brasileira de Pesquisa Agropecuária (Embrapa) um de seus mais importantes expoentes.", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 70, "a": "gerais", "t": "Uma revolução silenciosa está ocorrendo na educação brasileira, cujo inegável salto de qualidade coloca o País na vanguarda  mundial do desenvolvimento tecnológico.  CONSELHO REGIONAL DE CORRETORES DE IMÓVEIS DO PARANÁ – 6. a REGIÃO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRECI‑PR PROFISSIONAL ANALISTA SUPERIOR (PAS) – ADVOGADO 7", "c": "advogado_1_21:11"}, {"p": "advogado_1_21", "n": 71, "a": "direito", "t": "A organização sindical legalmente constituída e em  funcionamento há, pelo menos, dois anos tem legitimidade para realizar impetração de mandado de segurança coletivo.", "c": "advogado_1_21:12"}, {"p": "advogado_1_21", "n": 72, "a": "direito", "t": "O habeas data será concedido para a retificação de  dados, quando não houver preferência por realizá‑lo mediante processo sigiloso, judicial ou administrativo.", "c": "advogado_1_21:12"}, {"p": "advogado_1_21", "n": 73, "a": "direito", "t": "Os cargos da carreira diplomática são privativos de  brasileiros natos.", "c": "advogado_1_21:12"}, {"p": "advogado_1_21", "n": 74, "a": "direito", "t": "Os deputados e os senadores, desde a posse, serão submetidos a julgamento no Supremo Tribunal Federal.", "c": "advogado_1_21:13"}, {"p": "advogado_1_21", "n": 75, "a": "direito", "t": "Em caso de relevância e de urgência, o presidente da  República poderá adotar medidas provisórias acerca de diretrizes orçamentárias, com força de lei, devendo submetê‑las, de imediato, ao Congresso Nacional.", "c": "advogado_1_21:13"}, {"p": "advogado_1_21", "n": 76, "a": "direito", "t": "Um quinto dos lugares dos tribunais dos estados  apresentará a seguinte composição: membros do Ministério Público com mais de dez anos de carreira; e advogados de notório saber jurídico e de reputação ilibada, com mais de dez anos de efetiva atividade profissional. Ressalta‑se que todos devem ser indicados, em lista sêxtupla, pelos órgãos de representação das respectivas classes.", "c": "advogado_1_21:13"}, {"p": "advogado_1_21", "n": 77, "a": "direito", "t": "Os legitimados para a ação direta de  inconstitucionalidade podem propor a arguição de descumprimento de preceito fundamental.", "c": "advogado_1_21:14"}, {"p": "advogado_1_21", "n": 78, "a": "direito", "t": "No Brasil, o controle de constitucionalidade exercido de  maneira difusa será sempre incidental.", "c": "advogado_1_21:14"}, {"p": "advogado_1_21", "n": 79, "a": "direito", "t": "A ação direta de inconstitucionalidade por omissão  é uma forma de controle difuso, ao passo que o mandado de injunção é uma forma de controle concentrado. Considerando os poderes e os deveres da Administração", "c": "advogado_1_21:14"}, {"p": "advogado_1_21", "n": 80, "a": "direito", "t": "Os poderes da Administração Pública não representam  uma faculdade de ação, tendo em vista que eles tratam, em verdade, de poderes‑deveres, na medida em que o poder público deve agir em benefício da coletividade.", "c": "advogado_1_21:14"}, {"p": "advogado_1_21", "n": 81, "a": "direito", "t": "Os atos por meio dos quais a Administração Pública  exerce o seu poder regulamentar ou normativo têm, em comum com a lei, o fato de emanarem normas, ou seja, atos com efeitos gerais e abstratos.", "c": "advogado_1_21:14"}, {"p": "advogado_1_21", "n": 82, "a": "direito", "t": "Cabe à Administração Pública o poder disciplinar para a  apuração de infrações e a aplicação de penalidades aos servidores públicos, excluídas as demais pessoas, ainda que sujeitas à disciplina administrativa.", "c": "advogado_1_21:14"}, {"p": "advogado_1_21", "n": 83, "a": "direito", "t": "Uma das características do poder de polícia é a  executoriedade, que é a necessidade da Administração Pública de executar as suas decisões após o aval do Poder Judiciário.", "c": "advogado_1_21:14"}, {"p": "advogado_1_21", "n": 84, "a": "direito", "t": "O processo licitatório tem por objetivo evitar as  contratações com sobrepreço ou com preços manifestamente inexequíveis, bem como impedir o superfaturamento na execução dos contratos.", "c": "advogado_1_21:15"}, {"p": "advogado_1_21", "n": 85, "a": "direito", "t": "O autor do anteprojeto, caso seja pessoa jurídica, poderá  disputar a licitação que versa sobre a sua obra.", "c": "advogado_1_21:15"}, {"p": "advogado_1_21", "n": 86, "a": "direito", "t": "A fase externa do pregão será iniciada com a convocação  dos interessados.", "c": "advogado_1_21:15"}, {"p": "advogado_1_21", "n": 87, "a": "direito", "t": "São causas excludentes da responsabilidade civil do  Estado: a força maior; a culpa concorrente da vítima; e a culpa de terceiros.", "c": "advogado_1_21:16"}, {"p": "advogado_1_21", "n": 88, "a": "direito", "t": "A reparação de danos causados a terceiros pode ocorrer  no âmbito administrativo, desde que a Administração Pública reconheça, tão logo, sua responsabilidade e haja entendimento entre as partes quanto ao valor da indenização.  CONSELHO REGIONAL DE CORRETORES DE IMÓVEIS DO PARANÁ – 6. a REGIÃO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRECI‑PR PROFISSIONAL ANALISTA SUPERIOR (PAS) – ADVOGADO 8 À luz da Lei de Introdução às Normas do Direito Brasileiro,", "c": "advogado_1_21:16"}, {"p": "advogado_1_21", "n": 89, "a": "direito", "t": "O instituto da repristinação é vigente no ordenamento  jurídico brasileiro, tendo em vista a expressa determinação legal no sentido de que, em regra, a lei revogada se restaura em virtude de a lei revogadora ter perdido a vigência.", "c": "advogado_1_21:16"}, {"p": "advogado_1_21", "n": 90, "a": "direito", "t": "Quanto ao ônus e aos meios de produzi‑lo, a prova dos  fatos ocorridos em país estrangeiro é regida pela lei que nele vigorar, não sendo admitidas, pelos tribunais brasileiros, as provas que a lei do Brasil desconheça.", "c": "advogado_1_21:16"}, {"p": "advogado_1_21", "n": 91, "a": "direito", "t": "A incapacidade dos menores cessará pelo casamento e  pela colação de grau em curso de ensino superior.", "c": "advogado_1_21:17"}, {"p": "advogado_1_21", "n": 92, "a": "direito", "t": "As autarquias, inclusive as associações públicas, e  as fundações são pessoas jurídicas de direito público interno.", "c": "advogado_1_21:17"}, {"p": "advogado_1_21", "n": 93, "a": "direito", "t": "Na hipótese de abuso da personalidade jurídica,  caracterizado pelo desvio de finalidade ou pela confusão patrimonial, pode o juiz, de ofício ou a requerimento da parte, desconsiderá‑la, para que os efeitos de certas e determinadas relações de obrigação sejam estendidos aos bens particulares de administradores ou de sócios da pessoa jurídica beneficiados, direta ou indiretamente, pelo abuso.", "c": "advogado_1_21:17"}, {"p": "advogado_1_21", "n": 94, "a": "direito", "t": "Nos negócios jurídicos, ocorre o estado de perigo  quando uma pessoa, sob premente necessidade, obriga‑se à prestação manifestamente desproporcional ao valor da prestação oposta.", "c": "advogado_1_21:18"}, {"p": "advogado_1_21", "n": 95, "a": "direito", "t": "O contrato de mútuo é o empréstimo de coisas fungíveis,  no qual o mutuário é obrigado a restituir ao mutuante o que dele recebeu em coisa de mesmo gênero, qualidade e quantidade. Por sua vez, o comodato também é um contrato de empréstimo, mas de coisas não fungíveis, perfazendo‑se com a tradição do objeto dado.", "c": "advogado_1_21:18"}, {"p": "advogado_1_21", "n": 96, "a": "direito", "t": "Diante de violação de direito, é inadmissível que a ação  proposta seja meramente declaratória.", "c": "advogado_1_21:19"}, {"p": "advogado_1_21", "n": 97, "a": "direito", "t": "Nas hipóteses de litisconsórcio facultativo, o juiz poderá  limitar o número de litigantes, na fase de conhecimento, na liquidação de sentença ou na execução, quando o instituto processual comprometer a rápida solução do litígio ou dificultar a defesa ou o cumprimento da sentença.", "c": "advogado_1_21:19"}, {"p": "advogado_1_21", "n": 98, "a": "direito", "t": "A União, os estados, os municípios, o Distrito Federal e  suas respectivas autarquias e fundações de direito público gozarão de prazo em dobro para todas as suas manifestações processuais, salvo nas hipóteses em que a lei estabelecer, de forma expressa, prazo próprio para o ente público.", "c": "advogado_1_21:19"}, {"p": "advogado_1_21", "n": 99, "a": "direito", "t": "A tutela de evidência será concedida quando houver  elementos que evidenciem a probabilidade do direito e o perigo do dano ou o risco ao resultado útil do processo.", "c": "advogado_1_21:19"}, {"p": "advogado_1_21", "n": 100, "a": "direito", "t": "Por ser uma ação decorrente de obrigação  personalíssima, somente o devedor poderá, nos casos previstos em lei, requerer, com efeito de pagamento, a consignação da quantia ou da coisa devida.", "c": "advogado_1_21:19"}, {"p": "advogado_1_21", "n": 101, "a": "direito", "t": "Na falta de eleição, pelo contribuinte ou responsável, de  domicílio tributário, na forma da legislação aplicável, considera‑se como tal, quanto às pessoas naturais, em regra, o centro habitual de sua atividade.", "c": "advogado_1_21:20"}, {"p": "advogado_1_21", "n": 102, "a": "direito", "t": "Salvo quando conste do título a prova de sua quitação,  os créditos tributários relativos a impostos cujo fato gerador seja a propriedade, o domínio útil ou a posse de bens imóveis sub‑rogam‑se na pessoa dos respectivos adquirentes.", "c": "advogado_1_21:20"}, {"p": "advogado_1_21", "n": 103, "a": "direito", "t": "À autoridade administrativa compete privativamente  constituir o crédito tributário pelo lançamento, que é o procedimento administrativo, vinculado e obrigatório, com tendência a: verificar a ocorrência do fato gerador da obrigação correspondente; determinar a matéria tributável; calcular o montante do tributo devido; identificar o sujeito passivo; e propor a aplicação da penalidade cabível.", "c": "advogado_1_21:20"}, {"p": "advogado_1_21", "n": 104, "a": "direito", "t": "A exigibilidade do crédito tributário é suspensa pela  reclamação, mas não pela interposição de recurso nos moldes do processo tributário administrativo.", "c": "advogado_1_21:20"}, {"p": "advogado_1_21", "n": 105, "a": "direito", "t": "Em razão do princípio da formalidade, o contrato  individual de trabalho poderá ser acordado, tácita ou expressamente, por prazo determinado ou indeterminado, devendo ser exclusivamente por escrito.", "c": "advogado_1_21:21"}, {"p": "advogado_1_21", "n": 106, "a": "direito", "t": "O jus variandi é o direito que o empregador possui de  alterar, unilateralmente e em casos excepcionais, as condições de trabalho de seus empregados.", "c": "advogado_1_21:21"}, {"p": "advogado_1_21", "n": 107, "a": "direito", "t": "No caso de uma rescisão indireta do contrato de  trabalho, o empregado poderá considerar rescindida a sua contratação e pleitear a devida indenização, quando o empregador ou seus prepostos ofenderem‑no fisicamente, salvo em caso de legítima defesa, própria ou de outrem.  CONSELHO REGIONAL DE CORRETORES DE IMÓVEIS DO PARANÁ – 6. a REGIÃO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRECI‑PR PROFISSIONAL ANALISTA SUPERIOR (PAS) – ADVOGADO 9", "c": "advogado_1_21:21"}, {"p": "advogado_1_21", "n": 108, "a": "direito", "t": "O empregado poderá deixar de comparecer ao serviço,  sem prejuízo ao salário, por quinze dias consecutivos, em caso de nascimento de filho, de adoção ou de guarda compartilhada, e por até dois dias consecutivos, em virtude de casamento, estando o contrato de trabalho suspenso.", "c": "advogado_1_21:21"}, {"p": "advogado_1_21", "n": 109, "a": "direito", "t": "Nas causas da jurisdição da justiça do trabalho, somente  as exceções de suspeição ou de incompetência podem ser opostas com suspensão do feito, devendo ser as demais alegadas como matéria de defesa.", "c": "advogado_1_21:22"}, {"p": "advogado_1_21", "n": 110, "a": "direito", "t": "Cada uma das partes da relação processual poderá  indicar até cinco testemunhas, salvo quando se tratar de inquérito, hipótese na qual esse número poderá ser elevado a um total de dez.", "c": "advogado_1_21:22"}, {"p": "advogado_1_21", "n": 111, "a": "direito", "t": "Os dissídios individuais cujo valor não exceda a quarenta  vezes o salário mínimo vigente na data do ajuizamento da reclamação ficam submetidos ao procedimento sumaríssimo, sendo excluídas desse rito as demandas das quais sejam parte a administração pública direta, autárquica e fundacional.", "c": "advogado_1_21:22"}, {"p": "advogado_1_21", "n": 112, "a": "direito", "t": "Caberá, no prazo de quinze dias, recurso ordinário, para  a instância superior, das decisões definitivas ou terminativas das varas e dos juízos.", "c": "advogado_1_21:22"}, {"p": "advogado_1_21", "n": 113, "a": "direito", "t": "Em razão da livre convenção de aluguel, a estipulação de  seu valor em moeda estrangeira é considerada legal.", "c": "advogado_1_21:23"}, {"p": "advogado_1_21", "n": 114, "a": "direito", "t": "O direito de preferência é a prerrogativa do locatário  para a obtenção do imóvel locado, em igualdade de condições com terceiros, devendo o locador dar‑lhe conhecimento do negócio, seja de venda, de promessa de venda, de cessão ou de promessa de cessão de direitos ou dação em pagamento, mediante notificação judicial, extrajudicial ou outro meio de ciência inequívoca.", "c": "advogado_1_21:23"}, {"p": "advogado_1_21", "n": 115, "a": "direito", "t": "No contrato de locação, o locador pode exigir do  locatário a garantia da caução, da fiança, do seguro de fiança locatícia ou da cessão fiduciária de quotas de fundo de investimento, sendo válida a cláusula que exige mais de uma modalidade no mesmo contrato de locação.", "c": "advogado_1_21:23"}, {"p": "advogado_1_21", "n": 116, "a": "direito", "t": "Quem tiver a posse de uma edificação urbana de até  500 m², por dez anos, ininterruptamente e sem oposição, utilizando‑a para sua moradia, adquirir‑lhe‑á o domínio, desde que não seja proprietário de outro imóvel urbano ou rural, instituto denominado usucapião especial de imóvel urbano.", "c": "advogado_1_21:24"}, {"p": "advogado_1_21", "n": 117, "a": "direito", "t": "O proprietário urbano poderá conceder a outrem, a  título oneroso ou gratuito, o direito de superfície do seu terreno, por tempo determinado ou indeterminado, mediante escritura pública registrada no cartório de registro de imóveis.", "c": "advogado_1_21:24"}, {"p": "advogado_1_21", "n": 118, "a": "direito", "t": "Os imóveis rurais de propriedade pública devem ter  como objetivo a pesquisa, a experimentação, a demonstração e o fomento, com vistas ao desenvolvimento da agricultura. Além disso, os imóveis rurais públicos com outros objetivos terão caráter transitório no que diz respeito à propriedade.", "c": "advogado_1_21:24"}, {"p": "advogado_1_21", "n": 119, "a": "direito", "t": "Considera‑se consumidor por equiparação a  coletividade de pessoas, ainda que indetermináveis, a intervir nas relações de consumo.", "c": "advogado_1_21:25"}, {"p": "advogado_1_21", "n": 120, "a": "direito", "t": "Na hipótese de ocorrência de vício do produto, o  responsável deve saná‑lo em até sete dias úteis e, caso o problema não seja resolvido, o consumidor exigirá, alternativamente e à sua escolha, a substituição do produto por outro da mesma espécie, em perfeitas condições de uso. Além do mais, o consumidor poderá requerer a restituição imediata da quantia paga, monetariamente atualizada, sem prejuízo de eventuais perdas e danos ou o abatimento proporcional do preço.", "c": "advogado_1_21:25"}], "ctxs": {"advogado:1": "Cada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a \nque cada um deles esteja vinculado, marque, no cartão-resposta, para cada item: o campo designado com o código C, caso julgue \no item CERTO; ou o campo designado com o código E, caso julgue o item ERRADO.\nA marcação de acordo com o gabarito valerá + 1,00 (um ponto positivo). A marcação em desacordo com o gabarito \nvalerá - 1,00 (um ponto negativo). A ausência de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não \nreceberão pontuação negativa. Para as devidas marcações, use o cartão-resposta, único documento válido para a correção da sua \nprova objetiva.\nCONHECIMENTOS BÁSICOS\n1\n4\n7\n10\n13\n16\n19\n22\n25\n28\nTexto para os itens de 1 a 20.\nDe acordo com a Academia Americana da Odontologia Cosmética (AACD), uma faceta é uma peça fina de porcelana \nusada para recriar a aparência natural dos dentes, ao mesmo tempo em que fornece força e elasticidade comparável ao esmalte \ndo dente natural. Elas são moldadas para acompanhar o contorno dos dentes e coladas ao esmalte natural durante alguns \nprocedimentos de consultório. Constituem uma opção para a correção de dentes manchados, lascados, cariados ou apinhados. \nAs facetas são feitas por um técnico, geralmente num laboratório dental, que trabalha sobre um modelo fornecido pelo seu \ndentista. Além dos benefícios estéticos, as facetas podem ser usadas para fechar espaços ou corrigir pequenos desalinhamentos. \nOs pacientes também escolhem facetas como uma solução cosmética para realçar o brilho dos dentes e reforçar o sorriso. E o \nmaterial mais comum usado para as facetas são as de porcelana e a faceta de resina composta.\nEntenda que, tanto as facetas de porcelana quanto as lentes de contato dental são restaurações de cerâmicas que são \n“colocadas e cimentadas” na superfície frontal dos dentes, a fim de restabelecer o sorriso de uma forma natural e harmoniosa. \nEntretanto, o que as difere é a espessura da cerâmica. No que se refere ao preparo dos dentes, são realizados os mesmos \nprocedimentos de consultório. As facetas de porcelana são mais espessas, possuem em torno de 1 mm a 2 mm e servem para \ncorrigir defeitos maiores de coloração dental, formato ou posicionamento. As lentes de contato dental, nome dado \npopularmente ao “laminado cerâmico”, são ultrafinas, com cerca de 0,4 mm a 0,9 mm. E mesmo sendo bem fininhas o dente \ntambém sofre desgaste. Independente do tipo de peça a ser usada, esclarecemos que todo o processo de preparo do dente e \ncimentação das facetas ou lentes de contato dental é realizado sob anestesia local, gerando um mínimo desconforto e dor ao \npaciente.\nOptando por realizar uma técnica ou outra, você sairá no lucro com um belo conjunto de dentes! Além da rapidez, em \nmédia com três consultas já é possível modificar o sorriso, existe uma baixa manutenção, até porque a porcelana não altera a \ncor. É mais resistente e tem ótima durabilidade.\nPara saber se é melhor usar facetas de porcelana ou lentes de contato dental o melhor é conversar com seu dentista, \npois ele fará uma avaliação detalhada. Contudo, vamos esclarecer rapidamente a forma de aplicação de cada uma delas.\nAs facetas são mais usadas quando o dente está com a cor alterada pela falta de esmalte ou dentes que tenham \nrealizado tratamento de canal e escureceram em consequência disso. Essa recomendação é feita em casos mais complexos \nporque, para a colocação das facetas, é necessári", "advogado:2": "_____________________________________________________\nCom relação à correção gramatical e à coerência das \nsubstituições propostas para vocábulos e trechos destacados \ndo texto, julgue os itens de 11 a 16.", "advogado:3": "_____________________________________________________\nJulgue os itens de 17 a 20, que consistem em propostas de \nreescrita para períodos destacados do texto, quanto à \ncorreção gramatical e à coerência textual.", "advogado:4": "_____________________________________________________\nCom relação a equações e inequações e estruturas lógicas, \njulgue os itens de 21 a 24.", "advogado:5": "_____________________________________________________\nJoão definiu uma unidade de medida de \ncomprimento, chamada de horas-João, de modo que \n1 hora-João equivale à distância que João percorre em 1 hora \ncaminhando.\nCom base nessa situação hipotética, julgue os itens de 25 a 28.", "advogado:6": "_____________________________________________________\nConsiderando que a base de uma pirâmide de 3 m de altura \ntem 1 𝑚2 de área, julgue os itens 29 e 30.", "advogado:7": "software e do sistema operacional Windows 10, julgue os \nitens de 31 a 33.", "advogado:8": "_____________________________________________________\nConsiderando o navegador Google Chrome, malwares e sítios \nde busca e pesquisa na Internet, julgue os itens de 34 a 37.", "advogado:9": "_____________________________________________________\nJulgue os itens de 38 a 40, referentes a procedimentos de \nsegurança e backup.", "advogado:10": "CONHECIMENTOS COMPLEMENTARES\nConsiderando as disposições da Lei n.o 8.429/1992, julgue os \nitens de 41 a 50.", "advogado:11": "_____________________________________________________\nCom base nas disposições da Lei n.o 9.784/1999, julgue os \nitens de 51 a 55.", "advogado:12": "_____________________________________________________\nAcerca de acontecimentos atuais mundiais relacionados a \npolítica, sociedade, relações internacionais, saúde e \neconomia, julgue os itens de 56 a 65.", "advogado:13": "_____________________________________________________\nEm relação a atualidades políticas e econômicas de países da \nAmérica Latina, julgue os itens de 66 a 70.", "advogado:14": "CONHECIMENTOS ESPECÍFICOS\nCom base nas disposições do Código de Processo Civil, julgue \nos itens de 71 a 80.", "advogado:15": "_____________________________________________________\nConsiderando as disposições constitucionais a respeito do \nPoder Judiciário, julgue os itens de 81 a 90.", "advogado:16": "_____________________________________________________\nSegundo as disposições do Código Civil a respeito das \nobrigações, julgue os itens de 91 a 100.", "advogado:17": "odontológicas em sede administrativa, julgue os itens \nde 101 a 110.", "advogado:18": "Considerando as disposições da Lei n.o 4.324/1964, julgue os \nitens de 111 a 120.", "advogado12:1": "Advogado\n1\nCada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a que cada um deles \nesteja vinculado, marque, na folha de respostas, para cada item: o campo designado com o código C, caso julgue o item CERTO; ou o campo \ndesignado com o código E, caso julgue o item ERRADO.\nA marcação de acordo com o gabarito valerá pontuação positiva. A marcação em desacordo com o gabarito valerá pontuação negativa. A ausência \nde marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não receberão pontuação negativa. Para as devidas marcações, \nuse a folha de respostas, único documento válido para a correção da sua prova objetiva.\nCONHECIMENTOS BÁSICOS\nPROVA OBJETIVA\nTexto para os itens de 1 a 15.\nO aumento da expectativa de vida e da incidência \nde doenças crônicas, como o câncer, é responsável por \ngrande parte dos óbitos em todo o mundo. Dados da \nGlobal Cancer Statistics de 2020 mostram que ocorreram \nnaquele ano 19,3 milhões de novos casos e quase 10 \nmilhões de óbitos decorrentes dessa patologia. Por ser \ncrônico‑degenerativo, o câncer evolui lentamente em \nalguns casos e de forma rápida em outros, constituindo‑se \ncomo a segunda maior causa de morte no Brasil, atrás \nsomente de doenças cardiovasculares. \nFatores inerentes ao câncer, como dor, \nsofrimento e morte, evidenciam a importância da \nqualidade do cuidado prestado ao paciente quanto \nàs suas necessidades físicas, psicológicas, sociais e \nespirituais. Estima‑se que cerca de 20 milhões de pessoas \nprecisem de cuidados paliativos no fim da vida em todo o \nmundo; entretanto, ainda se carece de profissionais bem \nqualificados para lidar com essa demanda, que se tornou \num dos grandes assuntos da saúde pública. \nNesta perspectiva, “cuidado paliativo” é a \nassistência que visa proporcionar qualidade de vida \nao paciente e à sua família, de modo a buscar atenuar \nproblemas e sintomas com tratamentos que têm\npor objetivo aliviar o sofrimento. Torna‑se, portanto, \nfundamental o cuidado humanizado, integral e individual \nnão só do enfermo, mas também de seus familiares \nem período de luto, para que este seja vivenciado e \nacompanhado por profissionais. \nCuidados paliativos promovem qualidade \nde vida a pacientes acometidos por doença que não \nresponde a tratamento, ou seja, sem possibilidades \nterapêuticas. Essa abordagem busca proporcionar \nbem‑estar a doentes e familiares, prevenindo e aliviando \nsofrimento ao identificar, avaliar e tratar dor e outros \nproblemas de natureza física, psicossocial e espiritual. \nPara mitigar sintomas relacionados ao quadro clínico \ndo paciente, o cuidado paliativo se apresenta como \nelemento fundamental na ampliação da assistência e na \nmelhora da sua qualidade, sem violar direitos e objetivos \ndo enfermo, cuja autonomia, valores e desejos devem \nser considerados no planejamento e na concretização \ndo cuidado. \nInternet: <www.scielo.br> (com adaptações).\nCom base nas ideias do texto, julgue os itens que se \nseguem.", "advogado12:2": "Com base nessa situação hipotética, julgue os itens a seguir.", "advogado12:3": "CONHECIMENTOS COMPLEMENTARES\nA respeito da ética no setor público, julgue os itens a seguir.", "advogado12:4": "alterações, bem como o Decreto nº 9.830/2019, julgue os \nitens seguintes.", "advogado12:5": "à informação –, bem como o Decreto nº 7.724/2012, julgue \nos itens seguintes.", "advogado12:6": "internacionais que envolvem o Irã, julgue os itens seguintes.", "advogado12:7": "CONHECIMENTOS ESPECÍFICOS\nConsiderando a Constituição Federal de 1988, julgue \nos itens a seguir, acerca dos direitos políticos e dos \npartidos políticos.", "advogado12:8": "Com base na Constituição Federal de 1988, julgue os itens a \nseguir, acerca da organização do Estado.", "advogado12:9": "De acordo com o Código Civil, julgue os itens a seguir, \nacerca dos bens.", "advogado12:10": "À luz do Código de Processo Civil, julgue os itens a seguir, a \nrespeito da tutela provisória.", "advogado12:11": "De acordo com o Regimento Interno do COREN‑PR, julgue \nos itens a seguir.", "advogado12:12": "No que concerne à Resolução COFEN nº 564/2017, julgue \nos itens a seguir.", "advogado15:1": "Prova aplicada\n1\nCada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a \nque cada um deles esteja vinculado, marque, no cartão-resposta, para cada item: o campo designado com o código C, caso julgue \no item CERTO; ou o campo designado com o código E, caso julgue o item ERRADO.\nA marcação de acordo com o gabarito valerá + 1,00 (um ponto positivo). A marcação em desacordo com o gabarito \nvalerá - 1,00 (um ponto negativo). A ausência de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não \nreceberão pontuação negativa. Para as devidas marcações, use o cartão-resposta, único documento válido para a correção da sua \nprova objetiva.\nCONHECIMENTOS BÁSICOS\nTexto para os itens de 1 a 10.\nO retrato\nO meu querido amigo Emílio Rouède, que há dias faleceu, foi um homem espirituoso, que forneceria matéria para \nmuitos contos ligeiros.\nEm vez de inventar uma anedota, vou contar‑vos uma historieta em que ele figurou, e que tem, por conseguinte, o \nmérito de ser autêntica.\nA coisa passou‑se há um quarto de século pouco mais ou menos. Emílio Rouède tinha se casado havia poucos \nmeses, e estava estabelecido com fotografia na Rua dos Ourives, numa casa que foi demolida quando se tratou de construir \na Avenida Central.\nUm dia Mme. Rouède, que era uma linda senhora, saiu sozinha à rua, e foi acompanhada por um impertinente que, \nvendo‑a sorrir, supôs que ela sorrisse não dele mas para ele.\nEla entendeu que o mais prudente era voltar para casa, e assim fez; o conquistador, porém, continuou a segui‑la \nimperturbavelmente.\nChegando à porta da casa, a moça olhou para trás, a fim de verificar se continuava a perseguição, e esse movimento \nanimou o homenzinho, ao que parece: quando ela entrou, ele entrou também; ela subiu a escada, ele também subiu.\nEmílio Rouède estava no atelier, de blusa, a trabalhar, e, ouvindo os passos de sua esposa, foi esperá‑la no topo \nda escada.\nO sujeito, quando reparou que havia ali um homem, não teve mais tempo de fugir. Mme. Rouède apresentou‑o \nao marido:\n– Aqui tens este senhor que me tem acompanhado por toda parte, e entrou comigo. Não sei o que pretende.\n– Sei eu, acudiu prontamente o fotógrafo. ‑ Pretende tirar o retrato; não pode ser outra coisa. E voltando‑se para o \ndesconhecido, perguntou‑lhe olhando por cima dos óculos, segundo o seu costume.\n– Busto ou corpo inteiro?\nO pobre diabo, que não sabia mais de que freguesia era, gaguejou:\n– Busto... busto...\n– Faça favor.\nE levou uma hora a tirar‑lhe o retrato que foi pago, ficando o retratado de ir buscá‑lo daí a três ou quatro dias. Este \nqueria apenas meia dúzia, mas Emílio Rouède convenceu‑o de que devia encomendar duas dúzias e meia.\nQuando o freguês saiu, Emílio Rouède disse à esposa, que ria a bandeiras despregadas:\n– Tenho pena de não ser dentista, em vez de fotógrafo!\nEscusado é dizer que os retratos ficaram na fotografia.\nArtur Azevedo.\nEm relação aos aspectos gerais do texto, julgue os itens \nde 1 a 10.", "advogado15:2": "Em relação aos aspectos gerais do texto, julgue os \nitens seguintes.", "advogado15:3": "Com base nessa situação hipotética, julgue os seguintes \nitens abaixo.", "advogado15:4": "Excel 2013 e do sistema operacional Windows 8, julgue os \nitens a seguir.", "advogado15:5": "CONHECIMENTOS COMPLEMENTARES\nÀ luz da Lei nº 12.527/2011, julgue os itens de 41 a 50.", "advogado15:6": "administrativa, controladora e judicial, julgue os itens \na seguir.", "advogado15:7": "CONHECIMENTOS ESPECÍFICOS\nAcerca dos direitos fundamentais , julgue os itens seguintes.", "advogado15:8": "Quanto aos poderes administrativos, julgue os itens \nseguintes.", "advogado15:9": "Com base no direito tributário, julgue os itens que \nde 96 a 100.", "advogado15:10": "Considerando a ação trabalhista e os recursos, julgue os \nitens de 111 a 115.", "advogado16:1": "Cada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a \nque cada um deles esteja vinculado, marque, no cartão-resposta, para cada item: o campo designado com o código C, caso julgue \no item CERTO; ou o campo designado com o código E, caso julgue o item ERRADO.\nA marcação de acordo com o gabarito valerá + 1,00 (um ponto positivo). A marcação em desacordo com o gabarito \nvalerá - 1,00 (um ponto negativo). A ausência de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não \nreceberão pontuação negativa. Para as devidas marcações, use o cartão-resposta, único documento válido para a correção da sua \nprova objetiva.\nCONHECIMENTOS BÁSICOS\n1\n4\n7\n10\n13\n16\n19\n22\n25\n28\n31\n34\n37\n40\n43\nTexto para os itens de 1 a 20.\nHoje em dia, o norte da Groenlândia é um deserto \npolar. Mas o material genético extraído de amostras do solo \nrevelou uma rica variedade de plantas e animais.\nOs cientistas encontraram traços genéticos de \nanimais parecidos com elefantes – os mastodontes, que \nperambulavam ao lado de renas e gansos entre as árvores \nda região, como bétulas e álamos, além de vida marinha \ncomo algas e caranguejos-ferradura.\nA pesquisa foi publicada na revista Nature.\nAntes deste estudo, era difícil observar como era a \nregião dois milhões de anos atrás. Os fósseis de animais \ndaquele período são extremamente raros por ali.\nO professor Eske Willerslev, da Universidade de \nCopenhague, na Dinamarca, e de Cambridge, no Reino \nUnido, conduziu os estudos. Ele afirma que essa mistura de \nespécies de climas temperados e do Ártico, vivendo lado a \nlado, não tem equivalente na era moderna.\nNa falta de fósseis, a equipe concentrou-se no DNA \nambiental, ou eDNA – o material genético perdido pelas \nplantas ou animais (de células da pele ou esterco, por \nexemplo) que se acumula no ambiente onde eles vivem.\nEsta técnica vem sendo amplamente utilizada na \nconservação ambiental. Estudar o DNA em uma gota de \nágua do mar, por exemplo, pode revelar todas as criaturas \nque viveram em um trecho de oceano, mesmo se você não \nconseguir observar os animais individualmente.\nNa Groenlândia, os pesquisadores usaram \namostras de solo antigo para voltar no tempo e estudar a \nbiologia do Pleistoceno Inferior. Eles encontraram um \necossistema florestal, com arbustos do Ártico, ervas, \nsamambaias e musgos crescendo entre as árvores.\nFoi descoberto DNA de criaturas como roedores, \nrenas e gansos, mas o mastodonte foi uma surpresa. \nWillerslev contou à BBC que, até então, ninguém havia \nencontrado parentes dos elefantes na Groenlândia.\nExtrair e sequenciar o DNA do solo não foi fácil. Os \npesquisadores levaram anos para desenvolver a melhor \ntécnica a ser usada. Eles chegaram a pensar que o material \ngenético talvez não conseguisse sobreviver por tanto \ntempo.\nSe mais DNA ambiental remanescente for \nencontrado em outros locais, a descoberta pode mudar a \nforma como enxergamos o mundo antigo.\nInternet: <g1.globo.com>.\n_____________________________________________________\nConsiderando os aspectos linguísticos e semânticos do texto, \njulgue os itens de 1 a 12.", "advogado16:2": "_____________________________________________________\nJulgue os itens de 13 a 20, que consistem em propostas de \nreescrita para trechos destacados do texto, no que diz \nrespeito à correção gramatical e à manutenção das ideias do \ntexto.", "advogado16:3": "_____________________________________________________\n8 pessoas, entre elas Enzo e Valentina, devem ser \ncolocadas em fila.\nCom base nessa situação hipotética, julgue os itens \nde 21 a 23.", "advogado16:4": "_____________________________________________________\nConsiderando 2 cilindros concêntricos de raios 𝑟 e 𝑅, com \n𝑅 > 𝑟, e mesma altura ℎ, julgue os itens de 24 a 26.", "advogado16:5": "_____________________________________________________\nNa matemática, um número inteiro positivo 𝑛 é dito quase \nperfeito se a soma de seus divisores naturais, 𝑆(𝑛), for tal que \n𝑆(𝑛) −𝑛 = 𝑛 − 1. Com base nessa informação, julgue os \nitens de 27 a 30.", "advogado16:6": "______________________________________________________________________________________________________________\nNo que diz respeito ao programa de navegação Google Chrome, em sua versão mais recente, aos conceitos de organização e de \ngerenciamento de arquivos e programas e aos procedimentos de segurança da informação, julgue os itens de 36 a 40.", "advogado16:7": "CONHECIMENTOS COMPLEMENTARES\nNo que se refere à ética na Administração Pública e à\nlegislação pertinente, julgue os itens de 41 a 43.", "advogado16:8": "_____________________________________________________\nQuanto à prática de atos de improbidade administrativa e à\nlegislação pertinente, julgue os itens de 44 a 46.", "advogado16:9": "_____________________________________________________\nCom relação ao processo administrativo no âmbito da \nAdministração Pública, julgue os itens de 47 a 49.", "advogado16:10": "_____________________________________________________\nAcerca do acesso à informação e da legislação pertinente \npara regulação e procedimentos, julgue os itens 50 e 51.", "advogado16:11": "_____________________________________________________\nCom base no Decreto n.o 9.830/2019, julgue os itens 52 e 53.", "advogado16:12": "_____________________________________________________\nA respeito da Lei Geral de Proteção de Dados Pessoais (LGPD), \njulgue os itens 54 e 55.", "advogado16:13": "_____________________________________________________\nO mundo, na atualidade, apresenta enorme complexidade e \ninúmeras contradições. Guerra e paz, progresso e atraso. \nAvanços educacionais e extraordinário desenvolvimento \ncientífico e tecnológico convivem com a desigualdade entre \nnações e no interior dos países. De igual modo, a abundância \nusufruída em algumas sociedades contrasta com o cenário de \nmiséria e fome em muitas outras. Considerando os múltiplos \naspectos que envolvem a atualidade mundial e brasileira, \njulgue os itens de 56 a 70.", "advogado16:14": "CONHECIMENTOS ESPECÍFICOS\nCom base nas disposições da Constituição Federal de 1988 a \nrespeito da organização do Estado brasileiro, julgue os itens \nde 71 a 80.", "advogado16:15": "_____________________________________________________\nConforme as disposições do Código de Processo Civil a \nrespeito dos processos nos tribunais e dos meios de \nimpugnação das decisões judiciais, julgue os itens de 91 a \n100.", "advogado16:16": "_____________________________________________________\nConsiderando as disposições legais a respeito da contratação \nde consórcios públicos, julgue os itens de 101 a 105.", "advogado16:17": "_____________________________________________________\nA respeito do exercício da profissão de administrador e de sua \nregulamentação e da constituição e competência do \nConselho Federal e dos Conselhos Regionais, julgue os itens \nde 106 a 112.", "advogado16:18": "_____________________________________________________________________________________________________________\nCom base na legislação de regência e nas resoluções normativas do Conselho Federal de Administração, julgue os itens \nde 113 a 120.", "advogado17:1": "CREF3-SC ADVOGADO 1\nCada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a \nque cada um deles esteja vinculado, marque, no cartão-resposta, para cada item: o campo designado com o código C, caso julgue \no item CERTO; ou o campo designado com o código E, caso julgue o item ERRADO.\nA marcação de acordo com o gabarito valerá + 1,00 (um ponto positivo). A marcação em desacordo com o gabarito \nvalerá - 1,00 (um ponto negativo). A ausência de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não \nreceberão pontuação negativa. Para as devidas marcações, use o cartão-resposta, único documento válido para a correção da sua \nprova objetiva.\nCONHECIMENTOS BÁSICOS\nTexto para os itens de 1 a 8. \n1\n4\n7\n10\n13\n16\n19\n22\n25\nVôlei Saci\nFaixa etária: a partir dos oitos anos\nLocal: área de jogo de voleibol (quadra)\nNúmero de participantes: de seis a dez jogadores \nem cada equipe\nMaterial: uma bola de plástico gigante, quadra e \nrede de voleibol\nObjetivo: desenvolver habilidades motoras \ncoordenativas de deslocamento\nDesenvolvimento: o jogo tem início com os \neducandos na quadra, com a rede ao centro, e com uma \nbola de plástico. A rede deve estar em uma altura \ncompatível com a idade dos alunos e o grau de dificuldade \nproposto pelo professor. Os alunos, em suas quadras,\ndevem ficar apoiados apenas em uma das pernas, podendo \nse movimentar somente com pulo. Cada aluno poderá dar \nquantos toques forem necessários na bola para não deixá-la \ncair no chão, não havendo um máximo de toques para cada \nequipe. O objetivo do jogo é passar a bola sobre a rede,\nfazendo-a cair do outro lado, usando a quadra toda, com as \nmesmas regras básicas do voleibol.\nCaso algum educando em seu deslocamento toque \no solo, a equipe perderá a posse de bola.\nVariação: o mesmo jogo pode ser realizado com \nduas ou mais bolas, dependendo do nível do grupo.\nJúlio Nasário et al. Jogos lúdicos: o relato de uma vivência. \n2.\na edição. Editora Unidavi, 2014 (com adaptações).\n_____________________________________________________ \nCom relação ao texto e a seus aspectos gramaticais, julgue os \nitens de 1 a 8.", "advogado17:2": "_____________________________________________________ \n1\n4\n7\n10\n13\n16\n19\n22\n25\n28\n31\n34\n37\n40\n43\n46\n49\nTexto para os itens de 9 a 16.\nReconhecemos que nem todos serão \npesquisadores. Em nossa profissão, não são muitos os que se \ninteressam pela pesquisa. Na verdade, alguns têm verdadeira \naversão a ela. Os pesquisadores, às vezes, são vistos como \npessoas estranhas, preocupadas com problemas \ninsignificantes e desligadas do mundo real (embora saibamos \nque esse não é o seu caso). Em um livro informativo, e \ntambém divertido, sobre redação de artigos científicos, \nDay (1983) conta a história de dois homens passeando em um \nbalão de ar quente que se depararam com algumas nuvens e \nperderam o rumo. Quando finalmente se aproximaram do \nchão, não reconheceram a região nem faziam a mínima ideia \nde onde tinham ido parar. Na verdade, eles estavam \nsobrevoando um de nossos mais famosos institutos de \npesquisa. De repente, avistaram um homem, caminhando \npela estrada, e o chamaram: “Ei, senhor, onde estamos?”. O \nhomem olhou para cima, avaliou a situação e, depois de \nalguns momentos de reflexão, respondeu: “Vocês estão em \num balão”. Um dos balonistas virou-se para o outro e disse: \n“Aposto que aquele homem é um pesquisador”. O outro \nperguntou: “O que o faz pensar assim?”. O primeiro então \nexplicou: “A resposta dele é perfeitamente exata, mas \ntotalmente inútil” (p. 152).\nBrincadeiras à parte, não se pode negar a \nimportância das pesquisas para todas as profissões. Afinal, \numa das distinções básicas entre disciplinas ou profissões e \n“ofício” é que este último lida apenas com o modo de fazer \nas coisas, enquanto as duas primeiras estão relacionadas não \napenas com o modo, mas também com o motivo de algo \ndever ser feito de determinado modo (e, inclusive, por que \ndeve ser feito). No entanto, em disciplinas ou profissões, \nembora a maioria das pessoas “re-conheça” a importância da \npesquisa, grande parte delas não lê artigos científicos. Essa \nsituação não é exclusiva da nossa área. Há informações de \nque apenas 1% dos químicos leem publicações científicas da \nprópria área, de que menos de 7% dos psicólogos leem \nrevistas acadêmicas de psicologia etc. A grande questão é: \npor que isso acontece? Acreditamos que a maioria dos \nprofissionais não lê resultados de pesquisas porque considera \nisso desnecessário. A pesquisa não é prática o suficiente ou \nnão diz respeito ao trabalho deles. Outra razão, dada pelos \npróprios profissionais do movimento, é que eles não \nentendem os artigos. A linguagem é muito técnica; a \nterminologia, pouco familiar e confusa. Essa reclamação é \nválida, mas poderíamos argumentar que, se os programas de \npreparação profissional tivessem orientação mais científica, \no problema seria diminuído. Entretanto, a compreensão da \nliteratura científica é extremamente difícil para quem não é \npesquisador.\nJ. R. Thomas e J. K. Nelson. Métodos de pesquisa em atividade \nfísica. 3.\na ed. Porto Alegre: Artmed Editora, 2002.\n\nCREF3-SC ADVOGADO 2\nConsiderando o texto e seus aspectos gramaticais, julgue os \nitens de 9 a 16.", "advogado17:3": "_____________________________________________________ \nNo que diz respeito a figuras de linguagem, julgue os itens \nde 17 a 20.", "advogado17:4": "_____________________________________________________ \nArthur Antunes Coimbra, o Zico, é o maior ídolo e \nartilheiro da história do Flamengo. \nA tabela abaixo traz dados sobre a atuação de Zico \nem clubes profissionais. \nAnos Clubes Jogos Gols\n1971-1983 Flamengo 635 476\n1983-1985 Udinese 𝑥 + 20 𝑥 − 3\n1985-1989 Flamengo 3𝑥 −2 𝑥\n1991-1994 Kashima Antlers 75 56\n860 y\nCom base nas informações acima apresentadas, julgue os \nitens de 21 a 24.", "advogado17:5": "_____________________________________________________ \nA função indicadora de um conjunto A é definida como \n𝐼𝐴\n(𝑥) = {0, 𝑥 ∉ 𝐴,\n1, 𝑥 ∈ A.\nPor exemplo, se 𝐵 = {2}, então 𝐼𝐵\n(2) = 1 e 𝐼𝐵\n(2.023) = 0, \npois 2 ∈ 𝐵 e 2.023 ∉ 𝐵. \nConsiderando as definições acima apresentadas, julgue os \nitens de 25 a 27.", "advogado17:6": "_____________________________________________________ \nNo que se refere à lógica proposicional, julgue os itens \nde 28 a 30.", "advogado17:7": "______________________________________________________________________________________________________________\nJulgue os itens de 36 a 40, relativos aos conceitos de organização e de gerenciamento de arquivos, às noções de vírus, worms e \npragas virtuais e aos procedimentos de backup.", "advogado17:8": "CONHECIMENTOS COMPLEMENTARES\nAcerca da ética na Administração Pública e dos princípios e \natos de improbidade, julgue os itens de 41 a 43.", "advogado17:9": "_____________________________________________________\nCom relação aos atos de improbidade administrativa, julgue \nos itens 44 e 45.", "advogado17:10": "_____________________________________________________\nA respeito do processo administrativo no âmbito da ação positiva. A marcação em desacordo com o gabarito valerá pontuação negativa. A ausência \nde marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não receberão pontuação negativa. Para as devidas marcações, \nuse a folha de respostas, único documento válido para a correção da sua prova objetiva.\nCONHECIMENTOS BÁSICOS\nPROVA OBJETIVA\nTexto para os itens de 1 a 8.\nLei da Pesquisa Clínica é regulamentada para \natrair investimentos em inovação\nFoi regulamentada, em 2025, a Lei da Pesquisa \nClínica, um marco para o desenvolvimento científico e a \nsaúde no Brasil. A legislação traz mais segurança jurídica, \natrai investimentos em inovação e impulsiona um setor \nestratégico para o desenvolvimento científico e industrial \ndo país, ao mesmo tempo em que fortalece a segurança \ne a proteção dos participantes, garantindo que os avanços \nocorram de forma ética e responsável. \nO Brasil está entre os 20 países no ranking global \nde estudos clínicos, mas participa de menos de 2% da \npesquisa clínica mundial. O país tem potencial de estar \nentre as dez nações mais relevantes do mundo nessa área. \nA expectativa é que a nova legislação impulsione esse \ncrescimento. \nEm 2024, o Brasil registrou 254 estudos clínicos. \nA expectativa é dobrar esse número e reverter a tendência \nde queda a partir de 2022, quando os marcos regulatórios \nde outros países se tornaram mais competitivos. Com uma \npopulação de aproximadamente 214 milhões de pessoas \ne ampla diversidade genética e cultural, o país reúne \ncondições únicas para atrair investimentos de instituições \nmundiais e gerar impactos positivos para o fortalecimento \ndo SUS. \nO novo modelo, que está alinhado às melhores \npráticas internacionais, reduz de 180 dias para 30 dias \no processo de avaliação dos projetos pelos Comitês de \nÉtica em Pesquisa (CEPs). A avaliação da Agência Nacional \nde Vigilância Sanitária (Anvisa) será de até 90 dias úteis. \nJá as pesquisas estratégicas para o SUS e as situações \nemergenciais serão avaliadas em até 15 dias úteis. \nA nova lei determina que, em casos de doenças \ngraves e sem alternativas de tratamento, os pacientes que \napresentarem benefícios comprovados tenham garantida \na continuidade do tratamento por até cinco anos após o \ntérmino da pesquisa, mediante plano prévio aprovado pelo \nCEP. A oferta do medicamento pode ser encerrada ainda em \nsituações como decisão do participante, cura, surgimento \nde alternativa terapêutica, ausência de benefício ou \nocorrência de reação adversa grave.\nA proteção aos participantes também foi \nreforçada, com a definição do consentimento livre e de \nesclarecimentos mais detalhados. Regras específicas para \npesquisas com grupos vulneráveis foram definidas para \nassegurar tratamento ético diferenciado e mais segurança.\nInternet: <gov.br> (com adaptações).\nEm relação ao texto e aos seus aspectos linguísticos, julgue \nos itens a seguir.", "advogado3:2": "Acerca do texto e dos seus aspectos linguísticos, julgue os \nitens a seguir.", "advogado3:3": "Com base nessa situação hipotética, julgue os itens a seguir.", "advogado3:4": "Com base nessa situação hipotética, julgue os itens \nseguintes.", "advogado3:5": "Com base nessa situação hipotética, julgue os itens a seguir.", "advogado3:6": "dados em ambientes computacionais, julgue os itens a \nseguir.", "advogado3:7": "CONHECIMENTOS COMPLEMENTARES\nA ética na função pública e os princípios constitucionais \nque regem a Administração Pública estruturam o regime \njurídico‑administrativo, influenciando a validade, a \nlegitimidade e a conformidade da atuação estatal. À luz \ndessas premissas, julgue os itens a seguir.", "advogado3:8": "partir dessa informação, julgue os itens a seguir, conforme \nesse diploma legal.", "advogado3:9": "nessa informação, julgue os itens a seguir, a partir desse \ndiploma legal.", "advogado3:10": "CONHECIMENTOS ESPECÍFICOS\nAcerca das classificações da Constituição Federal de \n1988 (CF/198 smo por matéria \nestranha, ora como “perda da alma”, ora em termos de corpo possuído por fantasmas, ora como decorrência do rompimento \nde tabus, entre outras formas. \nPovos primitivos entendiam a doença como algo que se devia à ação de projéteis: lanças, flechas, pedras atiradas \npor inimigos ou, talvez, ossos e espinhos que alguém engolia sem querer, em virtude da ação de forças adversas, humanas ou \nsobre‑humanas. Em alguns casos, o projétil é um organismo (um verme, por exemplo), cujos movimentos, na pessoa afetada, \nexplicariam dores agudas ou o mal‑estar súbito. A terapia, nessas várias situações, resumir‑se‑ia à localização e à remoção do \ninvasor, sem excluir, muitas vezes, a possibilidade de devolvê‑lo ao remetente.\nA alma, para povos primitivos, não seria entendida em fundamentos teológicos ou metafísicos, mas como sombra \nou duplo da pessoa. Esse duplo teria condições, às vezes, de separar‑se do corpo, graças à ação mágica dos deuses ou de \neventuais inimigos humanos. A terapia aconselhável consistia em reencontrar a alma para devolvê‑la ao proprietário. No \ncaso de invasão por demônio, a pessoa adoecia porque era possuída por espíritos ou almas estranhas, cuja terapia consistia \nem tratamentos psicológicos (exorcismo), em extrações mecânicas (alcançada por ingestão de substâncias ou por aspiração \nde vapores presumivelmente não apreciados pelo invasor) ou em transferências (procurando‑se enviar a alma estranha para \noutro corpo – animal ou objeto capaz de retê‑la). \nQuando se alude à quebra de tabus, entendia‑se a doença como punição: o doente era castigado por haver‑se \nrebelado contra imperativos religiosos ou sociais. Deuses e almas de antepassados puniam os homens que não se curvavam \ndiante dos mandamentos vigentes. \nEm certas circunstâncias, era preciso distinguir a culpa individual da coletiva: males que afligiam a tribo eram \nassociados a uma culpa coletiva, um erro ou uma desobediência generalizada, que dava origem aos males e às epidemias. Em \nqualquer caso, a terapia envolvia interrogatório e conf", "advogado4:2": "Com base nessa situação hipotética, julgue os itens a seguir.", "advogado4:3": "Com base nessa situação hipotética, julgue os itens a seguir.", "advogado4:4": "Beatriz não é baiana” são verdadeiras, julgue os itens \na seguir.", "advogado4:5": "e aos conceitos de redes de computadores, julgue os \nitens seguintes.", "advogado4:6": "CONHECIMENTOS COMPLEMENTARES\nOs servidores públicos devem ser guiados, acima de \ntudo, por valores fundamentais, como dignidade, decoro, \ndedicação, eficiência e integridade moral. Esses princípios \ndevem orientar suas ações não apenas no desempenho de \nsuas funções oficiais, mas também em sua vida pessoal, \npois suas condutas refletem a própria essência e propósito \ndo Estado. Considerando essas informações, julgue os \nitens seguintes.", "advogado4:7": "enriquecimento ilícito. A partir dessa informação, julgue os \nitens a seguir.", "advogado4:8": "essas informações, julgue os itens a seguir, em relação \nà referida Lei e aos princípios e às regras que regem o \nprocesso administrativo.", "advogado4:9": "CONHECIMENTOS ESPECÍFICOS\nConsiderando os princípios constitucionais relativos ao \nEstado brasileiro e relativos à forma e ao sistema de \ngoverno, julgue os itens a seguir.", "advogado4:10": "Considerando as informações supracitadas, julgue os itens \nseguintes.", "advogado4:11": "Com base na Constituição Federal de 1988, julgue os itens \na seguir, em relação à organização dos Poderes Executivo, \nLegislativo e Judiciário.", "advogado4:12": "Em relação às limitações do poder de tributar, julgue o \nitem a seguir, a partir das alterações provocadas pela \nEmenda Constitucional nº 132/2023, que trata da reforma \ntributária.", "advogado4:13": "Acerca das licitações e dos contratos administrativos julgue \nos itens a seguir.", "advogado4:14": "personalidade, julgue os itens seguintes, à luz do Código \nCivil brasileiro.", "advogado4:15" erminado por fatores do próprio indivíduo \ne por aspectos mais amplos do contexto social no qual \nestá inserido. \nSegundo Salvador Minuchin, médico e terapeuta \nfamiliar, a família é um complexo sistema de organização, \ncom crenças, valores e práticas ligadas diretamente às \ntransformações da sociedade, e visa à melhor adaptação \npossível para a sobrevivência de seus membros e da \ninstituição como um todo. O sistema familiar muda à \nmedida que a sociedade muda, e todos os que dele \nparticipam podem ser afetados por pressões internas \ne externas. \nCom as mudanças econômicas, políticas, sociais \ne culturais ocorridas ao longo dos tempos, a sociedade \nestá sendo obrigada a reorganizar regras básicas para \namparar a nova ordem familiar. No Código Civil de 1916, \na família “legítima” era definida apenas pelo casamento \noficial. Em janeiro de 2003, começou a vigorar o Novo \nCódigo Civil, que incorporou uma série de novidades: \na definição de família passou a abranger as unidades \nformadas por casamento, união estável ou comunidade \nde qualquer genitor e descendentes; casamento passou \na ser definido como uma “comunhão plena de vida, com \nbase na igualdade de direitos e deveres dos cônjuges”; \nos filhos adotados ou concebidos fora do casamento \npassaram a ter direitos idênticos aos dos nascidos dentro \ndo matrimônio; a palavra “pessoa” substituiu “homem” e \no “pátrio poder” que o pai exercia sobre os filhos passou \na ser denominado “poder familiar” e atribuído também \nà mãe. A Lei do Divórcio, de 1977, atribuía a guarda dos \nfilhos ao cônjuge que não tivesse provocado a separação \nou, não havendo acordo, à mãe. Hoje, é concedida a \n“quem revelar melhores condições para exercê‑la”.\nInternet: <books.scielo.org>. (com adaptações).\nDe acordo com as ideias do texto, julgue os itens a seguir.", "advogado5:2": "República, julgue os itens a seguir, acerca da redação oficial.", "advogado5:3": "Com base nessa situação hipotética, julgue os itens a s nhã da última quarta‑feira (29) em frente a empresa de contabilidade onde ele trabalhava, e \nfoi gravado por câmeras de segurança (veja vídeo abaixo; as cenas são fortes).\nJosé Horley de Sousa tinha 36 anos e foi baleado quando estava dentro de seu carro, estacionado na Rua Coronel \nFrancisco Inácio, na região do Sacomã. Ele ainda chegou a ser socorrido e levado ao Hospital Heliópolis, onde não resistiu aos \nferimentos e morreu.\nO criminoso é um motociclista, que fugiu após roubar o relógio e a carteira do contador e atirar ao menos quatro \nvezes nele. \nImagens gravadas por câmeras de segurança, e que circulam nas redes sociais, mostram que José não reagiu ao \nassalto. As cenas mostram que o carro, um Chevrolet Cruize vermelho, está parado na rua, quando um homem numa moto \nsobe a calçada se aproxima e aponta a arma para o veículo, que estava com os vidros escuros fechados.\nNo vídeo, feito por duas câmeras, ainda é possível ver o contador abrir a porta e entregar os pertences ao criminoso, \nque atira diversas vezes no motorista.\nO bandido, que usa mochila e capacete, foge em seguida na sua motocicleta.\nO caso foi registrado inicialmente como latrocínio, que é o roubo seguido de morte, no 95º Distrito Policial (DP), \nCohab‑Heliópolis.\nMas segundo o delegado que investiga a morte do contador e tenta identificar o criminoso, também está sendo \napurada a possibilidade de José ter sido vítima de uma execução.\n“O caso foi inicialmente registrado como latrocínio, mas a possibilidade de homicídio também é investigada. Estamos \ntrabalhando com as duas vertentes”, afirmou à reportagem o delegado Carlos Miranda. De acordo com a investigação, a moto \ndo criminoso não era roubada, mas estaria usando placa clonada. O celular do contador e um comprovante de transação \nbancária, no valor de R$ 50 mil, que estavam no automóvel da vítima, foram apreendidos pela polícia.\nAlém de analisar as imagens das câmeras de vídeo, que gravaram a morte do contador, a investigação quer ouvir o \ndepoimento de testemunhas.\nInternet: <www.g1.globo.com> (com adaptações).\nCom base no texto, julgue os itens a seguir.", "advogado6:2": "Com base nessa situação hipotética, julgue os itens a seguir.", "advogado6:3": "desktop, servidor etc.). Com base nessa informação, julgue \nos itens a seguir.", "advogado6:4": "um advogado. Com base nessa informação, julgue os \nitens seguintes.", "advogado6:5": "os advogados. Com base nessa informação, julgue os itens \na seguir.", "advogado6:6": "os envolvidos. Com base nessa informação, julgue o item \na seguir.", "advogado6:7": "CONHECIMENTOS COMPLEMENTARES\nConsiderando as normas estabelecidas no Código de Ética \nProfissional do Servidor Público Civil do Poder Executivo \nFederal – Decreto nº 1.171/1994 –, julgue os itens a seguir.", "advogado6:8": "pela prática de atos contra a Administração Pública, julgue \nos itens a seguir.", "advogado6:9": "Conselhos Regionais de Contabilidade (CRCs), julgue os \nitens a seguir.", "advogado6:10": "Conselheiros, Colaboradores e Funcionários, julgue os \nitens seguintes.", "advogado6:11": "nº 1.093/2011 – Regimento Interno do CRC‑SP –, julgue os \nitens a seguir.", "advogado6:12": "CONHECIMENTOS ESPECÍFICOS\nConsiderando o Código de Processo Civil, a respeito dos \nprocedimentos especiais e dos procedimentos de jurisdição \nvoluntária, julgue os itens a seguir.", "advogado6:13": "Poderes Executivo, Legislativo e Judiciário, julgue os itens \na seguir.", "advogado_11:1": "Advogado\n1\nCada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a que cada um deles \nesteja vinculado, marque, na folha de respostas, para cada item: o campo designado com o código C, caso julgue o item CERTO; ou o campo \ndesignado com o código E, caso julgue o item ERRADO.\nA marcação de acordo com o gabarito valerá pontuação positiva. A marcação em desacordo com o gabarito valerá pontuação negativa. A ausência \nde marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não receberão pontuação negativa. Para as devidas marcações, \nuse a folha de respostas, único documento válido para a correção da sua prova objetiva.\nCONHECIMENTOS BÁSICOS\nPROVA OBJETIVA\nTexto para os itens de 1 a 20.\nO termo Internet das Coisas, da sigla em \ninglês IoT (Internet of Things), pode despertar bastante \ncuriosidade e soar complicado, mas, na verdade, \nrepresenta uma tecnologia que já é utilizada por \nmilhões de pessoas em todo o mundo, em busca \nde mais praticidade e conectividade no dia a dia. \nConectados aos mais variados objetos, sensores e outros \nsoftwares ajudam a levar dados sobre o que acontece no \nmundo real para a Internet. Desde objetos domésticos a \nferramentas industriais, tudo e todos podem se beneficiar\nda tecnologia.\n“Por exemplo, a sua geladeira já sabe o \nmapeamento de produtos e que você compra leite \nsazonalmente. Ela nota que o seu estoque de leite está \nbaixo dentro da geladeira e já emite um comunicado para \no supermercado, encomendando o leite que depois você \npode buscar ou receber em casa”, explicou Daniel Carius, \nCVO da Ribus e especialista em soluções de criptoativos \ne blockchain. Além de processos mais básicos da rotina, \na Internet das Coisas pode influenciar no dia a dia de \nfábricas, transportadoras e hospitais, em logística, no \nvarejo, no setor público e na segurança, por exemplo. \nTudo isso foi só foi possível por causa do\ndesenvolvimento de outras tecnologias, tais como \nsensores, nuvem, machine learning e inteligência \nartificial, que ajudam a Internet das Coisas a captar, \narmazenar e entender comandos e dados. “Eu acredito \nque o impacto que vai gerar no cotidiano das pessoas \né realmente um facilitador, porque as coisas já vão\nter um armazenamento das informações do usuário e \njá vão poder, de forma automatizada, sugerir ações.”, \nacrescentou Carius.\nInternet: <www.exame.com> (com adaptações).\nNo que se refere à tipologi ia de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não \nreceberão pontuação negativa. Para as devidas marcações, use o cartão-resposta, único documento válido para a correção da sua \nprova objetiva.\nCONHECIMENTOS BÁSICOS\nTexto para os itens de 1 a 10.\nPara além dos profundos impactos sobre o meio \nambiente e sobre a saúde da população, as consequências \ndo garimpo ilegal em terras indígenas são diferentes \nentre homens e mulheres. Enquanto os homens, \nespecialmente os mais jovens, estão mais vulneráveis \nao aliciamento e à exploração do seu trabalho em troca \nde alimentos, celulares, álcool ou parte da produção, \nas mulheres raramente são integradas desse modo no \nciclo econômico do garimpo ilegal. Por meio dessas \natividades, os homens passam a ter acesso a armas de \nfogo, Internet e celulares trazidos pelos garimpeiros, \nusufruindo de maior acesso a informação, mobilidade, \nrecursos e possibilidade de comunicação. Por outro lado, \nas mulheres enfrentam mais obstáculos para circular \nlivremente no território (entre outras coisas, pelo risco \nde violência sexual), o que pode afetar sua capacidade \nde buscar alimentos, água ou acessar serviços de saúde, \nassim como de exercer seus papéis e funções sociais. \nIsso agrava as desigualdades entre homens e mulheres, \ncriando condições de maior dependência em relação \naos homens e exposição a violência, dentro e fora de \nsuas comunidades.\nInternet: <www.onumulheres.org.br> (com adaptações).\nCom base nas ideias, no vocabulário e nas estruturas \nlinguísticas do texto, julgue os itens de 1 a 10.", "advogado_118:2": "República (MRPR), julgue os itens 19 e 20, a respeito da \ncorrespondência oficial.", "advogado_118:3": "4 resulta em 6. Considerando essas informações, julgue os \nitens de 21 a 23.", "advogado_118:4": "é doutor”, “Paula é advogada” e “Felipe é doutor”, julgue os \nitens de 28 a 30.", "advogado_123:1": "Cada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a \nque cada um deles esteja vinculado, marque, no cartão-resposta, para cada item: o campo designado com o código C, caso julgue \no item CERTO; ou o campo designado com o código E, caso julgue o item ERRADO.\nA marcação de acordo com o gabarito valerá + 1,00 (um ponto positivo). A marcação em desacordo com o gabarito \nvalerá - 1,00 (um ponto negativo). A ausência de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não \nreceberão pontuação negativa. Para as devidas marcações, use o cartão-resposta, único documento válido para a correção da sua \nprova objetiva. \nCONHECIMENTOS BÁSICOS\nTexto para os itens de 1 a 20.\n1 \n4 \n7 \n10 \n13 \n16 \n19 \n22 \n25 \n28 \n31 \nSe os senhores algum dia quiserem encontrar um representante da grande nação brasileira, não o procurem \nnunca na sua residência. Seja a que hora for, de manhã, ao amanhecer mesmo, à hora do jantar, quando quiserem enfim,\nse o procurarem, o criado há de dizer-lhes secamente: Não está. Falo-lhes de experiência própria, porque, durante as\ninúmeras vezes, a toda a hora do dia, em que fui ao Hotel Términus procurar o Deputado Castro, apalpando a carta do\ncoronel, tive o desprazer de ouvir estas duas palavras do porteiro indiferente. Nas últimas vezes, antes mesmo de acabar \na pergunta, já o homenzinho respondia invariavelmente da mesma desesperada forma negativa. \nÉ bem fácil de imaginar com que sorte de cogitações eu ia passando esses dias. O meu dinheiro dentro em breve,\npago o hotel, ficaria reduzido a alguns mil-réis insignificantes. Não conhecia ninguém, não tinha a mínima relação que me\npudesse socorrer, dar-me qualquer coisa, casa ao menos, até que me arranjasse. Saíra de meus penates, cheio de\nentusiasmo, certo de que aquela carta, mal fosse apresentada, me daria uma situação qualquer. Era essa a minha\nconvicção, dos meus e do próprio coronel. Tinha-se lá, por aquelas alturas, em grande conta a força do doutor Castro nas\ndecisões dos governantes e a influência do velho fazendeiro sobre o ânimo do deputado. \nNão era ele o seu grande eleitor? Não era ele o seu banqueiro para os efeitos eleitorais? E nós, lá na roça, tínhamos \nquase a convicção de que o verdadeiro deputado era o coronel e o doutor Castro um simples preposto seu. As minhas idas \ne vindas ao hotel repetiam-se e não o encontrava. Vinham-me então os terrores sombrios da falta de dinheiro, da falta\nabsoluta. Voltava para o hotel taciturno, preocupado, cortado de angústias. Sentia-me só, só naquele grande e imenso\nformigueiro humano, só, sem parentes, sem amigos, sem conhecidos que uma desgraça pudesse fazer amigos. Os meus \núnicos amigos eram aquelas notas sujas encardidas; eram elas o meu único apoio; eram elas que me evitavam as\nhumilhações, os sofrimentos, os insultos de toda a sorte; e quando eu trocava uma delas, quando as dava ao condutor do\nbonde, ao homem do café, era como se perdesse um amigo, era como se me separasse de uma pessoa bem amada...\nEu nunca compreendi tanto a avareza como naqueles dias em que dei alma ao dinheiro, e o senti tão forte para os\nelementos da nossa felicidade externa ou interna... \nA minha ignorância de viver e falta de experiência quase deixavam transparecer a natureza das minhas \npreocupações. O gerente do hotel pareceu-me que as farejava. De quando em quando, procurava na conversação\namedrontar-me com o seu poderio, proveniente de estreitas relações que m", "advogado_123:2": "do sistema operacional Windows 8, julgue os itens de 21 a 25.", "advogado_123:3": "procedimentos de segurança da informação, julgue os itens \nde 26 a 30.", "advogado_123:4": "A partir dessas informações, julgue os itens de 31 a 33, \nconsiderando π = 3.", "advogado_123:5": "miocárdio repentino. Com base nessas informações, julgue os \nitens de 37 a 40.", "advogado_123:6": "CONHECIMENTOS COMPLEMENTARES \nÀ luz do disposto na Lei n.o 8.429/1992 e na \nLei n.o 9.784/1999, julgue os itens
