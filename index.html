implica  reconhecer que dispositivos físicos como teclado e monitor pertencem à categoria de hardware, enquanto os programas que permitem utilizar esses dispositivos são classificados como software. Nos itens que avaliem conhecimentos de informática, a menos que seja explicitamente informado o contrário, considere que: todos os programas mencionados estejam em configuração‑padrão, em português; o mouse esteja configurado para pessoas destras; expressões como clicar, clique simples e clique duplo refiram‑se a cliques com o botão esquerdo do mouse; e teclar corresponda à operação de pressionar uma tecla e, rapidamente, liberá‑la, acionando‑a apenas uma vez.", "c": "advogado3:x25"}, {"p": "advogado3", "n": 30, "a": "informatica", "t": "Durante o acesso a um site institucional, o navegador  pode estabelecer conexões com servidores para solicitar recursos por meio do protocolo HTTP, sendo possível que intermediários de rede armazenem cópias desses recursos para acelerar acessos futuros.", "c": "advogado3:x29"}, {"p": "advogado3", "n": 31, "a": "informatica", "t": "Em redes corporativas, o acesso à Internet ocorre  como consequência natural da existência de uma intranet, pois ambas representam a mesma rede de comunicação utilizada pela organização.", "c": "advogado3:x29"}, {"p": "advogado3", "n": 32, "a": "informatica", "t": "Durante o acesso aos sistemas institucionais por meio  de navegadores, o processamento das funcionalidades da aplicação ocorre no computador do usuário, enquanto o servidor atua apenas como um repositório de páginas. Quanto às ferramentas de comunicação digital, aos aplicativos de escritório, à segurança da informação e às", "c": "advogado3:x29"}, {"p": "advogado3", "n": 33, "a": "informatica", "t": "No uso de correio eletrônico, o envio de uma  mensagem depende da presença simultânea do remetente e do destinatário conectados à Internet, para que a comunicação possa ocorrer.", "c": "advogado3:x29"}, {"p": "advogado3", "n": 34, "a": "informatica", "t": "No contexto da segurança da informação, a atuação  do firewall consiste em analisar o conteúdo de arquivos armazenados no computador, com o objetivo de identificar códigos maliciosos presentes nesses arquivos.", "c": "advogado3:5"}, {"p": "advogado3", "n": 35, "a": "informatica", "t": "As ferramentas de busca na Internet organizam  informações disponíveis na web por meio de processos de coleta e de indexação de páginas, permitindo recuperar conteúdos relacionados aos termos pesquisados.", "c": "advogado3:5"}, {"p": "advogado3", "n": 36, "a": "informatica", "t": "Em aplicativos de apresentação eletrônica, a utilização  de elementos visuais, como gráficos e imagens, pode contribuir para tornar a exposição de informações mais clara e compreensível. Em relação ao uso de aplicativos de escritório, às ferramentas de comunicação digital, à navegação na Internet, à segurança da informação e à organização de", "c": "advogado3:5"}, {"p": "advogado3", "n": 37, "a": "direito", "t": "Nos editores de texto utilizados em ambientes  corporativos, os recursos de formatação permitem alterar a aparência do conteúdo de um documento, sem modificar, necessariamente, as informações escritas no texto.", "c": "advogado3:6"}, {"p": "advogado3", "n": 38, "a": "informatica", "t": "Durante a navegação em um site da Internet, o  navegador passa a integrar a infraestrutura de rede responsável por hospedar as páginas acessadas.", "c": "advogado3:6"}, {"p": "advogado3", "n": 39, "a": "informatica", "t": "Em planilhas eletrônicas, os dados podem ser  organizados em células dispostas em linhas e colunas, permitindo a manipulação e a análise das informações registradas.", "c": "advogado3:6"}, {"p": "advogado3", "n": 40, "a": "legislacao", "t": "No contexto da segurança da informação, as políticas  de proteção de dados podem incluir procedimentos voltados à prevenção de acesso não autorizado e à preservação da integridade das informações.  Advogado CONSELHO REGIONAL DE BIOMEDICINA DA 6ª REGIÃO Quadrix | 2026 4", "c": "advogado3:6"}, {"p": "advogado3", "n": 41, "a": "legislacao", "t": "A ética na função pública impõe ao agente público  atuação orientada pelo interesse público primário, vedando a prevalência de interesses particulares no exercício da função administrativa.", "c": "advogado3:7"}, {"p": "advogado3", "n": 42, "a": "legislacao", "t": "O princípio da moralidade administrativa possui  natureza meramente ética, não se qualificando, portanto, como parâmetro jurídico autônomo para o controle de validade dos atos administrativos.", "c": "advogado3:7"}, {"p": "advogado3", "n": 43, "a": "legislacao", "t": "A conformidade da atuação administrativa com  o princípio da legalidade não afasta a exigência de observância concomitante dos princípios da moralidade e da impessoalidade.", "c": "advogado3:7"}, {"p": "advogado3", "n": 44, "a": "legislacao", "t": "À luz do art. 37, caput, da Constituição Federal  de 1988, a atuação administrativa pressupõe a observância integrada da legalidade, da moralidade e da finalidade pública no exercício da função estatal. A Lei nº 8.429/1992 disciplina os atos de improbidade administrativa, os seus elementos constitutivos, as espécies e as sanções aplicáveis, conforme a redação vigente. A", "c": "advogado3:7"}, {"p": "advogado3", "n": 45, "a": "legislacao", "t": "A aplicação da sanção de perda da função pública  por ato de improbidade administrativa exige previsão expressa na sentença condenatória, não decorrendo automaticamente da simples prática do ato ímprobo.", "c": "advogado3:8"}, {"p": "advogado3", "n": 46, "a": "legislacao", "t": "Após as alterações promovidas pela  Lei nº 14.230/2021, admite‑se a responsabilização por ato de improbidade administrativa fundada exclusivamente em culpa, desde que seja comprovado prejuízo ao erário.", "c": "advogado3:8"}, {"p": "advogado3", "n": 47, "a": "legislacao", "t": "O agente público responderá por ato de improbidade  administrativa, ainda que um terceiro também tenha concorrido para a prática do ilícito ou dele se beneficiado.", "c": "advogado3:8"}, {"p": "advogado3", "n": 48, "a": "legislacao", "t": "A condenação por ato de improbidade administrativa  pode fundamentar‑se em tipo aberto ou em princípios genéricos da Administração Pública, ainda que a conduta não esteja expressamente tipificada nos artigos. 9º, 10 ou 11 da Lei nº 8.429/1992. A Lei nº 9.784/1999 estabelece normas básicas a respeito do processo administrativo no âmbito da Administração Pública federal, disciplinando os princípios, os direitos dos administrados, os deveres da Administração e os critérios de formação, motivação e controle das decisões administrativas.", "c": "advogado3:8"}, {"p": "advogado3", "n": 49, "a": "legislacao", "t": "No processo administrativo federal, é assegurado  ao administrado o direito de apresentar alegações e documentos antes da decisão final, como expressão do contraditório e da ampla defesa.", "c": "advogado3:8"}, {"p": "advogado3", "n": 50, "a": "legislacao", "t": "A Administração pode decidir processos  administrativos sem motivação quando a decisão se fundar em discricionariedade administrativa.", "c": "advogado3:8"}, {"p": "advogado3", "n": 51, "a": "legislacao", "t": "A Lei nº 9.784/1999 impõe à Administração Pública  o dever de decidir explicitamente as solicitações ou as reclamações formuladas pelos administrados em prazo razoável.", "c": "advogado3:8"}, {"p": "advogado3", "n": 52, "a": "direito", "t": "No processo administrativo federal, a autoridade  competente pode delegar parte de suas atribuições, sendo vedada a delegação para edição de atos normativos, de decisão de recursos administrativos e de matérias de competência exclusiva.", "c": "advogado3:8"}, {"p": "advogado3", "n": 53, "a": "legislacao", "t": "A avocação de competência pode ser exercida em  caráter permanente sempre que a autoridade superior a considerar conveniente.", "c": "advogado3:8"}, {"p": "advogado3", "n": 54, "a": "legislacao", "t": "A Administração Pública pode rever os seus próprios  atos quando estes estiverem eivados de vício de legalidade, independentemente de provocação do interessado. A Lei nº 12.527/2011 disciplina o acesso a informações no âmbito da Administração Pública, estabelecendo regras sobre transparência, classificação, restrição e responsabilização decorrente da negativa indevida de acesso.", "c": "advogado3:8"}, {"p": "advogado3", "n": 55, "a": "legislacao", "t": "A Lei nº 12.527/2011 consagra o acesso à informação  como regra e o sigilo como exceção no âmbito da Administração Pública.", "c": "advogado3:8"}, {"p": "advogado3", "n": 56, "a": "legislacao", "t": "O pedido de acesso à informação dirigido à  Administração Pública deve ser acompanhado de justificativa quanto à finalidade pretendida pelo requerente.", "c": "advogado3:8"}, {"p": "advogado3", "n": 57, "a": "legislacao", "t": "Informações pessoais relativas à intimidade, vida  privada, honra e imagem têm acesso restrito pelo prazo máximo de 100 anos, contado da data de sua produção.", "c": "advogado3:8"}, {"p": "advogado3", "n": 58, "a": "legislacao", "t": "A informação classificada como secreta possui prazo  máximo de restrição de acesso de 25 anos, sendo admitida uma única prorrogação por igual período.", "c": "advogado3:8"}, {"p": "advogado3", "n": 59, "a": "legislacao", "t": "A classificação de informação como ultrassecreta  sujeita‑se ao prazo máximo de restrição de acesso de 25 anos, sendo admitida uma única prorrogação por igual período.  Advogado CONSELHO REGIONAL DE BIOMEDICINA DA 6ª REGIÃO Quadrix | 2026 5 A Lei nº 13.709/2018 estabelece regras para o tratamento de dados pessoais no âmbito público e privado, disciplinando princípios, bases legais, direitos dos titulares e responsabilidades dos agentes de tratamento. Com base", "c": "advogado3:8"}, {"p": "advogado3", "n": 60, "a": "legislacao", "t": "A Lei nº 13.709/2018 aplica‑se exclusivamente às  operações de tratamento de dados pessoais realizadas por empresas privadas.", "c": "advogado3:9"}, {"p": "advogado3", "n": 61, "a": "legislacao", "t": "Nos termos da Lei nº 13.709/2018, considera‑se  dado pessoal sensível aquele que revele origem racial ou étnica, convicção religiosa ou dado biométrico vinculado à pessoa natural.", "c": "advogado3:9"}, {"p": "advogado3", "n": 62, "a": "legislacao", "t": "O tratamento de dados pessoais pelo Poder Público  depende, necessariamente, do consentimento prévio e expresso do titular, ainda que realizado para execução de políticas públicas previstas em Lei.", "c": "advogado3:9"}, {"p": "advogado3", "n": 63, "a": "legislacao", "t": "Compete à Autoridade Nacional de Proteção de  Dados (ANPD) fiscalizar o cumprimento da Lei nº 13.709/2018 e aplicar as sanções administrativas em caso de infração à legislação de proteção de dados pessoais.", "c": "advogado3:9"}, {"p": "advogado3", "n": 64, "a": "legislacao", "t": "O titular dos dados pessoais tem direito a solicitar a  revisão de decisões tomadas unicamente com base em tratamento automatizado de dados pessoais que afetem os seus interesses, sendo inclusas as decisões destinadas a definir o seu perfil pessoal, profissional, de consumo ou de crédito.", "c": "advogado3:9"}, {"p": "advogado3", "n": 65, "a": "legislacao", "t": "O consentimento para o tratamento de dados  pessoais pode ser concedido de forma genérica, desde que o controlador, posteriormente, especifique as finalidades do tratamento.", "c": "advogado3:9"}, {"p": "advogado3", "n": 66, "a": "legislacao", "t": "A aplicação das sanções administrativas previstas na  Lei nº 13.709/2018 compete à ANPD, devendo‑se ser observadas as garantias do devido processo administrativo.", "c": "advogado3:9"}, {"p": "advogado3", "n": 67, "a": "legislacao", "t": "No exercício de suas competências regulatórias e  fiscalizatórias, a ANPD deve observar o princípio da mínima intervenção na atividade econômica.", "c": "advogado3:9"}, {"p": "advogado3", "n": 68, "a": "legislacao", "t": "As normas de caráter geral editadas pela ANPD  independem de consulta pública, podendo ser expedidas diretamente para assegurar uma maior celeridade regulatória.", "c": "advogado3:9"}, {"p": "advogado3", "n": 69, "a": "legislacao", "t": "A Lei nº 13.709/2018 admite a coordenação e a  atuação cooperativa entre a ANPD e os órgãos ou as entidades reguladoras setoriais.", "c": "advogado3:9"}, {"p": "advogado3", "n": 70, "a": "legislacao", "t": "A Lei nº 13.709/2018 exclui a aplicação de  outros direitos e de outras garantias previstos no ordenamento jurídico que sejam relacionados à proteção da privacidade e da personalidade. RASCUNHO  Advogado CONSELHO REGIONAL DE BIOMEDICINA DA 6ª REGIÃO Quadrix | 2026 6", "c": "advogado3:9"}, {"p": "advogado3", "n": 71, "a": "direito", "t": "A CF/1988 classifica‑se, quanto ao seu conteúdo, em  constituição formal, já que não se limitou, em sua promulgação, a matérias tipicamente constitucionais.", "c": "advogado3:10"}, {"p": "advogado3", "n": 72, "a": "direito", "t": "Embora a CF/1988 já tenha recebido 138 emendas  constitucionais (até dezembro de 2025), a doutrina classifica, quanto à estabilidade, a Carta Política brasileira como semirrígida.", "c": "advogado3:10"}, {"p": "advogado3", "n": 73, "a": "direito", "t": "A CF/1988 é, quanto à origem e ao modo de  elaboração, do tipo promulgada e histórica, respectivamente. Em relação à aplicação dos direitos constitucionais fundamentais, em consonância com o texto da Constituição", "c": "advogado3:10"}, {"p": "advogado3", "n": 74, "a": "direito", "t": "Quando a lei pessoal da pessoa de cuja sucessão se  tratar não lhes for mais favorável, a sucessão dos bens de estrangeiros, onde quer que estejam, será regida pela legislação brasileira em benefício do cônjuge ou dos filhos brasileiros.", "c": "advogado3:10"}, {"p": "advogado3", "n": 75, "a": "direito", "t": "A liberdade de crença autoriza que paciente capaz  possa recusar tratamento de saúde por motivos religiosos, desde que a decisão seja inequívoca, livre, informada e esclarecida.", "c": "advogado3:10"}, {"p": "advogado3", "n": 76, "a": "direito", "t": "O brasileiro nato poderá ser extraditado por  comprovado envolvimento em tráfico ilícito de entorpecentes e drogas afins, não se admitindo a extradição em caso de crime comum.", "c": "advogado3:10"}, {"p": "advogado3", "n": 77, "a": "direito", "t": "A extradição de estrangeiro é admitida tanto para  crimes comuns, quanto para crimes políticos.", "c": "advogado3:10"}, {"p": "advogado3", "n": 78, "a": "direito", "t": "Em relação à igualdade em concurso público,  admite‑se a restrição à inscrição em razão da idade por meio de ato administrativo.", "c": "advogado3:10"}, {"p": "advogado3", "n": 79, "a": "direito", "t": "Somente brasileiros natos poderão ser das carreiras  diplomática ou de oficial das Forças Armadas. Segundo José Afonso da Silva (2017), a Constituição conferiu ao Congresso Nacional, um órgão constituído, a competência para elaborar emendas a ela e, por isso, se lhe dá a denominação de poder constituinte instituído ou constituído. Por outro lado, como esse seu poder não lhe pertence por natureza primariamente, mas, ao contrário, deriva de outro (isto é, do poder constituinte originário), é que também se lhe reserva o nome de poder constituinte derivado, embora pareça mais acertado falar em competência constituinte derivada ou constituinte de", "c": "advogado3:10"}, {"p": "advogado3", "n": 80, "a": "direito", "t": "Por ser atribuição do Congresso Nacional, o presidente  da República não participa do processo de emenda à Constituição.", "c": "advogado3:11"}, {"p": "advogado3", "n": 81, "a": "direito", "t": "Não se admite proposta de emenda à Constituição com  a finalidade de instituir um regime parlamentarista no Brasil, já que a separação dos Poderes é cláusula pétrea.", "c": "advogado3:11"}, {"p": "advogado3", "n": 82, "a": "direito", "t": "A revisão constitucional que fora prevista no ato  das disposições constitucionais transitórias pode ser novamente invocada, a qualquer tempo, para modificar a forma de governo do País.", "c": "advogado3:11"}, {"p": "advogado3", "n": 83, "a": "direito", "t": "O poder constituinte derivado decorrente é o poder  atribuído aos estados‑membros da Federação para elaborar as suas próprias Constituições estaduais. De acordo com o Portal Migalhas, em matéria do dia 5/2/2026., “O ministro Flávio Dino, do STF, determinou a suspensão do pagamento de verbas indenizatórias que extrapolem o teto constitucional de remuneração no Judiciário, Executivo e Legislativo. A decisão estabelece prazo de 60 dias para que os Três Poderes revisem e interrompam o repasse de benefícios sem amparo legal, frequentemente utilizados para ultrapassar o limite remuneratório fixado pela Constituição”. O trecho em questão trata da decisão do STF a respeito dos limites remuneratórios de agentes públicos, contestada em face da Reclamação Constitucional nº 88319. A partir", "c": "advogado3:11"}, {"p": "advogado3", "n": 84, "a": "direito", "t": "Nos casos autorizados, constitucionalmente, de  acumulação de cargos, de empregos e de funções públicas, o teto remuneratório constitucional deverá considerar cada um dos vínculos formalizados.", "c": "advogado3:12"}, {"p": "advogado3", "n": 85, "a": "direito", "t": "O teto remuneratório no Judiciário, Executivo e  Legislativo fixado pela CF/1988 é o subsídio mensal, em espécie, dos ministros de Estado do Poder Executivo, sendo autorizada a existência de limites inferiores para os estados e municípios.", "c": "advogado3:12"}, {"p": "advogado3", "n": 86, "a": "direito", "t": "Poderão ultrapassar o teto remuneratório  constitucional as parcelas de caráter indenizatório expressamente previstas em lei ordinária, aprovada pelo Congresso Nacional, de caráter nacional, aplicada a todos os Poderes e a todos os órgãos constitucionalmente autônomos. Acerca das regras constitucionais a respeito da organização e da competência do Poder Judiciário, bem como das", "c": "advogado3:12"}, {"p": "advogado3", "n": 87, "a": "direito", "t": "Compete ao Superior Tribunal de Justiça julgar, em  sede recursal, as causas decididas em única ou em última instância, quando a decisão recorrida julgar válida lei local contestada em face de lei federal.", "c": "advogado3:13"}, {"p": "advogado3", "n": 88, "a": "direito", "t": "Aos juízes é vedado dedicar‑se à atividade  político‑partidária.  Advogado CONSELHO REGIONAL DE BIOMEDICINA DA 6ª REGIÃO Quadrix | 2026 7", "c": "advogado3:13"}, {"p": "advogado3", "n": 89, "a": "direito", "t": "A aprovação e promulgação do Estatuto da  Magistratura é uma prerrogativa do Supremo Tribunal Federal.", "c": "advogado3:13"}, {"p": "advogado3", "n": 90, "a": "direito", "t": "Compete à justiça do trabalho julgar as ações  relacionadas ao exercício do direito de greve. Quanto ao regime jurídico aplicável aos conselhos de", "c": "advogado3:13"}, {"p": "advogado3", "n": 91, "a": "direito", "t": "Os conselhos de fiscalização profissional não são  considerados entidades da Administração Pública.", "c": "advogado3:13"}, {"p": "advogado3", "n": 92, "a": "direito", "t": "Os conselhos de fiscalização profissional, embora  tenham natureza autárquica, podem ter seu quadro de pessoal composto por empregados sujeitos a contrato de trabalho regido pela CLT.", "c": "advogado3:13"}, {"p": "advogado3", "n": 93, "a": "direito", "t": "Os conselhos de fiscalização profissional atuam  fiscalizando setores específicos da atividade econômica, em regime idêntico ao das agências reguladoras.", "c": "advogado3:13"}, {"p": "advogado3", "n": 94, "a": "direito", "t": "As anuidades dos conselhos de fiscalização profissional  são espécie tributária, não podendo os Conselhos definir o valor das anuidades por ato próprio.", "c": "advogado3:13"}, {"p": "advogado3", "n": 95, "a": "direito", "t": "O regime jurídico das empresas públicas e das  sociedades de economia mista é aplicável aos conselhos de fiscalização profissional.", "c": "advogado3:13"}, {"p": "advogado3", "n": 96, "a": "direito", "t": "Os conselhos profissionais possuem poder de  polícia para fiscalizar o exercício das profissões regulamentadas, podendo impor sanções administrativas e proceder à autuação de eventuais infratores, sem a necessidade de intervenção do Poder Judiciário. O Conselho Regional de Biomedicina do Estado do Paraná necessitou realizar uma aquisição de equipamentos comuns de informática, como computadores pessoais e impressoras, para atender melhor aos novos concursados da entidade. O setor competente estimou que a aquisição deverá ultrapassar o valor de um milhão de reais. Com base nessa situação hipotética e nas regras para as compras estabelecidas no regime jurídico de compras", "c": "advogado3:13"}, {"p": "advogado3", "n": 97, "a": "legislacao", "t": "A contratação deverá ser realizada por meio de pregão  eletrônico.", "c": "advogado3:13"}, {"p": "advogado3", "n": 98, "a": "legislacao", "t": "A contratação deverá ser realizada por meio de uma  licitação, na modalidade tomada de preços.", "c": "advogado3:13"}, {"p": "advogado3", "n": 99, "a": "legislacao", "t": "Pelo critério de valor estimado da licitação, o qual é  de um milhão de reais, não se admitirá a compra por meio de dispensa de licitação.", "c": "advogado3:13"}, {"p": "advogado3", "n": 100, "a": "legislacao", "t": "O edital da licitação poderá estabelecer que a fase de  julgamento só será concluída após a homologação de amostras, o exame de conformidade ou a prova de conceito.", "c": "advogado3:13"}, {"p": "advogado3", "n": 101, "a": "legislacao", "t": "O Conselho poderá realizar licitação na modalidade de  pregão para o registro de preços, por grupo de itens, pelo critério de julgamento de menor preço, com prazo da ata de um ano, vedando a adesão de outros órgãos e de outras entidades. O regime jurídico dos contratos administrativos outorga à Administração Pública prerrogativas especiais na execução desses instrumentos, com fundamento na supremacia do", "c": "advogado3:13"}, {"p": "advogado3", "n": 102, "a": "portugues", "t": "A concordância do contratado é desnecessária para  que as cláusulas econômico‑financeiras dos contratos administrativos possam ser alteradas.", "c": "advogado3:14"}, {"p": "advogado3", "n": 103, "a": "direito", "t": "A Administração Pública não pode ser responsabilizada  pelos encargos previdenciários e trabalhistas inadimplidos pelos contratados.", "c": "advogado3:14"}, {"p": "advogado3", "n": 104, "a": "direito", "t": "Para compras, o contratado é obrigado a aceitar  supressões de até 25% do valor do contrato.", "c": "advogado3:14"}, {"p": "advogado3", "n": 105, "a": "direito", "t": "Apenas a Administração Pública tem direito à  extinção unilateral do contrato, não podendo o particular invocar direito à extinção sem antes cumprir integralmente as suas obrigações.", "c": "advogado3:14"}, {"p": "advogado3", "n": 106, "a": "direito", "t": "As estradas, as ruas e as praças são bens públicos de  uso especial.", "c": "advogado3:14"}, {"p": "advogado3", "n": 107, "a": "direito", "t": "A ocupação indevida de um bem público não  configura posse, mas, sim, uma mera detenção que, por sua natureza precária, não admite a retenção ou a indenização por benfeitorias.", "c": "advogado3:14"}, {"p": "advogado3", "n": 108, "a": "direito", "t": "Os bens das sociedades de economia mista  prestadoras de serviço público próprio do Estado e de natureza não concorrencial são impenhoráveis.", "c": "advogado3:14"}, {"p": "advogado3", "n": 109, "a": "direito", "t": "Independentemente da destinação do bem público,  tanto bens móveis quanto imóveis são imprescritíveis.", "c": "advogado3:14"}, {"p": "advogado3", "n": 110, "a": "direito", "t": "Os rios que banham mais de um estado são bens da  União, sendo classificados, portanto, como dominiais.  Advogado CONSELHO REGIONAL DE BIOMEDICINA DA 6ª REGIÃO Quadrix | 2026 8 Conforme Diniz (2003), o contrato nasce do mútuo consentimento, sofre as vicissitudes de sua carreira jurídica e termina normalmente com o cumprimento da prestação.", "c": "advogado3:14"}, {"p": "advogado3", "n": 111, "a": "direito", "t": "É possível a extinção do contrato por fatos anteriores  à celebração, como a nulidade que surge pela ilicitude, comum a ambas as partes, de seu motivo determinante, insuscetível de confirmação.", "c": "advogado3:14"}, {"p": "advogado3", "n": 112, "a": "direito", "t": "A finalidade econômico‑social do contrato permite  o indeferimento de pedido liminar de busca e apreensão, amparado na teoria do adimplemento substancial.", "c": "advogado3:14"}, {"p": "advogado3", "n": 113, "a": "direito", "t": "O contrato de compra e venda é translativo,  sendo, porém, anulável a venda de ascendente a descendente, exceto se o cônjuge do alienante consentir expressamente, independentemente do regime de bens. Segundo Barbosa Moreira (1974), o recurso judicial é o remédio idôneo a ensejar, dentro do mesmo processo, a reforma, a invalidação, o esclarecimento ou a integração da decisão judicial que se impugna. A partir dessa premissa,", "c": "advogado3:14"}, {"p": "advogado3", "n": 114, "a": "direito", "t": "O princípio do contraditório, da ampla defesa e  da efetividade do processo afastam a noção da taxatividade do rol recursal, assim como atraem a plena fungibilidade das espécies recursais.", "c": "advogado3:15"}, {"p": "advogado3", "n": 115, "a": "direito", "t": "O agravo de instrumento, no processo de trabalho,  tem a função de destrancar o recurso e será julgado pelo tribunal que seria competente para conhecer o recurso cuja interposição foi denegada.", "c": "advogado3:15"}, {"p": "advogado3", "n": 116, "a": "direito", "t": "Os embargos de declaração serão opostos contra  qualquer decisão judicial, no prazo de cinco dias, acompanhados de preparo, sob pena de deserção. O conceito de relação de trabalho é bastante amplo, já que pode abranger todo contrato, mesmo informal, em que há uma atividade humana, caracterizada como prestação de um serviço, em que há remuneração por outrem. Com base", "c": "advogado3:15"}, {"p": "advogado3", "n": 117, "a": "direito", "t": "Na relação de emprego, a assunção dos riscos pelo  empregador é plena (alteridade), não se admitindo nenhum tipo de desconto por dano causado pelo empregado.", "c": "advogado3:15"}, {"p": "advogado3", "n": 118, "a": "gerais", "t": "Compete à justiça do trabalho julgar os conflitos  entre a Administração Pública e os seus servidores estatutários.", "c": "advogado3:15"}, {"p": "advogado3", "n": 119, "a": "direito", "t": "A cláusula de não concorrência é inerente à relação  de emprego, e a sua violação pelo empregado pode ensejar demissão por justa causa.", "c": "advogado3:15"}, {"p": "advogado3", "n": 120, "a": "direito", "t": "O contrato de trabalho intermitente é incompatível  com a relação de emprego. RASCUNHO", "c": "advogado3:15"}, {"p": "advogado4", "n": 1, "a": "portugues", "t": "Quanto às características do texto, nele é empregada  uma linguagem de difícil acesso, que é ininteligível para quem não é da área médica.", "c": "advogado4:1"}, {"p": "advogado4", "n": 2, "a": "portugues", "t": "É predominante, no texto, a tipologia argumentativa,  ao se discutir e pormenorizar os vários conceitos de doença, nos tempos modernos.", "c": "advogado4:1"}, {"p": "advogado4", "n": 3, "a": "portugues", "t": "Segundo o texto, a medicina teria surgido da  necessidade humana de se afastar e curar, a partir de rituais e crenças mágicas, o sofrimento causado por enfermidades e por ferimentos.", "c": "advogado4:1"}, {"p": "advogado4", "n": 4, "a": "portugues", "t": "Depreende‑se do texto que a medicina, como a arte de  curar, era aplicada desde as civilizações mais antigas.", "c": "advogado4:1"}, {"p": "advogado4", "n": 5, "a": "portugues", "t": "Deduz‑se do texto que o termo medicina designa tanto  a arte de curar (prática médica) quanto a aplicação de terapia (na forma de rituais e mágicas para curar as doenças).", "c": "advogado4:1"}, {"p": "advogado4", "n": 6, "a": "portugues", "t": "De acordo com o texto, as doenças tinham uma  causa única, ou seja, eram ocorrências naturais, com dolorosas consequências, que poderiam ser aplacadas por curandeiros.", "c": "advogado4:1"}, {"p": "advogado4", "n": 7, "a": "direito", "t": "A partir da sentença “seria obra de algum inimigo,  dotado de poderes especiais ou mágicos, cuja animosidade haveria de ser combatida por meio de sortilégios”, no primeiro parágrafo, depreende‑se a referência a feiticeiro, bruxo ou mago. Prova aplicada  Advogado CONSELHO REGIONAL DE MEDICINA DE MATO GROSSO DO SUL Quadrix | 2025 2 Com referência ao texto e a seus aspectos linguísticos e", "c": "advogado4:1"}, {"p": "advogado4", "n": 8, "a": "portugues", "t": "Na linha 2, o termo “‑los”, em “curá‑los”, retoma o  termo antecedente “os doentes”, da mesma forma que, na linha 16, o termo “‑la” retoma “a alma”.", "c": "advogado4:1"}, {"p": "advogado4", "n": 9, "a": "portugues", "t": "Ao se falar de “ocorrência sobrenatural” (linha  3), citando‑se “os ventos, as tempestades ou as manifestações de deuses malévolos” como exemplos, considerava‑se que, à época, os fenômenos meteorológicos ou atmosféricos eram tidos como não naturais.", "c": "advogado4:1"}, {"p": "advogado4", "n": 10, "a": "portugues", "t": "A expressão “tal como” (linha 3) poderia, sem prejuízo  gramatical, ser flexionada no plural – tais como –, caso em que passaria a se referir aos elementos da enumeração posterior.", "c": "advogado4:1"}, {"p": "advogado4", "n": 11, "a": "portugues", "t": "No primeiro parágrafo do texto, anteriormente à  forma verbal “encarasse” (linha 2), está elíptica a expressão “medicina”.", "c": "advogado4:1"}, {"p": "advogado4", "n": 12, "a": "portugues", "t": "A expressão “com suas dolorosas  consequências” (linhas 3 e 4) poderia ser suprimida da oração, sem que isso provocasse prejuízo gramatical ou falta de clareza no texto.", "c": "advogado4:1"}, {"p": "advogado4", "n": 13, "a": "portugues", "t": "O termo “sortilégios” (linha 5) poderia ser substituído  por sacrilégios, sem prejuízo gramatical ou aos sentidos do texto.", "c": "advogado4:1"}, {"p": "advogado4", "n": 14, "a": "portugues", "t": "No segundo parágrafo do texto, são enumeradas  explicitamente três explicações para a ocorrência de doenças, as quais estão descritas nos próximos parágrafos do texto.", "c": "advogado4:1"}, {"p": "advogado4", "n": 15, "a": "portugues", "t": "No segundo parágrafo do texto, o vocábulo “ora”, em  todas as suas ocorrências, foi empregado para unir duas ou mais orações, e expressa alternância.", "c": "advogado4:1"}, {"p": "advogado4", "n": 16, "a": "portugues", "t": "Os vocábulos “possível”, “projéteis” e “psicológicos”  apresentam acento gráfico em razão da mesma regra de acentuação.", "c": "advogado4:1"}, {"p": "advogado4", "n": 17, "a": "direito", "t": "Na linha 9, o emprego de acento gráfico no termo “à”,  em “se devia à ação de projéteis”, decorre da regência da forma verbal “dever‑se”, que é acompanhada do vocábulo “a”, em presença de artigo feminino “a” que define “ação de projéteis”.", "c": "advogado4:1"}, {"p": "advogado4", "n": 18, "a": "portugues", "t": "O período “Povos primitivos entendiam a doença  como algo que se devia à ação de projéteis: lanças, flechas, pedras atiradas por inimigos ou, talvez, ossos e espinhos que alguém engolia sem querer, em virtude da ação de forças adversas, humanas ou sobre‑humanas.” (linhas de 9 a 11) poderia ser reescrito, sem prejuízo para a correção gramatical e para os sentidos originais do texto, da seguinte forma: As populações antigas acreditavam que a doença existia por força da ação de projetis como lanças, flechas, pedras atiradas por inimigos, ou mesmo, ossos e espinhos que alguém sem querer engoliu, graças a ação de forças diversas, humana ou sobre‑humana.", "c": "advogado4:1"}, {"p": "advogado4", "n": 19, "a": "portugues", "t": "No quinto parágrafo, o termo “Quando” permite situar  no tempo a ação expressa na oração principal.", "c": "advogado4:1"}, {"p": "advogado4", "n": 20, "a": "portugues", "t": "No último parágrafo do texto, as duas ocorrências  do elemento “que” empregado nas duas orações apresentam a mesma função sintática.", "c": "advogado4:1"}, {"p": "advogado4", "n": 21, "a": "matematica", "t": "A probabilidade de Betina pisar em um número par,  após escolher aleatoriamente uma das três pistas, é igual a 48%.", "c": "advogado4:x20"}, {"p": "advogado4", "n": 22, "a": "matematica", "t": "Se Betina escolher a pista que vai de 1 a 10, a  probabilidade de ela pisar em um número primo será igual a 40%.", "c": "advogado4:x20"}, {"p": "advogado4", "n": 23, "a": "matematica", "t": "A probabilidade de Betina escolher a terceira pista  e, em seguida, pisar em um número ímpar é menor que 20%.", "c": "advogado4:x20"}, {"p": "advogado4", "n": 24, "a": "matematica", "t": "Sabendo‑se que Betina pisou no número 8, a  probabilidade de isso ter ocorrido na segunda pista é igual a 1 2 .", "c": "advogado4:x20"}, {"p": "advogado4", "n": 25, "a": "matematica", "t": "A velocidade média de Gael no percurso de 200  metros foi maior que no percurso de 500 metros.", "c": "advogado4:x24"}, {"p": "advogado4", "n": 26, "a": "matematica", "t": "Se Gael mantivesse a mesma velocidade média  dos 200 metros no percurso de 1.000 metros, ele completaria esse trajeto em exatamente 3 minutos e 20 segundos.", "c": "advogado4:x24"}, {"p": "advogado4", "n": 27, "a": "matematica", "t": "Para percorrer os 200 metros no mesmo ritmo  com que percorre os 1.000 metros, Gael levaria 45 segundos. Sabendo‑se que as proposições “Ana é alagoana se, e somente se, Beatriz é baiana” e “Cecília é curitibana e", "c": "advogado4:x24"}, {"p": "advogado4", "n": 29, "a": "matematica", "t": "A proposição “Cecília é curitibana e Beatriz não é  baiana” é a negação da condicional “Se Cecília é curitibana, então Beatriz é baiana”.", "c": "advogado4:4"}, {"p": "advogado4", "n": 30, "a": "informatica", "t": "A proposição “Se Beatriz é baiana, então Déborah é  douradense” é verdadeira, independentemente de Déborah ser ou não douradense. Prova aplicada  Advogado CONSELHO REGIONAL DE MEDICINA DE MATO GROSSO DO SUL Quadrix | 2025 3 Quanto aos conceitos de hardware, ao Microsoft Teams", "c": "advogado4:4"}, {"p": "advogado4", "n": 31, "a": "informatica", "t": "A placa‑mãe, em um computador, tem como função  conectar e permitir a comunicação entre os principais componentes do computador, como o processador, a memória RAM e os dispositivos de armazenamento.", "c": "advogado4:5"}, {"p": "advogado4", "n": 32, "a": "informatica", "t": "No computador, a principal função de uma placa  de rede é melhorar o desempenho gráfico do computador, processando imagens e vídeos em alta resolução.", "c": "advogado4:5"}, {"p": "advogado4", "n": 33, "a": "informatica", "t": "No Microsoft Teams, cada canal é dedicado  a um tópico, a exemplo do departamento ou projeto específico.", "c": "advogado4:5"}, {"p": "advogado4", "n": 34, "a": "informatica", "t": "Por padrão, as conversas do canal no Microsoft Teams  são privadas e limitadas a duas pessoas, ou seja, apenas os dois envolvidos na comunicação possuem conhecimento do teor delas.", "c": "advogado4:5"}, {"p": "advogado4", "n": 35, "a": "informatica", "t": "A PAN é um conjunto de redes interconectadas que  compartilham recursos e informações entre diferentes empresas e instituições ao redor do mundo. Em relação ao programa de navegação Google Chrome, em sua versão mais recente, às noções de vírus, worms e pragas virtuais e aos aplicativos para segurança da informação,", "c": "advogado4:5"}, {"p": "advogado4", "n": 36, "a": "informatica", "t": "Por questões de segurança, o Google Chrome não  permite que o usuário faça download de arquivos executáveis a partir do navegador, por exemplo, .exe e .bat.", "c": "advogado4:5"}, {"p": "advogado4", "n": 37, "a": "informatica", "t": "Uma das formas de compartilhar páginas no Google  Chrome com as pessoas usando outros aplicativos é por meio de um QR code.", "c": "advogado4:5"}, {"p": "advogado4", "n": 38, "a": "informatica", "t": "O adware é um malware que faz publicidade forçada,  ou seja, ele insere anúncios indesejados e redireciona páginas da web para sites patrocinados.", "c": "advogado4:5"}, {"p": "advogado4", "n": 39, "a": "informatica", "t": "A principal característica de um ransomware é  sobrecarregar servidores de DNS, tornando‑os inacessíveis.", "c": "advogado4:5"}, {"p": "advogado4", "n": 40, "a": "informatica", "t": "O firewall monitora o tráfego de rede e permite  ou bloqueia a comunicação com base em regras predefinidas de segurança. Nos itens que avaliem conhecimentos de informática, a menos que seja explicitamente informado o contrário, considere que: todos os programas mencionados estejam em configuração‑padrão, em português; o mouse esteja configurado para pessoas destras; expressões como clicar, clique simples e clique duplo refiram‑se a cliques com o botão esquerdo do mouse; e teclar corresponda à operação de pressionar uma tecla e, rapidamente, liberá‑la, acionando‑a apenas uma vez.", "c": "advogado4:5"}, {"p": "advogado4", "n": 41, "a": "legislacao", "t": "Como regra, a publicidade dos atos da Administração  Pública é requisito fundamental dos atos administrativos, constituindo‑se como dever do servidor e requisito de eficácia e moralidade, sendo que sua omissão compromete o bem comum, imputável a quem a negar.", "c": "advogado4:6"}, {"p": "advogado4", "n": 42, "a": "direito", "t": "O servidor público deve se atentar a evitar danos  aos usuários de serviços públicos, inclusive o dano moral, pondo fim ou procurando, prioritariamente, resolver situações procrastinatórias, principalmente diante de filas ou de qualquer outra espécie de atraso na prestação dos serviços pelo setor em que exerça suas atribuições.", "c": "advogado4:6"}, {"p": "advogado4", "n": 43, "a": "legislacao", "t": "Em atenção às regras éticas e seu dever de integridade,  o servidor público, no exercício de sua função, não poderá, em hipótese alguma, retirar do setor qualquer documento, livro ou bem pertencente ao patrimônio público. A improbidade administrativa, regulamentada pela Lei nº 8.429/1992, refere‑se aos atos praticados por agentes públicos que violam os princípios da Administração Pública, causando dano ao erário ou proporcionando", "c": "advogado4:6"}, {"p": "advogado4", "n": 44, "a": "legislacao", "t": "Uma importante regra no sistema nacional de sanções  contra a prática de atos de improbidade administrativa está na desnecessidade de comprovação de ato doloso, admitindo‑se a responsabilidade por negligência, imprudência ou imperícia.", "c": "advogado4:7"}, {"p": "advogado4", "n": 45, "a": "legislacao", "t": "O objetivo do sistema de responsabilização por atos  de improbidade administrativa é também evitar que se promovam, indevidamente, o enaltecimento do agente público e a personalização de atos, de programas, de obras, de serviços ou de campanhas dos órgãos públicos.", "c": "advogado4:7"}, {"p": "advogado4", "n": 46, "a": "legislacao", "t": "Entre as sanções previstas na Lei nº 8.429/1992,  estão a perda dos bens ou valores acrescidos ilicitamente ao patrimônio, a perda da função pública, a suspensão dos direitos políticos por até 14 anos e as penas restritivas de liberdade, como a detenção e a prisão simples.", "c": "advogado4:7"}, {"p": "advogado4", "n": 47, "a": "legislacao", "t": "Entre as medidas cautelares previstas para a ação de  improbidade administrativa, está a possibilidade de ser formulado, em caráter antecedente ou incidente, pedido de indisponibilidade de bens dos réus, a fim de garantir a integral recomposição do erário, não se admitindo, porém, seu deferimento, sem oitiva prévia do réu. A Lei nº 9.784/1999, estabelece normas básicas para o processo administrativo federal. Surgida no contexto de modernização da Administração Pública, tem por principal objetivo proteger os direitos dos administrados, além de melhorar a eficiência administrativa. Considerando", "c": "advogado4:7"}, {"p": "advogado4", "n": 48, "a": "direito", "t": "Como regra, o administrado deve atuar pessoalmente  no processo administrativo e em interesse próprio. No entanto, o administrado tem o direito de fazer‑se assistir, facultativamente, por advogado, salvo quando obrigatória a representação, por força de Lei.", "c": "advogado4:8"}, {"p": "advogado4", "n": 49, "a": "direito", "t": "A Lei nº 9.784/1999, que regula o processo  administrativo no âmbito da Administração Pública Federal, não se aplica aos procedimentos perante os tribunais de contas, sendo afastada, integralmente, pelo caráter jurisdicional de seus julgamentos.", "c": "advogado4:8"}, {"p": "advogado4", "n": 50, "a": "legislacao", "t": "Em relação aos prazos processuais da  Lei nº 9.784/1999, estes só poderão ser suspensos por motivo de força maior, que seja devidamente comprovado. Considerando a Lei nº 12.527/2011 – Lei de Acesso à Informação (LAI) – e os procedimentos a serem observados por União, estados, Distrito Federal e municípios, com o fim de garantir o acesso a informações previsto na Constituição", "c": "advogado4:8"}, {"p": "advogado4", "n": 51, "a": "legislacao", "t": "A LAI aplica‑se, indistintamente, aos órgãos públicos  integrantes da Administração Direta dos Poderes Executivo, Legislativo – incluindo as Cortes de Contas, do Judiciário e do Ministério Público, bem como às autarquias, às fundações públicas, às empresas públicas e sociedades de economia mista, assim como em relação às demais entidades controladas direta ou indiretamente por União, estados, Distrito Federal e municípios.", "c": "advogado4:8"}, {"p": "advogado4", "n": 52, "a": "legislacao", "t": "A LAI estabelece um sistema de sanções por sua  violação, sendo que a pessoa física ou a entidade privada que detiver informações em virtude de vínculo de qualquer natureza com o Poder Público e deixar de observá‑la estará sujeita às penas que começam com a advertência e chegam, no máximo, à aplicação de multas. Em relação ao conteúdo da Lei Geral de Proteção de Dados", "c": "advogado4:8"}, {"p": "advogado4", "n": 53, "a": "legislacao", "t": "De modo a evitar a violação ao direito à informação,  o Tribunal de Contas da União possui amplo entendimento de que, para a eventual retirada de informações publicadas em transparência ativa, em especial aquelas de maior relevância e interesse público, deve haver justificativa com fundamentação específica e adequada para a prática desse ato, não se admitindo a retirada com invocação de princípios gerais da LGPD. Prova aplicada  Advogado CONSELHO REGIONAL DE MEDICINA DE MATO GROSSO DO SUL Quadrix | 2025 5", "c": "advogado4:8"}, {"p": "advogado4", "n": 54, "a": "legislacao", "t": "A LGPD determina que os dados de saúde devem ser  tratados de maneira a garantir sua confidencialidade, segurança e integridade, exigindo‑se a adoção de medidas técnicas e administrativas apropriadas para proteger esses dados contra acessos não autorizados e usos indevidos, sendo considerado dado pessoal sensível o referente à saúde ou à vida sexual, dado genético ou biométrico, quando vinculado a uma pessoa natural.", "c": "advogado4:8"}, {"p": "advogado4", "n": 55, "a": "legislacao", "t": "A fim de assegurar a efetiva indenização ao titular  dos dados, em caso de violação aos deveres estabelecidos pela LGPD, o operador de dados responderá subsidiariamente pelos danos causados pelo tratamento, quando descumprir as obrigações da legislação de proteção de dados ou quando não tiver seguido as instruções lícitas dadas pelo controlador. No que diz respeito às medidas tomadas pelo atual", "c": "advogado4:8"}, {"p": "advogado4", "n": 56, "a": "legislacao", "t": "Em relação aos imigrantes, o presidente  norte‑americano Donald Trump assinou ordens executivas que deram ao Serviço de Imigração e Alfândega dos EUA a possibilidade do procedimento de deportação rápida.", "c": "advogado4:8"}, {"p": "advogado4", "n": 57, "a": "gerais", "t": "O número de brasileiros deportados no primeiro ano  do governo Trump foi maior que o das remoções de brasileiros dos Estados Unidos da América (EUA) na última década.", "c": "advogado4:8"}, {"p": "advogado4", "n": 58, "a": "legislacao", "t": "No contexto político atual, o refugiado é tratado  como estorvo, pois possui status de um imigrante socioeconômico com mão de obra desqualificada que não gera nenhum tipo de atrativo na divisão internacional do trabalho.", "c": "advogado4:8"}, {"p": "advogado4", "n": 59, "a": "legislacao", "t": "Uma compensação econômica fez o governo de El  Salvador receber mais de duas centenas de imigrantes deportados dos EUA.", "c": "advogado4:8"}, {"p": "advogado4", "n": 60, "a": "direito", "t": "Para executar deportações dos migrantes, o atual  governo dos EUA usou uma lei promulgada mais de dois séculos atrás, que nunca havia sido utilizada, a chamada Lei de Inimigos Estrangeiros.", "c": "advogado4:8"}, {"p": "advogado4", "n": 61, "a": "legislacao", "t": "Na escala de nações, a maior população de migrantes  do mundo encontra‑se nos EUA.", "c": "advogado4:8"}, {"p": "advogado4", "n": 62, "a": "gerais", "t": "No Brasil, a emigração é muito pouco significativa,  uma vez que, nos anos pós‑pandemia, a saída de brasileiros para outros países não passou de algumas centenas de pessoas.", "c": "advogado4:8"}, {"p": "advogado4", "n": 63, "a": "legislacao", "t": "Atualmente, o maior quantitativo de imigrantes  registrados no Brasil responde pelos venezuelanos.", "c": "advogado4:8"}, {"p": "advogado4", "n": 64, "a": "legislacao", "t": "Uma das medidas do governo Trump foi efetivar,  de imediato, a retirada dos EUA do Acordo de Paris, um tratado internacional que visa reduzir as emissões de gases do efeito estufa e combater as mudanças climáticas.", "c": "advogado4:8"}, {"p": "advogado4", "n": 65, "a": "legislacao", "t": "O presidente Donald Trump concedeu indulto a  mais de 1.000 condenados pelo ataque ao Capitólio, evento que tentou impedir a juramentação do então presidente eleito Joe Biden. No que concerne a eventos econômicos e ambientais que", "c": "advogado4:8"}, {"p": "advogado4", "n": 66, "a": "gerais", "t": "A tentativa de combater a inflação de comestíveis  fez o governo federal brasileiro zerar o imposto de importação de alguns alimentos.", "c": "advogado4:8"}, {"p": "advogado4", "n": 67, "a": "gerais", "t": "Apesar de ser composto de um grupo de países que  se destaca por reuniões voltadas para os processos econômicos, o Brics não deixou de discutir o assunto sobre a guerra entre a Rússia e a Ucrânia.", "c": "advogado4:8"}, {"p": "advogado4", "n": 68, "a": "legislacao", "t": "Uma das medidas do atual governo dos EUA que afeta  o Brasil é o aumento da tarifa sobre a importação do aço.", "c": "advogado4:8"}, {"p": "advogado4", "n": 69, "a": "legislacao", "t": "O Brasil foi ameaçado de não sediar a Conferência das  Nações Unidas sobre as Mudanças Climáticas (COP 30), por ter executado perfuração de petróleo na foz do rio Amazonas.", "c": "advogado4:8"}, {"p": "advogado4", "n": 70, "a": "gerais", "t": "Eventos atmosféricos, como as chuvas torrenciais  que causaram a enchente em Porto Alegre e as tempestades de ventos fortes em São Paulo, são certificações do aquecimento global fornecidas de forma singular e uníssona pelos especialistas do painel intergovernamental sobre mudanças climáticas (IPCC). RASCUNHO Prova aplicada  Advogado CONSELHO REGIONAL DE MEDICINA DE MATO GROSSO DO SUL Quadrix | 2025 6", "c": "advogado4:8"}, {"p": "advogado4", "n": 71, "a": "direito", "t": "São elementos do Estado brasileiro a indissolubilidade  da Federação e o estado democrático de direito, não se admitindo a secessão, embora a intervenção, em situações bem definidas pelo texto constitucional, seja possível.", "c": "advogado4:9"}, {"p": "advogado4", "n": 72, "a": "direito", "t": "No momento da promulgação da Constituição Federal  de 1988, a convicção na forma de Estado Republicana era relativa, já que foi previsto que o eleitorado definiria, em data certa, por meio de plebiscito, a forma (república ou monarquia constitucional) e o sistema de governo (parlamentarismo ou presidencialismo) que deveriam vigorar no País.", "c": "advogado4:9"}, {"p": "advogado4", "n": 73, "a": "direito", "t": "Considerando o recente avanço das competências do  Congresso Nacional em relação ao orçamento, em especial, pelas emendas parlamentares impositivas e a já tradicional atribuição do Congresso de sustar atos normativos do Poder Executivo, além de aprovar nomeação de diversas autoridades, considera‑se que o sistema de governo estabelecido mais recentemente pelo texto constitucional é o semipresidencialismo. A segurança jurídica é um elemento central do estado de direito. Do princípio da segurança jurídica derivam a questão da retroatividade das leis, validez dos atos jurídicos, autossujeição da Administração Pública aos requisitos da publicidade e da coisa julgada, assegurando‑se, assim, a função estabilizadora do Estado de Direito. Peter Häberle. Estado constitucional (com adaptações).", "c": "advogado4:9"}, {"p": "advogado4", "n": 74, "a": "direito", "t": "O status constitucional do princípio da segurança  jurídica é imprescindível ao estado democrático de direito e, portanto, não pode ceder diante da alegação de que ofende a moralidade pública e da razoabilidade, como se seu regime tivesse natureza meramente infraconstitucional.", "c": "advogado4:10"}, {"p": "advogado4", "n": 75, "a": "direito", "t": "A jurisprudência do Supremo Tribunal Federal  estabelece que não há direito adquirido frente a regime jurídico de servidor público, mas ressalva que o direito à aposentadoria se adquire e se introduz no patrimônio jurídico do interessado no momento em que este ingressa no serviço público. Em relação ao tema de regime jurídico aplicável a servidores públicos e militares, em especial, das regras constitucionais", "c": "advogado4:10"}, {"p": "advogado4", "n": 76, "a": "direito", "t": "Os policiais e os bombeiros militares dos estados e  do Distrito Federal podem acumular a função militar com cargos públicos nas áreas de saúde e educação, quando houver compatibilidade de horários e com prevalência da atividade militar.", "c": "advogado4:10"}, {"p": "advogado4", "n": 77, "a": "gerais", "t": "A Câmara dos Deputados compõe‑se de  representantes do povo, eleitos, pelo sistema majoritário, em cada estado, em cada território e no Distrito Federal, sendo que o número total de deputados, estabelecido por lei complementar, deve ser proporcional à população, procedendo‑se aos ajustes necessários, no ano anterior às eleições, para que nenhuma daquelas unidades da Federação tenha menos de 8 ou mais de 70 deputados.", "c": "advogado4:11"}, {"p": "advogado4", "n": 78, "a": "direito", "t": "O texto constitucional assegura estabilidade do  governo ao estabelecer que, em caso de impedimento do presidente e do vice‑presidente, ou em caso de vacância dos respectivos cargos, serão sucessivamente chamados ao exercício da presidência o presidente do Congresso Nacional e, na sua falta, os demais membros da mesa diretora do Senado Federal.", "c": "advogado4:11"}, {"p": "advogado4", "n": 79, "a": "direito", "t": "O Conselho Nacional da Justiça é competente para  apreciar, inclusive de ofício, a legalidade dos atos praticados por membros ou por órgãos do Poder Judiciário, quando se referem às infrações típicas segundo as normas da Lei Orgânica da Magistratura Nacional, bem como rever os respectivos processos disciplinares, podendo aplicar pena mais gravosa do que a imposta pelos Tribunais.", "c": "advogado4:11"}, {"p": "advogado4", "n": 80, "a": "direito", "t": "A reforma tributária propôs‑se a aperfeiçoar o  Sistema Tributário Nacional, determinando que este deverá ser calcado nos princípios da simplicidade, da transparência, da justiça tributária, da cooperação e da defesa do meio ambiente. Além disso, a Emenda Constitucional nº 132/2023 determinou que as alterações na legislação tributária buscarão atenuar os efeitos regressivos da tributação. Considerando a organização objetiva e subjetiva da", "c": "advogado4:12"}, {"p": "advogado4", "n": 81, "a": "direito", "t": "As autarquias são pessoas jurídicas de direito público  que desenvolvem atividades administrativas típicas de Estado e, por isso, gozam de liberdade administrativa nos limites estabelecidos na legislação, em especial, na que determina a criação de cada uma delas, desfrutando de personalidade jurídica própria e autonomia técnica, administrativa e financeira.", "c": "advogado4:12"}, {"p": "advogado4", "n": 82, "a": "direito", "t": "No que concerne ao regime jurídico das autarquias  profissionais, é firme o entendimento jurisprudencial no sentido de que os conselhos de fiscalização profissional têm natureza de autarquia federal, sendo assegurada a ampla autonomia técnica, administrativa e financeira, em especial, para a cobrança de suas anuidades, que não se constituem tributo. Prova aplicada  Advogado CONSELHO REGIONAL DE MEDICINA DE MATO GROSSO DO SUL Quadrix | 2025 7", "c": "advogado4:12"}, {"p": "advogado4", "n": 83, "a": "direito", "t": "Devido à natureza jurídica dos conselhos de  fiscalização profissional e à gestão de recursos públicos que eles efetuam, o tribunal de contas controla suas atividades, estando eles sujeitos às regras de contabilidade pública.", "c": "advogado4:12"}, {"p": "advogado4", "n": 84, "a": "direito", "t": "O ordenamento jurídico admite duas espécies de  empresa pública e de sociedade de economia mista, levando em consideração a finalidade por elas exercida, admitindo‑se tanto a prestação de serviço público quanto a exploração de atividade econômica.", "c": "advogado4:12"}, {"p": "advogado4", "n": 85, "a": "direito", "t": "Em relação aos critérios para a nomeação de diretores  de agências reguladoras, a legislação estabelece que poderão ser indicados para o conselho diretor, ou para a diretoria colegiada, ministro de estado, secretário de estado, secretário municipal, dirigente estatutário de partido político e titular de mandato no Poder Legislativo de qualquer ente da federação, desde que licenciados dos respectivos cargos.", "c": "advogado4:12"}, {"p": "advogado4", "n": 86, "a": "legislacao", "t": "De acordo com o que estabelece a Lei nº 14.133/2021,  admite‑se a contratação direta de bens e serviços, atendidos os requisitos legais.", "c": "advogado4:13"}, {"p": "advogado4", "n": 88, "a": "legislacao", "t": "O pregoeiro deverá inabilitar a empresa licitante  por insuficiência de índices econômico‑financeiros e retornar à fase de preços do pregão, realizando nova rodada de lances com as demais empresas licitantes.", "c": "advogado4:13"}, {"p": "advogado4", "n": 89, "a": "direito", "t": "Da decisão do pregoeiro que inabilitou a empresa  caberá recurso administrativo, devendo, porém, a licitante manifestar a intenção de recorrer, sob pena de preclusão, sendo que o prazo para apresentação das razões recursais será iniciado na data de intimação ou de lavratura da ata de habilitação ou inabilitação.", "c": "advogado4:13"}, {"p": "advogado4", "n": 90, "a": "direito", "t": "O administrador está vinculado aos motivos postos  como fundamento para a prática do ato administrativo, seja vinculado seja discricionário, configurando vício de legalidade, justificando até mesmo o controle do Poder Judiciário, se forem inexistentes ou inverídicos, bem como se faltar adequação lógica entre as razões expostas e o resultado alcançado. No que se refere ao tema de capacidade civil e de", "c": "advogado4:13"}, {"p": "advogado4", "n": 91, "a": "direito", "t": "O direito à identidade é um direito de personalidade  de caráter inato, sendo base de outros direitos referentes à família e à cidadania.", "c": "advogado4:14"}, {"p": "advogado4", "n": 92, "a": "direito", "t": "De acordo com o Código Civil brasileiro, são incapazes,  relativamente a certos atos ou à maneira de os exercer, os maiores de 16 e menores de 18 anos de idade, os ébrios habituais e os viciados em tóxico, os pródigos e aqueles que, por causa transitória ou permanente, não puderem exprimir sua vontade, pois o elemento do discernimento suficiente é fundamental para o exercício pleno da capacidade civil.", "c": "advogado4:14"}, {"p": "advogado4", "n": 93, "a": "direito", "t": "A jurisprudência considera ineficaz a procuração  outorgada em face de analfabetismo, já que essa condição lhe retira a capacidade para os atos da vida civil. De acordo com a legislação brasileira, as pessoas jurídicas são entidades dotadas de personalidade jurídica, ou seja, são sujeitos de direitos e obrigações distintos das pessoas físicas que as compõem. Com base nessa informação,", "c": "advogado4:14"}, {"p": "advogado4", "n": 94, "a": "direito", "t": "Os partidos políticos são organizados e funcionam  conforme o disposto no Código Civil e são equiparados pela lei às fundações.", "c": "advogado4:14"}, {"p": "advogado4", "n": 95, "a": "direito", "t": "A lei assegura a autonomia patrimonial das pessoas  jurídicas como instrumento lícito de alocação e segregação de riscos. Isso não quer dizer, porém, que, em caso de abuso desse direito, a Administração Pública não possa desconsiderar a personalidade jurídica para que os efeitos de certas e determinadas relações de obrigações sejam estendidos aos bens particulares de administradores ou de sócios da pessoa jurídica beneficiados direta ou indiretamente pelo abuso. Prova aplicada  Advogado CONSELHO REGIONAL DE MEDICINA DE MATO GROSSO DO SUL Quadrix | 2025 8 Uma obrigação jurídica é um vínculo pelo qual uma pessoa (o devedor) fica adstrita a dar, fazer ou não fazer algo em favor de outra pessoa, denominada credor dessa", "c": "advogado4:14"}, {"p": "advogado4", "n": 96, "a": "direito", "t": "A jurisprudência do STJ considera que o  inadimplemento da obrigação tributária pela sociedade não gera, por si só, a responsabilidade solidária do sócio‑gerente.", "c": "advogado4:15"}, {"p": "advogado4", "n": 97, "a": "direito", "t": "Não é lícito ao credor renunciar à solidariedade em  favor de um ou de alguns dos devedores. Isso quer dizer que, se o credor exonerar da solidariedade um ou mais devedores, ela estender‑se‑á a todos os demais devedores.", "c": "advogado4:15"}, {"p": "advogado4", "n": 98, "a": "direito", "t": "À luz do Código Civil, em qualquer das modalidades de  contratos de seguros, a apólice ou o bilhete de seguro poderão ser nominativos, à ordem ou ao portador, mencionando‑se os riscos assumidos, o início e o fim de sua validade, o limite da garantia e o prêmio devido e, quando for o caso, o nome do segurado e o do beneficiário. No que concerne às regras de direito sucessório", "c": "advogado4:15"}, {"p": "advogado4", "n": 99, "a": "direito", "t": "A capacidade para adquirir por testamento pressupõe  a existência do herdeiro, ou legatário, à época da morte do testador. Isso quer dizer que, tendo falecido antes o herdeiro, a cédula testamentária perderá sua validade.", "c": "advogado4:16"}, {"p": "advogado4", "n": 100, "a": "direito", "t": "É possível que haja a deserdação tanto dos  descendentes por seus ascendentes, quanto de ascendentes pelos descendentes, sendo que o direito de provar a deserdação extingue‑se no prazo geral do Código Civil, a saber, em dez anos, a contar da data da abertura do testamento. Conforme as regras processuais aplicáveis ao procedimento", "c": "advogado4:16"}, {"p": "advogado4", "n": 101, "a": "direito", "t": "Na sessão de julgamento de recurso em mandado  de segurança perante tribunal, depois da exposição da causa pelo relator, não se admite sustentação oral, exceto ao representante do membro do Ministério Público, já que o Parquet atua no MS como custos legis. Acerca dos princípios e regras que regem o processo civil", "c": "advogado4:17"}, {"p": "advogado4", "n": 102, "a": "direito", "t": "Ainda que o Código de Processo Civil estabeleça  o dever de cooperação entre todos os sujeitos do processo, o juiz não pode auxiliar o autor na busca de endereços para a citação do réu, já que a citação é ônus da parte que inicia o processo.", "c": "advogado4:17"}, {"p": "advogado4", "n": 103, "a": "gerais", "t": "A conciliação, a mediação e outros métodos de solução  consensual de conflitos deverão ser estimulados por juízes, advogados, defensores públicos e membros do Ministério Público, inclusive no curso do processo judicial.", "c": "advogado4:17"}, {"p": "advogado4", "n": 104, "a": "direito", "t": "A Defensoria Pública tem por munus a orientação  jurídica, a promoção dos direitos humanos e a defesa dos direitos individuais e coletivos dos necessitados. No entanto, a atuação no processo civil é equiparada à da advocacia privada, não se admitindo qualquer privilégio processual, em atenção ao princípio de paridade de armas. No que diz respeito às execuções fiscais regidas pela Lei nº 6.830/1980 e às regras infraconstitucionais tributárias,", "c": "advogado4:x103"}, {"p": "advogado4", "n": 105, "a": "direito", "t": "Considerando o dever de proteção aos contribuintes,  expressos na Lei nº 6.830/1980 e no novo paradigma de equidade no processo de execução fiscal, apresentado pela reforma tributária (Emenda Constitucional nº 132/2024) admite‑se que os embargos do executado sejam conhecidos, processados e julgados independentemente de que seja apresentada garantia à execução.", "c": "advogado4:x103"}, {"p": "advogado4", "n": 106, "a": "direito", "t": "A prescrição é hipótese de extinção do crédito  tributário, sendo que a ação para a cobrança do crédito tributário prescreve em cinco anos, contados da data de sua constituição definitiva. Em relação às regras materiais expressas na Consolidação das Leis do Trabalho (CLT) e em sua interpretação pela", "c": "advogado4:x103"}, {"p": "advogado4", "n": 107, "a": "direito", "t": "A responsabilidade dos entes integrantes da  Administração Pública em relação ao adimplemento das obrigações trabalhistas assumidas pela empresa regularmente contratada configura‑se caso evidenciada sua conduta culposa no cumprimento das suas obrigações de fiscalização de contrato administrativo, especialmente no cumprimento das obrigações contratuais e legais da prestadora de serviço como empregadora.", "c": "advogado4:x103"}, {"p": "advogado4", "n": 108, "a": "gerais", "t": "A pandemia da covid‑19 evidenciou a problemática  do controle e da supervisão do trabalho na relação de emprego quando este é realizado a distância ou mesmo no domicílio do empregado. A legislação brasileira, porém, modernizou‑se para equiparar os meios telemáticos e informatizados de comando, controle e supervisão para fins de subordinação jurídica aos meios pessoais e diretos. Prova aplicada  Advogado CONSELHO REGIONAL DE MEDICINA DE MATO GROSSO DO SUL Quadrix | 2025 9 O recurso de revista é um recurso específico do processo trabalhista, previsto na CLT e dirigido ao Tribunal Superior do Trabalho (TST) com a finalidade de uniformizar a jurisprudência trabalhista em âmbito nacional. A partir", "c": "advogado4:17"}, {"p": "advogado4", "n": 109, "a": "direito", "t": "Das decisões proferidas pelos tribunais regionais  do trabalho ou por suas turmas, em execução de sentença caberá recurso de revista, mas somente na hipótese de ofensa direta e literal de norma da Constituição Federal de 1988.", "c": "advogado4:18"}, {"p": "advogado4", "n": 110, "a": "direito", "t": "O direito a acessar a justiça do trabalho é amplo  e admite, até mesmo, que os empregados e os empregadores possam reclamar pessoalmente perante a justiça do trabalho, sem a necessidade de advogado. No entanto, o TST restringe o jus postulandi às varas do trabalho, não se admitindo a interposição de recursos trabalhistas sem a subscrição de advogado.", "c": "advogado4:18"}, {"p": "advogado4", "n": 111, "a": "direito", "t": "É permitida a divulgação de especialidade médica  sem registro de RQE no Conselho Regional de Medicina (CRM).", "c": "advogado4:19"}, {"p": "advogado4", "n": 112, "a": "direito", "t": "O processo ético‑profissional garante ao médico o  direito ao contraditório e à ampla defesa.", "c": "advogado4:19"}, {"p": "advogado4", "n": 113, "a": "direito", "t": "A publicidade médica pode incluir depoimentos de  pacientes satisfeitos com seus resultados.", "c": "advogado4:19"}, {"p": "advogado4", "n": 114, "a": "direito", "t": "A Constituição Federal de 1988 atribui ao Sistema  Único de Saúde (SUS) a responsabilidade pela execução das ações de vigilância sanitária e epidemiológica.", "c": "advogado4:19"}, {"p": "advogado4", "n": 115, "a": "direito", "t": "A competência do departamento de fiscalização  dos CRMs inclui a verificação da regularidade da atividade médica.", "c": "advogado4:19"}, {"p": "advogado4", "n": 116, "a": "direito", "t": "O departamento de fiscalização dos CRMs pode  arquivar denúncias contra médicos.", "c": "advogado4:19"}, {"p": "advogado4", "n": 117, "a": "direito", "t": "A Constituição Federal de 1988 prevê a participação  da comunidade na formulação das políticas de saúde.", "c": "advogado4:19"}, {"p": "advogado4", "n": 118, "a": "direito", "t": "É permitido ao médico prometer resultado  garantido, desde que a técnica esteja respaldada por evidências científicas.", "c": "advogado4:19"}, {"p": "advogado4", "n": 119, "a": "direito", "t": "A sindicância constitui etapa pré‑processual  obrigatória para a apuração de indícios de infração ética.", "c": "advogado4:19"}, {"p": "advogado4", "n": 120, "a": "direito", "t": "O médico pode responder a processo ético mesmo  após ter deixado de exercer a profissão. RASCUNHO Prova aplicada", "c": "advogado4:19"}, {"p": "advogado5", "n": 1, "a": "portugues", "t": "Segundo as ideias do texto, a possibilidade de  desenvolvimento pessoal existe ou não, conforme as configurações familiares a que o indivíduo é exposto ao longo da sua formação.", "c": "advogado5:1"}, {"p": "advogado5", "n": 2, "a": "portugues", "t": "O conceito de família apresentado no texto, do  estudioso Salvador Minuchin, baseia‑se nos papéis que as pessoas desempenham no núcleo familiar.", "c": "advogado5:1"}, {"p": "advogado5", "n": 3, "a": "portugues", "t": "Infere-se do texto que o processo de mudança das  famílias e o da sociedade são inter‑relacionados.", "c": "advogado5:1"}, {"p": "advogado5", "n": 4, "a": "portugues", "t": "De acordo com as ideias do texto, em diferentes  momentos da história do país, a “nova ordem familiar” que surgia era uma decorrência direta das regras estabelecidas nos códigos civis brasileiros.", "c": "advogado5:1"}, {"p": "advogado5", "n": 5, "a": "portugues", "t": "O desenvolvimento humano não é um processo  estanque, segundo as ideias apresentadas no texto.", "c": "advogado5:1"}, {"p": "advogado5", "n": 6, "a": "direito", "t": "Conclui-se do texto que, com o passar do tempo, o  Código Civil brasileiro mudou a ponto de considerar que, atualmente, a mulher é a pessoa mais apta para exercer a guarda dos filhos. Em relação à estrutura linguística e vocabular do texto,", "c": "advogado5:1"}, {"p": "advogado5", "n": 7, "a": "portugues", "t": "A expressão “vêm se formando”, no trecho “A  família representa o espaço de socialização, de busca coletiva de estratégias de sobrevivência, de exercício da cidadania e de possibilidade para o desenvolvimento individual e grupal de seus membros, independentemente dos arranjos apresentados ou das novas estruturas que vêm se formando.”, poderia ser substituída por têm se formado, sem que isso prejudicasse a correção gramatical ou a coerência entre as ideias.", "c": "advogado5:1"}, {"p": "advogado5", "n": 8, "a": "portugues", "t": "No período “A família é um dos principais contextos  de socialização dos indivíduos e, portanto, possui um papel fundamental para a compreensão do desenvolvimento humano.”, observa‑se uma relação de causa e consequência entre as orações.", "c": "advogado5:1"}, {"p": "advogado5", "n": 9, "a": "portugues", "t": "O trecho “aspectos mais amplos do contexto  social no qual está inserido” poderia ser reescrito, preservando‑se a correção gramatical, da seguinte forma: aspectos mais amplos do contexto social que está inserido.", "c": "advogado5:1"}, {"p": "advogado5", "n": 10, "a": "direito", "t": "A palavra imbricado é sinônima da palavra  “complexo”, que ocorre no texto no trecho a seguir: “a família é um complexo sistema de organização, com crenças, valores e práticas ligadas diretamente às transformações da sociedade”. Prova aplicada  Advogado CONSELHO REGIONAL DE PSICOLOGIA 16ª REGIÃO - ESPÍRITO SANTO Quadrix | 2025 2", "c": "advogado5:1"}, {"p": "advogado5", "n": 11, "a": "portugues", "t": "O pronome “seus”, no trecho “A família representa  o espaço de socialização, de busca coletiva de estratégias de sobrevivência, de exercício da cidadania e de possibilidade para o desenvolvimento individual e grupal de seus membros”, pode fazer referência tanto aos membros da família quanto aos membros da sociedade.", "c": "advogado5:1"}, {"p": "advogado5", "n": 12, "a": "portugues", "t": "A correção gramatical e a coerência entre as ideias  do texto seriam mantidas caso a expressão “à medida que”, no trecho “O sistema familiar muda à medida que a sociedade muda”, fosse substituída por conforme.", "c": "advogado5:1"}, {"p": "advogado5", "n": 13, "a": "portugues", "t": "As aspas foram empregadas no texto para indicar que  as expressões destacadas por esse sinal de pontuação foram empregadas originalmente no texto dos códigos civis.", "c": "advogado5:1"}, {"p": "advogado5", "n": 14, "a": "direito", "t": "No período a seguir, o trecho após os dois-pontos  funciona como aposto da expressão “uma série de novidades”: “Em janeiro de 2003, começou a vigorar o Novo Código Civil, que incorporou uma série de novidades: a definição de família passou a abranger as unidades formadas por casamento, união estável ou comunidade de qualquer genitor e descendentes; casamento passou a ser definido como uma ‘comunhão plena de vida, com base na igualdade de direitos e deveres dos cônjuges’; os filhos adotados ou concebidos fora do casamento passaram a ter direitos idênticos aos dos nascidos dentro do matrimônio; a palavra ‘pessoa’ substituiu ‘homem’ e o ‘pátrio poder’ que o pai exercia sobre os filhos passou a ser denominado ‘poder familiar’ e atribuído também à mãe.”", "c": "advogado5:1"}, {"p": "advogado5", "n": 15, "a": "portugues", "t": "No trecho “o ‘pátrio poder’ que o pai exercia sobre  os filhos passou a ser denominado ‘poder familiar’”, a oração “que o pai exercia sobre os filhos” é adjetiva explicativa com relação à expressão “‘pátrio poder’”.", "c": "advogado5:1"}, {"p": "advogado5", "n": 16, "a": "portugues", "t": "A supressão do sinal indicativo de crase no “à”  presente em “o ‘pátrio poder’ que o pai exercia sobre os filhos passou a ser denominado ‘poder familiar’ e atribuído também à mãe.” prejudicaria a correção gramatical do texto.", "c": "advogado5:1"}, {"p": "advogado5", "n": 17, "a": "direito", "t": "No período “A Lei do Divórcio, de 1977, atribuía  a guarda dos filhos ao cônjuge que não tivesse provocado a separação ou, não havendo acordo, à mãe.”, é facultativo o emprego de vírgula logo após “Lei do Divórcio”. De acordo com o Manual de Redação da Presidência da", "c": "advogado5:1"}, {"p": "advogado5", "n": 18, "a": "portugues", "t": "Em uma comunicação oficial, o que se comunica  é sempre algum assunto relativo às atribuições do órgão que comunica ou do órgão com quem se quer comunicar.", "c": "advogado5:2"}, {"p": "advogado5", "n": 19, "a": "portugues", "t": "A clareza, a concisão, a objetividade, a coesão, a  coerência, a precisão, a formalidade, a padronização e o uso da norma padrão da língua portuguesa são atributos da redação oficial.", "c": "advogado5:2"}, {"p": "advogado5", "n": 20, "a": "portugues", "t": "O princípio constitucional da impessoalidade abarca a  redação de textos oficiais. Oswaldo possui três cães: Javali; Pretinha; e Zorro. Sabe‑se que, entre eles, há um dobermann, um fila‑brasileiro e um vira‑lata. Considerem‑se as afirmações seguintes, sabendo‑se que apenas uma delas é verdadeira. • Javali não é fila‑brasileiro. • Pretinha é fila‑brasileiro. • Zorro não é vira‑lata.", "c": "advogado5:2"}, {"p": "advogado5", "n": 23, "a": "direito", "t": "Zorro é um vira‑lata. Admitindo‑se que Júlio dispõe de dois dados de doze faces (d12), sendo um roxo e o outro dourado, numerados de 1 a 12, independentes e equiprováveis. Júlio rolou ambos os dados e anotou os resultados obtidos em cada um deles.", "c": "advogado5:3"}, {"p": "advogado5", "n": 24, "a": "matematica", "t": "A probabilidade de a soma dos resultados ser ímpar é  igual a 1 2 .", "c": "advogado5:4"}, {"p": "advogado5", "n": 25, "a": "matematica", "t": "A probabilidade de a soma ser exatamente 13 é igual  a 1 12.", "c": "advogado5:4"}, {"p": "advogado5", "n": 26, "a": "matematica", "t": "Sabendo‑se que a soma dos resultados é par, a  probabilidade de os dois valores serem idênticos é igual a 1 6 .", "c": "advogado5:4"}, {"p": "advogado5", "n": 27, "a": "matematica", "t": "A média aritmética do número de sessões por  paciente é igual a 4.", "c": "advogado5:x26"}, {"p": "advogado5", "n": 28, "a": "matematica", "t": "A mediana do número de sessões é igual a 3.", "c": "advogado5:x26"}, {"p": "advogado5", "n": 29, "a": "matematica", "t": "A moda do número de sessões é igual a 4.", "c": "advogado5:x26"}, {"p": "advogado5", "n": 30, "a": "informatica", "t": "O menor valor arrecadado ao todo com os 12  pacientes é igual a R$ 9.000. Prova aplicada  Advogado CONSELHO REGIONAL DE PSICOLOGIA 16ª REGIÃO - ESPÍRITO SANTO Quadrix | 2025 3 No que diz respeito ao Google Meet, aos conceitos de redes de computadores e ao navegador Google Chrome, em sua", "c": "advogado5:x26"}, {"p": "advogado5", "n": 31, "a": "informatica", "t": "O Google Meet oferece a funcionalidade de levantar a  mão virtualmente durante a reunião, permitindo que o participante indique que deseja falar, sem que seja necessário interromper o orador.", "c": "advogado5:5"}, {"p": "advogado5", "n": 32, "a": "informatica", "t": "Para usar o Google Meet, é obrigatório instalar um  software específico no computador, pois o serviço não funciona diretamente pelo navegador.", "c": "advogado5:5"}, {"p": "advogado5", "n": 33, "a": "informatica", "t": "Em redes de computadores, a comutação por pacotes  permite que os dados sejam divididos e transmitidos por caminhos diferentes, otimizando o uso da rede.", "c": "advogado5:5"}, {"p": "advogado5", "n": 34, "a": "informatica", "t": "Em uma rede local (LAN), os dispositivos conectados  compartilham recursos e dados entre si, sem a necessidade de conexão com a Internet.", "c": "advogado5:5"}, {"p": "advogado5", "n": 35, "a": "informatica", "t": "O Google Chrome salva automaticamente todas as  senhas digitadas pelo usuário, mesmo que ele não autorize explicitamente esse salvamento. Quanto ao Google Drive, às noções de vírus, worms e", "c": "advogado5:5"}, {"p": "advogado5", "n": 36, "a": "informatica", "t": "O Google Drive permite o uso de versões anteriores  de arquivos armazenados, o que contribui para a recuperação de documentos alterados indevidamente, mas essa funcionalidade só está disponível em contas institucionais (Google Workspace).", "c": "advogado5:6"}, {"p": "advogado5", "n": 37, "a": "informatica", "t": "O Google Drive permite a criação de arquivos  diretamente na nuvem por meio de ferramentas integradas, como o Google Documentos, eliminando a necessidade de softwares instalados localmente.", "c": "advogado5:6"}, {"p": "advogado5", "n": 38, "a": "informatica", "t": "Embora pragas virtuais como o ransomware possam  criptografar dados locais, não há risco de impacto em arquivos armazenados em nuvem, já que os serviços de nuvem são totalmente imunes a esse tipo de ameaça.", "c": "advogado5:6"}, {"p": "advogado5", "n": 39, "a": "informatica", "t": "Um dos principais riscos do uso da computação  em nuvem está relacionado ao modelo de responsabilidade compartilhada, no qual tanto o provedor quanto o cliente têm obrigações distintas quanto à segurança.", "c": "advogado5:6"}, {"p": "advogado5", "n": 41, "a": "legislacao", "t": "São considerados atos de improbidade administrativa  todos os atos que afrontam a Administração Pública.", "c": "advogado5:7"}, {"p": "advogado5", "n": 42, "a": "legislacao", "t": "Somente os agentes públicos com vínculo direto com  a Administração Pública estão sujeitos às sanções por atos de improbidade.", "c": "advogado5:7"}, {"p": "advogado5", "n": 43, "a": "legislacao", "t": "A perda patrimonial decorrente da atividade  econômica acarretará improbidade administrativa quando for comprovado ato doloso praticado com essa finalidade.", "c": "advogado5:7"}, {"p": "advogado5", "n": 44, "a": "legislacao", "t": "Se ocorrer lesão ao patrimônio público, a reparação  do dano a que se refere a Lei de Improbidade Administrativa deverá deduzir o ressarcimento ocorrido nas instâncias criminal, civil e administrativa que tiver por objeto os mesmos fatos.", "c": "advogado5:7"}, {"p": "advogado5", "n": 45, "a": "legislacao", "t": "Apenas as autoridades da Administração Pública  podem solicitar a instauração de investigação destinada a apurar a prática de ato de improbidade.", "c": "advogado5:7"}, {"p": "advogado5", "n": 46, "a": "legislacao", "t": "A sentença proferida na ação de improbidade  administrativa deve considerar os obstáculos e as dificuldades reais do gestor e as exigências das políticas públicas ao seu cargo.", "c": "advogado5:7"}, {"p": "advogado5", "n": 48, "a": "legislacao", "t": "O denunciante que, sabendo ser inocente o  agente público ou terceiro beneficiado, apresentar representação por ato de improbidade estará sujeito apenas à obrigação de indenizar os danos materiais, morais ou à imagem causados ao denunciado.", "c": "advogado5:7"}, {"p": "advogado5", "n": 49, "a": "legislacao", "t": "Não se aplica, na ação de improbidade administrativa,  o reexame obrigatório da sentença de improcedência ou de extinção sem resolução de mérito.", "c": "advogado5:7"}, {"p": "advogado5", "n": 50, "a": "legislacao", "t": "Na responsabilização da pessoa jurídica, deverão  ser considerados os efeitos econômicos e sociais das sanções, de modo a viabilizar a manutenção das suas atividades.", "c": "advogado5:7"}, {"p": "advogado5", "n": 51, "a": "direito", "t": "Conforme a Lei nº 9.784/1999, considera‑se  entidade a unidade de atuação integrante da estrutura da Administração Direta e da estrutura da administração indireta.", "c": "advogado5:8"}, {"p": "advogado5", "n": 52, "a": "legislacao", "t": "No processo administrativo, deve‑se observar o critério  de impulsão, de ofício, do processo administrativo, sem prejuízo da atuação dos interessados.", "c": "advogado5:8"}, {"p": "advogado5", "n": 53, "a": "direito", "t": "O processo administrativo pode se iniciar de ofício ou  a pedido de autoridade da Administração Pública.", "c": "advogado5:8"}, {"p": "advogado5", "n": 54, "a": "legislacao", "t": "São capazes, para fins de processo administrativo, os  maiores de 18 anos de idade, ressalvada a previsão especial em ato normativo próprio.", "c": "advogado5:8"}, {"p": "advogado5", "n": 55, "a": "legislacao", "t": "No processo administrativo, é possível a delegação da  edição de atos de caráter normativo.", "c": "advogado5:8"}, {"p": "advogado5", "n": 56, "a": "legislacao", "t": "É impedido de atuar em processo administrativo o  servidor ou a autoridade que tenha interesse indireto na matéria.", "c": "advogado5:8"}, {"p": "advogado5", "n": 57, "a": "legislacao", "t": "Os atos do processo administrativo dependem de  forma determinada.", "c": "advogado5:8"}, {"p": "advogado5", "n": 58, "a": "legislacao", "t": "As atividades de instrução destinadas a averiguar e  comprovar os dados necessários à tomada de decisão realizam-se apenas mediante impulsão do órgão responsável pelo processo.", "c": "advogado5:8"}, {"p": "advogado5", "n": 59, "a": "legislacao", "t": "São inadmissíveis no processo administrativo as  provas obtidas por meios ilícitos.", "c": "advogado5:8"}, {"p": "advogado5", "n": 60, "a": "legislacao", "t": "Concluída a instrução de processo administrativo,  a Administraçã
