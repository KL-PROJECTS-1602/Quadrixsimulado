sa e Desenvolvimento da Embrapa, contou com a participação de\nmais de 50 pesquisadores e analistas representando nove unidades de pesquisa da Empresa. Os dados, oriundos de\npesquisas e estudos desenvolvidos ao longo das últimas décadas, geraram a publicação Tecnologias Poupa-Terra 2021,\nlançada em comemoração ao 48.o aniversário da Embrapa. \nNa avicultura e suinocultura, o progresso tecnológico contínuo nas últimas quatro décadas garantiu às atividades\nlugar cativo no ranking das melhores do mundo. Grande parte desse sucesso se deve ao processo de conversão alimentar,\na quantidade de ração que um animal precisa consumir para cada quilo de peso que ganha. Essa tecnologia é o resultado \ndireto dos progressos obtidos ao longo dos anos em vários segmentos, como melhoramento genético, nutrição, sanidade\nanimal, manejo e ambiência. \nNo caso da avicultura de corte, em 1975, o frango precisava de 2,1 kg de ração para ganhar um quilo de peso vivo.\nEm 2020, esse mesmo quilo de peso foi obtido com 1,7 kg de ração. Considerada a produtividade atual do milho e da soja \nno País, caso o desenvolvimento tecnológico não tivesse dotado os frangos de maior capacidade de conversão de ração\nem ganho de peso, a avicultura de corte demandaria um adicional de 1.551.056,40 ha de terra para a entrega dos mesmos\n16,4 milhões de toneladas de peso vivo de frango produzidos em 2020. Essa economia de terra equivale a três vezes o\ntamanho do Distrito Federal. \nNa suinocultura comercial brasileira, a melhora na conversão alimentar entre os anos de 1975 e 2020 permitiu\nreduzir o consumo de ração de 3,5 kg para 2,6 kg. Sem o aporte tecnológico, seria necessário 1.007.745,70 ha de terra para \nproduzir os 5,3 milhões de toneladas de carne suína produzidos hoje. A terra poupada corresponde ao território inteiro da\nRepública do Chipre. \nAs tecnologias desenvolvidas pela Embrapa e parceiros garantem à agricultura um efeito poupa-terra nas mais \ndiversas cadeias do agronegócio brasileiro. O diretor de Pesquisa e Desenvolvimento da Embrapa, Gu", "advogado_126:2": "Considerando os mecanismos de coesão no texto, julgue os \nitens 13 e 14 quanto à correta correspondência entre o termo \ndestacado e o respectivo elemento de referência.", "advogado_126:3": "Windows 8 e aos conceitos de redes de computadores, julgue \nos itens de 21 a 25.", "advogado_126:4": "Com base nessa situação hipotética, julgue os itens \nde 31 a 34.", "advogado_126:5": "42 vértices. Considerando essa informação, julgue os itens \nde 35 a 37.", "advogado_126:6": "e as outras duas são verdadeiras, julgue os itens de 38 a 40.", "advogado_126:7": "CONHECIMENTOS COMPLEMENTARES \nDe acordo com a Lei n.o 9.784/1999, julgue os itens \nde 41 a 50.", "advogado_126:8": "A respeito do quadro político da América do Sul, julgue os \nitens de 61 a 65.", "advogado_126:9": "dimensões (ambiental, econômica, social e política), julgue os \nitens de 66 a 70.", "advogado_126:10": "CONHECIMENTOS ESPECÍFICOS \nAcerca das obrigações no direito civil, julgue os itens \nde 71 a 80.", "advogado_126:11": "Quanto aos princípios do direito processual civil, julgue os \nitens de 91 a 100.", "advogado_127:1": "Cada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a \nque cada um deles esteja vinculado, marque, no cartão-resposta, para cada item: o campo designado com o código C, caso julgue \no item CERTO; ou o campo designado com o código E, caso julgue o item ERRADO.\nA marcação de acordo com o gabarito valerá + 1,00 (um ponto positivo). A marcação em desacordo com o gabarito \nvalerá - 1,00 (um ponto negativo). A ausência de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não \nreceberão pontuação negativa. Para as devidas marcações, use o cartão-resposta, único documento válido para a correção da sua \nprova objetiva. \nCONHECIMENTOS BÁSICOS \nTexto para os itens de 1 a 18. \n1 \n4 \n7 \n10 \n13 \n16 \n19 \n22 \n25 \n28 \n31 \n34 \n37 \nSegundo a Organização Mundial da Saúde (OMS), o Brasil é o segundo país das Américas com o maior número de\npessoas depressivas e alerta para o fato de que a depressão será a doença mais comum em todo o mundo nos próximos \n20 anos. \nEla é capaz de impactar diretamente a forma como as pessoas se relacionam e como agem em situações \ncotidianas. O isolamento social e as incertezas geradas pela covid-19 só agravaram os casos. Segundo estudo realizado pela \nUniversidade de São Paulo, o Brasil lidera o ranking dos países com mais casos de depressão (59%) e ansiedade (63%)\ndurante a pandemia. Uma situação preocupante, que também afeta a forma como os trabalhadores se comportam diante\ndas exigências feitas diariamente pelas empresas. \nPor se tratar de uma doença que afeta a mente e o estado emocional, não há como definir com exatidão o fator \ndeterminante para o desencadeamento de um caso depressivo. O que se sabe é que fatores psíquicos provocam alteração \ncerebral e mudanças de humor capazes de gerar tristeza profunda ou desânimo. É uma condição crônica e recorrente, que \npode ter ou não relação com o histórico familiar. \nNesse ponto, é preciso diferenciar uma questão importante: a tristeza é um sentimento comum, a que todos estão \nsujeitos e com o qual aprendem a lidar. A depressão não é um simples caso de tristeza profunda. Ela é uma doença que\npersiste e afeta consideravelmente a vida do paciente, podendo ser causada, inclusive, por fatores socioambientais —\ncomo eventos estressores, traumas psicológicos, rompimento de relações e insatisfação com o trabalho. \nA depressão pode ser classificada como leve, moderada ou grave, de acordo com o impacto dos sintomas no \npaciente. Entre os sinais mais comuns, estão ansiedade constante, alterações no apetite e no peso, insônia, fadiga mental\ne corporal, sentimento de inutilidade ou culpa, dificuldade de concentração e até pensamentos de morte e suicídio. \nCaso os sintomas sejam persistentes, é preciso buscar ajuda junto a um psicólogo ou um psiquiatra de confiança. \nComo os sintomas se assemelham a outros transtornos psiquiátricos, só esses profissionais podem realizar um diagnóstico \ncorreto da doença, analisando o histórico do paciente, sintomas físicos e mentais e a recorrência de cada um deles. \nTambém cabe ao especialista indicar o tratamento adequado para o caso, pois isso deve ser feito de forma \npersonalizada para cada paciente. Atualmente, existem diversos tipos de terapias para o restabelecimento da saúde\nmental, que podem variar de sessões com psicólogo/psiquiatra a tratamentos medicamentosos — ou uma combinação \ndos dois. \nA piora das crises econômica e sanitária no Brasil não tem contribuído par", "advogado_127:2": "Julgue os itens de 5 a 12, referentes a aspectos linguísticos do \ntexto.", "advogado_127:3": "Julgue os itens 19 e 20, considerando a correção gramatical \ndos trechos apresentados e a adequação da linguagem à \ncorrespondência oficial.", "advogado_127:4": "Com relação a estruturas lógicas, julgue os itens de 25 a 27.", "advogado_127:5": "CONHECIMENTOS COMPLEMENTARES \nConsiderando as disposições da Lei n.o 8.429/1992, julgue os \nitens de 41 a 45.", "advogado_127:6": "CONHECIMENTOS ESPECÍFICOS \nQuanto aos direitos e às garantias fundamentais, julgue os \nitens de 71 a 80.", "advogado_127:7": "Com relação ao instituto da ausência, julgue os itens de 101 a 105.", "advogado_127:8": "A respeito das disposições do Código de Ética Médica, julgue \nos itens de 106 a 115.", "advogado_130:1": "CONSELHO REGIONAL DOS TÉCNICOS INDUSTRIAIS DE MINAS GERAIS  INSTITUTO QUADRIX – CRT‐MG ADVOGADO  1 \nCada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a \nque cada um deles esteja vinculado, marque, no cartão‐resposta, para cada item: o campo designado com o código C, caso julgue \no item CERTO; ou o campo designado com o código E, caso julgue o item ERRADO.  \nA ausência de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não receberão pontuação negativa. \nPara as devidas marcações, use o cartão‐resposta, único documento válido para a correção da sua prova objetiva. \nCONHECIMENTOS BÁSICOS \nTexto para os itens de 1 a 20. \n1 \n4 \n7 \n10 \n13 \n16 \n19 \n22 \n25 \n28 \n31 \nMênfis, no Antigo Egito, foi a maior cidade do planeta por quase mil anos, entre 3100 a.C. e 2200 a.C. Tinha vinte\nmil habitantes. É menos que o bairro da Sé, no centro de São Paulo, nos dias atuais. Imagine o quanto era difícil proteger\na privacidade em uma cidade de cinco mil anos atrás.  \nNão é que a preocupação não existisse. Aristóteles, que viveu no século 4 a.C., defendia que a vida se dividia em\nduas esferas, a pública, que acontecia na pólis, e a privada, que o filósofo chamava de oikos.  \nMas, na prática, as comunidades humanas moravam em vilas. Ali  tudo o que acontecia era, de uma  forma ou\noutra, público, especialmente no ambiente familiar, que era muito mais extenso do que hoje em dia. \nA preocupação de garantir o direito a proteger a vida de bisbilhoteiros é uma invenção muito mais recente: a\nprimeira proposta de lei com esse objetivo surgiu nos Estados Unidos, na década de 1890. E os juristas Samuel Warren e\nLouis Brandeis propuseram, de forma pioneira, no artigo intitulado The Right of Privacy, que todo cidadão tinha o “direito\nde ser deixado sozinho”.  \nNa época, a maior cidade do mundo era Londres e tinha 5,5 milhões de habitantes. Em metrópoles desse porte,\nera possível, pela primeira vez, garantir segredo em alguns aspectos da vida. Como apontou o escritor Edgar Allan Poe no\nconto O Homem na Multidão, publicado na capital da Inglaterra em 1840, numa grande cidade era possível estar no meio\nda rua, cercado por pessoas, e não conhecer absolutamente ninguém.  \nA iniciativa foi transformada em diferentes leis, difundidas inicialmente no mundo anglo‐saxão, num momento \nem que a Inglaterra controlava as terras onde viviam 23% da população global, e os Estados Unidos ainda estavam sob a\ninfluência dos códigos britânicos. O conceito jurídico de privacidade continuou avançando. As leis europeias desenhadas\nentre  meados  dos  anos  1960  e  início  dos  anos  1970  o  atualizaram,  mergulharam  em  detalhes  e  se  mostraram\nvisionárias — a lei sobre a divulgação de dados pessoais promulgada na cidade alemã de Hessen é ainda hoje citada como \nreferência para a legislação a respeito da Internet.  \nAcontece  que  agora,  com  a  nova  sociedade  digital,  voltamos  a  viver  em  vilas.  O  privado  e  o  público  estão\nnovamente misturados, quase como uma babilônia digital. “Ao atender um telefone dentro de um teatro, estamos vivendo\num momento privado em um ambiente público. Por outro lado, ao publicar um post com uma foto tirada dentro do nosso\nquarto, estamos vivendo um momento público em um ambiente privado”, avalia o sociólogo e professor Massimo Di Felice, \ncoordenador do Centro Internacional de Pesquisa da Escola de Comunicações e Artes da Universidade de São Paulo.  \nO digital m", "advogado_130:2": "correio  eletrônico  Microsoft  Outlook  Express  6,  julgue  os \nitens de 21 a 25.", "advogado_130:3": "Com  base  nessa  situação  hipotética,  julgue  os  itens  \nde 31 a 34.", "advogado_130:4": "Com  base  nessa  situação  hipotética,  julgue  os  itens  \nde 38 a 40.", "advogado_130:5": "CONHECIMENTOS COMPLEMENTARES \nConforme a  Lei  n.o  9.784/1999 e  suas  alterações,  julgue  os \nitens de 41 a 45.", "advogado_130:6": "Quanto  à  ética  no  serviço  público,  julgue  os  itens  \nde 51 a 55.", "advogado_130:7": "Considerando  o  cenário  mundial  da  atualidade,  julgue  os \nitens de 56 a 65.", "advogado_130:8": "existindo.  A  partir  dessas  considerações,  julgue  os  itens  \nde 66 a 70.", "advogado_130:9": "CONHECIMENTOS ESPECÍFICOS \nAcerca  do  controle  concreto  ou  incidental  de \nconstitucionalidade, julgue os itens de 71 a 75.", "advogado_130:10": "jurisprudência  do  Tribunal  Superior  do  Trabalho,  julgue  os \nitens de 91 a 95 quanto à ação rescisória.", "advogado_130:11": "____________________________________________________ \nÀ luz da Lei n.o 13.639/2018, julgue os itens de 111 a 115.", "advogado_130:12": "____________________________________________________ \nConforme a Lei n.o\n 13.639/2018, julgue os itens de 116 a 120.", "advogado_133:1": "INSTITUTO DE DESENVOLVIMENTO URBANO      Aplicação: 2020 \nIDURB ANALISTA DE DESENVOLVIMENTO URBANO E FUNDIÁRIO / URBANISMO E FUNDIÁRIO – ADVOGADO  1 \nCada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a \nque cada um deles esteja vinculado, marque, no cartão‐resposta, para cada item: o campo designado com o código C, caso julgue \no item CERTO; ou o campo designado com o código E, caso julgue o item ERRADO.  \nA ausência de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não receberão pontuação negativa. \nPara as devidas marcações, use o cartão‐resposta, único documento válido para a correção da sua prova objetiva. \nCONHECIMENTOS BÁSICOS \nTexto para os itens de 1 a 8. \n1 \n4 \n7 \n10 \n13 \n16 \n19 \n22 \n25 \n28 \n31 \nMuitas pessoas entendem sustentabilidade apenas como um termo que designa os impactos das questões ambientais\nsobre os negócios, como, por exemplo, a diminuição das poluições e emissões de gases nocivos pelas empresas. Entretanto,\ndeve‐se pensar a sustentabilidade como um modo de vida, o que  torna seu significado muito mais amplo e abrange outras\nquestões, como a mudança de comportamento dos cidadãos e gestores nas cidades e novos planos de ação para uma melhor\nqualidade de vida da humanidade. \nNa  realidade  atual,  o  conceito  de  sustentabilidade  está  cada  vez  mais  presente  nas  conferências  nacionais  e\ninternacionais em  face  dos  diversos  problemas enfrentados  globalmente,  como mudanças  climáticas,  poluições  de  grandes\ncentros urbanos, desigualdade, pobreza, entre  tantos outros, e a principal indagação centra‐se em como a sustentabilidade \nurbana pode ser transformada em um elo de integração entre os diversos atores da sociedade para o alcance de um objetivo \nem comum: a melhoria das condições de vida e a preservação do meio ambiente. \nO modelo de desenvolvimento sustentável tem como objetivo reverter os danos à natureza gerados pelos seres humanos \nao longo dos anos e, a partir disso, conduzir a existência humana e dos demais seres vivos de uma maneira mais ecológica, que \ncontraponha  a  lógica  de  maximização  dos  lucros  e  consumismo.  Desse  modo,  o  conceito  de  sustentabilidade  remete\ndiretamente à vida moderna e ao meio urbano, já que os problemas têm origem justamente na má administração dos recursos\nescassos presentes na natureza em face dos desejos ilimitados dos seres humanos. \nEm sentido amplo, a cidade pode ser entendida como um ecossistema, uma unidade ambiental dentro da qual todos os \nelementos  e  processos  do  ambiente  são  inter‐relacionados  e  interdependentes,  de modo  que  uma mudança  em  um  deles\nresultará em alterações em outros componentes. Um exemplo de uma pequena ação de impacto positivo no meio ambiente é \na coleta seletiva de lixo, que, a partir da reutilização de recursos naturais, tanto orgânicos quanto recicláveis, contribui para a\nredução da quantidade de lixo acumulada e favorece a geração de novos empregos. \nUm dos maiores entraves até o momento para a integração de todos os atores em torno de ações sustentáveis tem sido\na  falta  de  conscientização  acerca  da  necessidade  da  participação  de  todos  os  segmentos  da  sociedade  na  resolução  dos\nproblemas complexos que afetam o meio urbano.  \nSegundo o professor em gestão urbana e habitacional da Universidade de São Paulo, Alex Kenya Abiko, a ciência tem um\npapel  fundamental  na  conscientização  das  instituições  pol", "advogado_133:2": "Quanto à correção gramatical e à coerência das substituições propostas para vocábulos e trechos destacados do texto, julgue os\nitens de 6 a 8.", "advogado_133:3": "Julgue  os  itens  9  e  10  no  que  se  refere  à  correção  gramatical  dos  trechos  apresentados  e  à  adequação  da  linguagem  à \ncorrespondência oficial.", "advogado_133:4": "Julgue os itens de 11 a 14, relativos aos modos de utilização \nde tecnologias e ao programa PowerPoint 2013.", "advogado_133:5": "gerenciamento  de  arquivos  e  programas,  julgue  os  itens  \nde 15 a 18.", "advogado_133:6": "CONHECIMENTOS COMPLEMENTARES \nJulgue os itens de 31 a 35 a respeito da organização do estado \nna Constituição Federal de 1988.", "advogado_133:7": "No  que  se  refere  à  ética  na  função  pública,  julgue  os  itens  \nde 46 a 50.", "advogado_133:8": "CONHECIMENTOS ESPECÍFICOS \nJulgue  os  itens  de  61  a  65  a  respeito  das  organizações  da \nsociedade civil de interesse público (OSCIPs).", "advogado_133:9": "No  que  concerne  às  agências  executivas,  julgue  os  itens  \nde 66 a 70.", "advogado_133:10": "Julgue  os  itens  de  76  a  80,  relativos  aos  métodos  de \ninterpretação constitucional.", "advogado_133:11": "Acerca  dos  direitos  de  personalidade,  julgue  os  itens  \nde 86 a 90.", "advogado_133:12": "De  acordo  com  a  Lei  n.º  6.766/1979,  julgue  os  itens  \nde 91 a 95.", "advogado_133:13": "Conforme  o  Estatuto  das  Cidades,  julgue  os  itens  \nde 96 a 100.", "advogado_1_19:1": "1\nCada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a \nque cada um deles esteja vinculado, marque, no cartão-resposta, para cada item: o campo designado com o código C, caso julgue \no item CERTO; ou o campo designado com o código E, caso julgue o item ERRADO.\nA marcação de acordo com o gabarito valerá + 1,00 (um ponto positivo). A marcação em desacordo com o gabarito \nvalerá - 1,00 (um ponto negativo). A ausência de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não \nreceberão pontuação negativa. Para as devidas marcações, use o cartão-resposta, único documento válido para a correção da sua \nprova objetiva.\nCONHECIMENTOS BÁSICOS\nTexto para os itens de 1 a 18.\nEm um experimento pioneiro, cientistas do Reino Unido e dos Estados Unidos da América (EUA) criaram, em \nlaboratório, modelos de embriões humanos sintéticos a partir de células‑tronco. A estrutura se parece com as primeiras \netapas de desenvolvimento humano, mas não é como um embrião natural — não foi criada com espermatozoides e óvulos. \nO resultado do trabalho, apresentado na reunião anual da Sociedade Internacional para Pesquisa de Células‑Tronco, em \njunho de 2023, nos EUA, poderá ajudar a aprofundar entendimentos sobre doenças genéticas e causas biológicas de abortos \nespontâneos, segundo os autores, mas suscita debates sobre limites éticos na saúde. \n“Eles são modelos de embriões muito parecidos com embriões humanos, um caminho muito importante para \ndescobrir por que tantas gestações falham, já que a maioria desses problemas ocorre na época do desenvolvimento em que \nse constroem essas estruturas”, afirmou Magdalena Zernicka‑Goetz, professora da Universidade de Cambridge e do Instituto \nde Tecnologia da Califórnia, durante a apresentação do estudo, que ainda não foi revisado por pares.\nSalmo Raskin, especialista em pediatria e genética e diretor do Laboratório Genetika, em Curitiba, afirma que o \naperfeiçoamento conquistado pelo grupo de cientistas é indiscutível, pois, há até pouco tempo, pesquisadores esbarravam \nem enormes dificuldades técnicas na hora de transformar células‑tronco em tecidos extraembrionários.\nAinda de acordo com o especialista, o trabalho é pioneiro, porém, também desperta dúvidas sobre os limites éticos\nem experimentos desse tipo. As diretrizes da Sociedade Internacional para Pesquisa de Células‑Tronco sobre o tema afirmam \nque “a pesquisa científica em e com embriões humanos e linhagens de células‑tronco embrionárias em cultura é vista como \neticamente permissível em muitos países quando realizada sob rigorosa supervisão científica e ética”. \nEm comunicado sobre o estudo, Kathryn MacKay, professora de ética na saúde da Universidade de Sydney, na \nAustrália, também cita a questão e aponta que é preciso entender se o modelo criado em laboratório poderia continuar a \nse desenvolver. “Há uma questão moral envolvida na criação de algo para pesquisa que pode ou não ter o potencial de viver \ncomo a própria entidade completa. Se eles puderem viver como as próprias entidades plenas, então devemos perguntar se é \nmoralmente permissível criar seres vivos apenas para fins de pesquisa”, defende.\nÁlvaro Pigatto Ceschin, presidente da Associação Brasileira de Reprodução Assistida, sublinha que o cuidado é \nessencial em estudos que lidam com a vida humana: “A questão ética, ao se lidar com embriões, especialmente embriões \nda espécie humana, deve ser levada em consideração sempr", "advogado_1_19:2": "Em relação aos aspectos linguísticos do texto, julgue os \nitens de 8 a 18.", "advogado_1_19:3": "subsequentes, julgue os itens 19 e 20, acerca dos atributos \nde impessoalidade, concisão, objetividade e uso do registro \npadrão culto da língua portuguesa na redação oficial.", "advogado_1_19:4": "Com base nessa situação hipotética, julgue os itens \nde 24 a 26.", "advogado_1_19:5": "CONHECIMENTOS COMPLEMENTARES\nDe acordo com o Regimento Interno do Conselho Regional \nde Medicina do Estado do Tocantins (CRM‑TO), julgue os \nitens de 41 a 50.", "advogado_1_19:6": "A respeito do contexto político da América Latina, julgue os \nitens de 56 a 60.", "advogado_1_19:7": "Acerca do panorama atual do Brasil, julgue os itens \nde 61 a 65.", "advogado_1_19:8": "No que se refere ao contexto atual do mundo, julgue os \nitens de 66 a 70.", "advogado_1_19:9": "CONHECIMENTOS ESPECÍFICOS\nEm relação ao direito penal e ao direito processual penal, \njulgue os itens de 71 a 75.", "advogado_1_19:10": "Considerando o direito tributário, julgue os itens \nde 81 a 85.", "advogado_1_19:11": "Com base no Código de Processo Civil, julgue os itens \nde 86 a 90.", "advogado_1_19:12": "Com base na Lei Federal n.o 3.268/1957, julgue os itens \nde 106 a 110.\n106 Quando deixar, temporária ou definitivamente, de \nexercer atividade profissional, o profissional restituirá \na carteira ao Conselho onde estiver inscrito.\n107 Para a candidatura à vaga de conselheiro federal, o \nmédico não necessita ser conselheiro do CRM em que \nestá inscrito.\n108 O mandato dos membros do Conselho Federal de \nMedicina (CFM) será meramente honorífico e com \nduração de três anos.\n109 A taxa de inscrição e o imposto sindical constituem \nrenda do CFM.\n110 O médico inscrito no conselho regional de um estado \nque passar a exercer a profissão por mais de noventa \ndias, em nova jurisdição, ficará obrigado a requerer \ninscrição secundária ou se transferir.\nConforme o Decreto Federal n.o\n 44.045/1958, com \nalterações do Decreto nº 10.911/2021, julgue os itens \nde 111 a 115.\n111 Nos processos ético‑profissionais, o recurso de \napelação poderá ser interposto ex‑officio.\n112 O infrator da ética profissional pode ser punido com \nadvertência em aviso reservado, advertência em \npublicação oficial, suspensão por até trinta dias e \ncassação do exercício profissional.\n113 Para formalizar o pedido de inscrição do médico, \ndevem ser coletados seus dados biométricos e deve \nser verificado se ele consta na relação de formandos \nda instituição de ensino superior (IES).\n114 O dia e a hora das eleições dos membros dos conselhos \nregionais serão fixados conforme a conveniência local. \n115 A eleição para o CFM será realizada entre sessenta e \nnoventa dias antes do término do mandato em curso.\nQuanto à Resolução CFM n.o\n 2.306/2022, que aprovou o \nCódigo de Processo Ético‑Profissional (CPEP), julgue os \nitens de 116 a 120.\n116 A sustentação oral não é ato processual obrigatório, \nsendo um ato exclusivo de advogado ou da \nprópria parte.\n117 É obrigatória a mesma composição de participantes \nda sessão anterior, quando da continuidade do \njulgamento, após o pedido de diligências ou \nde vistas.\n118 Quando o médico tiver inscrição em mais de um \nCRM, a sanção será executada em todos eles, em um \nintervalo de até dez dias.\n119 A sindicância ou o processo ético‑profissional \nparalisado há mais de três anos, pendente de \ndespacho ou julgamento, será arquivado. \n120 Decorridos cinco anos após o cumprimento da \nsanção, o médico será reabilitado no CRM onde está \ninscrito, com a retirada dos apontamentos referentes \nàquela sanção.", "advogado_1_19:13": "Quanto ao direito administrativo, julgue os itens \nde 96 a 100.", "advogado_1_19:14": "Considerando a Constituição Federal de 1988, julgue os \nitens de 101 a 105.", "advogado_1_21:1": "a REGIÃO CRECI‑PR PROFISSIONAL ANALISTA SUPERIOR (PAS) – ADVOGADO 1\nCada um dos itens da prova objetiva está vinculado ao comando que imediatamente o antecede. De acordo com o comando a \nque cada um deles esteja vinculado, marque, no cartão‑resposta, para cada item: o campo designado com o código C, caso julgue \no item CERTO; ou o campo designado com o código E, caso julgue o item ERRADO.\nA marcação de acordo com o gabarito valerá + 1,00 (um ponto positivo). A marcação em desacordo com o gabarito \nvalerá ‑ 1,00 (um ponto negativo). A ausência de marcação ou a marcação de ambos os campos não serão apenadas, ou seja, não \nreceberão pontuação negativa. Para as devidas marcações, use o cartão‑resposta, único documento válido para a correção da sua\nprova objetiva.\nCONHECIMENTOS BÁSICOS\n1\n4\n7\n10\n13\n16\n19\n22\n25\n28\n31\n34\n37\nTexto para os itens de 1 a 10.\nQuando o oficial de justiça chegou\nLá na favela\nE contra seu desejo\nEntregou pra seu Narciso\nUm aviso, uma ordem de despejo\nAssinada, seu doutor\nAssim dizia a petição\nDentro de dez dias\nQuero a juiz” NÃO é acentuado (o “i” tônico forma sílaba com a consoante seguinte: ju-iz). “Saúde” e “raízes” têm hiato tônico acentuado."}, {"a": "portugues", "d": 2, "g": "E", "t": "A vírgula em “O advogado, que atua no CREF, apresentou a defesa” introduz oração subordinada adjetiva restritiva.", "c": "Entre vírgulas, a oração é EXPLICATIVA (acrescenta informação sobre todo o conjunto); a restritiva não usa vírgulas."}, {"a": "portugues", "d": 2, "g": "C", "t": "Na frase “É necessário paciência”, a ausência de flexão do adjetivo justifica-se porque o substantivo não está determinado por artigo.", "c": "Sem artigo, a expressão fica invariável (“É necessário paciência”); com artigo, flexiona (“É necessária a paciência”)."}, {"a": "portugues", "d": 1, "g": "B", "t": "Assinale a alternativa em que o acento indicativo de crase foi corretamente empregado.", "c": "Crase = preposição + artigo feminino: “à diretora”. Não há crase antes de palavra masculina, verbo ou pronome pessoal.", "alts": ["Fui à pé ao trabalho.", "Entreguei o ofício à diretora.", "Ele começou à chorar.", "Refiro-me à ele."]}, {"a": "portugues", "d": 2, "g": "D", "t": "Assinale a alternativa com concordância verbal correta.", "c": "“Haver” no sentido de existir é impessoal (Há dez vagas). “Existir” concorda (existem vários); “fazer” temporal é impessoal (faz dois anos).", "alts": ["Houveram muitos recursos no certame.", "Existe vários candidatos inscritos.", "Fazem dois anos que estudo.", "Há dez vagas para advogado."]}, {"a": "portugues", "d": 1, "g": "B", "t": "O vocábulo “corroborar” pode ser substituído, sem alteração de sentido, por:", "c": "Corroborar = confirmar, reforçar, dar sustentação a uma tese.", "alts": ["contradizer", "confirmar", "revogar", "atenuar"]}, {"a": "portugues", "d": 3, "g": "C", "t": "Sobre pontuação, assinale a alternativa que apresenta regra corretamente enunciada e de observância obrigatória.", "c": "É vedado separar sujeito e predicado por vírgula. Vocativo EXIGE vírgula; adjunto /* ============ ACERVO OFFLINE (fallback sem IA) ============ */
let poolUsed=new Set();
function poolPick(filter,n){
  let cand=D.pool.map((q,i)=>({q,i})).filter(x=>!poolUsed.has(x.i)&&filter(x.q));
  if(cand.length<n){ // reciclar
    D.pool.forEach((q,i)=>{if(filter(q))poolUsed.delete(i);});
    cand=D.pool.map((q,i)=>({q,i})).filter(x=>!poolUsed.has(x.i)&&filter(x.q));
  }
  const out=shuffle(cand).slice(0,n);
  out.forEach(x=>poolUsed.add(x.i));
  return out.map(x=>({enunciado:x.q.t,gabarito:x.q.g,comentario:x.q.c,alternativas:x.q.alts||null,areaNome:AREAS[x.q.a],a:x.q.a,d:x.q.d,offline:true}));
}

/* ============ API com reparo e fallback ============ */
let iaOn=true;
function tryParse(text){
  try{ return JSON.parse(text); }catch(e){}
  let i=text.lastIndexOf('}');
  while(i>0){
    let t=text.slice(0,i+1).trim();
    if(t.startsWith('[')) t+=']';
    try{ return JSON.parse(t); }catch(e){ i=text.lastIndexOf('}', i-1); }
  }
  throw new Error('JSON inválido');
}
async function claudeJSON(prompt, tent){
  tent = tent||0;
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await resp.json();
    if(data.error) throw new Error(data.error.message||'Erro na API');
    let text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    text=text.replace(/```json|```/g,'').trim();
    const a=text.indexOf('['),o=text.indexOf('{');
    const start=(a>=0&&(o<0||a<o))?a:o;
    if(start<0) throw new Error('Resposta sem JSON');
    iaOn=true;
    return tryParse(text.slice(start));
  }catch(e){
    if(tent<1){ await new Promise(r=>setTimeout(r,600)); return claudeJSON(prompt, tent+1); }
    iaOn=false;
    throw e;
  }
}

      else if(mil.fase==='reveal'){ if(L===q.gabarito)c='gok'; else if(mil.sel===L)c='gbad'; }

      return `<button class="${c}" onclick="milSel('${L}')"><b>${L})</b> ${esc(alt)}</button>`;
    }).join('');
    el.innerHTML=`<div class="milwrap">
    ${mil.off?`<div class="notice" style="background:#152a6e;border-color:#4a5da8;color:#93a4d8">🎲 Perguntas do acervo inédito embutido (IA externa indisponível)</div>`:''}

function milTier(){ return mil.nivel<5?1:mil.nivel<10?2:3; }
function milPoolQ(){
  const d=milTier();
  let q=poolPick(x=>x.alts&&x.d===d,1);
  if(!q.length) q=poolPick(x=>!!x.alts,1);
  if(!q.length) throw new Error('acervo esgotado');
  mil.off=true;
  return q[0];
}
async function milGetQ(){
  try{
    const areas=Object.keys(AREAS);
    const a=areas[(mil.nivel+Math.floor(Math.random()*2))%areas.length];
    const dif=mil.nivel<5?'FÁCIL':'mil.nivel<10'?'MÉDIA':'DIFÍCIL';
    const ex=shuffle(D.banco.filter(i=>i.a===a)).slice(0,2).map(i=>'- "'+i.t.slice(0,160)+'"').join('\n');
    const r=await claudeJSON(`Elaborador da banca Quadrix (CREF-15/PI, Advogado). Estilo real da área "${AREAS[a]}":\n${ex}\n\nCrie 1 pergunta INÉDITA e AUTOSSUFICIENTE de múltipla escolha, 4 alternativas (A-D), dificuldade ${dif}, uma única correta. SOMENTE JSON: {"enunciado":"...","alternativas":["...","...","...","..."],"gabarito":"A" a "D","comentario":"porquê curto"}`);
    const q=Array.isArray(r)?r[0]:r;
    if(!q||!q.alternativas||q.alternativas.length<4||!'ABCD'.includes(q.gabarito)) throw new Error('inválida');
    q.areaNome=AREAS[a]; mil.off=false;
    return q;
  }catch(e){
    return milPoolQ();
  }
}
async function milStart(){
  mil={...mil,fase:'loading',nivel:0,sel:null,skips:2,l5050:true,lUni:true,hidden:[],uni:null,msg:'Preparando a 1ª pergunta...'};
  milhao();
  mil.q=await milGetQ(); mil.fase='run';
  milhao();
}
function milSel(L){ if(mil.fase!=='run'||mil.hidden.includes(L))return; mil.sel=mil.sel===L?null:L; milhao(); }
function milConfirm(){
  if(!mil.sel)return;
  mil.fase='reveal';
  if(mil.sel===mil.q.gabarito){ const w=PRIZES[mil.nivel]; if(w>mil.best)mil.best=w; }
  else { const g=garantido(); if(g>mil.best)mil.best=g; }
  milhao();
}
async function milNext(){
  mil.nivel++; mil.sel=null; mil.hidden=[]; mil.uni=null;
  mil.fase='loading'; mil.msg=`Preparando pergunta ${mil.nivel+1} (${money(PRIZES[mil.nivel])})...`; milhao();
  mil.q=await milGetQ(); mil.fase='run';
  milhao();
}
function mil5050(){
  if(!mil.l5050)return; mil.l5050=false;
  const wrong=shuffle(['A','B','C','D'].slice(0,mil.q.alternativas.length).filter(L=>L!==mil.q.gabarito)).slice(0,2);
  mil.hidden=wrong; if(wrong.includes(mil.sel))mil.sel=null; milhao();
}
function milUni(){
  if(!mil.lUni)return; mil.lUni=false;
  const conf=mil.nivel<5?55+Math.random()*30:mil.nivel<10?40+Math.random()*30:25+Math.random()*35;
  let rest=100-conf; const others=['A','B','C','D'].slice(0,mil.q.alternativas.length).filter(L=>L!==mil.q.gabarito&&!mil.hidden.includes(L));
  const parts=others.map(()=>Math.random()); const sum=parts.reduce((a,b)=>a+b,0)||1;
  mil.uni=[[mil.q.gabarito,Math.round(conf)],...others.map((L,i)=>[L,Math.round(rest*parts[i]/sum)])].sort((a,b)=>b[1]-a[1]);
  milhao();
}
async function milSkip(){
  if(mil.skips<=0)return; mil.skips--;
  mil.sel=null; mil.hidden=[]; mil.uni=null;
  mil.fase='loading'; mil.msg='Trocando a pergunta...'; milhao();
  mil.q=await milGetQ(); mil.fase='run';
  milhao();
}
function milStop(){ mil.prize=mil.nivel>0?PRIZES[mil.nivel-1]:0; if(mil.prize>mil.best)mil.best=mil.prize; mil.fase='stop'; milhao(); }
function milReset(){ mil.fase='setup'; milhao(); }

function pomoResp(v,advance){
  const q=pomo.qs[pomo.idx];
  if(q.inst){ if(pomo.idx<pomo.qs.length-1){pomo.idx++;ciclos();} return; }
  if(!advance){ q.resp=q.resp===v?null:v; }
  else { q.resp=null; }
  if(advance){ if(pomo.idx<pomo.qs.length-1){ pomo.idx++; } }
  ciclos();
}
async function pomoInst(){
  const q=pomo.qs[pomo.idx];
  if(q.gabarito && q.comentario){ q.inst=true; ciclos(); return; }
  if(q.gabarito && q.fonteGab==='oficial'){
    q.inst=true; ciclos();
    try{ await corrigeLote([{q,i:0}]); }catch(e){ q.comentario=q.comentario||'Gabarito oficial: '+q.gabarito+'. (Comentário da IA indisponível neste ambiente.)'; }
    ciclos(); return;
  }
  const b=document.getElementById('instBtn'); if(b)b.innerHTML='<span class="spin"></span>';
  try{ await corrigeLote([{q,i:0}]); q.inst=true; }
  catch(e){ q.instErr=true; q.inst=true; q.comentario='IA indisponível neste ambiente para corrigir esta questão real. Tente novamente mais tarde ou use questões do acervo inédito (sempre com gabarito).'; }
  ciclos();
}
async function pomoStart(){
  pomo.fase='loading'; pomo.offNote=false; pomo.loadingMsg='o ciclo'; pomo.loadingSub=pomo.fonte==='ia'?'Preparando questões inéditas...':'Sorteando questões reais do banco...';
  ciclos();
  try{
    if(pomo.fonte==='banco'){
      let pool;
      if(pomo.area==='mix'){
        const prop={portugues:.2,matematica:.1,informatica:.1,gerais:.08,legislacao:.17,direito:.35};
        pool=[];
        for(const[a,p]of Object.entries(prop)){
          const need=Math.max(1,Math.round(pomo.qtd*p));
          pool.push(...shuffle(D.banco.filter(i=>i.a===a)).slice(0,need));
        }
        pool=shuffle(pool).slice(0,pomo.qtd);
      } else pool=shuffle(D.banco.filter(i=>i.a===pomo.area)).slice(0,pomo.qtd);
      pomo.qs=pool.map(i=>({enunciado:i.t,gabarito:i.g||null,fonteGab:i.g?'oficial':null,p:i.p,areaNome:AREAS[i.a],a:i.a,fonte:'banco',resp:null,comentario:null,ctx:ctxDe(i)}));
    } else {
      pomo.qs=[];
      // tentar IA em lotes; fallback: acervo
      const areas=pomo.area==='mix'?shuffle(Object.keys(AREAS)):[pomo.area];
      const per=pomo.fmt==='CE'?4:3;
      while(pomo.qs.length<pomo.qtd && iaOn){
        const a=areas[pomo.qs.length%areas.length];
        try{
          const ex=shuffle(D.banco.filter(i=>i.a===a)).slice(0,3).map(i=>'- "'+i.t.slice(0,180)+'"').join('\n');
          const fmt=pomo.fmt==='CE'
            ?'CERTO/ERRADO. JSON: [{"enunciado":"...","gabarito":"C" ou "E","comentario":"porquê curto"}]'
            :'múltipla escolha 5 alternativas curtas. JSON: [{"enunciado":"...","alternativas":["..."x5],"gabarito":"A"-"E","comentario":"porquê curto"}]';
          const need=Math.min(per,pomo.qtd-pomo.qs.length);
          pomo.loadingSub=`Gerando ${pomo.qs.length}/${pomo.qtd}...`; ciclos();
          const r=await claudeJSON(`Elaborador da banca Quadrix, concurso CREF-15/PI, Advogado. Estilo real da área "${AREAS[a]}":\n${ex}\n\nCrie ${need} itens INÉDITOS e AUTOSSUFICIENTES no mesmo estilo, formato ${fmt}. SOMENTE o array JSON.`);
          (Array.isArray(r)?r:[r]).slice(0,need).forEach(q=>{if(q&&q.enunciado&&q.gabarito)pomo.qs.push({...q,fonteGab:'ia',areaNome:AREAS[a],a,fonte:'ia',resp:null})});
        }catch(e){ break; }
      }
      if(pomo.qs.length<pomo.qtd){
        pomo.offNote=true;
        const filt = pomo.area==='mix'
          ? (q)=>(pomo.fmt==='CE'? !q.alts : !!q.alts)
          : (q)=>q.a===pomo.area && (pomo.fmt==='CE'? !q.alts : !!q.alts);
        poolPick(filt, pomo.qtd-pomo.qs.length).forEach(q=>pomo.qs.push({...q,fonteGab:'acervo',fonte:'ia',resp:null}));
      }
      if(pomo.qs.length<pomo.qtd && pomo.fmt==='CE'){
        // completar com questões REAIS de gabarito oficial da área
        const ja=new Set(pomo.qs.map(q=>q.enunciado.slice(0,60)));
        shuffle(D.banco.filter(i=>i.g && (pomo.area==='mix'||i.a===pomo.area) && !ja.has(i.t.slice(0,60))))
          .slice(0,pomo.qtd-pomo.qs.length)
          .forEach(i=>pomo.qs.push({enunciado:i.t,gabarito:i.g,fonteGab:'oficial',p:i.p,areaNome:AREAS[i.a],a:i.a,fonte:'banco',resp:null,comentario:null,ctx:ctxDe(i)}));
      }
      if(pomo.qs.length<pomo.qtd && pomo.fmt==='ME'){
        // completar com acervo de outras áreas
        poolPick(q=>!!q.alts, pomo.qtd-pomo.qs.length).forEach(q=>pomo.qs.push({...q,fonteGab:'acervo',fonte:'ia',resp:null}));
      }
    }
    if(!pomo.qs.length) throw new Error('sem questões disponíveis para esta combinação');
    pomo.idx=0; pomo.fase='run'; pomo.secs=pomo.dur*60;
    clearInterval(pomo.int);
    pomo.int=setInterval(()=>{
      pomo.secs--;
      const t=document.getElementById('pt'); if(t)t.textContent=fmtT(pomo.secs);
      if(pomo.secs<=0){clearInterval(pomo.int);pomoFinish();}
    },1000);
    ciclos();
  }catch(e){ alert('Erro: '+e.message); pomo.fase='setup'; ciclos(); }
}
async function corrigeLote(lote){
  const lista=lote.map((x,j)=>{
    const ctx=x.q.ctx?`\n[CONTEXTO/TEXTO DO ITEM ${j}]: "${x.q.ctx.slice(0,700)}"`:'';
    return `ITEM ${j}: "${x.q.enunciado}"${ctx}${x.q.gabarito?` [GABARITO OFICIAL: ${x.q.gabarito} — não altere]`:''}${x.q.resp?` [candidato marcou: ${x.q.resp}]`:' [em branco]'}`;
  }).join('\n');
  const r=await claudeJSON(`Corretor da banca Quadrix (Advogado). Para cada item CERTO/ERRADO (use o contexto quando fornecido), dê o gabarito e um comentário curto com O PORQUÊ (regra/lei/conceito; se o candidato errou, aponte a pegadinha).\n${lista}\nSOMENTE JSON: [{"i":0,"gabarito":"C" ou "E","comentario":"..."}]`);
  (Array.isArray(r)?r:[r]).forEach(o=>{
    const x=lote[o.i]; if(!x)return;
    if(!x.q.gabarito){x.q.gabarito=o.gabarito;x.q.fonteGab='ia';}
    if(o.comentario)x.q.comentario=o.comentario;
  });
}
async function pomoFinish(){
  clearInterval(pomo.int);
  pomo.fase='loading'; pomo.loadingMsg='o feedback do ciclo'; pomo.loadingSub='Corrigindo e escrevendo o porquê de cada item...';
  ciclos();
  const pend=pomo.qs.map((q,i)=>({q,i})).filter(x=>!x.q.gabarito||!x.q.comentario);
  for(let k=0;k<pend.length && iaOn;k+=2){
    const lote=pend.slice(k,k+2);
    pomo.loadingSub=`Analisando itens ${Math.min(k+2,pend.length)}/${pend.length}...`; ciclos();
    try{ await corrigeLote(lote); }catch(e){}
  }
  // itens oficiais sem comentário ganham porquê padrão
  pomo.qs.forEach(q=>{ if(q.gabarito&&!q.comentario&&q.fonteGab==='oficial') q.comentario='Gabarito oficial da banca: '+(q.gabarito==='C'?'CERTO':'ERRADO')+'. (Comentário automático indisponível neste ambiente.)'; });
  pomoScore(true);
  pomo.fase='feedback'; ciclos();
}
function pomoScore(push){
  let ac=0,er=0,br=0; const erroAreas={};
  pomo.qs.forEach(q=>{
    if(!q.gabarito) return;
    if(!q.resp)br++;
    else if(q.resp===q.gabarito)ac++;
    else {er++; erroAreas[q.areaNome]=(erroAreas[q.areaNome]||0)+1;}
  });
  const pior=Object.entries(erroAreas).sort((a,b)=>b[1]-a[1])[0];
  const dica = er===0
    ? (br===0?'Ciclo perfeito! Aumente a dificuldade: mais questões ou menos tempo.':'Nenhum erro — na regra +1/−1, os brancos foram a decisão certa nos itens em dúvida.')
    : `Você perdeu ${er*2} pontos líquidos com os erros. Maior concentração: ${pior?pior[0]:''}. Releia os porquês antes da pausa — na prova, dúvida = branco.`;
  const h={ac,er,br,area:pomo.area==='mix'?'Misto':AREAS[pomo.area],dica};
  if(push) pomo.hist.push(h); else pomo.hist[pomo.hist.length-1]=h;
}
async function pomoRecorrigir(){
  const pend=pomo.qs.map((q,i)=>({q,i})).filter(x=>!x.q.gabarito||!x.q.comentario);
  pomo.fase='loading'; pomo.loadingMsg='a recorreção'; pomo.loadingSub=`${pend.length} item(ns)...`; ciclos();
  for(let k=0;k<pend.length;k+=2){ try{ await corrigeLote(pend.slice(k,k+2)); }catch(e){} }
  pomoScore(false);
  pomo.fase='feedback'; ciclos();
}
function pomoBreak(){
  pomo.fase='break'; pomo.breakSecs=300; ciclos();
  clearInterval(pomo.int);
  pomo.int=setInterval(()=>{
    pomo.breakSecs--;
    const t=document.getElementById('bt'); if(t)t.textContent=fmtT(pomo.breakSecs);
    if(pomo.breakSecs<=0){clearInterval(pomo.int);pomo.fase='setup';pomo.breakSecs=300;ciclos();}
  },1000);
}

/* ============ BANCO ============ */
let bArea='portugues', bPage=0, bSearch='', bAns={};
function banco(){
  const chips=Object.entries(AREAS).map(([k,v])=>{
    const n=D.banco.filter(i=>i.a===k).length;
    return `<button class="chip ${bArea===k?'on':''}" onclick="bArea='${k}';bPage=0;banco()">${v} <small>${n}</small></button>`;
  }).join('');
  let list=D.banco.filter(i=>i.a===bArea);
  if(bSearch) list=list.filter(i=>i.t.toLowerCase().includes(bSearch));
  const per=25, pages=Math.ceil(list.length/per);
  const slice=list.slice(bPage*per,(bPage+1)*per);
  const cards=slice.map(it=>{
    const id=it.p+'_'+it.n, st=bAns[id]||{};
    let cls='', gabline='';
    if(st.done){
      if(!st.resp) cls='blank2';
      else cls = st.resp===st.gab?'right':'wrong';
      gabline=`<div class="gabtag" style="color:${!st.resp?'var(--muted)':(st.resp===st.gab?'var(--ok)':'var(--bad)')}">${!st.resp?'∅ Sem resposta':(st.resp===st.gab?'✔ Você acertou!':'✘ Você errou')} · Gabarito: ${st.gab==='C'?'CERTO':'ERRADO'} ${st.fonte==='oficial'?'(oficial)':'(correção IA)'}</div>${st.com?`<div class="coment"><b>Porquê:</b> ${esc(st.com)}</div>`:''}`;
    }
    return `<div class="item ${cls}" id="bk_${id}">
      <div class="num">#${it.n}</div>
      <div class="txt">${esc(it.t)}
        ${ctxBox(it, refTexto(it.t))}
        <div class="small" style="margin-top:6px">${it.p} · ${AREAS[it.a]}</div></div>
      <div class="opts">
        <button class="${st.resp==='C'?'selC':''}" onclick="bMarca('${id}','C')">C</button>
        <button class="${st.resp==='E'?'selE':''}" onclick="bMarca('${id}','E')">E</button>
        <button class="btn mini" style="width:auto;height:auto;border-radius:8px" onclick="bCorrige('${id}')" id="cb_${id}">✔ Corrigir</button>
      </div>${gabline}</div>`;
  }).join('');
  document.getElementById('banco').innerHTML=`
  <div class="card"><h2>🏦 Banco de questões reais Quadrix</h2>
  <p class="small">Itens únicos das 19 provas C/E. Marque C ou E e toque em <b>✔ Corrigir</b> para o feedback imediato com o porquê. Quando o item se refere a um texto, ele aparece junto (📄). Itens da CRO-SC têm gabarito oficial.</p>
  <div class="chips">${chips}</div>
  <input class="search" placeholder="🔎 Buscar (ex.: crase, improbidade, firewall...)" value="${esc(bSearch)}" oninput="bSearch=this.value.toLowerCase();bPage=0;bancoDebounce()">
  <div class="small">${list.length} itens nesta seleção</div></div>
  ${cards}
  <div class="pager">
    <button class="btn ghost mini" ${bPage<=0?'disabled':''} onclick="bPage--;banco();window.scrollTo(0,0)">← Anterior</button>
    <span class="small" style="align-self:center">pág. ${bPage+1}/${pages||1}</span>
    <button class="btn ghost mini" ${bPage>=pages-1?'disabled':''} onclick="bPage++;banco();window.scrollTo(0,0)">Próxima →</button>
  </div>`;
}
let bT=null; function bancoDebounce(){clearTimeout(bT);bT=setTimeout(banco,350);}
function bMarca(id,v){const s=bAns[id]=bAns[id]||{};s.resp=s.resp===v?null:v;s.done=false;banco();}
async function bCorrige(id){
  const [p,n]=[id.slice(0,id.lastIndexOf('_')),+id.slice(id.lastIndexOf('_')+1)];
  const it=D.banco.find(i=>i.p===p&&i.n===n);
  const s=bAns[id]=bAns[id]||{};
  if(it.g){
    s.done=true; s.gab=it.g; s.fonte='oficial'; banco();
    try{
      const ctx=ctxDe(it);
      const r=await claudeJSON(`Explique em até 2 frases por que o item de prova abaixo é ${it.g==='C'?'CERTO':'ERRADO'} (gabarito oficial da Quadrix), citando a regra/lei.\n${ctx?`[CONTEXTO]: "${ctx.slice(0,700)}"\n`:''}[ITEM]: "${it.t}"\nSOMENTE JSON: {"comentario":"..."}`);
      s.com=r.comentario; banco();
    }catch(e){}
    return;
  }
  const btn=document.getElementById('cb_'+id); if(btn)btn.innerHTML='<span class="spin"></span>';
  try{
    const ctx=ctxDe(it);
    const r=await claudeJSON(`Corretor da banca Quadrix (Advogado). Julgue o item CERTO/ERRADO${ctx?' considerando o contexto':''}:\n${ctx?`[CONTEXTO/TEXTO]: "${ctx.slice(0,900)}"\n`:''}[ITEM]: "${it.t}"\nSOMENTE JSON: {"gabarito":"C" ou "E","comentario":"porquê em até 2 frases"}`);
    s.done=true; s.gab=r.gabarito; s.com=r.comentario; s.fonte='ia';
  }catch(e){
    s.done=false;
    alert('A correção por IA não está disponível neste ambiente para itens sem gabarito oficial. Dica: os itens da prova CRO-SC (e todo o acervo inédito nos Ciclos/Gerar/Milhão) têm gabarito garantido.');
  }
  banco();
}

/* ============ GERADOR ============ */
let gArea='portugues', gFmt='CE', gQtd=5, gItems=[], gLoading=false, gProg='', gOff=false;
function gerar(){
  const chips=Object.entries(AREAS).map(([k,v])=>`<button class="chip ${gArea===k?'on':''}" onclick="gArea='${k}';gerar()">${v}</button>`).join('');
  const qs=gItems.map((q,i)=>{
    let body='';
    const letras=q.alternativas?'ABCDE'.slice(0,q.alternativas.length):null;
    if(q.alternativas){
      body=`<div class="alts">${q.alternativas.map((alt,j)=>{
        const L=letras[j]; let c='';
        if(q.corrigido){ if(L===q.gabarito)c='gok'; else if(q.resp===L)c='gbad'; }
        else if(q.resp===L)c='sel';
        return `<button class="${c}" onclick="gResp(${i},'${L}')"><b>${L})</b> ${esc(alt)}</button>`;}).join('')}</div>`;
    } else {
      body=`<div class="opts h"><button class="${q.resp==='C'?'selC':''}" onclick="gResp(${i},'C')">C</button><button class="${q.resp==='E'?'selE':''}" onclick="gResp(${i},'E')">E</button></div>`;
    }
    const gab=q.corrigido?`<div class="gabtag" style="color:${!q.resp?'var(--muted)':(q.resp===q.gabarito?'var(--ok)':'var(--bad)')}">${!q.resp?'∅ Em branco':(q.resp===q.gabarito?'✔ Você acertou!':'✘ Você marcou '+q.resp)} · Gabarito: ${q.gabarito}</div><div class="coment"><b>Porquê:</b> ${esc(q.comentario||'')}</div>`:'';
    return `<div class="item ${q.corrigido&&q.resp?(q.resp===q.gabarito?'right':'wrong'):''}"><div class="num">${i+1}</div><div class="txt">${esc(q.enunciado)}${body}
    ${q.corrigido?'':`<div style="margin-top:8px"><button class="btn mini" onclick="gItems[${i}].corrigido=true;gerar()">✔ Corrigir</button></div>`}
    </div>${gab}</div>`;
  }).join('');
  document.getElementById('gerar').innerHTML=`
  <div class="card"><h2>✨ Questões inéditas — estilo Quadrix</h2>
  <p class="small">Cada questão vem com C/E (ou alternativas), botão <b>✔ Corrigir</b> individual e feedback imediato com o porquê. Com IA disponível, gera ilimitado; sem IA, usa o acervo inédito embutido (60 questões elaboradas a partir do padrão das 19 provas).</p>
  <div class="chips">${chips}</div>
  <div class="chips">
    <button class="chip ${gFmt==='CE'?'on':''}" onclick="gFmt='CE';gerar()">Certo/Errado</button>
    <button class="chip ${gFmt==='ME'?'on':''}" onclick="gFmt='ME';gerar()">Múltipla escolha</button>
  </div>
  <h2 style="font-size:14px">Quantidade</h2>
  <div class="chips">${[3,5,10,15].map(n=>`<button class="chip ${gQtd===n?'on':''}" onclick="gQtd=${n};gerar()">${n}</button>`).join('')}</div>
  ${gOff?`<div class="notice">${AVISO_OFF}</div>`:''}
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn" onclick="gGerar()" ${gLoading?'disabled':''}>${gLoading?'<span class="spin"></span> '+gProg:'⚡ Gerar '+gQtd+' questões'}</button>
    ${gItems.length&&!gLoading?`<button class="btn ghost" onclick="gItems.forEach(q=>q.corrigido=true);gerar()">✔ Corrigir todas</button>
    <button class="btn ghost" onclick="gGerar()">↻ Gerar novas</button>`:''}
  </div></div>
  ${qs}`;
}
function gResp(i,v){ if(gItems[i].corrigido)return; gItems[i].resp=gItems[i].resp===v?null:v; gerar(); }
async function gGerar(){
  gLoading=true; gOff=false; gItems=[]; gProg='Gerando 0/'+gQtd+'...'; gerar();
  const per=gFmt==='CE'?4:3;
  const fmt = gFmt==='CE'
    ? 'CERTO/ERRADO. JSON: [{"enunciado":"...","gabarito":"C" ou "E","comentario":"porquê curto"}]'
    : 'múltipla escolha 5 alternativas curtas. JSON: [{"enunciado":"...","alternativas":["..."x5],"gabarito":"A"-"E","comentario":"porquê curto"}]';
  while(gItems.length<gQtd && iaOn){
    try{
      const ex=shuffle(D.banco.filter(i=>i.a===gArea)).slice(0,3).map(i=>'- "'+i.t.slice(0,180)+'"').join('\n');
      const need=Math.min(per,gQtd-gItems.length);
      gProg=`Gerando ${gItems.length}/${gQtd}...`; gerar();
      const r=await claudeJSON(`Elaborador da banca Instituto Quadrix, concurso CREF-15/PI, Advogado. Estilo real da área "${AREAS[gArea]}":\n${ex}\n\nCrie ${need} itens INÉDITOS e AUTOSSUFICIENTES no mesmo estilo, com pegadinhas típicas ("sempre/nunca/somente", trocas de termos legais). Formato ${fmt}\nSOMENTE o array JSON, sem markdown.`);
      (Array.isArray(r)?r:[r]).slice(0,need).forEach(q=>{if(q&&q.enunciado&&q.gabarito)gItems.push({...q,resp:null,corrigido:false})});
      gerar();
    }catch(e){ break; }
  }
  if(gItems.length<gQtd){
    gOff=true;
    poolPick(q=>q.a===gArea && (gFmt==='CE'? !q.alts : !!q.alts), gQtd-gItems.length)
      .forEach(q=>gItems.push({...q,resp:null,corrigido:false}));
  }
  if(gItems.length<gQtd && gFmt==='CE'){
    const ja=new Set(gItems.map(q=>q.enunciado.slice(0,60)));
    shuffle(D.banco.filter(i=>i.g && i.a===gArea && !ja.has(i.t.slice(0,60))))
      .slice(0,gQtd-gItems.length)
      .forEach(i=>gItems.push({enunciado:i.t,gabarito:i.g,comentario:'Gabarito oficial da banca (prova CRO-SC 2023). Use ✔ Corrigir com IA disponível para obter o comentário detalhado.',resp:null,corrigido:false,oficial:true}));
  }
  if(gItems.length<gQtd && gFmt==='ME'){
    poolPick(q=>!!q.alts, gQtd-gItems.length).forEach(q=>gItems.push({...q,resp:null,corrigido:false}));
  }
  gLoading=false; gerar(); window.scrollTo(0,0);
}

/* ============ PROVA / SIMULADO ============ */
function blocoDe(n){return n<=40?'bas':(n<=70?'comp':'esp');}
function startBox(sec,titulo,desc){
  document.getElementById(sec).innerHTML=`<div class="card startbox"><h2>${titulo}</h2>
  <p style="margin:10px 0 4px">${desc}</p>
  <p class="small" style="margin-bottom:18px">120 itens · 3 horas · certo +1 · errado −1 · branco 0<br>Mínimos: Básicos 10 · Complementares 8 · Específicos 12 · Total 34</p>
  <button class="btn" onclick="iniciar('${sec}')">▶ Iniciar</button></div>`;
}
function iniciar(sec){
  mode=sec;answers={};finished=false;secs=3*3600;
  if(sec==='prova'){order=D.itens.map(i=>i.n);}
  else{order=[...shuffle(D.itens.filter(i=>i.n<=40).map(i=>i.n)),...shuffle(D.itens.filter(i=>i.n>40&&i.n<=70).map(i=>i.n)),...shuffle(D.itens.filter(i=>i.n>70).map(i=>i.n))];}
  render(sec);
  document.getElementById('fbar').style.display='flex';
  const tEl=document.getElementById('timer');tEl.style.display='';
  clearInterval(timerInt);
  timerInt=setInterval(()=>{secs--;if(secs<=0){clearInterval(timerInt);corrigir();return;}
    const h=String(Math.floor(secs/3600)).padStart(2,'0'),m=String(Math.floor(secs%3600/60)).padStart(2,'0'),s=String(secs%60).padStart(2,'0');
    tEl.textContent=`${h}:${m}:${s}`;tEl.classList.toggle('warn',secs<600);},1000);
  window.scrollTo(0,0);
}
function render(sec){
  const byN=Object.fromEntries(D.itens.map(i=>[i.n,i]));
  let out=`<div id="resultado"></div>`;let lastB=null,lastC=null,pos=0;
  const nomes={bas:'CONHECIMENTOS BÁSICOS · 1–40',comp:'CONHECIMENTOS COMPLEMENTARES · 41–70',esp:'CONHECIMENTOS ESPECÍFICOS · 71–120'};
  for(const n of order){
    const it=byN[n],b=blocoDe(n);pos++;
    if(b!==lastB){out+=`<div class="bloco-h">${nomes[b]}</div>`;lastB=b;lastC=null;}
    if(it.ctx&&it.ctx!==lastC){
      const c=D.contextos[it.ctx];
      if(mode==='prova'){ out+=`<div class="ctx">${esc(c)}</div>`; }
      else { out+=`<details class="ctxd" style="margin:14px 0 4px"><summary>📄 Texto / contexto dos próximos itens</summary><div class="body">${esc(c)}</div></details>`; }
      lastC=it.ctx;
    }
    out+=`<div class="item" id="it${n}"><div class="num">${mode==='prova'?n:pos}</div><div class="txt">${esc(it.text)}</div>
    <div class="opts"><button id="C${n}" onclick="marca(${n},'C')">C</button><button id="E${n}" onclick="marca(${n},'E')">E</button></div>
    <div class="gabtag" id="g${n}"></div></div>`;
  }
  document.getElementById(sec).innerHTML=out;
}
function marca(n,v){
  if(finished)return;
  if(answers[n]===v){delete answers[n];}else{answers[n]=v;}
  document.getElementById('C'+n).className=answers[n]==='C'?'selC':'';
  document.getElementById('E'+n).className=answers[n]==='E'?'selE':'';
  const r=Object.keys(answers).length;
  document.getElementById('prog').textContent=`${r}/120 respondidas · ${120-r} em branco`;
}
function corrigir(){
  if(!mode||finished)return;
  finished=true;clearInterval(timerInt);
  document.getElementById('fbar').style.display='none';
  const g=D.gab;const sc={bas:0,comp:0,esp:0};const st={bas:[0,0,0],comp:[0,0,0],esp:[0,0,0]};
  for(const it of D.itens){
    const n=it.n,b=blocoDe(n),corr=g[n-1],resp=answers[n];
    const el=document.getElementById('it'+n),gt=document.getElementById('g'+n);
    gt.textContent='Gab: '+corr;
    if(!resp){st[b][2]++;el.classList.add('blank2');gt.style.color='#7a746a';}
    else if(resp===corr){sc[b]+=1;st[b][0]++;el.classList.add('right');gt.style.color='var(--ok)';}
    else{sc[b]-=1;st[b][1]++;el.classList.add('wrong');gt.style.color='var(--bad)';}
  }
  const tot=sc.bas+sc.comp+sc.esp;
  const ok=sc.bas>=MIN.bas&&sc.comp>=MIN.comp&&sc.esp>=MIN.esp&&tot>=MIN.total;
  const row=(nm,k,mn)=>`<div>${nm}</div><div>${st[k][0]}✔ ${st[k][1]}✘ ${st[k][2]}∅</div><div><b>${sc[k]}</b></div><div class="${sc[k]>=mn?'pass':'fail'}">${sc[k]>=mn?'OK':'< '+mn}</div>`;
  document.getElementById('resultado').innerHTML=`<div class="card">
  <h2>${ok?'✅ APROVADO na prova objetiva':'❌ ELIMINADO (critérios do edital)'}</h2>
  <div class="res-grid" style="margin-top:10px">
  <div class="hd">Bloco</div><div class="hd">✔/✘/∅</div><div class="hd">Nota</div><div class="hd">Mínimo</div>
  ${row('Básicos','bas',MIN.bas)}${row('Complementares','comp',MIN.comp)}${row('Específicos','esp',MIN.esp)}
  <div><b>TOTAL</b></div><div></div><div><b>${tot}</b></div><div class="${tot>=MIN.total?'pass':'fail'}">${tot>=MIN.total?'OK':'< '+MIN.total}</div></div>
  <button class="btn ghost" style="margin-top:12px" onclick="iniciar(mode)">↻ Refazer</button></div>`;
  window.scrollTo(0,0);
}

dash(); ciclos(); milhao(); banco(); gerar();
startBox('prova','Prova Real — CRO-SC 2023 · Advogado (Quadrix)','Prova oficial completa com textos-base e gabarito definitivo verificado. Estrutura idêntica ao CREF-15/PI: 40+30+50.');
startBox('simulado','Simulado Real — modo CREF-15/PI','120 itens reais embaralhados por bloco, mantendo a proporção 40/30/50 do edital, contra o relógio.');
</script>
