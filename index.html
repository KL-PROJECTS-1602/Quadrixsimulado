ernacionais foram bloqueadas na rede social de sua propriedade.", "c": "advogado15:6"}, {"p": "advogado15", "n": 61, "a": "legislacao", "t": "A renúncia do presidente boliviano, Evo Morales,  relaciona‑se diretamente ao suprimento de lítio, material utilizado na bateria de carros elétricos, sendo a Bolívia o maior produtor desse metal alcalino no mundo.", "c": "advogado15:6"}, {"p": "advogado15", "n": 62, "a": "legislacao", "t": "Atualmente, no mercado automobilístico, os carros  elétricos vêm ganhando mercado em escala mundial, e a maior concorrência responde pela chinesa BYD e a norte‑americana Tesla.", "c": "advogado15:6"}, {"p": "advogado15", "n": 63, "a": "direito", "t": "Além da Tesla, outras fabricantes de carros elétricos  ainda avaliam o custo e a possibilidade de uso da inteligência artificial no que diz respeito ao desempenho, aos recursos de segurança, à experiência do usuário e à maior eficiência.", "c": "advogado15:6"}, {"p": "advogado15", "n": 64, "a": "legislacao", "t": "Na contenda junto a um dos ministros do STF  brasileiro, Elon Musk, ao se encontrar com o presidente argentino Javier Milei, conseguiu apoio no processo que a rede social X (antigo Twitter) enfrenta no Brasil.", "c": "advogado15:6"}, {"p": "advogado15", "n": 65, "a": "legislacao", "t": "As cúpulas dos Poderes Judiciário e Legislativo do  Brasil receberam duras críticas do Poder Executivo pela não manifestação relativa às críticas feitas pelo bilionário Elon Musk à atuação do STF. Em relação às relações internacionais quanto à invasão da embaixada mexicana em Quito, realizada com o intuito de capturar o ex‑vice‑presidente equatoriano Jorge Glas,", "c": "advogado15:6"}, {"p": "advogado15", "n": 66, "a": "legislacao", "t": "As relações diplomáticas do México com o Equador  estremeceram, devido a uma invasão da polícia equatoriana à embaixada mexicana.", "c": "advogado15:6"}, {"p": "advogado15", "n": 67, "a": "direito", "t": "O Tribunal Penal Internacional de Haia manifestou‑se  logo após saber que os agentes equatorianos agrediram o diplomata mexicano Roberto Canseco.", "c": "advogado15:6"}, {"p": "advogado15", "n": 68, "a": "gerais", "t": "O México, ao denunciar o Equador, pediu a suspensão  do país sul‑americano na Organizações das Nações Unidas (ONU).", "c": "advogado15:6"}, {"p": "advogado15", "n": 69, "a": "legislacao", "t": "Na circunstância da referida invasão, o presidente  mexicano, López Obrador, afirmou que o Equador violou a soberania do México e rompeu relações diplomáticas com o país sul‑americano.", "c": "advogado15:6"}, {"p": "advogado15", "n": 70, "a": "direito", "t": "O fato de a invasão ter acontecido em território  equatoriano protege o governo sul‑americano no contexto geopolítico internacional.  Prova aplicada CRO-AM ADVOGADO CONSELHO REGIONAL DE ODONTOLOGIA DO AMAZONAS INSTITUTO QUADRIX – APLICAÇÃO: 2024 7", "c": "advogado15:6"}, {"p": "advogado15", "n": 71, "a": "direito", "t": "A feição de garantias institucionais dos direitos  fundamentais desempenha a função de proteção de bens jurídicos indispensáveis à preservação de certos valores reputados essenciais por uma sociedade.", "c": "advogado15:7"}, {"p": "advogado15", "n": 72, "a": "direito", "t": "Os direitos fundamentais, como os direitos de defesa,  abarcam a pretensão de abstenção, a pretensão de revogação e a pretensão de anulação, oponíveis notadamente ao Estado.", "c": "advogado15:7"}, {"p": "advogado15", "n": 73, "a": "direito", "t": "Na perspectiva liberal, a efetividade dos direitos  fundamentais delega uma implementação pelo Estado na sociedade que pode transcorrer em graus, de um modo não efetivo para todos.", "c": "advogado15:7"}, {"p": "advogado15", "n": 74, "a": "direito", "t": "Na perspectiva comunitarista, a efetividade dos  direitos fundamentais delega uma implementação pelo Estado, a qual deve transcorrer de modo igual e para todos.", "c": "advogado15:7"}, {"p": "advogado15", "n": 75, "a": "direito", "t": "Decorre da característica da relatividade dos direitos  fundamentais a inexistência de hierarquia entre eles.", "c": "advogado15:7"}, {"p": "advogado15", "n": 76, "a": "direito", "t": "Não se concederá mandado de segurança quando se  tratar de ato do qual caiba recurso administrativo com efeito suspensivo, independentemente de caução.", "c": "advogado15:7"}, {"p": "advogado15", "n": 77, "a": "direito", "t": "A decisão denegatória de mandado de segurança, não  fazendo coisa julgada contra o impetrante, impede o uso da ação própria.", "c": "advogado15:7"}, {"p": "advogado15", "n": 78, "a": "direito", "t": "O prazo para a impetração do mandado de segurança  é de 120 dias a contar do conhecimento oficial, pelo interessado, do ato a ser impugnado. Esse prazo é decadencial e, portanto, após iniciado, não se interrompe nem se suspende.", "c": "advogado15:7"}, {"p": "advogado15", "n": 79, "a": "direito", "t": "Se a impetração do mandado de segurança se  deu originariamente em um Tribunal e este, por ato do relator, indefere de plano a petição inicial, caberá apelação.", "c": "advogado15:7"}, {"p": "advogado15", "n": 80, "a": "direito", "t": "Conforme o entendimento doutrinário e  jurisprudencial, o direito líquido e certo é aquele direito comprovado de plano, que resulta de fato certo, com prova inequívoca, apto e manifesto no ato de sua existência.", "c": "advogado15:7"}, {"p": "advogado15", "n": 81, "a": "direito", "t": "Poder disciplinar é o que cabe à Administração Pública  para se apurar as infrações e aplicar as penalidades aos servidores públicos e às demais pessoas sujeitas à disciplina administrativa. Esse é o caso dos estudantes de uma escola pública.", "c": "advogado15:8"}, {"p": "advogado15", "n": 82, "a": "direito", "t": "É possível apontar como atributo do poder de polícia a  delegabilidade às pessoas jurídicas de direito privado.", "c": "advogado15:8"}, {"p": "advogado15", "n": 83, "a": "direito", "t": "O poder de polícia administrativa é a competência  para disciplinar o exercício da autonomia privada para a realização de direitos fundamentais e da democracia, segundo os princípios da legalidade e da proporcionalidade.", "c": "advogado15:8"}, {"p": "advogado15", "n": 84, "a": "direito", "t": "O poder de polícia, como medida discricionária, não  esbarra em limitações traçadas pela lei.", "c": "advogado15:8"}, {"p": "advogado15", "n": 85, "a": "direito", "t": "A autoexecutoriedade é a possibilidade que tem a  Administração de, com os próprios meios, pôr em execução suas decisões, precisando, apenas, recorrer previamente ao Poder Judiciário.", "c": "advogado15:8"}, {"p": "advogado15", "n": 86, "a": "direito", "t": "O cônjuge, quando o casal adotar o regime de  separação absoluta, só estará legitimado a alienar, hipotecar ou gravar de ônus reais os bens imóveis depois de obter a autorização do outro ou o suprimento judicial de seu consentimento.", "c": "advogado15:8"}, {"p": "advogado15", "n": 87, "a": "direito", "t": "Como principais efeitos da compra e da venda, é  possível elencar as obrigações recíprocas para os contratantes e o acarretamento da responsabilidade do vendedor pelos vícios redibitórios e pela evicção.", "c": "advogado15:8"}, {"p": "advogado15", "n": 88, "a": "direito", "t": "É anulável a venda de ascendente a descendente,  salvo se os outros descendentes e o cônjuge do alienante expressamente houverem consentido.", "c": "advogado15:8"}, {"p": "advogado15", "n": 89, "a": "direito", "t": "A partir da negociação entre o comprador e o  vendedor, é possível deixar ao arbítrio daquele a taxação do preço.", "c": "advogado15:8"}, {"p": "advogado15", "n": 90, "a": "direito", "t": "Como, em regra, a compra e a venda podem ser  efetuadas por qualquer pessoa capaz, o Código Civil permite, excepcionalmente, que os tutores comprem os bens confiados à sua proteção.  Prova aplicada CRO-AM ADVOGADO CONSELHO REGIONAL DE ODONTOLOGIA DO AMAZONAS INSTITUTO QUADRIX – APLICAÇÃO: 2024 8", "c": "advogado15:8"}, {"p": "advogado15", "n": 91, "a": "direito", "t": "É possível conceituar os recursos como meio ou  instrumento destinado a provocar o reexame da decisão judicial, que dá origem a uma nova relação processual, com a finalidade de obter‑lhe a invalidação, a reforma, o esclarecimento ou a integração.", "c": "advogado15:8"}, {"p": "advogado15", "n": 92, "a": "direito", "t": "À luz da legislação processual e da jurisprudência  pátria, não há previsão do duplo grau de jurisdição horizontal, isto é, a decisão não pode ser revista por um órgão da mesma hierarquia, com composição diversa.", "c": "advogado15:8"}, {"p": "advogado15", "n": 93, "a": "direito", "t": "O Código de Processo Civil de 2015 prevê, como  hipótese de fungibilidade recursal, que, se o órgão julgador entender que os embargos de declaração opostos pela parte não são o meio impugnativo adequado, ele poderá conhecê‑los como agravo interno.", "c": "advogado15:8"}, {"p": "advogado15", "n": 94, "a": "direito", "t": "Para efetivar os princípios da economia processual e  da celeridade, admite‑se a interposição da apelação perante o tribunal competente.", "c": "advogado15:8"}, {"p": "advogado15", "n": 95, "a": "direito", "t": "O agravo de instrumento, via de regra, limita‑se ao  efeito devolutivo.", "c": "advogado15:8"}, {"p": "advogado15", "n": 96, "a": "direito", "t": "Imunidade recíproca é aquela que impede que os  entes políticos cobrem impostos uns dos outros. Essa imunidade também diz respeito a outras espécies tributárias, como contribuições ou taxas.", "c": "advogado15:9"}, {"p": "advogado15", "n": 97, "a": "direito", "t": "Em relação ao lançamento por declaração, é o  contribuinte quem apura e paga o tributo, cabendo ao fisco simplesmente chancelar tal apuração quando a entender correta.", "c": "advogado15:9"}, {"p": "advogado15", "n": 98, "a": "direito", "t": "A existência de ação judicial tem, por si só, efeito  suspensivo da exigibilidade do crédito tributário. Com o ajuizamento da ação judicial, já não mais se poderá falar em impugnação ou em recurso administrativo suspensivo da exigibilidade.", "c": "advogado15:9"}, {"p": "advogado15", "n": 99, "a": "direito", "t": "A Fazenda Pública poderá adjudicar os bens  penhorados antes do leilão, pelo preço da avaliação, se a execução não for embargada ou se forem rejeitados os embargos.", "c": "advogado15:9"}, {"p": "advogado15", "n": 100, "a": "direito", "t": "A imunidade dos livros, dos jornais, dos periódicos  e do papel para sua impressão, de acordo com entendimento do Supremo Tribunal Federal (STF), abrange a tinta especial para jornal, máquinas e aparelhos utilizados por empresas jornalísticas.", "c": "advogado15:9"}, {"p": "advogado15", "n": 101, "a": "direito", "t": "Tributo é toda prestação pecuniária compulsória,  em moeda ou cujo valor nela se possa exprimir, que não constitua sanção de ato ilícito, instituída em lei e cobrada mediante atividade administrativa plenamente vinculada.", "c": "advogado15:9"}, {"p": "advogado15", "n": 102, "a": "direito", "t": "O crédito tributário extingue‑se quando as  impugnações e os recursos administrativos forem tempestivos.", "c": "advogado15:9"}, {"p": "advogado15", "n": 103, "a": "direito", "t": "As decisões liminares (em mandado de segurança)  e as tutelas provisórias de urgência ou de evidência extinguem o crédito tributário.", "c": "advogado15:9"}, {"p": "advogado15", "n": 104, "a": "direito", "t": "Fato gerador da obrigação acessória é qualquer  situação que, na forma da legislação aplicável, imponha a prática ou a abstenção de ato que não configure obrigação principal.", "c": "advogado15:9"}, {"p": "advogado15", "n": 105, "a": "direito", "t": "A natureza jurídica específica do tributo é determinada  pelo fato gerador da respectiva obrigação, sendo irrelevantes para qualificá‑la a denominação e as demais características formais adotadas pela lei, bem como a destinação legal do produto de sua arrecadação.  Prova aplicada CRO-AM ADVOGADO CONSELHO REGIONAL DE ODONTOLOGIA DO AMAZONAS INSTITUTO QUADRIX – APLICAÇÃO: 2024 9 Em relação à suspensão e à interrupção do contrato de", "c": "advogado15:9"}, {"p": "advogado15", "n": 106, "a": "direito", "t": "Em caso de afastamento de empregado, decorrente de  licença médica de dezoito meses, este estará sujeito a reajuste salarial decorrente de negociação coletiva e à alteração na nomenclatura do cargo que ocorreram durante o período de seu afastamento.", "c": "advogado15:9"}, {"p": "advogado15", "n": 107, "a": "direito", "t": "A falência do empregador e a convocação do  empregado para perícias previdenciárias geram a extinção do contrato de trabalho.", "c": "advogado15:9"}, {"p": "advogado15", "n": 108, "a": "direito", "t": "Nos casos de contratos provisórios e temporários,  não serão computados, na contagem de prazo para a respectiva terminação, os dias que o empregado estiver afastado.", "c": "advogado15:9"}, {"p": "advogado15", "n": 109, "a": "direito", "t": "Em casos de substituição de caráter não eventual do  empregado, tendo em vista férias de quinze dias do referido, o empregado substituto não terá direito ao salário contratual integral do substituído.", "c": "advogado15:9"}, {"p": "advogado15", "n": 110, "a": "direito", "t": "O empregado poderá deixar de comparecer ao  trabalho, sem prejuízo a seu salário, por três dias seguidos nos casos de falecimento de ascendente e por cinco dias nos casos de cônjuge.", "c": "advogado15:9"}, {"p": "advogado15", "n": 111, "a": "direito", "t": "É sabido que, quanto ao procedimento, as ações  trabalhistas podem ser processadas sob o rito ordinário e sumaríssimo. O ordinário compreende ações em que o valor da causa não será superior a quarenta salários mínimos.", "c": "advogado15:10"}, {"p": "advogado15", "n": 112, "a": "direito", "t": "As decisões interlocutórias são irrecorríveis,  admitindo‑se a apreciação dessas decisões apenas no recurso da decisão definitiva.", "c": "advogado15:10"}, {"p": "advogado15", "n": 113, "a": "direito", "t": "A massa falida e as empresas em liquidação  extrajudicial não estão sujeitas ao pagamento de custas nem ao depósito recursal.", "c": "advogado15:10"}, {"p": "advogado15", "n": 114, "a": "direito", "t": "O empregador pode fazer‑se substituir pelo gerente ou  por qualquer outro preposto que tenha conhecimento do fato e cujas declarações obrigarão o preponente.", "c": "advogado15:10"}, {"p": "advogado15", "n": 115, "a": "direito", "t": "Se, por doença ou por qualquer outro motivo  relevante, devidamente comprovado, não for possível ao empregado comparecer pessoalmente, poderá fazer‑se representar por outro empregado que pertença à mesma profissão ou por seu sindicato.", "c": "advogado15:10"}, {"p": "advogado15", "n": 116, "a": "direito", "t": "O Conselho Federal de Odontologia (CFO) compor‑se‑á  de doze membros e de outros tantos suplentes, todos de nacionalidade brasileira, com mandato trienal, eleitos por escrutínio secreto e maioria absoluta de votos em assembleia dos delegados dos Conselhos Regionais.", "c": "advogado15:10"}, {"p": "advogado15", "n": 117, "a": "direito", "t": "Os membros efetivos e suplentes do CFO serão eleitos  pelos delegados eleitores dos Conselhos Regionais, em um pleito que deverá realizar‑se, pelo menos, trinta dias antes do término do mandato dos conselheiros em exercício. Nesse caso, o presidente do Conselho Federal declarará inscrita a chapa apresentada por dez cirurgiões‑dentistas ou por cinco presidentes de Conselho Regional.", "c": "advogado15:10"}, {"p": "advogado15", "n": 118, "a": "gerais", "t": "Os membros efetivos e suplentes dos Conselhos  Regionais serão eleitos por maioria absoluta de votos dos cirurgiões‑dentistas inscritos em seu quadro, em eleição que deverá realizar‑se, pelo menos, sessenta dias antes do término do mandato dos conselheiros em exercício.", "c": "advogado15:10"}, {"p": "advogado15", "n": 119, "a": "direito", "t": "O presidente do Conselho Federal tem a competência  de presidir sessões do Conselho Federal, representá‑lo judicial e extrajudicialmente, velar pelo decoro e pela independência dos Conselhos de Odontologia e pelo livre exercício legal dos direitos de seus membros.", "c": "advogado15:10"}, {"p": "advogado16", "n": 1, "a": "portugues", "t": "A oração “Ele afirma que essa mistura de espécies de  climas temperados e do Ártico, vivendo lado a lado, não tem equivalente na era moderna” (linhas de 15 a 17) é classificada como subordinada objetiva indireta.", "c": "advogado16:1"}, {"p": "advogado16", "n": 2, "a": "portugues", "t": "Estaria preservada a correção gramatical do texto caso  fosse inserida uma vírgula imediatamente após o termo “Esta técnica” (linha 22).", "c": "advogado16:1"}, {"p": "advogado16", "n": 3, "a": "portugues", "t": "Na oração “Estudar o DNA em uma gota de água do mar,  por exemplo, pode revelar todas as criaturas que viveram em um trecho de oceano” (linhas de 23 a 25), o pronome relativo “que” introduz uma oração subordinada adjetiva explicativa.", "c": "advogado16:1"}, {"p": "advogado16", "n": 4, "a": "portugues", "t": "O texto, estruturado em forma narrativa, traz  informações científicas importantes sobre novas descobertas no norte da Groelândia que podem mudar a forma como se enxerga o mundo antigo.", "c": "advogado16:1"}, {"p": "advogado16", "n": 5, "a": "portugues", "t": "A crase empregada em “contou à BBC” (linha 34) deve-se  à regência do verbo contar, que, no sentido utilizado no texto, é transitivo indireto e requer a preposição “a”.", "c": "advogado16:1"}, {"p": "advogado16", "n": 6, "a": "portugues", "t": "Na linha 28, estaria preservada a correção gramatical do  texto caso o adjetivo “antigo” estivesse flexionado no plural, concordando com “amostras”.", "c": "advogado16:1"}, {"p": "advogado16", "n": 7, "a": "portugues", "t": "O “Mas” (linha 2) introduz uma oração coordenada  adversativa e pode ser substituído por porém, sem alteração de sentido do texto.", "c": "advogado16:1"}, {"p": "advogado16", "n": 8, "a": "portugues", "t": "Na linha 18, a partícula “se”, em “a equipe  concentrou-se”, indica que o sujeito da oração é indeterminado.", "c": "advogado16:1"}, {"p": "advogado16", "n": 9, "a": "portugues", "t": "O verbo “conseguisse” (linha 39) está no modo  subjuntivo, indicando uma possibilidade ou uma incerteza.", "c": "advogado16:1"}, {"p": "advogado16", "n": 10, "a": "portugues", "t": "Na linha 10, o sujeito da oração “era difícil” é “deste  estudo”.", "c": "advogado16:1"}, {"p": "advogado16", "n": 11, "a": "portugues", "t": "É correto inferir do texto que os mastodontes guardam  semelhanças genéticas com os elefantes, animais que perambulavam ao lado de renas e gansos entre as árvores da região, como bétulas e álamos.", "c": "advogado16:1"}, {"p": "advogado16", "n": 12, "a": "portugues", "t": "De acordo com o texto, o DNA presente em uma gota de  água do mar é capaz de mostrar todas as criaturas que viveram no oceano.", "c": "advogado16:1"}, {"p": "advogado16", "n": 13, "a": "portugues", "t": "“Se mais DNA ambiental remanescente for encontrado  em outros locais, a descoberta pode mudar a forma como enxergamos o mundo antigo” (linhas de 41 a 43) por Quanto mais DNA ambiental remanescente for encontrado em outros locais, mais descobertas mudarão a forma como enxergamos o mundo antigo", "c": "advogado16:2"}, {"p": "advogado16", "n": 14, "a": "direito", "t": "“Ele afirma que essa mistura de espécies de climas  temperados e do Ártico, vivendo lado a lado, não tem equivalente na era moderna” (linhas de 15 a 17) por “A era moderna nunca presenciou algo parecido: essa mistura de espécies vivendo lado a lado”, afirma o cientista  CONSELHO REGIONAL DE ADMINISTRAÇÃO DE PERNAMBUCO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRA-PE ADVOGADO 2", "c": "advogado16:2"}, {"p": "advogado16", "n": 15, "a": "portugues", "t": "“Antes deste estudo, era difícil observar como era a  região dois milhões de anos atrás. Os fósseis de animais daquele período são extremamente raros por ali” (linhas de 10 a 12) por Antes deste estudo, era difícil observar como era a região dois milhões de anos atrás, pois os fósseis de animais daquele período são extremamente raros por ali", "c": "advogado16:2"}, {"p": "advogado16", "n": 16, "a": "portugues", "t": "“O professor Eske Willerslev, da Universidade de  Copenhague, na Dinamarca, e de Cambridge, no Reino Unido, conduziu os estudos. Ele afirma que essa mistura de espécies de climas temperados e do Ártico, vivendo lado a lado, não tem equivalente na era moderna” (linhas de 13 a 17) por O professor Eske Willerslev, da Universidade de Copenhague, na Dinamarca, e de Cambridge, no Reino Unido, conduziu os estudos. Ele afirma que essa mistura de espécies de climas temperados e do Ártico, vivendo lado a lado, não têm equivalente na era moderna", "c": "advogado16:2"}, {"p": "advogado16", "n": 17, "a": "portugues", "t": "“Os pesquisadores levaram anos para desenvolver a  melhor técnica a ser usada. Eles chegaram a pensar que o material genético talvez não conseguisse sobreviver por tanto tempo” (linhas de 36 a 40) por Os pesquisadores levaram anos para desenvolver a melhor técnica a ser usada, chegando a pensar que o material genético não pudesse ter sobrevivido por tanto tempo", "c": "advogado16:2"}, {"p": "advogado16", "n": 18, "a": "portugues", "t": "“Na falta de fósseis, a equipe concentrou-se no DNA  ambiental, ou eDNA – o material genético perdido pelas plantas ou animais (de células da pele ou esterco, por exemplo) que se acumula no ambiente onde eles vivem” (linhas de 18 a 21) por por não haver fósseis, a equipe se concentrou no DNA ambiental, também conhecido como eDNA, ou seja, o material genético que as plantas ou animais costumam perder e se acumulam no ambiente onde elas vivem", "c": "advogado16:2"}, {"p": "advogado16", "n": 19, "a": "portugues", "t": "“mesmo se” (linha 25) por ainda que", "c": "advogado16:2"}, {"p": "advogado16", "n": 20, "a": "portugues", "t": "“remanescente” (linha 41) por sobejante", "c": "advogado16:2"}, {"p": "advogado16", "n": 21, "a": "direito", "t": "Há 2 7 ∙ 3 2 ∙ 5 ∙ 7 formas de se colocar essas pessoas em fila.", "c": "advogado16:3"}, {"p": "advogado16", "n": 22, "a": "direito", "t": "Há 20.160 formas de se colocar Enzo ou Valentina nas  pontas da fila.", "c": "advogado16:3"}, {"p": "advogado16", "n": 23, "a": "matematica", "t": "Formando-se essa fila ao acaso, a probabilidade de que  Enzo e Valentina fiquem juntos é de 25%.", "c": "advogado16:3"}, {"p": "advogado16", "n": 24, "a": "direito", "t": "O volume da região compreendida entre os 2 cilindros é  igual a 𝜋(𝑅 − 𝑟) 2ℎ.", "c": "advogado16:4"}, {"p": "advogado16", "n": 25, "a": "matematica", "t": "Se os raios desses cilindros forem duplicados e suas  alturas forem reduzidas em 75%, então o volume da região compreendida entre os 2 cilindros não será alterado.", "c": "advogado16:4"}, {"p": "advogado16", "n": 26, "a": "matematica", "t": "Escolhendo-se um ponto aleatoriamente dentro do  cilindro maior, a probabilidade de ele estar dentro do menor é de 𝑟 2 𝑅2 .", "c": "advogado16:4"}, {"p": "advogado16", "n": 27, "a": "matematica", "t": "Um número quase perfeito é um número inteiro positivo  e, caso todos os seus divisores naturais forem somados, com exceção dele mesmo, obter-se-á seu antecessor.", "c": "advogado16:5"}, {"p": "advogado16", "n": 31, "a": "informatica", "t": "No PowerPoint 2013, caso o usuário realize alterações em um folheto mestre, elas serão aplicadas, automaticamente, tanto  no slide mestre quanto nas anotações mestras.", "c": "advogado16:5"}, {"p": "advogado16", "n": 32, "a": "informatica", "t": "Um modelo do PowerPoint pode conter layouts, cores, fontes, efeitos, estilos de segundo plano e até mesmo conteúdo. O  PowerPoint 2013 permite que o usuário crie seus próprios modelos personalizados.", "c": "advogado16:5"}, {"p": "advogado16", "n": 33, "a": "informatica", "t": "O Windows 10 não permite que dois dispositivos do mesmo tipo, como, por exemplo, pendrives, sejam inseridos  simultaneamente em duas portas USB distintas, , pois esta ação gera conflitos de IRQ (Interrupt Request Line).", "c": "advogado16:5"}, {"p": "advogado16", "n": 34, "a": "informatica", "t": "Em redes de computadores, o termo comunicação de dados pode ser definido como a transferência de dados entre dois  dispositivos, através de um meio de transmissão, como, por exemplo, um cabo ou um enlace de rádio.", "c": "advogado16:5"}, {"p": "advogado16", "n": 35, "a": "informatica", "t": "O backbone, em redes de computadores, pode ser definido como o circuito de alto tráfego que tem como função interligar  nós principais da rede.", "c": "advogado16:5"}, {"p": "advogado16", "n": 36, "a": "informatica", "t": "Por se tratar de uma padronização do navegador Chrome, ele não permite que o usuário possa configurar o que é mostrado  abaixo da caixa de pesquisa, na página \"Nova guia\".", "c": "advogado16:6"}, {"p": "advogado16", "n": 37, "a": "informatica", "t": "No Explorador de Arquivos do Windows 10, ao clicar o botão direito do mouse sobre o arquivo e selecionar  a opção , será aberto, automaticamente, o aplicativo Restauração.", "c": "advogado16:6"}, {"p": "advogado16", "n": 38, "a": "informatica", "t": "No sistema operacional Windows, a extensão *.ini pertence aos arquivos de configuração de inicialização do Windows.", "c": "advogado16:6"}, {"p": "advogado16", "n": 39, "a": "informatica", "t": "Todos os procedimentos de segurança da informação estão relacionados somente aos softwares instalados no computador,  já que cuidados físicos (hardware) não são considerados para fins de segurança da informação.", "c": "advogado16:6"}, {"p": "advogado16", "n": 40, "a": "informatica", "t": "Um procedimento de segurança que o usuário pode adotar caso utilize um programa de correio eletrônico é configurá-lo  para nunca abrir anexos automaticamente.  CONSELHO REGIONAL DE ADMINISTRAÇÃO DE PERNAMBUCO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRA-PE ADVOGADO 4", "c": "advogado16:6"}, {"p": "advogado16", "n": 41, "a": "direito", "t": "A moralidade na Administração Pública está relacionada  somente às atitudes nas quais se possa verificar a opção entre o bem e o mal.", "c": "advogado16:7"}, {"p": "advogado16", "n": 42, "a": "direito", "t": "Um governador pode nomear seu irmão como secretário  de transportes de determinado estado sem que tal ato represente violação à Constituição Federal ou infração ao princípio da moralidade, visto que se trata de cargo de natureza política.", "c": "advogado16:7"}, {"p": "advogado16", "n": 43, "a": "direito", "t": "Todo cidadão tem direito a exercer a cidadania. Nesse  sentido, a Constituição Federal estabelece que qualquer cidadão é parte legítima para propor ação popular que vise a anular ato lesivo à moralidade administrativa.", "c": "advogado16:7"}, {"p": "advogado16", "n": 44, "a": "direito", "t": "O servidor público não pode afastar o elemento ético de  sua conduta.", "c": "advogado16:8"}, {"p": "advogado16", "n": 45, "a": "legislacao", "t": "Os atos de improbidade praticados contra o patrimônio  de entidade privada que receba subvenção, benefício ou incentivo, fiscal ou creditício, de entes públicos ou governamentais não se sujeitam às sanções previstas na Lei n.o 8.429/1992.", "c": "advogado16:x44"}, {"p": "advogado16", "n": 46, "a": "legislacao", "t": "O ato de obter vantagem patrimonial em razão do  exercício de cargo, mandato, função ou emprego que importe em enriquecimento ilícito, mediante a prática de ato doloso ou culposo, constitui ato de improbidade administrativa.", "c": "advogado16:x44"}, {"p": "advogado16", "n": 47, "a": "legislacao", "t": "Considera-se decisão coordenada a instância de  natureza interinstitucional ou intersetorial que atue, de forma compartilhada, com a finalidade de simplificar o processo administrativo mediante participação concomitante de todas as autoridades e agentes decisórios e dos responsáveis pela instrução técnico-jurídica, observada a natureza do objeto e a compatibilidade do procedimento e de sua formalização com a legislação pertinente.", "c": "advogado16:x44"}, {"p": "advogado16", "n": 48, "a": "direito", "t": "Das decisões administrativas cabe recurso, em face de  razões de legalidade e de mérito, dirigido à autoridade que proferiu a decisão. No entanto, se o recorrente alegar que a decisão administrativa contraria enunciado de súmula vinculante, a autoridade prolatora da decisão impugnada não poderá reconsiderá-la.", "c": "advogado16:x44"}, {"p": "advogado16", "n": 49, "a": "legislacao", "t": "Poderão habilitar-se para participar da decisão  coordenada, na qualidade de ouvintes, as pessoas ou as associações legalmente constituídas quanto a direitos ou interesses difusos.", "c": "advogado16:9"}, {"p": "advogado16", "n": 50, "a": "legislacao", "t": "O serviço de busca e o fornecimento da informação são  gratuitos, porém o órgão ou a entidade poderá cobrar, exclusivamente, o valor necessário ao ressarcimento dos custos dos serviços e dos materiais utilizados, quando o serviço de busca e de fornecimento da informação exigir reprodução de documentos pelo órgão ou pela entidade pública consultada. No entanto, aquele cuja situação econômica não permita fazê-lo sem prejuízo do sustento próprio ou da família, declarada nos termos legais, estará isento de tal ressarcimento.", "c": "advogado16:10"}, {"p": "advogado16", "n": 51, "a": "legislacao", "t": "Os sítios eletrônicos dos órgãos e das entidades, em  cumprimento às normas estabelecidas pelo Ministério da Economia, deverão possibilitar acesso automatizado, por sistemas externos, em formatos abertos, estruturados e legíveis por máquina, e, ainda, garantir a autenticidade e a integridade das informações disponíveis para acesso, entre outros requisitos.", "c": "advogado16:10"}, {"p": "advogado16", "n": 52, "a": "direito", "t": "A decisão administrativa que estabelecer interpretação  ou orientação nova sobre norma de conteúdo indeterminado e impuser novo dever ou novo condicionamento de direito não precisará prever regime de transição, mesmo que seja relativa a um direito cumprido de modo proporcional.  CONSELHO REGIONAL DE ADMINISTRAÇÃO DE PERNAMBUCO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRA-PE ADVOGADO 5", "c": "advogado16:11"}, {"p": "advogado16", "n": 53, "a": "legislacao", "t": "O agente público somente poderá ser responsabilizado  por suas decisões ou opiniões técnicas se agir ou se omitir com dolo, direto ou eventual, ou cometer erro grosseiro no desempenho de suas funções.", "c": "advogado16:11"}, {"p": "advogado16", "n": 54, "a": "legislacao", "t": "O titular dos dados pessoais tem direito a obter do  controlador, em relação aos dados do titular por ele tratados, a qualquer momento e mediante requisição, o acesso e a correção de dados incompletos, inexatos ou desatualizados.", "c": "advogado16:12"}, {"p": "advogado16", "n": 55, "a": "legislacao", "t": "O tratamento de dados pessoais será irregular quando  deixar de observar a legislação ou quando não fornecer a segurança que o titular dele pode esperar, considerando-se o modo por meio do qual é realizado, o resultado e os riscos razoavelmente esperados, bem como as técnicas de tratamento dos dados pessoais disponíveis à época em que foi realizado.", "c": "advogado16:12"}, {"p": "advogado16", "n": 56, "a": "gerais", "t": "A questão climática passou a ter reconhecida sua  extrema importância na agenda mundial. Sob a liderança da Organização das Nações Unidas (ONU), já foram realizadas diversas conferências para tratar do tema, buscando consensos para o melhor enfrentamento do problema.", "c": "advogado16:13"}, {"p": "advogado16", "n": 57, "a": "gerais", "t": "O aquecimento global tem trazido consequências  dramáticas, materiais e humanas. Ondas de calor intenso em algumas regiões do Planeta atingem, especialmente, idosos e crianças com menos de um ano de idade, colocando-os em risco agudo de estresse por calor, insolação e outros problemas físicos e mentais.", "c": "advogado16:13"}, {"p": "advogado16", "n": 58, "a": "gerais", "t": "A ciência tem demonstrado que o aquecimento global  não deriva das ações humanas nem da emissão de gases poluentes na atmosfera, algo que a própria natureza é capaz de superar.", "c": "advogado16:13"}, {"p": "advogado16", "n": 59, "a": "legislacao", "t": "Uma crítica que se faz ao Brasil, um dos maiores países  em extensão territorial e dono de grande parte da Floresta Amazônica, fundamenta-se na inexistência de um ministério específico para tratar do meio ambiente na estrutura do Estado brasileiro.", "c": "advogado16:13"}, {"p": "advogado16", "n": 60, "a": "legislacao", "t": "Nos dias atuais, o avanço do conhecimento científico e  sua aplicação sob a forma de tecnologia fazem-se presentes nas mais variadas áreas, inclusive sendo essenciais no conjunto do sistema produtivo.", "c": "advogado16:13"}, {"p": "advogado16", "n": 61, "a": "legislacao", "t": "O Brasil, na atualidade, é um dos maiores fornecedores  mundiais de alimentos, como, por exemplo, de proteína animal. A Empresa Brasileira de Pesquisa Agropecuária (Embrapa), alvo do respeito internacional, contribui significativamente para o desenvolvimento do agronegócio e da agricultura familiar brasileiros.", "c": "advogado16:13"}, {"p": "advogado16", "n": 62, "a": "gerais", "t": "Nos dias de hoje, a República Popular da China deixou de  ser grande parceira do Brasil nas relações comerciais, provavelmente pelo fato de estar interessada quase que exclusivamente em ampliar seus negócios com o Leste asiático e com a África.", "c": "advogado16:13"}, {"p": "advogado16", "n": 63, "a": "gerais", "t": "A saúde pública mundial foi abalada pela covid-19, que,  surgida na China no primeiro semestre de 2020, disseminou-se mundialmente, de forma rápida e avassaladora, o que levou a Organização Mundial da Saúde (OMS) a declarar seu caráter pandêmico.", "c": "advogado16:13"}, {"p": "advogado16", "n": 64, "a": "legislacao", "t": "Apesar de todos os seus avanços, a ciência mostrou-se  incapaz de produzir vacinas para combater o coronavírus com a necessária rapidez. No Brasil, essa produção inexistiu.", "c": "advogado16:13"}, {"p": "advogado16", "n": 65, "a": "legislacao", "t": "Graças às medidas adotadas pela totalidade dos países,  é correto afirmar que, hoje, o coronavírus teve sua circulação interrompida por completo.", "c": "advogado16:13"}, {"p": "advogado16", "n": 66, "a": "gerais", "t": "O mundo acompanha com apreensão o conflito no Leste  europeu, iniciado, no início de 2022, com a invasão da Ucrânia ao território russo, o que, entre outras consequências, levou à queda de Vladimir Putin do governo da Rússia.", "c": "advogado16:13"}, {"p": "advogado16", "n": 67, "a": "gerais", "t": "Finda a Guerra Fria, com a desintegração da União  Soviética, a grande disputa econômica, política e militar dos dias atuais se dá entre os Estados Unidos e a China.", "c": "advogado16:13"}, {"p": "advogado16", "n": 68, "a": "gerais", "t": "Ao Conselho de Segurança da ONU cabe acompanhar  situações de crise com potencial bélico ou que se desdobrarem em guerra, propondo soluções, sanções e até a intervenção da força de paz das Nações Unidas, em casos de extrema gravidade.", "c": "advogado16:13"}, {"p": "advogado16", "n": 69, "a": "gerais", "t": "A atual economia globalizada reduziu drasticamente as  taxas de desemprego e de inflação em todo o mundo, devido ao extraordinário aumento da produção e da circulação dos capitais.", "c": "advogado16:13"}, {"p": "advogado16", "n": 70, "a": "gerais", "t": "Nas eleições de 2022, no Brasil, estiveram em disputa  os cargos do Executivo (presidente da República e governadores estaduais e distrital) e do Legislativo (Congresso Nacional e assembleias legislativas estaduais e distrital).  CONSELHO REGIONAL DE ADMINISTRAÇÃO DE PERNAMBUCO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRA-PE ADVOGADO 6", "c": "advogado16:13"}, {"p": "advogado16", "n": 71, "a": "direito", "t": "A organização político-administrativa da República  Federativa do Brasil compreende a União, os estados e os municípios como entes autônomos e o Distrito Federal como ente sem autonomia e subordinado ao Poder Executivo Federal.", "c": "advogado16:14"}, {"p": "advogado16", "n": 72, "a": "direito", "t": "O Distrito Federal é dividido em municípios e regido por  constituição própria, votada em dois turnos, com interstício mínimo de dez dias, e aprovada por dois terços da Câmara Legislativa.", "c": "advogado16:14"}, {"p": "advogado16", "n": 73, "a": "direito", "t": "A administração pública direta e indireta de qualquer  dos Poderes da União, dos estados, do Distrito Federal e dos municípios obedecerá aos princípios de legalidade, impessoalidade, moralidade, publicidade e eficiência.", "c": "advogado16:14"}, {"p": "advogado16", "n": 74, "a": "direito", "t": "É vedada a divisão dos Territórios em municípios.", "c": "advogado16:14"}, {"p": "advogado16", "n": 75, "a": "direito", "t": "Ao Distrito Federal são atribuídas as competências  legislativas reservadas aos estados e municípios.", "c": "advogado16:14"}, {"p": "advogado16", "n": 76, "a": "direito", "t": "A fiscalização do município será exercida pelo Poder  Judiciário Municipal, mediante controle externo, e pelos sistemas de controle interno do Poder Executivo Municipal.", "c": "advogado16:14"}, {"p": "advogado16", "n": 77, "a": "gerais", "t": "A eleição do governador e do vice-governador de estado,  para mandato de oito anos, realizar-se-á no primeiro domingo de outubro, em primeiro turno, e no último domingo de outubro, em segundo turno, se houver, do ano anterior ao do término do mandato de seus antecessores; a posse ocorrerá em 6 de janeiro do ano subsequente.", "c": "advogado16:14"}, {"p": "advogado16", "n": 78, "a": "direito", "t": "Incluem-se entre os bens dos estados as ilhas fluviais e  lacustres não pertencentes à União.", "c": "advogado16:14"}, {"p": "advogado16", "n": 81, "a": "direito", "t": "Apenas os maiores de dezesseis anos de idade são  capazes de direitos e deveres na ordem civil.", "c": "advogado16:14"}, {"p": "advogado16", "n": 82, "a": "direito", "t": "A personalidade civil da pessoa começa com a  concepção do nascituro.", "c": "advogado16:14"}, {"p": "advogado16", "n": 83, "a": "direito", "t": "São absolutamente incapazes de exercer pessoalmente  os atos da vida civil os menores de dezesseis anos de idade.", "c": "advogado16:14"}, {"p": "advogado16", "n": 84, "a": "direito", "t": "Os pródigos são considerados incapazes de praticar  todos os atos da vida civil, devendo ser representados por assistentes ou curadores.", "c": "advogado16:14"}, {"p": "advogado16", "n": 85, "a": "direito", "t": "A menoridade cessa aos dezoito anos de idade  completos, quando a pessoa fica habilitada à prática de todos os atos da vida civil.", "c": "advogado16:14"}, {"p": "advogado16", "n": 86, "a": "direito", "t": "A existência da pessoa natural termina com o  encerramento de seu inventário e a homologação do respectivo formal de partilha.", "c": "advogado16:14"}, {"p": "advogado16", "n": 87, "a": "direito", "t": "Se dois ou mais indivíduos falecerem na mesma ocasião,  não se podendo averiguar se algum dos comorientes precedeu os outros, presumir-se-ão mortos primeiro os mais velhos e depois os mais novos.", "c": "advogado16:14"}, {"p": "advogado16", "n": 88, "a": "direito", "t": "Salvo por exigência médica, é defeso o ato de disposição  do próprio corpo quando importar diminuição permanente da integridade física ou contrariar os bons costumes.", "c": "advogado16:14"}, {"p": "advogado16", "n": 89, "a": "direito", "t": "É válida, com objetivo científico ou altruístico, a  disposição gratuita do próprio corpo, no todo ou em parte, para depois da morte.", "c": "advogado16:14"}, {"p": "advogado16", "n": 90, "a": "direito", "t": "O pseudônimo adotado para atividades lícitas goza da  proteção que se dá ao nome.", "c": "advogado16:14"}, {"p": "advogado16", "n": 91, "a": "direito", "t": "Ao editar enunciados de súmula, os tribunais devem  ignorar as circunstâncias fáticas dos precedentes que motivaram sua criação, atendo-se apenas à questão jurídica discutida.", "c": "advogado16:15"}, {"p": "advogado16", "n": 92, "a": "direito", "t": "A alteração da tese jurídica adotada em enunciado de  súmula ou em julgamento de casos repetitivos poderá ser precedida de audiências públicas e da participação de pessoas, órgãos ou entidades que possam contribuir para a rediscussão da tese.  CONSELHO REGIONAL DE ADMINISTRAÇÃO DE PERNAMBUCO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRA-PE ADVOGADO 7", "c": "advogado16:15"}, {"p": "advogado16", "n": 93, "a": "direito", "t": "Na hipótese de alteração de jurisprudência dominante  do Supremo Tribunal Federal e dos tribunais superiores ou daquela oriunda de julgamento de casos repetitivos, poderá haver modulação dos efeitos da alteração no interesse social e no da segurança jurídica.", "c": "advogado16:15"}, {"p": "advogado16", "n": 94, "a": "direito", "t": "A modificação de enunciado de súmula, de  jurisprudência pacificada ou de tese adotada em julgamento de casos repetitivos dispensará a fundamentação específica.", "c": "advogado16:15"}, {"p": "advogado16", "n": 95, "a": "direito", "t": "Incumbe ao relator apreciar o pedido de tutela  provisória nos recursos e nos processos de competência originária do tribunal.", "c": "advogado16:15"}, {"p": "advogado16", "n": 96, "a": "direito", "t": "A fato superveniente ocorrido entre a publicação da  decisão recorrida e o julgamento do recurso não deve ser considerado pelo tribunal.", "c": "advogado16:15"}, {"p": "advogado16", "n": 97, "a": "direito", "t": "O relator ou outro juiz que não se considerar habilitado  para proferir imediatamente seu voto poderá solicitar vista por prazo indeterminado.", "c": "advogado16:15"}, {"p": "advogado16", "n": 98, "a": "direito", "t": "Quando o resultado da apelação for não unânime, o  julgamento terá prosseguimento em sessão a ser designada com a presença de outros julgadores, que serão convocados nos termos previamente definidos no regimento interno, em número suficiente para garantir a possibilidade de inversão do resultado inicial, assegurado às partes e a eventuais terceiros o direito de sustentar oralmente suas razões perante os novos julgadores.", "c": "advogado16:15"}, {"p": "advogado16", "n": 99, "a": "direito", "t": "É admissível a assunção de competência quando o  julgamento de recurso, de remessa necessária ou de processo de competência originária envolver relevante questão de direito, com grande repercussão social, sem repetição em múltiplos processos.", "c": "advogado16:15"}, {"p": "advogado16", "n": 100, "a": "direito", "t": "Arguida, em controle difuso, a inconstitucionalidade de  lei ou de ato normativo do poder público, o relator, após ouvir o Ministério Público e as partes, remeterá os autos ao Supremo Tribunal Federal para que seja decidida a questão constitucional.", "c": "advogado16:15"}, {"p": "advogado16", "n": 101, "a": "direito", "t": "Os consórcios públicos somente poderão ser  constituídos sob a forma de empresa pública.", "c": "advogado16:16"}, {"p": "advogado16", "n": 102, "a": "direito", "t": "A União somente participará de consórcios públicos dos  quais também façam parte todos os estados em cujos territórios estejam situados os municípios consorciados.", "c": "advogado16:16"}, {"p": "advogado16", "n": 103, "a": "direito", "t": "Os consórcios públicos poderão outorgar concessão,  permissão ou autorização de obras ou serviços públicos, mediante autorização prevista no contrato de consórcio público, que deverá indicar, de forma específica, o objeto da concessão, da permissão ou da autorização e as condições a que deverá atender, observada a legislação de normas gerais em vigor.", "c": "advogado16:16"}, {"p": "advogado16", "n": 104, "a": "direito", "t": "O consórcio público será constituído por contrato cuja  celebração não dependerá da prévia subscrição de protocolo de intenções.", "c": "advogado16:16"}, {"p": "advogado16", "n": 105, "a": "direito", "t": "É nula a cláusula do contrato de consórcio que preveja  determinadas contribuições financeiras ou econômicas de ente da Federação ao consórcio público, salvo a doação, a destinação ou a cessão do uso de bens móveis ou imóveis e as transferências ou cessões de direitos operadas por força de gestão associada de serviços públicos.", "c": "advogado16:16"}, {"p": "advogado16", "n": 106, "a": "direito", "t": "O provimento e o exercício de cargos de técnicos de  administração na administração pública federal, estadual ou municipal, direta ou indireta, somente são permitidos aos bacharéis em administração diplomados no Brasil, em cursos regulares de ensino superior.", "c": "advogado16:17"}, {"p": "advogado16", "n": 107, "a": "direito", "t": "Para o exercício da profissão de técnico de  administração, é obrigatória a apresentação da carteira de identidade de técnico de administração, expedida pelo Conselho Regional de Técnicos de Administração, juntamente com prova de estar o profissional em pleno gozo dos seus direitos sociais, sendo que a falta de registro torna ilegal e punível o exercício da profissão.", "c": "advogado16:17"}, {"p": "advogado16", "n": 108, "a": "direito", "t": "A Lei n.o 4.769/1965 atribui competência ao Conselho  Federal de Administração para orientar e disciplinar o exercício da profissão de administrador, bem como dirimir dúvidas suscitadas pelos Conselhos Regionais de Administração, devendo promover, periodicamente, a capacitação continuada de fiscais dos Conselhos Regionais de Administração.  CONSELHO REGIONAL DE ADMINISTRAÇÃO DE PERNAMBUCO INSTITUTO QUADRIX – APLICAÇÃO: 2023 CRA-PE ADVOGADO 8", "c": "advogado16:17"}, {"p": "advogado16", "n": 109, "a": "direito", "t": "O Conselho Federal e os Conselhos Regionais de Administração constituem, em seu conjunto, uma fundação dotada de  personalidade jurídica de direito privado, porém vinculada ao Ministério do Trabalho e Previdência Social.", "c": "advogado16:17"}, {"p": "advogado16", "n": 110, "a": "direito", "t": "O Conselho Federal e os Conselhos Regionais de Administração, por iniciativa própria ou mediante denúncias das autoridades  judiciais ou administrativas, promoverão a responsabilidade do técnico de administração nos casos de dolo, fraude ou má-fé, adotando as providências cabíveis para a manutenção de um sadio ambiente profissional, sem prejuízo da ação administrativa ou criminal que couber.", "c": "advogado16:17"}, {"p": "advogado16", "n": 111, "a": "direito", "t": "Conforme a legislação pertinente, os conselhos profissionais em geral cobrarão multas por violação da ética, de anuidades e  de outras obrigações definidas em lei especial, podendo, sem renunciar ao valor devido, deixar de cobrar, administrativamente, valores definidos como irrisórios ou, judicialmente, valores irrecuperáveis, de difícil recuperação ou com custo de cobrança superior ao valor devido.", "c": "advogado16:17"}, {"p": "advogado16", "n": 112, "a": "direito", "t": "O administrador legalmente habilitado poderá exercer a profissão como profissional liberal ou não.", "c": "advogado16:17"}, {"p": "advogado16", "n": 113, "a": "direito", "t": "Quanto ao regulamento das eleições no âmbito do sistema do Conselho Federal e dos Conselhos Regionais de Administração, é correto afirmar que é inelegível o profissional que for declarado administrador ímprobo pelos tribunais de contas da União, dos estados, do Distrito Federal e dos municípios ou por órgão do Poder Judiciário, em razão do exercício de qualquer cargo ou função pública nos oito anos que antecederem a eleição.", "c": "advogado16:18"}, {"p": "advogado16", "n": 114, "a": "direito", "t": "O voto para as eleições de conselheiros, efetivos e suplentes, do Conselho Federal e dos Conselhos Regionais de  Administração poderá ser exercido por meio de sistema eletrônico ou por cédula enviada para o domicílio dos eleitores regulares, devendo constar ambos os sistemas do edital de convocação.", "c": "advogado16:18"}, {"p": "advogado16", "n": 115, "a": "direito", "t": "Em conformidade com a legislação de regência, a licença não extingue o vínculo jurídico do profissional de administração  com o Conselho Regional de Administração, podendo ser concedida pelo prazo de até quatro anos.", "c": "advogado16:18"}, {"p": "advogado16", "n": 116, "a": "direito", "t": "Em havendo indícios de violação de dispositivos legais inerentes aos profissionais de administração, deverá ser instaurado  processo administrativo de fiscalização, de forma física ou virtual, para a devida apuração, juntando-se todos os documentos que podem evidenciar o fato gerador do elemento de convicção necessário para sustentar o enquadramento legal.", "c": "advogado16:18"}, {"p": "advogado16", "n": 117, "a": "direito", "t": "Os Conselhos Regionais de Administração poderão promover conciliações administrativas e judiciais, conforme o programa  de recuperação de créditos do sistema, concedendo descontos incidentes exclusivamente sobre juros e multas, de forma a estimular a regularização dos inadimplentes junto aos respectivos Conselhos.", "c": "advogado16:18"}, {"p": "advogado16", "n": 118, "a": "direito", "t": "Os Conselhos Regionais de Administração poderão propor execução fiscal judicial, requerendo, inclusive, eventual bloqueio  judicial pelo inadimplemento da anuidade relativa ao registro profissional.", "c": "advogado16:18"}, {"p": "advogado16", "n": 119, "a": "direito", "t": "O Conselho Regional de Administração, mediante decisão fundamentada do Plenário, concederá isenção do pagamento de  anuidades, taxas, multas e preços de serviços ao profissional portador de doença grave prevista em Instrução Normativa da Receita Federal do Brasil, em vigor para fins de isenção do Imposto sobre a Renda das Pessoas Físicas. Para tanto, o profissional deverá instruir o requerimento com laudo de medicina especializada.", "c": "advogado16:18"}, {"p": "advogado17", "n": 1, "a": "portugues", "t": "É um texto injuntivo, pois descreve como um jogo deve  ser jogado.", "c": "advogado17:1"}, {"p": "advogado17", "n": 2, "a": "portugues", "t": "Infere-se do texto que os jogadores devem ficar com  apenas um pé no chão, devido ao nome do jogo.", "c": "advogado17:1"}, {"p": "advogado17", "n": 3, "a": "portugues", "t": "A altura da rede deve ser a altura definida pela  Federação Internacional de Voleibol (FIVB), pois se trata de uma variante do vôlei.", "c": "advogado17:1"}, {"p": "advogado17", "n": 4, "a": "portugues", "t": "A intenção do jogo é desenvolver o espírito competitivo  dos alunos, devendo o professor contar os pontos.", "c": "advogado17:1"}, {"p": "advogado17", "n": 5, "a": "portugues", "t": "No trecho “fazendo-a cair do outro lado” (linha 20) o  pronome ligado ao verbo retoma a palavra “bola” (linha 19).", "c": "advogado17:1"}, {"p": "advogado17", "n": 6, "a": "portugues", "t": "Sem prejuízo para a correção gramatical e para o sentido  original do texto, o trecho “podendo se movimentar somente com pulo” (linhas 15 e 16) poderia ser reescrito da seguinte forma: podendo-se movimentar somente com pulo.", "c": "advogado17:1"}, {"p": "advogado17", "n": 7, "a": "portugues", "t": "Não há conflito de ideias entre os trechos “Objetivo:  desenvolver habilidades motoras coordenativas de deslocamento” (linhas 8 e 9) e “O objetivo do jogo é passar a bola sobre a rede, fazendo-a cair do outro lado” (linhas 19 e 20), pois um demonstra um objetivo pedagógico geral do jogo e o outro demonstra o objetivo do jogo em ação.", "c": "advogado17:1"}, {"p": "advogado17", "n": 8, "a": "portugues", "t": "As vírgulas foram corretamente utilizadas no trecho “o  jogo tem início com os educandos na quadra, com a rede ao centro, e com uma bola de plástico”.", "c": "advogado17:1"}, {"p": "advogado17", "n": 9, "a": "portugues", "t": "Os autores do texto afirmam que há pouco interesse por  textos de pesquisa científica, devido à linguagem muito técnica e à terminologia pouco conhecida que eles apresentam.", "c": "advogado17:2"}, {"p": "advogado17", "n": 10, "a": "portugues", "t": "De acordo com o texto, pesquisadores podem dar  respostas corretas, porém sem utilidade prática.", "c": "advogado17:2"}, {"p": "advogado17", "n": 11, "a": "portugues", "t": "Conforme o texto, a formação do profissional de  educação física possui alta orientação científica, o que facilita a leitura de artigos científicos.", "c": "advogado17:2"}, {"p": "advogado17", "n": 12, "a": "portugues", "t": "Segundo o texto, um décimo dos químicos leem  publicações científicas da área.", "c": "advogado17:2"}, {"p": "advogado17", "n": 13, "a": "portugues", "t": "No trecho “Essa reclamação é válida, mas poderíamos  argumentar que, se os programas de preparação profissional tivessem orientação mais científica, o problema seria diminuído” (linhas de 44 a 47), há uma oração coordenada sindética adversativa.", "c": "advogado17:2"}, {"p": "advogado17", "n": 14, "a": "portugues", "t": "No trecho “Em um livro informativo, e também  divertido, sobre redação de artigos científicos” (linhas 7 e 8), não há sujeito.", "c": "advogado17:2"}, {"p": "advogado17", "n": 15, "a": "portugues", "t": "As palavras “científica”, “válida”, “psicólogos” e  “diminuído” são acentuadas segundo a mesma regra de acentuação gráfica.", "c": "advogado17:2"}, {"p": "advogado17", "n": 16, "a": "portugues", "t": "O trecho “A grande questão é: por que isso acontece?” (linhas 37 e 38) está gramaticalmente incorreto, pois, uma vez que o interlocutor questiona o motivo de algo acontecer, a escrita correta seria A grande questão é: porquê isso acontece?", "c": "advogado17:2"}, {"p": "advogado17", "n": 17, "a": "portugues", "t": "Em “O silêncio do estádio após o apito final foi  ensurdecedor”, há um paradoxo.", "c": "advogado17:3"}, {"p": "advogado17", "n": 18, "a": "portugues", "t": "Na frase “Os jogos olímpicos de 2024 serão disputadas  na Cidade Luz”, há uma sinestesia.", "c": "advogado17:3"}, {"p": "advogado17", "n": 19, "a": "portugues", "t": "Em “Agradeço à minha mãe por ela ter me tido”,  observa-se uma onomatopeia.", "c": "advogado17:3"}, {"p": "advogado17", "n": 20, "a": "portugues", "t": "Na oração “Nem se eu tivesse três pulmões eu  conseguiria pegar aquela bola!”, observa-se uma hipérbole.", "c": "advogado17:3"}, {"p": "advogado17", "n": 21, "a": "matematica", "t": "Mais de 85% dos jogos disputados por Zico em clubes  profissionais foram pelo Flamengo.", "c": "advogado17:4"}, {"p": "advogado17", "n": 22, "a": "legislacao", "t": "Jogando por clubes profissionais, Zico marcou mais de  600 gols.", "c": "advogado17:4"}, {"p": "advogado17", "n": 23, "a": "matematica", "t": "O número de jogos que Zico disputou pela Udinese é um  número primo.", "c": "advogado17:4"}, {"p": "advogado17", "n": 24, "a": "matematica", "t": "O número de gols que Zico marcou pelo Kashima Antlers  tem 8 divisores naturais.", "c": "advogado17:4"}, {"p": "advogado17", "n": 25, "a": "matematica", "t": "O conjunto formado pelos possíveis valores assumidos  por 𝐼𝐴 (𝑥), em que 𝐴 é um conjunto qualquer, é {0, 1}.", "c": "advogado17:5"}, {"p": "advogado17", "n": 26, "a": "matematica", "t": "Se 𝑞 é um número racional e ℝ é o conjunto dos  números reais, então 𝐼ℝ(𝑞) = 1.", "c": "advogado17:5"}, {"p": "advogado17", "n": 27, "a": "matematica", "t": "Se ℙ é o conjunto dos números primos, então  𝐼ℙ(1) = 1.", "c": "advogado17:5"}, {"p": "advogado17", "n": 28, "a": "matematica", "t": "“Red Hot Chili Peppers é a maior banda de funk rock de  todos os tempos!” é uma proposição.", "c": "advogado17:6"}, {"p": "advogado17", "n": 29, "a": "matematica", "t": "A sentença “𝑥 = 2.023” é uma proposição.", "c": "advogado17:6"}, {"p": "advogado17", "n": 31, "a": "informatica", "t": "Em um computador pessoal (PC), uma webcam é considerada como um periférico de entrada.", "c": "advogado17:6"}, {"p": "advogado17", "n": 32, "a": "informatica", "t": "No monitor, o tubo de raios catódicos (CRT) é a parte responsável por emitir, na tela, todo processamento realizado.", "c": "advogado17:6"}, {"p": "advogado17", "n": 33, "a": "informatica", "t": "Considerando a imagem a seguir, que representa parte da tela de edição do programa Microsoft Excel 2013, é correto afirmar que,  caso o usuário insira, na célula C1, tanto a fórmula = A1/B1 quanto a fórmula =DIVIDIR(A1; B1), o resultado será o mesmo, ou seja, 25.", "c": "advogado17:6"}, {"p": "advogado17", "n": 34, "a": "informatica", "t": "Na topologia em estrela, devido à forma como os nós são conectados, não é possível o uso de fibras ópticas.", "c": "advogado17:6"}, {"p": "advogado17", "n": 35, "a": "informatica", "t": "O bluetooth e o infravermelho (IR) são exemplos de redes sem fio WPAN.", "c": "advogado17:6"}, {"p": "advogado17", "n": 36, "a": "informatica", "t": "O usuário, utilizando o Explorador de Arquivos do Windows 10, ao selecionar o arquivo c:\\cref3.pdf e clicar o botão  , criará, automaticamente, um atalho na área de trabalho para esse arquivo.", "c": "advogado17:7"}, {"p": "advogado17", "n": 37, "a": "informatica", "t": "No sistema Windows, a extensão *.msi está relacionada ao arquivo instalador da Microsoft.", "c": "advogado17:7"}, {"p": "advogado17", "n": 38, "a": "informatica", "t": "Códigos maliciosos podem executar ações danosas e atividades maliciosas em equipamentos como roteadores.", "c": "advogado17:7"}, {"p": "advogado17", "n": 39, "a": "informatica", "t": "Os vírus não são considerados programas maliciosos, pois são criados pelos crackers, e não pelos hackers.", "c": "advogado17:7"}, {"p": "advogado17", "n": 40, "a": "informatica", "t": "O Windows 10 não permite que usuários comuns realizem backups de seus arquivos, pois apenas o administrador do sistema  tem esse privilégio.  CONSELHO REGIONAL DE EDUCAÇÃO FÍSICA DE SANTA CATARINA INSTITUTO QUADRIX – APLICAÇÃO: 2023 CREF3-SC ADVOGADO 4", "c": "advogado17:7"}, {"p": "advogado17", "n": 41, "a": "legislacao", "t": "Os atos de improbidade administrativa importarão na  suspensão dos direitos políticos, na indisponibilidade dos bens e no ressarcimento ao erário, na forma e gradação previstas em lei, sem prejuízo da ação penal cabível, mas não na perda da função pública.", "c": "advogado17:8"}, {"p": "advogado17", "n": 42, "a": "legislacao", "t": "O servidor público sempre deve ter respeito à  hierarquia, prestando toda a sua atenção às ordens de seus superiores e velando atentamente por seu cumprimento, mesmo quando manifestamente ilegais.", "c": "advogado17:8"}, {"p": "advogado17", "n": 43, "a": "legislacao", "t": "Suponha-se que um servidor público tenha flagrado o  chefe da repartição onde ele trabalha assediando sexualmente a secretária e que, em razão disso, o chefe lhe tenha oferecido benesses e vantagens. Suponha-se ainda que o servidor público, por questão de solidariedade ao chefe, tenha optado por não o denunciar. Nesse caso, é correto afirmar que, por respeito à hierarquia, a atitude do servidor não poderá ser caracterizada como desvio ético.", "c": "advogado17:8"}, {"p": "advogado17", "n": 44, "a": "legislacao", "t": "Facilitar ou concorrer, por qualquer forma, para a  incorporação, ao patrimônio particular de pessoa física ou jurídica, de bens, rendas, verbas ou valores públicos transferidos pela Administração Pública a entidades privadas, mediante celebração de parcerias, sem a observância das formalidades legais ou regulamentares aplicáveis à espécie não constitui ato de improbidade administrativa.", "c": "advogado17:9"}, {"p": "advogado17", "n": 45, "a": "legislacao", "t": "A mera nomeação ou indicação política por parte dos  detentores de mandatos eletivos não constitui ato de improbidade administrativa e, portanto, não viola os princípios da Administração Pública nem os deveres de honestidade, de imparcialidade e de legalidade.", "c": "advogado17:9"}, {"p": "advogado17", "n": 46, "a": "legislacao", "t": "Nos processos administrativos, serão observados, entre  outros, os critérios subjetivos de promoção pessoal de agentes, em detrimento do interesse público.", "c": "advogado17:10"}, {"p": "advogado17", "n": 47, "a": "legislacao", "t": "As associações legalmente constituídas quanto a direitos  ou interesses difus lizado pelo uso de seus celulares.", "c": "advogado17:13"}, {"p": "advogado17", "n": 68, "a": "portugues", "t": "A perda e o desgaste das tropas russas na guerra da  Ucrânia deixaram evidente uma abertura de negociações de paz pelo presidente Putin, o que aponta para o fim de uma guerra que já dura um ano ininterrupto.", "c": "advogado17:13"}, {"p": "advogado17", "n": 69, "a": "portugues", "t": "As mensagens de Ano Novo dos presidentes Vladimir  Putin e Volodymyr Zelensky remeteram ao mesmo conteúdo, com relação à guerra na Ucrânia: a defesa territorial e a busca da vitória como fim para o conflito.", "c": "advogado17:13"}, {"p": "advogado17", "n": 70, "a": "portugues", "t": "O fato de a Rússia usar drones mostra-se como um  diferencial da guerra, já que a Ucrânia não possui esse poder de ataque.  CONSELHO REGIONAL DE EDUCAÇÃO FÍSICA DE SANTA CATARINA INSTITUTO QUADRIX – APLICAÇÃO: 2023 CREF3-SC ADVOGADO 6", "c": "advogado17:13"}, {"p": "advogado17", "n": 71, "a": "direito", "t": "A Constituição não poderá ser emendada na vigência de  intervenção federal, de estado de defesa ou de estado de sítio.", "c": "advogado17:14"}, {"p": "advogado17", "n": 72, "a": "direito", "t": "A proposta de emenda à Constituição será discutida e  votada em cada Casa do Congresso Nacional, em dois turnos, considerando-se aprovada se obtiver, em ambos, metade dos votos dos respectivos membros.", "c": "advogado17:14"}, {"p": "advogado17", "n": 73, "a": "direito", "t": "A matéria constante de proposta de emenda à  Constituição rejeitada ou havida por prejudicada pode ser objeto de nova proposição na mesma sessão legislativa.", "c": "advogado17:14"}, {"p": "advogado17", "n": 74, "a": "direito", "t": "São de iniciativa privativa do ministro da Defesa as leis  que fixem ou modifiquem os efetivos das Forças Armadas.", "c": "advogado17:14"}, {"p": "advogado17", "n": 75, "a": "direito", "t": "Em caso de relevância e urgência, o presidente da  República poderá adotar medidas provisórias, com força de lei, devendo submetê-las ao Congresso Nacional no prazo de noventa dias.", "c": "advogado17:14"}, {"p": "advogado17", "n": 76, "a": "direito", "t": "É vedada a edição de medidas provisórias sobre matéria  relativa a direito penal, processual penal e processual civil.", "c": "advogado17:14"}, {"p": "advogado17", "n": 77, "a": "direito", "t": "Se a medida provisória não for apreciada em até 45 dias, contados de sua publicação, entrará em regime de urgência, subsequentemente, em cada uma das Casas do Congresso Nacional, ficando sobrestadas, até que se ultime a votação, todas as demais deliberações legislativas da Casa em que estiver tramitando.", "c": "advogado17:14"}, {"p": "advogado17", "n": 78, "a": "direito", "t": "As medidas provisórias terão sua votação iniciada na  Câmara dos Deputados.", "c": "advogado17:14"}, {"p": "advogado17", "n": 79, "a": "direito", "t": "É vedada a reedição, na mesma sessão legislativa, de  medida provisória que tenha sido rejeitada ou que tenha perdido sua eficácia por decurso de prazo.", "c": "advogado17:14"}, {"p": "advogado17", "n": 80, "a": "direito", "t": "O projeto de lei aprovado por uma Casa será revisto pela  outra, em dois turnos de discussão e votação, enviado para sanção ou promulgação, se a Casa revisora o aprovar, ou arquivado, se o rejeitar. De acordo com as disposições do Código de Processo Civil", "c": "advogado17:14"}, {"p": "advogado17", "n": 81, "a": "direito", "t": "Na ação que tiver por objeto o cumprimento de  obrigação em prestações sucessivas, estas serão consideradas incluídas no pedido, independentemente de declaração expressa do autor, e serão incluídas na condenação, enquanto durar a obrigação, se o devedor, no curso do processo, deixar de pagá-las ou de consigná-las.", "c": "advogado17:15"}, {"p": "advogado17", "n": 82, "a": "direito", "t": "É lícita a cumulação, em um único processo, contra o  mesmo réu, de vários pedidos, desde que entre eles haja conexão.", "c": "advogado17:15"}, {"p": "advogado17", "n": 83, "a": "direito", "t": "Na obrigação indivisível com pluralidade de credores,  aquele que não participou do processo receberá sua parte, deduzidas as despesas na proporção de seu crédito.", "c": "advogado17:15"}, {"p": "advogado17", "n": 84, "a": "direito", "t": "Uma vez deferida a petição inicial e determinada a  citação do réu, é vedado ao autor alterar o pedido ou a causa de pedir.", "c": "advogado17:15"}, {"p": "advogado17", "n": 85, "a": "direito", "t": "Nas ações que tenham por objeto a revisão de obrigação  decorrente de empréstimo, de financiamento ou de alienação de bens, o autor terá de, sob pena de inépcia, discriminar, na petição inicial, as obrigações contratuais que pretende controverter, além de quantificar o valor incontroverso do débito.", "c": "advogado17:15"}, {"p": "advogado17", "n": 86, "a": "direito", "t": "Indeferida a petição inicial, o autor poderá interpor  agravo de instrumento, sendo vedado ao juiz se retratar.", "c": "advogado17:15"}, {"p": "advogado17", "n": 87, "a": "direito", "t": "Nas causas que dispensarem a fase instrutória, o juiz,  independentemente da citação do réu, julgará liminarmente improcedente o pedido que contrariar enunciado de súmula do Supremo Tribunal Federal ou do Superior Tribunal de Justiça.", "c": "advogado17:15"}, {"p": "advogado17", "n": 88, "a": "direito", "t": "Se a petição inicial preencher os requisitos essenciais e  não for o caso de improcedência liminar do pedido, o juiz designará audiência de conciliação ou de mediação com antecedência mínima de quinze dias, devendo ser citado o réu com pelo menos cinco dias de antecedência.", "c": "advogado17:15"}, {"p": "advogado17", "n": 89, "a": "direito", "t": "Incumbe ao réu alegar, na contestação, toda a matéria  de defesa, expondo as razões de fato e de direito com que impugna o pedido do autor e especificando as provas que pretende produzir.", "c": "advogado17:15"}, {"p": "advogado17", "n": 90, "a": "direito", "t": "O réu revel restará impedido de produzir provas,  sendo-lhe permitido apenas tomar ciência dos atos processuais praticados durante a fase instrutória do processo.  CONSELHO REGIONAL DE EDUCAÇÃO FÍSICA DE SANTA CATARINA INSTITUTO QUADRIX – APLICAÇÃO: 2023 CREF3-SC ADVOGADO 7 Conforme as disposições do Código Civil sobre a sucessão", "c": "advogado17:15"}, {"p": "advogado17", "n": 91, "a": "direito", "t": "Toda pessoa, capaz ou incapaz, pode dispor, por  testamento, da totalidade dos seus bens, ou de parte deles, para depois de sua morte.", "c": "advogado17:15"}, {"p": "advogado17", "n": 92, "a": "direito", "t": "A legítima dos herdeiros necessários não poderá ser  incluída no testamento.", "c": "advogado17:15"}, {"p": "advogado17", "n": 93, "a": "direito", "t": "São válidas as disposições testamentárias de caráter não  patrimonial, ainda que o testador somente a elas se tenha limitado.", "c": "advogado17:15"}, {"p": "advogado17", "n": 94, "a": "direito", "t": "O testamento é ato personalíssimo e irrevogável.", "c": "advogado17:15"}, {"p": "advogado17", "n": 95, "a": "direito", "t": "A incapacidade superveniente do testador não invalida  o testamento.", "c": "advogado17:15"}, {"p": "advogado17", "n": 96, "a": "direito", "t": "É proibido o testamento conjuntivo, seja simultâneo,  recíproco ou correspectivo.", "c": "advogado17:15"}, {"p": "advogado17", "n": 97, "a": "direito", "t": "O testamento público deve ser escrito manualmente  pelo tabelião, sob pena de nulidade.", "c": "advogado17:15"}, {"p": "advogado17", "n": 98, "a": "direito", "t": "Ao cego só se permite o testamento público, que lhe será  lido, em voz alta, duas vezes pelo tabelião, fazendo-se de tudo circunstanciada a menção no testamento.", "c": "advogado17:15"}, {"p": "advogado17", "n": 99, "a": "direito", "t": "O testamento particular pode ser escrito de próprio  punho ou mediante processo mecânico.", "c": "advogado17:15"}, {"p": "advogado17", "n": 100, "a": "gerais", "t": "Quem estiver em viagem, a bordo de navio nacional, de  guerra ou mercante, poderá testar perante o comandante, sendo dispensada a presença de testemunhas, por forma que corresponda ao testamento público ou ao cerrado.", "c": "advogado17:15"}, {"p": "advogado17", "n": 101, "a": "matematica", "t": "A dívida ativa da Fazenda Pública, compreendendo a  tributária e a não tributária, abrange a atualização monetária, mas não os juros e as multas de mora.", "c": "advogado17:16"}, {"p": "advogado17", "n": 102, "a": "direito", "t": "A dívida ativa da União será apurada e inscrita na  Procuradoria da Fazenda Nacional.", "c": "advogado17:16"}, {"p": "advogado17", "n": 103, "a": "direito", "t": "A certidão de dívida ativa conterá os mesmos elementos  do termo de inscrição e será autenticada pela autoridade competente.", "c": "advogado17:16"}, {"p": "advogado17", "n": 104, "a": "direito", "t": "Na execução fiscal, até a decisão de segunda instância, a  certidão de dívida ativa poderá ser emendada ou substituída, assegurada ao executado a devolução do prazo para embargos.", "c": "advogado17:16"}, {"p": "advogado17", "n": 105, "a": "direito", "t": "A dívida ativa regularmente inscrita goza da presunção  de certeza e liquidez.", "c": "advogado17:16"}, {"p": "advogado17", "n": 106, "a": "direito", "t": "À dívida ativa da Fazenda Pública, de qualquer natureza,  aplicam-se as normas relativas à responsabilidade prevista na legislação tributária, civil e comercial.", "c": "advogado17:16"}, {"p": "advogado17", "n": 107, "a": "direito", "t": "A competência para processar e julgar a execução da  dívida ativa da Fazenda Pública exclui a de qualquer outro Juízo, exceto o da falência ou da recuperação judicial.", "c": "advogado17:16"}, {"p": "advogado17", "n": 108, "a": "direito", "t": "Na execução fiscal, far-se-á a intimação da penhora ao  executado, mediante publicação, no órgão oficial, do ato de juntada do termo ou do auto de penhora.", "c": "advogado17:16"}, {"p": "advogado17", "n": 109, "a": "direito", "t": "O termo ou auto de penhora não deverá conter a  avaliação dos bens penhorados, a qual deverá ser realizada por perito nomeado pelo juiz competente.", "c": "advogado17:16"}, {"p": "advogado17", "n": 110, "a": "direito", "t": "Na execução fiscal, qualquer intimação ao representante  judicial da Fazenda Pública será feita por publicação no Diário Oficial.", "c": "advogado17:16"}, {"p": "advogado17", "n": 111, "a": "direito", "t": "Havendo mais de um locador ou mais de um locatário,  entende-se que são solidários se o contrário não se estipulou.", "c": "advogado17:17"}, {"p": "advogado17", "n": 112, "a": "direito", "t": "O contrato de locação poderá ser ajustado por qualquer  prazo, dependendo de vênia conjugal, se igual ou superior a cinco anos.", "c": "advogado17:17"}, {"p": "advogado17", "n": 113, "a": "direito", "t": "Seja qual for o fundamento do término da locação, a  ação do locador para reaver o imóvel é a de despejo.", "c": "advogado17:17"}, {"p": "advogado17", "n": 114, "a": "direito", "t": "O locatário poderá denunciar a locação por prazo  indeterminado, mediante aviso por escrito ao locador, com antecedência mínima de quinze dias.", "c": "advogado17:17"}, {"p": "advogado17", "n": 115, "a": "direito", "t": "Nos casos de extinção de usufruto ou de fideicomisso, a  locação celebrada pelo usufrutuário ou fiduciário poderá ser denunciada, com o prazo de trinta dias para a desocupação, salvo se tiver havido aquiescência escrita do nuproprietário ou do fideicomissário, ou se a propriedade estiver consolidada em mãos do usufrutuário ou do fiduciário.", "c": "advogado17:17"}, {"p": "advogado17", "n": 116, "a": "direito", "t": "Se o imóvel for alienado durante a locação, o adquirente  somente poderá denunciar o contrato se pagar ao locatário indenização correspondente ao dobro do valor do aluguel vigente.", "c": "advogado17:17"}, {"p": "advogado17", "n": 117, "a": "direito", "t": "Morrendo o locador, a locação transmite-se aos  herdeiros.", "c": "advogado17:17"}, {"p": "advogado17", "n": 118, "a": "direito", "t": "Em casos de separação de fato, separação judicial,  divórcio ou dissolução da união estável, a locação residencial prosseguirá, automaticamente, com o cônjuge ou companheiro que permanecer no imóvel.", "c": "advogado17:17"}, {"p": "advogado17", "n": 119, "a": "direito", "t": "A cessão da locação, a sublocação e o empréstimo do  imóvel, total ou parcialmente, independem do consentimento prévio do locador.", "c": "advogado17:17"}, {"p": "advogado3", "n": 1, "a": "portugues", "t": "O trecho “A legislação traz mais segurança jurídica”  pode ser reescrito, mantendo‑se a correção gramatical e o sentido original do texto, da seguinte forma: Mais segurança jurídica é trazida pela legislação.", "c": "advogado3:1"}, {"p": "advogado3", "n": 2, "a": "portugues", "t": "No fragmento “os pacientes que apresentarem  benefícios comprovados”, a forma verbal “apresentarem”, que está no futuro do subjuntivo, foi empregada para indicar hipótese ou condição relativa a eventos futuros.", "c": "advogado3:1"}, {"p": "advogado3", "n": 3, "a": "direito", "t": "No trecho “Foi regulamentada, em 2025, a Lei da  Pesquisa Clínica, um marco para o desenvolvimento científico e a saúde no Brasil”, a palavra “marco” pode ser substituída, sem alteração do sentido original do texto, por fronteira, mantendo‑se a coerência e a correção gramatical.", "c": "advogado3:1"}, {"p": "advogado3", "n": 4, "a": "portugues", "t": "No fragmento “O novo modelo, que está alinhado às  melhores práticas internacionais, reduz de 180 dias para 30 dias o processo de avaliação dos projetos pelos Comitês de Ética em Pesquisa (CEPs)”, as vírgulas são dispensáveis, pois a oração contida entre elas restringe o sentido do substantivo “modelo”, indicando qual dos modelos existentes está sendo mencionado.", "c": "advogado3:1"}, {"p": "advogado3", "n": 5, "a": "direito", "t": "O trecho “A oferta do medicamento pode ser encerrada  ainda em situações como decisão do participante, cura, surgimento de alternativa terapêutica, ausência de benefício ou ocorrência de reação adversa grave” apresenta linguagem técnico‑jurídica compatível com o gênero normativo, evidenciada pelo uso de substantivos abstratos que descrevem hipóteses normativas de forma impessoal e enumerativa, o que consiste em um recurso típico da redação legislativa.", "c": "advogado3:1"}, {"p": "advogado3", "n": 6, "a": "direito", "t": "Em “A avaliação da Agência Nacional de Vigilância  Sanitária (Anvisa) será de até 90 dias úteis”, a forma verbal “será” está no futuro do presente e poderia ser substituída, sem alteração do sentido original do texto, pelo presente do indicativo “é”, uma vez que a lei já foi regulamentada e os seus prazos já estão em vigor.", "c": "advogado3:1"}, {"p": "advogado3", "n": 7, "a": "direito", "t": "O texto pertence ao tipo textual narrativo, uma vez  que relata um evento ocorrido em 2025, apresentando personagens institucionais, sequência temporal e desfecho relacionado à regulamentação da lei.  Advogado CONSELHO REGIONAL DE BIOMEDICINA DA 6ª REGIÃO Quadrix | 2026 2", "c": "advogado3:1"}, {"p": "advogado3", "n": 9, "a": "portugues", "t": "No trecho “o risco é transformar o avanço  biotecnológico em um vetor de exclusão, vigilância e exploração”, o vocábulo “vetor” está empregado em sentido conotativo.", "c": "advogado3:2"}, {"p": "advogado3", "n": 10, "a": "portugues", "t": "Na construção “Entretanto, os dispositivos legais  revelam‑se insuficientes”, o adjetivo “insuficientes” pode ser substituído, sem alteração do sentido original do texto, pelo seu antônimo suficientes, desde que o conectivo “Entretanto” seja suprimido, mantendo‑se a coerência do parágrafo.", "c": "advogado3:2"}, {"p": "advogado3", "n": 11, "a": "legislacao", "t": "No período “A LGPD exige que o consentimento para  o tratamento de dados sensíveis seja livre, informado, inequívoco e vinculado a finalidades específicas”, a forma verbal “seja” poderia ser substituída pelo presente do indicativo “é”, sem prejuízo da correção gramatical do texto, uma vez que a exigência legal descrita tem caráter permanente e já está em vigor.", "c": "advogado3:2"}, {"p": "advogado3", "n": 12, "a": "legislacao", "t": "No trecho “A LGPD exige que o consentimento para o  tratamento de dados sensíveis seja livre, informado, inequívoco e vinculado a finalidades específicas”, a oração introduzida pela conjunção “que” exerce a função de objeto direto do verbo “exigir”.", "c": "advogado3:2"}, {"p": "advogado3", "n": 13, "a": "portugues", "t": "O texto apresenta linguagem predominantemente  subjetiva, característica do gênero expositivo de opinião, o que se evidencia pelo uso de adjetivos valorativos como “ilusória” e pela conclusão que defende uma nova abordagem jurídica.", "c": "advogado3:2"}, {"p": "advogado3", "n": 14, "a": "portugues", "t": "No trecho “É, ao mesmo tempo, um dado individual,  profundamente identitário, e um dado relacional”, a vírgula antes de “e um dado relacional” é dispensável, pois a conjunção “e” já é suficiente para separar os dois elementos coordenados.", "c": "advogado3:2"}, {"p": "advogado3", "n": 15, "a": "portugues", "t": "Em “Ademais, a promessa de anonimização como  instrumento de proteção de dados genéticos revela‑se, em muitos casos, ilusória”, o conectivo “ademais” poderia ser substituído por portanto, sem prejuízo para o sentido original do texto.", "c": "advogado3:2"}, {"p": "advogado3", "n": 16, "a": "direito", "t": "O período “O risco de mercantilização da informação  genética, sobretudo no setor privado, também deve ser enfrentado com seriedade” pode ser reescrito, mantendo‑se a correção gramatical e o sentido original do texto, da seguinte forma: Deve‑se também enfrentar com seriedade o risco de mercantilização da informação genética, sobretudo no setor privado.", "c": "advogado3:2"}, {"p": "advogado3", "n": 17, "a": "portugues", "t": "O salto de Gabriel foi de 5,10 m.", "c": "advogado3:x16"}, {"p": "advogado3", "n": 18, "a": "portugues", "t": "A mediana dos 10 saltos foi igual a 4,80 m.", "c": "advogado3:x16"}, {"p": "advogado3", "n": 19, "a": "direito", "t": "O conjunto dos 10 saltos apresenta uma única moda.  Advogado CONSELHO REGIONAL DE BIOMEDICINA DA 6ª REGIÃO Quadrix | 2026 3 Poliana está organizando uma dinâmica de grupo com 10 participantes.", "c": "advogado3:x16"}, {"p": "advogado3", "n": 20, "a": "portugues", "t": "O número de maneiras de escolher, entre os 10  participantes, um líder e um vice‑líder para a dinâmica é igual a 90.", "c": "advogado3:x16"}, {"p": "advogado3", "n": 21, "a": "matematica", "t": "O número de maneiras distintas de dispor os 10  participantes em uma roda é igual a 10!.", "c": "advogado3:4"}, {"p": "advogado3", "n": 22, "a": "matematica", "t": "O número de maneiras de dividir os 10 participantes  em 3 grupos, sendo 2 grupos com 3 pessoas e um grupo com 4 pessoas, é igual a 4.200.", "c": "advogado3:4"}, {"p": "advogado3", "n": 23, "a": "matematica", "t": "A proposição “Se Davi não é jardineiro, então  Leonardo é fiel” é verdadeira.", "c": "advogado3:x22"}, {"p": "advogado3", "n": 24, "a": "matematica", "t": "É possível que a proposição “Davi é jardineiro ou  Leonardo é fiel” seja falsa.", "c": "advogado3:x22"}, {"p": "advogado3", "n": 25, "a": "matematica", "t": "A negação da proposição “Todo jardineiro é fiel” é  “Nenhum jardineiro é fiel”.", "c": "advogado3:x22"}, {"p": "advogado3", "n": 26, "a": "direito", "t": "Exatamente 21 entrevistados declararam saber tocar  somente baixo.", "c": "advogado3:x25"}, {"p": "advogado3", "n": 27, "a": "direito", "t": "Exatamente 89 entrevistados declararam saber tocar  somente um desses 3 instrumentos.", "c": "advogado3:x25"}, {"p": "advogado3", "n": 28, "a": "direito", "t": "Apenas 4 entrevistados declararam não saber tocar  nenhum desses 3 instrumentos. Acerca de conceitos fundamentais de informática, de sistemas operacionais, de redes de computadores e de", "c": "advogado3:x25"}, {"p": "advogado3", "n": 29, "a": "informatica", "t": "A distinção entre hardware e software
