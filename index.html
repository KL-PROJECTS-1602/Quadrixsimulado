o tem o prazo de até seis meses para decidir, salvo prorrogação por igual período expressamente motivada.", "c": "advogado5:8"}, {"p": "advogado5", "n": 61, "a": "direito", "t": "Os atos administrativos deverão ser motivados, com  indicação dos fatos e dos fundamentos jurídicos, quando decidirem recursos administrativos. No que diz respeito à transparência e ao acesso à", "c": "advogado5:8"}, {"p": "advogado5", "n": 62, "a": "legislacao", "t": "De acordo com a Lei nº 12.527/2011, considera‑se  integridade a qualidade da informação coletada na fonte, com o máximo de detalhamento possível, sem modificações.", "c": "advogado5:8"}, {"p": "advogado5", "n": 64, "a": "legislacao", "t": "É dever dos órgãos e das entidades públicas promover,  mediante requerimento, a divulgação em local de fácil acesso, no âmbito das suas competências, de informações de interesse coletivo ou geral por eles produzidas ou custodiadas.", "c": "advogado5:8"}, {"p": "advogado5", "n": 65, "a": "legislacao", "t": "Qualquer interessado poderá apresentar pedido  de acesso a informações aos órgãos e às entidades públicas, devendo o pedido conter a identificação do requerente e a especificação da informação requerida.", "c": "advogado5:8"}, {"p": "advogado5", "n": 66, "a": "legislacao", "t": "O órgão ou a entidade pública deverá autorizar  ou conceder o acesso imediato à informação disponível quando concordar com a fundamentação da solicitação.", "c": "advogado5:8"}, {"p": "advogado5", "n": 67, "a": "legislacao", "t": "É direito do requerente obter o inteiro teor de decisão  de negativa de acesso, por certidão ou cópia.", "c": "advogado5:8"}, {"p": "advogado5", "n": 68, "a": "direito", "t": "No caso de indeferimento de acesso às informações ou  às razões da negativa do acesso, poderá o interessado interpor recurso contra a decisão no prazo de 15 dias, a contar da sua ciência.", "c": "advogado5:8"}, {"p": "advogado5", "n": 69, "a": "direito", "t": "O recurso será dirigido à autoridade hierarquicamente  superior à que exarou a decisão impugnada, que deverá manifestar‑se no prazo de dez dias.", "c": "advogado5:8"}, {"p": "advogado5", "n": 70, "a": "legislacao", "t": "Não poderá ser negado acesso à informação  necessária à tutela judicial ou administrativa de direitos fundamentais. Prova aplicada  Advogado CONSELHO REGIONAL DE PSICOLOGIA 16ª REGIÃO - ESPÍRITO SANTO Quadrix | 2025 5", "c": "advogado5:8"}, {"p": "advogado5", "n": 71, "a": "direito", "t": "A República Federativa do Brasil buscará a integração  econômica, política, social e cultural dos povos da América Latina, visando à formação de uma comunidade latino‑americana de nações.", "c": "advogado5:9"}, {"p": "advogado5", "n": 72, "a": "direito", "t": "A República Federativa do Brasil rege‑se nas suas  relações internacionais pelo princípio da concessão de asilo político.", "c": "advogado5:9"}, {"p": "advogado5", "n": 73, "a": "direito", "t": "A República Federativa do Brasil rege‑se nas suas  relações internacionais pelo princípio da intervenção.", "c": "advogado5:9"}, {"p": "advogado5", "n": 74, "a": "direito", "t": "É assegurado a todos, mediante o pagamento de  taxa específica, o direito de obter certidões em repartições públicas para a defesa de direitos e para o esclarecimento de situações de interesse pessoal.", "c": "advogado5:9"}, {"p": "advogado5", "n": 75, "a": "direito", "t": "A pena será cumprida em estabelecimentos distintos,  de acordo com a natureza do delito, com a idade e com o sexo do apenado.", "c": "advogado5:9"}, {"p": "advogado5", "n": 76, "a": "direito", "t": "O preso será informado de seus direitos, entre os  quais o de permanecer calado, sendo-lhe assegurada a assistência apenas do seu advogado.", "c": "advogado5:9"}, {"p": "advogado5", "n": 77, "a": "direito", "t": "O mandado de segurança coletivo pode ser impetrado  por associação legalmente constituída e em funcionamento há pelo menos seis meses, em defesa dos interesses dos seus membros ou associados.", "c": "advogado5:9"}, {"p": "advogado5", "n": 78, "a": "direito", "t": "É direito do trabalhador urbano e rural, além de  outros que visem à melhoria da sua condição social, repouso semanal remunerado, preferencialmente aos domingos.", "c": "advogado5:9"}, {"p": "advogado5", "n": 81, "a": "direito", "t": "Os atos e os termos processuais dependem de  forma determinada.", "c": "advogado5:10"}, {"p": "advogado5", "n": 82, "a": "direito", "t": "De comum acordo, o juiz e as partes podem fixar  calendário para a prática dos atos processuais, quando for o caso.", "c": "advogado5:10"}, {"p": "advogado5", "n": 83, "a": "direito", "t": "Os atos das partes consistentes em declarações  unilaterais ou bilaterais de vontade não produzem imediatamente a constituição, a modificação ou a extinção de direitos processuais.", "c": "advogado5:10"}, {"p": "advogado5", "n": 84, "a": "direito", "t": "Os pronunciamentos do juiz consistirão em sentenças,  decisões interlocutórias, despachos e certidões.", "c": "advogado5:10"}, {"p": "advogado5", "n": 85, "a": "direito", "t": "Quando a lei for omissa, o juiz determinará prazo de  15 dias para a prática do ato.", "c": "advogado5:10"}, {"p": "advogado5", "n": 86, "a": "direito", "t": "As citações e as intimações serão nulas quando forem  realizadas sem a observância das prescrições legais.", "c": "advogado5:10"}, {"p": "advogado5", "n": 87, "a": "direito", "t": "O réu poderá impugnar, em preliminar da contestação,  o valor atribuído à causa pelo autor, sob pena de preclusão.", "c": "advogado5:10"}, {"p": "advogado5", "n": 88, "a": "direito", "t": "Suspender-se-á o processo com a interposição do  agravo de instrumento.", "c": "advogado5:10"}, {"p": "advogado5", "n": 89, "a": "direito", "t": "A extinção do processo dar‑se‑á por sentença que  resolva o mérito.", "c": "advogado5:10"}, {"p": "advogado5", "n": 90, "a": "direito", "t": "Indeferida a petição inicial, o autor poderá apelar,  sendo facultado ao juiz, no prazo de 15 dias, retratar‑se.", "c": "advogado5:10"}, {"p": "advogado5", "n": 91, "a": "direito", "t": "O juiz poderá julgar liminarmente improcedente  o pedido se verificar, desde logo, a ocorrência de decadência ou de prescrição.", "c": "advogado5:10"}, {"p": "advogado5", "n": 92, "a": "direito", "t": "Sem autorização, não se pode usar o nome alheio em  propaganda comercial.", "c": "advogado5:10"}, {"p": "advogado5", "n": 93, "a": "direito", "t": "As associações são pessoas jurídicas de direito  público interno.", "c": "advogado5:10"}, {"p": "advogado5", "n": 94, "a": "direito", "t": "Decai em cinco anos o direito de anular a constituição  das pessoas jurídicas de direito privado, por defeito do ato respectivo, contado o prazo da publicação da sua inscrição no registro.", "c": "advogado5:10"}, {"p": "advogado5", "n": 95, "a": "direito", "t": "Se a pessoa jurídica tiver administração coletiva, as  decisões sempre se tomarão pela maioria de votos dos presentes, independentemente do ato constitutivo.", "c": "advogado5:10"}, {"p": "advogado5", "n": 96, "a": "direito", "t": "Se a administração da pessoa jurídica vier a faltar,  o juiz, de ofício ou a requerimento de qualquer interessado, nomear‑lhe‑á administrador provisório.", "c": "advogado5:10"}, {"p": "advogado5", "n": 97, "a": "direito", "t": "É vedado aplicar às pessoas jurídicas a proteção dos  direitos da personalidade.", "c": "advogado5:10"}, {"p": "advogado5", "n": 98, "a": "direito", "t": "Perdem o caráter de imóveis os materiais  provisoriamente separados de um prédio, para nele se reempregarem.", "c": "advogado5:10"}, {"p": "advogado5", "n": 99, "a": "direito", "t": "Os bens naturalmente divisíveis podem tornar-se  indivisíveis por determinação da lei ou por vontade das partes.", "c": "advogado5:10"}, {"p": "advogado5", "n": 100, "a": "direito", "t": "Apesar de ainda não separados do bem principal,  os frutos e os produtos podem ser objeto de negócio jurídico.", "c": "advogado5:10"}, {"p": "advogado5", "n": 101, "a": "direito", "t": "Os bens públicos dominicais podem ser alienados.", "c": "advogado5:10"}, {"p": "advogado5", "n": 102, "a": "direito", "t": "A validade do negócio jurídico requer apenas objeto  lícito, possível, determinado ou determinável.", "c": "advogado5:10"}, {"p": "advogado5", "n": 103, "a": "legislacao", "t": "Conforme a Lei nº 14.133/2021, agente público é o  indivíduo integrante da Administração Pública dotado de poder de decisão.", "c": "advogado5:11"}, {"p": "advogado5", "n": 104, "a": "direito", "t": "Na modalidade diálogo competitivo, o edital deverá  prever a realização de fases sucessivas, caso em que cada fase poderá restringir as soluções ou as propostas a serem discutidas.", "c": "advogado5:11"}, {"p": "advogado5", "n": 105, "a": "direito", "t": "Nas licitações, o julgamento por melhor técnica  ou conteúdo artístico considerará exclusivamente as propostas técnicas ou artísticas apresentadas pelos licitantes.", "c": "advogado5:11"}, {"p": "advogado5", "n": 106, "a": "direito", "t": "No julgamento por melhor técnica ou por técnica  e preço, a obtenção de pontuação relacionada à capacitação técnico‑profissional prescinde da participação direta e pessoal do profissional correspondente na execução do contrato. Prova aplicada  Advogado CONSELHO REGIONAL DE PSICOLOGIA 16ª REGIÃO - ESPÍRITO SANTO Quadrix | 2025 6", "c": "advogado5:11"}, {"p": "advogado5", "n": 107, "a": "legislacao", "t": "No julgamento da licitação, serão desclassificadas as  propostas que permanecerem acima do orçamento estimado para a contratação.", "c": "advogado5:11"}, {"p": "advogado5", "n": 108, "a": "direito", "t": "A possibilidade de instauração do processo por  iniciativa da Administração, independentemente de provocação do administrado, corresponde ao princípio da pluralidade de instâncias.", "c": "advogado5:11"}, {"p": "advogado5", "n": 109, "a": "direito", "t": "No que se refere à extinção do ato administrativo,  a anulação consiste no seu desfazimento em razão de ilegalidade.", "c": "advogado5:11"}, {"p": "advogado5", "n": 110, "a": "direito", "t": "Convalidação é o ato administrativo que supre o  vício existente em um ato ilegal, produzindo efeitos retroativos à data da sua prática.", "c": "advogado5:11"}, {"p": "advogado5", "n": 111, "a": "direito", "t": "A dívida ativa da União será apurada e inscrita no  Ministério da Fazenda.", "c": "advogado5:11"}, {"p": "advogado5", "n": 112, "a": "direito", "t": "A neutralidade tributária é o princípio segundo  o qual a tributação não deve interferir nas decisões econômicas dos agentes, nem distorcer a livre concorrência.", "c": "advogado5:11"}, {"p": "advogado5", "n": 113, "a": "direito", "t": "A obrigação principal decorre da legislação tributária  e tem por objeto as prestações, positivas ou negativas, nela previstas no interesse da arrecadação ou da fiscalização dos tributos.", "c": "advogado5:11"}, {"p": "advogado5", "n": 114, "a": "direito", "t": "Sujeito ativo da obrigação é a pessoa jurídica de  direito público ou privado, titular da competência para exigir o seu cumprimento.", "c": "advogado5:11"}, {"p": "advogado5", "n": 115, "a": "direito", "t": "A capacidade tributária passiva independe de estar a  pessoa jurídica regularmente constituída, bastando que configure uma unidade econômica ou profissional.", "c": "advogado5:11"}, {"p": "advogado5", "n": 116, "a": "direito", "t": "A atividade administrativa de lançamento é vinculada  e obrigatória, sob pena de responsabilidade funcional.", "c": "advogado5:11"}, {"p": "advogado5", "n": 117, "a": "direito", "t": "As gorjetas não integram a remuneração do  empregado. Para todos os efeitos legais, a remuneração do empregado compreende apenas o salário pago pelo empregador como contraprestação pelos serviços prestados.", "c": "advogado5:12"}, {"p": "advogado5", "n": 118, "a": "direito", "t": "A transferência para o período diurno de trabalho não  implica a perda do direito ao adicional noturno.", "c": "advogado5:12"}, {"p": "advogado5", "n": 119, "a": "direito", "t": "Conforme a Consolidação das Leis do Trabalho (CLT),  a reclamação trabalhista poderá ser apresentada pelo sindicato de classe.", "c": "advogado5:13"}, {"p": "advogado6", "n": 1, "a": "portugues", "t": "No título, o emprego do presente do indicativo,  “investiga”, aponta para fato ocorrido no passado, como em geral acontece em notícias.", "c": "advogado6:1"}, {"p": "advogado6", "n": 2, "a": "portugues", "t": "No título, a forma “veja”, por estar no imperativo,  indica possibilidade de interatividade com o leitor.", "c": "advogado6:1"}, {"p": "advogado6", "n": 3, "a": "portugues", "t": "A palavra “se”, no trecho “se um contador morto  a tiros, sem reagir, foi vítima de latrocínio ou execução na Zona Sul de São Paulo”, atua como um pronome reflexivo.", "c": "advogado6:1"}, {"p": "advogado6", "n": 4, "a": "portugues", "t": "No trecho “em frente a empresa de contabilidade  onde ele trabalhava”, é obrigatório o uso do acento indicativo de crase em “em frente a”.", "c": "advogado6:1"}, {"p": "advogado6", "n": 5, "a": "portugues", "t": "No primeiro parágrafo, a passagem “(veja vídeo  abaixo; as cenas são fortes)” aparece entre parênteses por se tratar de comentário do veículo de comunicação julgando os fatos relatados.", "c": "advogado6:1"}, {"p": "advogado6", "n": 6, "a": "portugues", "t": "A oração “quando estava dentro de seu carro”  classifica‑se como subordinada adverbial temporal.", "c": "advogado6:1"}, {"p": "advogado6", "n": 7, "a": "portugues", "t": "O verbo “morrer”, em “onde não resistiu aos  ferimentos e morreu”, é intransitivo.", "c": "advogado6:1"}, {"p": "advogado6", "n": 8, "a": "portugues", "t": "No trecho “O criminoso é um motociclista, que fugiu  após roubar o relógio e a carteira do contador e atirar ao menos quatro vezes nele”, o pronome em “nele” refere‑se ao contador alvo da notícia.", "c": "advogado6:1"}, {"p": "advogado6", "n": 9, "a": "portugues", "t": "No período “Imagens gravadas por câmeras de  segurança, e que circulam nas redes sociais, mostram que José não reagiu ao assalto”, por modificar a forma verbal “mostram”, a oração “que José não reagiu ao assalto” é adverbial.", "c": "advogado6:1"}, {"p": "advogado6", "n": 10, "a": "portugues", "t": "No trecho “As cenas mostram que o carro, um  Chevrolet Cruize vermelho, está parado na rua”, o termo “um Chevrolet Cruize vermelho” ajuda a explicar o termo “carro”, funcionando como adjunto adnominal.", "c": "advogado6:1"}, {"p": "advogado6", "n": 11, "a": "direito", "t": "O emprego do presente do indicativo na  passagem “quando um homem numa moto sobe a calçada se aproxima e aponta a arma para o veículo” caracteriza‑se pelo uso como presente narrativo (ou histórico). Prova aplicada  Advogado CONSELHO REGIONAL DE CONTABILIDADE DO ESTADO DE SÃO PAULO Quadrix | 2025 2", "c": "advogado6:1"}, {"p": "advogado6", "n": 12, "a": "portugues", "t": "No trecho “os vidros escuros fechados”, os dois  adjuntos adnominais ligados ao substantivo diferenciam‑se pela natureza: um indica uma característica duradoura, enquanto o outro indica uma característica transitória.", "c": "advogado6:1"}, {"p": "advogado6", "n": 13, "a": "portugues", "t": "No período “No vídeo, feito por duas câmeras, ainda  é possível ver o contador abrir a porta e entregar os pertences ao criminoso, que atira diversas vezes no motorista.”, a oração “que atira diversas vezes no motorista”, por caracterizar “criminoso”, funciona como subordinada adjetiva.", "c": "advogado6:1"}, {"p": "advogado6", "n": 14, "a": "portugues", "t": "Para se atender à regência de “em seguida”, no trecho  “foge em seguida na sua motocicleta”, a forma “na” deveria ser substituída por “à”.", "c": "advogado6:1"}, {"p": "advogado6", "n": 15, "a": "portugues", "t": "No período “O caso foi registrado inicialmente como  latrocínio, que é o roubo seguido de morte, no 95º Distrito Policial (DP), Cohab‑Heliópolis.”, o termo “como latrocínio”, por ser o predicativo do sujeito, não poderia ser preposicionado.", "c": "advogado6:1"}, {"p": "advogado6", "n": 16, "a": "portugues", "t": "Na estruturação sintática do sintagma “a morte do  contador”, observa‑se que o termo preposicionado representa a ação implícita na ideia do substantivo “morte”.", "c": "advogado6:1"}, {"p": "advogado6", "n": 17, "a": "portugues", "t": "No trecho “também está sendo apurada a  possibilidade de José ter sido vítima de uma execução”, o substantivo “possibilidade” atua como objeto direto de “está sendo apurada”.", "c": "advogado6:1"}, {"p": "advogado6", "n": 18, "a": "portugues", "t": "No trecho “Estamos trabalhando com as duas  vertentes”, as duas vertentes referem‑se a: latrocínio e homicídio.", "c": "advogado6:1"}, {"p": "advogado6", "n": 19, "a": "portugues", "t": "No trecho “ O celular do contador e um comprovante de transação bancária, no valor de R$ 50 mil, que estavam no automóvel da vítima, foram apreendidos pela polícia.”, o termo “apreendidos” concorda tanto com “contador” quanto com “comprovante”.", "c": "advogado6:1"}, {"p": "advogado6", "n": 20, "a": "portugues", "t": "No período “Além de analisar as imagens das  câmeras de vídeo, que gravaram a morte do contador, a investigação quer ouvir o depoimento de testemunhas.”, o termo “investigação” passa por um processo de personificação, como é típico em contextos como o apresentado no texto. Um escritório jurídico especializado em causas cíveis possui três advogados: Dr. Andrade; Dra. Barros; e Dr. Costa. Para otimizar o trabalho, os processos são distribuídos entre eles, de acordo com as seguintes regras lógicas. I Se um processo envolve direito do consumidor, então ou dr. Andrade ou dra. Barros deverá atendê‑lo. II Se um processo não envolve contratos, então dr. Costa não deverá atendê‑lo. III Se dra. Barros atende um processo, então ele não envolverá direito de família. Com base nessa situação hipotética e considerando essas", "c": "advogado6:1"}, {"p": "advogado6", "n": 21, "a": "direito", "t": "Se um processo envolve direito do consumidor  e direito de família, então o dr. Andrade deverá atendê‑lo.", "c": "advogado6:1"}, {"p": "advogado6", "n": 22, "a": "direito", "t": "Se um processo é atendido pelo dr. Costa, então ele  envolverá contratos.", "c": "advogado6:1"}, {"p": "advogado6", "n": 23, "a": "direito", "t": "Se um processo não é atendido pela dra.", "c": "advogado6:1"}, {"p": "advogado6", "n": 24, "a": "matematica", "t": "Se o advogado atendeu 200 processos nos últimos  3 anos, então o número de processos de direito imobiliário foi igual a 60.", "c": "advogado6:1"}, {"p": "advogado6", "n": 25, "a": "matematica", "t": "Escolhendo aleatoriamente um processo dos últimos  3 anos, se ele nem é de direito de família, nem de direito imobiliário, então a probabilidade de ser de direito do consumidor será maior que 50%.", "c": "advogado6:1"}, {"p": "advogado6", "n": 26, "a": "matematica", "t": "Se o advogado cobrou, em média, R$ 3.000 por  processo de direito de família, R$ 5.000 por processo de direito imobiliário, R$ 2.500 por processo de direito do consumidor e R$ 4.000 pelos demais, então seu faturamento médio por processo foi maior que R$ 3.800. Um escritório de advocacia está analisando o tempo gasto em diferentes tipos de processos judiciais.", "c": "advogado6:1"}, {"p": "advogado6", "n": 27, "a": "direito", "t": "A mediana do tempo de conclusão desses processos é  igual a 10,5 meses.", "c": "advogado6:x26"}, {"p": "advogado6", "n": 28, "a": "matematica", "t": "A probabilidade de selecionar aleatoriamente um  processo dessa amostra cujo tempo de conclusão seja maior que 10 meses é de 50%.", "c": "advogado6:x26"}, {"p": "advogado6", "n": 29, "a": "matematica", "t": "Se for adicionado um novo processo à amostra e  a média passar a ser 12 meses, então o tempo de conclusão desse novo processo foi inferior a 20 meses.", "c": "advogado6:x26"}, {"p": "advogado6", "n": 31, "a": "informatica", "t": "Um computador do tipo servidor pode ser utilizado  em escritórios de advocacia para centralizar arquivos e facilitar o compartilhamento seguro de documentos entre os colaboradores.", "c": "advogado6:3"}, {"p": "advogado6", "n": 32, "a": "informatica", "t": "O sistema operacional é um tipo de software que atua  como intermediário entre o hardware e os programas de aplicação utilizados pelo usuário. Os aplicativos de escritório (Word, Excel e PowerPoint) são ferramentas de produtividade fundamentais para", "c": "advogado6:3"}, {"p": "advogado6", "n": 33, "a": "informatica", "t": "O Microsoft Word, parte do Office 365, permite o uso  de controle de alterações, ferramenta essencial para revisar e compartilhar petições ou contratos entre advogados e clientes.", "c": "advogado6:4"}, {"p": "advogado6", "n": 34, "a": "informatica", "t": "O Microsoft Word não permite a inserção de  comentários em documentos, o que limita sua utilidade para revisão de contratos jurídicos.", "c": "advogado6:4"}, {"p": "advogado6", "n": 35, "a": "informatica", "t": "O Word possui uma funcionalidade robusta  de inserção de comentários, essencial para revisões colaborativas de contratos, petições e pareceres jurídicos. A Internet é uma poderosa ferramenta de consultas para", "c": "advogado6:4"}, {"p": "advogado6", "n": 36, "a": "informatica", "t": "O uso de aspas (“”) nas pesquisas no Google aumenta  a quantidade de resultados e torna a pesquisa mais ampla.", "c": "advogado6:5"}, {"p": "advogado6", "n": 37, "a": "informatica", "t": "Advogados podem utilizar operadores como “site:”  para restringir pesquisas a domínios jurídicos específicos, como tribunais ou órgãos públicos. Um escritório de advocacia uma gera muitos documentos e a organização deles é fundamental para poder localizá‑los com rapidez e segurança. Com base nessa informação,", "c": "advogado6:5"}, {"p": "advogado6", "n": 38, "a": "informatica", "t": "Armazenar cópias de arquivos em nuvem, como no  OneDrive ou Google Drive, aumenta a segurança e a acessibilidade dos documentos jurídicos.", "c": "advogado6:5"}, {"p": "advogado6", "n": 39, "a": "informatica", "t": "Todos os programas instalados no computador do  advogado devem ser removidos automaticamente após 30 dias, para evitar acúmulo. A segurança de informação é um esforço contínuo de todos", "c": "advogado6:5"}, {"p": "advogado6", "n": 40, "a": "informatica", "t": "Salvar senhas de acesso a sistemas jurídicos no  navegador é uma prática recomendada para facilitar o uso diário. RASCUNHO Prova aplicada  Advogado CONSELHO REGIONAL DE CONTABILIDADE DO ESTADO DE SÃO PAULO Quadrix | 2025 4", "c": "advogado6:6"}, {"p": "advogado6", "n": 41, "a": "direito", "t": "A função pública deve ser tida como exercício  profissional e, portanto, integra‑se à vida particular de cada servidor público. Nesse contexto, é correto afirmar que a embriaguez, mesmo que fortuita e involuntária, constitui falta funcional e representa violação ao Código de Ética.", "c": "advogado6:7"}, {"p": "advogado6", "n": 42, "a": "legislacao", "t": "Estão sujeitos às disposições do Código de Ética  todos aqueles que prestem serviços de natureza permanente, mediante retribuição financeira, excluindo‑se, portanto, aqueles que possuam vínculo temporário e sem retribuição financeira. Segundo a Lei nº 8.429/1992, que trata das sanções aplicáveis em virtude da prática de atos de improbidade", "c": "advogado6:7"}, {"p": "advogado6", "n": 43, "a": "legislacao", "t": "A conduta culposa do agente público não é suficiente  para caracterizar o ato de improbidade administrativa que importe em enriquecimento ilícito, sendo indispensável a presença do dolo.", "c": "advogado6:7"}, {"p": "advogado6", "n": 44, "a": "legislacao", "t": "A pena de suspensão dos direitos políticos é aplicada  ao agente público, em razão de seu vínculo com a Administração Pública, não se estendendo ao terceiro que, com ele, concorreu para a prática do ato de improbidade.", "c": "advogado6:7"}, {"p": "advogado6", "n": 45, "a": "matematica", "t": "A correção monetária e os juros de mora da pena  de multa civil devem incidir desde a data do ato de improbidade administrativa.", "c": "advogado6:7"}, {"p": "advogado6", "n": 46, "a": "legislacao", "t": "A contratação de servidores públicos temporários sem  a realização de concurso público, ainda que amparada por legislação local, constitui ato de improbidade administrativa que atenta contra os princípios da Administração Pública.", "c": "advogado6:7"}, {"p": "advogado6", "n": 47, "a": "legislacao", "t": "A ação de improbidade administrativa somente deve  ser recebida pelo juiz quando houver elementos concretos que indiquem a presença de dolo específico por parte do agente e a existência de prejuízo ao erário. À luz da Lei nº 9.784/1999, que regula o processo administrativo no âmbito da Administração Pública Federal,", "c": "advogado6:7"}, {"p": "advogado6", "n": 48, "a": "legislacao", "t": "Os prazos fixados em meses ou anos contam‑se de  data a data.", "c": "advogado6:7"}, {"p": "advogado6", "n": 49, "a": "legislacao", "t": "Caso a Administração identifique que um ato ilegal  gerou efeitos favoráveis para os destinatários, poderá, com base no princípio da autotutela, revogá‑lo, no prazo decadencial de cinco anos, respeitando‑se, contudo, os direitos adquiridos pelos interessados de boa‑fé. No que diz respeito à Lei nº 13.709/2018, que trata da", "c": "advogado6:x48"}, {"p": "advogado6", "n": 50, "a": "legislacao", "t": "O princípio da adequação consiste na compatibilidade  do tratamento de dados com as finalidades informadas ao titular, de acordo com o contexto do tratamento.", "c": "advogado6:x48"}, {"p": "advogado6", "n": 51, "a": "legislacao", "t": "O tratamento de dados pessoais sensíveis poderá  ocorrer, sem o consentimento do titular, quando for indispensável para a proteção da vida ou da incolumidade física do titular ou de terceiro. Quanto à Lei nº 12.846/2013, que trata a respeito da responsabilização administrativa e civil de pessoas jurídicas", "c": "advogado6:x48"}, {"p": "advogado6", "n": 52, "a": "legislacao", "t": "Na esfera administrativa, a responsabilidade da  pessoa jurídica não afasta a possibilidade de sua responsabilização na esfera judicial.", "c": "advogado6:x48"}, {"p": "advogado6", "n": 53, "a": "legislacao", "t": "Os efeitos do acordo de leniência serão estendidos  às pessoas jurídicas que integram o mesmo grupo econômico, de fato e de direito, desde que firmem o acordo em conjunto, respeitadas as condições nele estabelecidas.", "c": "advogado6:8"}, {"p": "advogado6", "n": 54, "a": "legislacao", "t": "A celebração do acordo de leniência pelo agente  infrator elide a condenação judicial por danos morais coletivos.", "c": "advogado6:8"}, {"p": "advogado6", "n": 55, "a": "direito", "t": "O Ministério Público Federal é o órgão competente  para celebrar os acordos de leniência no âmbito do Poder Executivo federal. De acordo com o Decreto‑Lei nº 9.295/1946, que cria o Conselho Federal de Contabilidade e prerrogativas dos", "c": "advogado6:8"}, {"p": "advogado6", "n": 56, "a": "direito", "t": "Compete ao Conselho Federal de Contabilidade (CFC)  aprovar os regimentos internos organizados pelos Conselhos Regionais, modificando o que se tornar necessário, a fim de manter a respectiva unidade de ação.", "c": "advogado6:9"}, {"p": "advogado6", "n": 57, "a": "direito", "t": "A carteira profissional, visada pelo presidente do  CFC, servirá como documento de identidade e terá fé pública. Prova aplicada  Advogado CONSELHO REGIONAL DE CONTABILIDADE DO ESTADO DE SÃO PAULO Quadrix | 2025 5", "c": "advogado6:9"}, {"p": "advogado6", "n": 58, "a": "legislacao", "t": "A falta de pagamento de multa devidamente  confirmada importará, decorridos 30 dias da notificação, em suspensão, por 90 dias, do profissional ou da organização que, nela, tiver incorrido.", "c": "advogado6:9"}, {"p": "advogado6", "n": 59, "a": "direito", "t": "O recurso contra decisões do CRC que aplicarem pena  de multa será dirigido ao CFC e terá efeito suspensivo.", "c": "advogado6:9"}, {"p": "advogado6", "n": 60, "a": "direito", "t": "As empresas que atuam no ramo de serviços contábeis  devem se registrar e pagar anuidade ao CFC. Quanto ao estabelecido na Resolução CFC nº 1.523/2017, que versa a respeito do Código de Conduta dos", "c": "advogado6:9"}, {"p": "advogado6", "n": 61, "a": "direito", "t": "Segundo o Código de Conduta, a censura ética é  o documento que explicita os comportamentos considerados inaceitáveis, bem como as medidas a serem adotadas para assegurar o cumprimento do referido código, indicando a conduta apropriada no ambiente de trabalho.", "c": "advogado6:10"}, {"p": "advogado6", "n": 62, "a": "legislacao", "t": "A comissão de conduta instituída para apuração  de infração cometida por conselheiro do Sistema CFC/CRCs será composta de três conselheiros do CFC e dos respectivos substitutos.", "c": "advogado6:10"}, {"p": "advogado6", "n": 63, "a": "legislacao", "t": "Os integrantes das comissões de conduta terão  mandato de três anos, sendo vedada a recondução.", "c": "advogado6:10"}, {"p": "advogado6", "n": 64, "a": "legislacao", "t": "O presidente das comissões será eleito pelo plenário  do CFC para mandato de dois anos, sendo permitida a recondução.", "c": "advogado6:10"}, {"p": "advogado6", "n": 65, "a": "legislacao", "t": "O integrante da comissão que estiver  respondendo a um processo ético, criminal ou administrativo‑disciplinar ficará suspenso de suas funções até o trânsito em julgado. Segundo as normas previstas na Resolução CRC‑SP", "c": "advogado6:10"}, {"p": "advogado6", "n": 66, "a": "legislacao", "t": "O cargo de conselheiro, inclusive quando investido na  função de membro de órgão deste CRC, é de exercício gratuito, e será considerado serviço relevante.", "c": "advogado6:11"}, {"p": "advogado6", "n": 67, "a": "legislacao", "t": "O conselho diretor é composto do presidente, dos  vice‑presidentes e de mais três conselheiros efetivos, eleitos pelo plenário, com mandato de dois anos.", "c": "advogado6:11"}, {"p": "advogado6", "n": 68, "a": "legislacao", "t": "A Câmara de Política Institucional constitui órgão  deliberativo superior do CRC do estado de São Paulo.", "c": "advogado6:11"}, {"p": "advogado6", "n": 69, "a": "legislacao", "t": "Compete ao conselho diretor conceder licença  ao presidente, vice‑presidentes e aos demais conselheiros.", "c": "advogado6:11"}, {"p": "advogado6", "n": 70, "a": "direito", "t": "Ao conselheiro que exerceu a presidência no biênio  anterior, por período igual ou superior a 40% do mandato, é vedado ocupar uma vice‑presidência no biênio imediatamente posterior. RASCUNHO Prova aplicada  Advogado CONSELHO REGIONAL DE CONTABILIDADE DO ESTADO DE SÃO PAULO Quadrix | 2025 6", "c": "advogado6:11"}, {"p": "advogado6", "n": 71, "a": "direito", "t": "Nos casos previstos em lei, poderá o devedor ou  o terceiro requerer, com efeito de pagamento, a consignação da quantia ou da coisa devida.", "c": "advogado6:12"}, {"p": "advogado6", "n": 72, "a": "matematica", "t": "Requerer‑se‑á a consignação no lugar do domicílio  do devedor, cessando para este, à data do depósito, os juros e os riscos, salvo se a demanda for julgada improcedente.", "c": "advogado6:12"}, {"p": "advogado6", "n": 73, "a": "direito", "t": "Tratando‑se de prestações sucessivas, consignada  uma delas, pode o devedor continuar a depositar, no mesmo processo e sem mais formalidades, as que se forem vencendo, desde que o faça em até cinco dias contados da data do respectivo vencimento.", "c": "advogado6:12"}, {"p": "advogado6", "n": 74, "a": "direito", "t": "Aquele que afirmar ser titular do direito de exigir  contas requererá a citação do réu para que as preste ou ofereça contestação no prazo de 30 dias.", "c": "advogado6:12"}, {"p": "advogado6", "n": 75, "a": "direito", "t": "As contas do réu serão apresentadas na forma  adequada, especificando‑se as receitas, a aplicação das despesas e os investimentos, se houver.", "c": "advogado6:12"}, {"p": "advogado6", "n": 76, "a": "direito", "t": "Na ação de exigir contas, a sentença apurará o saldo e  constituirá título executivo extrajudicial.", "c": "advogado6:12"}, {"p": "advogado6", "n": 77, "a": "direito", "t": "A propositura de uma ação possessória em vez de  outra obstará a que o juiz conheça do pedido.", "c": "advogado6:12"}, {"p": "advogado6", "n": 78, "a": "direito", "t": "No caso de ação possessória em que figure no  polo passivo grande número de pessoas, serão realizadas a citação pessoal dos ocupantes que forem encontrados no local e a citação por edital dos demais, determinando‑se, ainda, a intimação do Ministério Público e, se envolver pessoas em situação de hipossuficiência econômica, da Defensoria Pública.", "c": "advogado6:12"}, {"p": "advogado6", "n": 79, "a": "direito", "t": "Não é lícito cumular ao pedido possessório e de  condenação em perdas e danos.", "c": "advogado6:12"}, {"p": "advogado6", "n": 80, "a": "direito", "t": "É ilícito ao réu, na contestação, alegando que foi  o ofendido em sua posse, demandar a proteção possessória e a indenização pelos prejuízos resultantes da turbação ou do esbulho cometido pelo autor.", "c": "advogado6:12"}, {"p": "advogado6", "n": 81, "a": "direito", "t": "Na pendência de ação possessória, é vedado, tanto ao  autor quanto ao réu, propor ação de reconhecimento do domínio, exceto se a pretensão for deduzida diante de terceira pessoa.", "c": "advogado6:12"}, {"p": "advogado6", "n": 82, "a": "direito", "t": "O possuidor tem direito a ser mantido na posse em  caso de turbação e reintegrado em caso de esbulho.", "c": "advogado6:12"}, {"p": "advogado6", "n": 83, "a": "direito", "t": "Nos procedimentos de jurisdição voluntária, a  sentença é irrecorrível.", "c": "advogado6:12"}, {"p": "advogado6", "n": 84, "a": "direito", "t": "Quem tiver interesse em manifestar formalmente  sua vontade a outrem sobre assunto juridicamente relevante poderá notificar pessoas participantes da mesma relação jurídica para dar‑lhes ciência de seu propósito.", "c": "advogado6:12"}, {"p": "advogado6", "n": 85, "a": "direito", "t": "Recebendo testamento cerrado, o juiz, ainda que ache  vício e o ou um símbolo) é feita por meio de uma tabela de conversão que converte Byte em caractere. Essa tabela é chamada de ASCII.", "c": "advogado_11:3"}, {"p": "advogado_11", "n": 41, "a": "legislacao", "t": "Essa lei dispõe sobre os procedimentos a serem  observados pela União, pelos estados, pelo Distrito Federal e pelos municípios, com o objetivo de garantir o acesso a informações.", "c": "advogado_11:4"}, {"p": "advogado_11", "n": 42, "a": "legislacao", "t": "A Lei de Acesso à Informação prevê a necessidade de  observância da publicidade como exceção e do sigilo como preceito geral.", "c": "advogado_11:4"}, {"p": "advogado_11", "n": 43, "a": "legislacao", "t": "Os procedimentos previstos na Lei de Acesso à  Informação destinam‑se a assegurar o direito fundamental de acesso à informação e devem ser executados em conformidade com os princípios básicos da Administração Pública.", "c": "advogado_11:4"}, {"p": "advogado_11", "n": 44, "a": "legislacao", "t": "A Lei de Acesso à Informação considera como  informação todos os dados, processos ou não, que podem ser utilizados para a produção e para a transmissão de conhecimento, contidos em qualquer meio, suporte ou formato.", "c": "advogado_11:4"}, {"p": "advogado_11", "n": 45, "a": "legislacao", "t": "É dever do Estado garantir o direito de acesso  à informação, que será franqueada, mediante procedimentos burocráticos, sem a necessidade de observância de prazos ágeis.", "c": "advogado_11:4"}, {"p": "advogado_11", "n": 46, "a": "direito", "t": "Aplicam‑se as disposições da Lei de Acesso à  Informação às entidades privadas sem fins lucrativos que recebam, para realização de ações de interesse público, recursos públicos diretamente do orçamento ou mediante subvenções sociais, contrato de gestão, termo de parceria, convênios, acordo, ajustes ou outros instrumentos congêneres.", "c": "advogado_11:4"}, {"p": "advogado_11", "n": 47, "a": "legislacao", "t": "Os órgãos da administração indireta são dispensados  dos procedimentos previstos na Lei de Acesso à Informação.", "c": "advogado_11:4"}, {"p": "advogado_11", "n": 48, "a": "legislacao", "t": "A Lei de Acesso à Informação define informação  sigilosa como aquela relacionada à pessoal natural identificada ou identificável.", "c": "advogado_11:4"}, {"p": "advogado_11", "n": 49, "a": "legislacao", "t": "Cabe aos órgãos e às entidades do poder público,  observadas as normas e os procedimentos específicos aplicáveis, assegurar a gestão transparente da informação, propiciando acesso restrito a ela.", "c": "advogado_11:4"}, {"p": "advogado_11", "n": 50, "a": "direito", "t": "Subordinam‑se ao regime da Lei de Acesso à  Informação os órgãos públicos integrantes da Administração Direta dos Poderes Executivo, Legislativo, incluindo as Cortes de Contas, do Judiciário e do Ministério Público.", "c": "advogado_11:4"}, {"p": "advogado_11", "n": 51, "a": "legislacao", "t": "Esse decreto regulamenta os procedimentos para a  garantia do acesso à informação no âmbito dos órgãos da Administração Pública Direta.", "c": "advogado_11:5"}, {"p": "advogado_11", "n": 52, "a": "legislacao", "t": "A busca e o fornecimento da informação são  gratuitos, ressalvada a cobrança do valor referente ao custo dos serviços e dos materiais utilizados, tais como reprodução de documentos, mídias digitais e postagem.", "c": "advogado_11:5"}, {"p": "advogado_11", "n": 53, "a": "legislacao", "t": "O documento preparatório é o documento formal  utilizado como fundamento da tomada de decisão ou de ato administrativo, a exemplo de pareceres e notas técnicas.", "c": "advogado_11:5"}, {"p": "advogado_11", "n": 54, "a": "legislacao", "t": "O decreto define como autenticidade a qualidade  da informação não modificada, inclusive quanto à origem, ao trânsito e ao destino.", "c": "advogado_11:5"}, {"p": "advogado_11", "n": 55, "a": "legislacao", "t": "A informação é definida como todo dado submetido  a qualquer operação ou tratamento por meio de processamento eletrônico ou por meio automatizado com o emprego da tecnologia da informação.", "c": "advogado_11:5"}, {"p": "advogado_11", "n": 56, "a": "legislacao", "t": "A derrubada do presidente Evo Morales na Bolívia  não alcançou êxito, devido à mobilização popular convocada pelos eleitores pró‑governo.", "c": "advogado_11:6"}, {"p": "advogado_11", "n": 57, "a": "gerais", "t": "O atual golpe de estado na Bolívia ocorreu devido a  problemas políticos atrelados ao pleito presidencial anterior, uma vez que, após a saída do presidente, não houve eleições posteriores.", "c": "advogado_11:6"}, {"p": "advogado_11", "n": 58, "a": "legislacao", "t": "A Organização dos Estados Americanos (OEA)  identificou irregularidades no processo eleitoral da política nacional boliviana, a ponto de gerar a renúncia de um de seus presidentes.", "c": "advogado_11:6"}, {"p": "advogado_11", "n": 59, "a": "legislacao", "t": "Países como Brasil, Chile, Paraguai e Honduras  condenaram a mobilização do exército boliviano para a tomada de poder na Bolívia.", "c": "advogado_11:6"}, {"p": "advogado_11", "n": 60, "a": "legislacao", "t": "A democracia latino‑americana mostra‑se frágil,  a partir do momento em que, no instante após a tentativa de golpe na Bolívia, apenas militares de baixa patente e alguns manifestantes civis foram presos dias depois do ocorrido.", "c": "advogado_11:6"}, {"p": "advogado_11", "n": 61, "a": "legislacao", "t": "Evo Morales renunciou, em 2019, à presidência  da Bolívia após ter passado mais de uma década no poder.", "c": "advogado_11:6"}, {"p": "advogado_11", "n": 62, "a": "legislacao", "t": "Os dois motins políticos de tomada de poder  acontecidos na Bolívia têm fundamentos no fato de não haver manifestações nas ruas em favor da democracia.", "c": "advogado_11:6"}, {"p": "advogado_11", "n": 63, "a": "legislacao", "t": "O atual presidente boliviano foi eleito com o apoio  do antigo presidente, mas os dois tornaram‑se adversários políticos para o próximo pleito presidencial, que acontecerá em 2025.", "c": "advogado_11:6"}, {"p": "advogado_11", "n": 64, "a": "legislacao", "t": "As reservas de gás e lítio fazem da Bolívia um país  importante nos contextos geopolítico e econômico internacionais.", "c": "advogado_11:6"}, {"p": "advogado_11", "n": 65, "a": "legislacao", "t": "Apesar de os índices econômicos estarem apontando  crescimento e a exportação de combustíveis apontarem expansão, a crise boliviana é estritamente política pelas disputas de poder.", "c": "advogado_11:6"}, {"p": "advogado_11", "n": 66, "a": "gerais", "t": "Uma empresa de comunicação estadunidense sediou  um debate entre os candidatos ao pleito presidencial dos Estados Unidos, momento em que a troca de acusações sobre assuntos ligados à economia e à imigração veio à tona.", "c": "advogado_11:7"}, {"p": "advogado_11", "n": 67, "a": "gerais", "t": "Todos os institutos de pesquisa apontam, desde  o início do ano eleitoral, para a eleição de Trump, candidato do partido republicano.", "c": "advogado_11:7"}, {"p": "advogado_11", "n": 68, "a": "legislacao", "t": "O questionamento sobre a senilidade do atual  presidente norte‑americano acerca de um segundo mandato tornou‑se uma questão importante, a ponto de chamar a atenção de eleitores e da imprensa internacional.", "c": "advogado_11:7"}, {"p": "advogado_11", "n": 69, "a": "legislacao", "t": "A disputa presidencial norte‑americana marcou a  segunda vez em que um presidente e um ex‑presidente ficaram cara a cara em um debate presidencial. A primeira foi com Barack Obama e Bill Clinton.", "c": "advogado_11:7"}, {"p": "advogado_11", "n": 70, "a": "gerais", "t": "O candidato republicano é o único homem condenado  criminalmente por falsificação que já esteve na presidência dos Estados Unidos da América. Prova aplicada  Advogado CONSELHO REGIONAL DE MEDICINA DO ESTADO DE RORAIMA Quadrix | 2024 5", "c": "advogado_11:7"}, {"p": "advogado_11", "n": 71, "a": "direito", "t": "Pertence aos municípios o produto da arrecadação  do imposto da União sobre a renda e os proventos de qualquer natureza, incidente na fonte sobre os rendimentos pagos, por eles, suas autarquias e fundações.", "c": "advogado_11:8"}, {"p": "advogado_11", "n": 72, "a": "direito", "t": "É proibido ao banco central conceder, direta ou  indiretamente, empréstimos ao Tesouro Nacional e a qualquer órgão ou entidade que não seja instituição financeira.", "c": "advogado_11:8"}, {"p": "advogado_11", "n": 73, "a": "direito", "t": "Nenhum benefício da seguridade social poderá ser  criado, majorado ou estendido sem a correspondente fonte de custeio total.", "c": "advogado_11:8"}, {"p": "advogado_11", "n": 74, "a": "direito", "t": "A lei disporá sobre a remoção e a comercialização de  órgãos e tecidos humanos, sangue e seus derivados, para fins de transplante, pesquisa e tratamento.", "c": "advogado_11:8"}, {"p": "advogado_11", "n": 75, "a": "direito", "t": "É permitida a filiação ao regime geral de Previdência  Social de pessoa participante de regime próprio de previdência como segurado facultativo.", "c": "advogado_11:8"}, {"p": "advogado_11", "n": 76, "a": "direito", "t": "É permitida a vinculação e (ou) equiparação de  espécies remuneratórias para a remuneração de pessoal do serviço público, diante do princípio da isonomia.", "c": "advogado_11:9"}, {"p": "advogado_11", "n": 77, "a": "direito", "t": "As pessoas jurídicas de direito privado prestadoras de  serviços públicos responderão pelos danos que seus agentes causarem a terceiros, assegurado o direito de regresso nos casos de dolo ou culpa.", "c": "advogado_11:9"}, {"p": "advogado_11", "n": 78, "a": "direito", "t": "A ação, quanto aos créditos das relações de trabalho,  tem prazo prescricional de cinco anos, até o limite de dois anos após a extinção do contrato de trabalho.", "c": "advogado_11:9"}, {"p": "advogado_11", "n": 79, "a": "direito", "t": "Cabe habeas data sempre que a inexistência de  norma regulamentadora tornar inviável o exercício dos direitos e das liberdades constitucionais.", "c": "advogado_11:9"}, {"p": "a
